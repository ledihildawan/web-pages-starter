<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>Telkomsel Story - Seamless UI</title>
        <style>
            :root {
                --brand-red: #EE2D24;
                --brand-dark: #050505;
                --surface: #ffffff;
                --bg-gray: #F8F9FA;
                --text-main: #111111;
                --text-sub: #555555;
                --glass-bg: rgba(20,20,20,0.6);
                --glass-border: rgba(255,255,255,0.15);
                --ease-out: cubic-bezier(0.25,1,0.5,1);
                --ease-spring: cubic-bezier(0.34,1.5,0.64,1);
                --card-width: 420px;
                --desktop-gap: 40px;
                --fab-size: 44px;
                --frame-radius: 12px;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }
            body {
                background: #0f0f11;
                font-family: -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
                overflow: hidden;
                color: var(--text-main);
            }

            .layout-wrapper {
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100dvh;
                width: 100vw;
                touch-action: pan-y;
                transition: opacity 0.5s var(--ease-out);
            }
            .desktop-slider {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100dvh;
                width: 100%;
                transition: padding 0.7s var(--ease-spring);
            }

            .story-group-wrapper {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100dvh;
                width: 100%;
            }

            .story-container {
                position: relative;
                height: 100dvh;
                width: 100%;
                max-width: calc(100dvh * 9/16);
                min-width: 320px;
                background: var(--brand-dark);
                overflow: hidden;
                z-index: 10;
                border-radius: var(--frame-radius);
                transition: border-radius 0.6s var(--ease-out),box-shadow 0.6s var(--ease-out);
                transform: translateZ(0);
            }

            .ambient-layer {
                display: none;
                position: absolute;
                top: 5%;
                left: 0;
                right: 0;
                margin: 0 auto;
                width: 110%;
                height: 90%;
                z-index: 1;
                filter: blur(60px) saturate(150%);
                opacity: 0.4;
                pointer-events: none;
                transition: opacity 0.6s;
                will-change: opacity, transform;
                transform: translateZ(0);
            }
            #ambientPlayer {
                width: 100%;
                height: 100%;
                border: none;
                opacity: 0;
                transition: opacity 0.8s var(--ease-out);
            }
            .story-container.is-focused .ambient-layer {
                opacity: 0.25;
            }

            .story-viewport {
                position: absolute;
                inset: 0;
                z-index: 10;
                background: transparent;
                overflow: hidden;
                border-radius: inherit;
                transition: filter 0.6s var(--ease-out);
                will-change: filter;
            }
            .story-video-wrapper {
                position: relative;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: var(--brand-dark);
            }
            .story-video-wrapper::after {
                content: '';
                position: absolute;
                inset: 0;
                pointer-events: none;
                z-index: 5;
                background: linear-gradient(to bottom,rgba(0,0,0,0.05) 0,rgba(0,0,0,0) 25%,rgba(0,0,0,0) 50%,rgba(0,0,0,0.85) 100%);
                transition: opacity 0.4s var(--ease-out);
            }

            #youtubePlayer {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                border: none;
                pointer-events: none;
                object-fit: cover;
                opacity: 0;
                transition: opacity 0.8s var(--ease-out);
            }
            .story-click-layer {
                position: absolute;
                inset: 0;
                z-index: 12;
                cursor: pointer;
                touch-action: manipulation;
            }

            .story-center-play {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(1.5);
                font-size: 80px;
                z-index: 25;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.4s ease-out, transform 0.4s ease-out;
                filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
                will-change: transform, opacity;
            }
            .story-center-play.is-flashing {
                opacity: 0.9;
                transform: translate(-50%, -50%) scale(1);
                transition: opacity 0.1s ease-in, transform 0.2s var(--ease-spring);
            }

            .story-loader {
                position: absolute;
                inset: 0;
                z-index: 50;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--brand-dark);
                transition: opacity 0.6s var(--ease-out);
                pointer-events: none;
            }
            .story-loader__spinner {
                width: 42px;
                height: 42px;
                border: 3.5px solid rgba(255,255,255,0.1);
                border-top-color: var(--brand-red);
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .layout-wrapper.is-ready .story-loader {
                opacity: 0;
            }

            .story-progress-bar {
                position: absolute;
                top: max(16px,env(safe-area-inset-top));
                left: 16px;
                right: 16px;
                height: 3px;
                background: rgba(255,255,255,0.25);
                z-index: 15;
                border-radius: 4px;
                overflow: hidden;
                opacity: 0;
                transition: opacity 0.8s var(--ease-out);
            }
            .story-progress-bar__fill {
                height: 100%;
                background: rgba(255,255,255,0.95);
                width: 0;
                border-radius: 4px;
                box-shadow: 0 0 8px rgba(255,255,255,0.5);
                will-change: width;
            }

            .story-top-actions {
                position: absolute;
                top: max(32px,env(safe-area-inset-top));
                left: 16px;
                z-index: 20;
                display: flex;
                flex-direction: row;
                gap: 12px;
                opacity: 0;
                pointer-events: none;
                transform: translateY(-20px);
                transition: opacity 0.8s var(--ease-out),transform 0.8s var(--ease-spring);
            }

            .story-excerpt {
                position: absolute;
                bottom: max(32px,env(safe-area-inset-bottom));
                left: 20px;
                right: 20px;
                padding-right: 70px;
                z-index: 20;
                color: #fff;
                cursor: pointer;
                opacity: 0;
                pointer-events: none;
                transform: translateY(20px);
                transition: opacity 0.8s var(--ease-out),transform 0.8s var(--ease-spring);
            }
            .story-player-actions {
                position: absolute;
                bottom: max(32px,env(safe-area-inset-bottom));
                right: 16px;
                z-index: 20;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                opacity: 0;
                pointer-events: none;
                transform: translateY(20px);
                transition: opacity 0.8s var(--ease-out),transform 0.8s var(--ease-spring);
            }

            .story-card {
                display: none;
                width: var(--card-width);
                height: auto;
                max-height: calc(100dvh - 80px);
                background: var(--surface);
                border-radius: var(--frame-radius);
                padding: 32px 0 0;
                z-index: 30;
                position: relative;
                flex-direction: column;
                overflow: hidden;
                box-shadow: 0 32px 72px rgba(0,0,0,0.3);
                border: 1px solid rgba(255,255,255,0.05);
            }

            .story-excerpt__badge {
                background: rgba(255,255,255,0.15);
                color: #fff;
                backdrop-filter: blur(12px);
                border: 0.5px solid var(--glass-border);
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                padding: 6px 12px;
                border-radius: 8px;
                display: inline-block;
                margin-bottom: 12px;
            }
            .story-excerpt__title {
                font-size: 20px;
                font-weight: 800;
                margin-bottom: 8px;
                text-shadow: 0 2px 10px rgba(0,0,0,0.6);
                line-height: 1.2;
            }
            .story-excerpt__text {
                font-size: 14px;
                line-height: 1.5;
                opacity: 0.9;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                text-shadow: 0 1px 8px rgba(0,0,0,0.6);
            }

            .player-fab {
                width: var(--fab-size);
                height: var(--fab-size);
                border-radius: 50%;
                background: var(--glass-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid var(--glass-border);
                color: #fff;
                font-size: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: 0 6px 16px rgba(0,0,0,0.2);
                transition: background 0.3s,box-shadow 0.3s, opacity 0.3s, transform 0.3s;
            }
            .player-fab:active {
                background: rgba(255,255,255,0.1);
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            }

            /* ELEMEN GLOBAL DILUAR VIDEO (Dipaku ke Viewport) */
            .story-close-player {
                position: absolute;
                z-index: 30;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.8s var(--ease-out),transform 0.8s var(--ease-spring);
            }
            .external-nav-group {
                position: absolute;
                display: flex;
                flex-direction: column;
                gap: 12px;
                z-index: 20;
                opacity: 0;
                transition: opacity 0.6s var(--ease-out);
            }
            .external-nav-btn {
                width: var(--fab-size);
                height: var(--fab-size);
                border-radius: 50%;
                background: var(--glass-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid var(--glass-border);
                color: #fff;
                font-size: 20px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 6px 16px rgba(0,0,0,0.2);
                transition: background 0.3s ease, transform 0.2s ease, opacity 0.3s ease;
            }
            .external-nav-btn:active:not(.is-disabled) {
                background: rgba(255,255,255,0.1);
                transform: scale(0.95);
            }
            .external-nav-btn.is-disabled {
                opacity: 0.3;
                cursor: not-allowed;
                pointer-events: none;
            }

            /* Init Element Visibility */
            .layout-wrapper.is-ready .external-nav-group,
            .layout-wrapper.is-ready .story-close-player,
            .layout-wrapper.is-ready .story-excerpt,
            .layout-wrapper.is-ready .story-player-actions,
            .layout-wrapper.is-ready .story-progress-bar,
            .layout-wrapper.is-ready .story-top-actions {
                opacity: 1;
                pointer-events: auto;
                transform: translateY(0);
            }

            .reaction-wrapper {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .reaction-options {
                position: absolute;
                bottom: 100%;
                right: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                pointer-events: none;
                padding-bottom: 12px;
            }
            .reaction-wrapper.is-active .reaction-options {
                pointer-events: auto;
            }
            .reaction-option-btn {
                width: var(--fab-size);
                height: var(--fab-size);
                border-radius: 50%;
                background: var(--glass-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid var(--glass-border);
                color: #fff;
                font-size: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: 0 6px 16px rgba(0,0,0,0.2);
                opacity: 0;
                transform: translateY(20px) scale(0.6);
                transition: all 0.4s var(--ease-spring);
            }
            .reaction-option-btn:active {
                background: rgba(255,255,255,0.1);
            }
            .reaction-wrapper.is-active .reaction-option-btn {
                opacity: 1;
                transform: translateY(0) scale(1);
                margin-bottom: 10px;
            }
            .reaction-wrapper.is-active .player-fab {
                background: rgba(255,255,255,0.9);
                color: var(--brand-dark);
            }
            .reaction-option-btn:nth-child(1) {
                transition-delay: 0s;
            }
            .reaction-option-btn:nth-child(2) {
                transition-delay: 0.04s;
            }
            .reaction-option-btn:nth-child(3) {
                transition-delay: 0.08s;
            }
            .reaction-option-btn:nth-child(4) {
                transition-delay: 0.12s;
            }
            .reaction-wrapper.is-active .reaction-option-btn:nth-child(4) {
                transition-delay: 0s;
            }
            .reaction-wrapper.is-active .reaction-option-btn:nth-child(3) {
                transition-delay: 0.05s;
            }
            .reaction-wrapper.is-active .reaction-option-btn:nth-child(2) {
                transition-delay: 0.1s;
            }
            .reaction-wrapper.is-active .reaction-option-btn:nth-child(1) {
                transition-delay: 0.15s;
            }

            /* =========================================================
               LOGIKA CLEAN MODE (Hanya hide UI di dalam Video)
               ========================================================= */
            .layout-wrapper.is-clean-mode .reaction-wrapper,
            .layout-wrapper.is-clean-mode .share-fab,
            .layout-wrapper.is-clean-mode .story-excerpt,
            .layout-wrapper.is-clean-mode .story-top-actions {
                opacity: 0 !important;
                pointer-events: none !important;
            }
            .layout-wrapper.is-clean-mode .story-top-actions {
                transform: translateY(-20px) !important;
            }
            .layout-wrapper.is-clean-mode .story-video-wrapper::after {
                display: none!important;
            }
            .layout-wrapper.is-clean-mode #icon-enter-fs {
                display: none;
            }
            .layout-wrapper.is-clean-mode #icon-exit-fs {
                display: block!important;
            }

            .overlay-backdrop {
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,0.6);
                backdrop-filter: blur(4px);
                opacity: 0;
                transition: opacity 0.5s;
                pointer-events: auto;
                touch-action: none;
            }
            .is-active .overlay-backdrop {
                opacity: 1;
            }

            .story-sheet {
                position: fixed;
                inset: 0;
                z-index: 100;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                visibility: hidden;
                pointer-events: none;
            }
            .story-sheet.is-active {
                visibility: visible;
            }
            .story-sheet__content {
                position: relative;
                background: var(--surface);
                border-radius: 28px 28px 0 0;
                width: 100%;
                padding: 12px 0 0;
                z-index: 101;
                transform: translateY(100%);
                pointer-events: auto;
                max-height: 88vh;
                height: auto;
                display: flex;
                flex-direction: column;
                transition: transform 0.6s var(--ease-spring);
                box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
                will-change: transform;
            }
            .story-sheet.is-active .story-sheet__content {
                transform: translateY(0);
            }
            .story-sheet__content.is-dragging {
                transition: none;
            }
            .story-sheet__handle-wrapper {
                width: 100%;
                padding: 10px 0 24px;
                cursor: grab;
                display: flex;
                justify-content: center;
                flex-shrink: 0;
                touch-action: none;
            }
            .story-sheet__handle {
                width: 44px;
                height: 5px;
                background: #D1D1D6;
                border-radius: 10px;
            }

            .story-popup {
                position: fixed;
                inset: 0;
                z-index: 100;
                display: flex;
                justify-content: center;
                align-items: center;
                visibility: hidden;
                pointer-events: none;
            }
            .story-popup.is-active {
                visibility: visible;
            }
            .story-popup__content {
                position: relative;
                background: var(--surface);
                width: var(--card-width);
                padding: 32px 0;
                z-index: 101;
                opacity: 0;
                transform: translateY(40px);
                max-height: calc(100dvh - 64px);
                height: auto;
                border-radius: var(--frame-radius);
                transition: transform 0.6s var(--ease-spring),opacity 0.6s var(--ease-spring);
                pointer-events: auto;
                display: flex;
                flex-direction: column;
                box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            }
            .story-popup.is-active .story-popup__content {
                opacity: 1;
                transform: translateY(0);
            }
            .story-close-btn {
                position: absolute;
                top: 20px;
                right: 24px;
                width: 36px;
                height: 36px;
                border: none;
                background: var(--bg-gray);
                border-radius: 50%;
                font-size: 14px;
                font-weight: bold;
                color: var(--text-sub);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.3s;
                z-index: 30;
            }

            .story-dynamic-area,
            .story-view {
                display: flex;
                flex-direction: column;
                min-height: 0;
                flex: 1 1 auto;
            }
            .story-header {
                flex-shrink: 0;
                padding: 0 28px;
            }
            .story-view__title {
                font-size: 24px;
                font-weight: 800;
                color: var(--text-main);
                margin-bottom: 6px;
                line-height: 1.25;
            }
            .story-view__meta {
                font-size: 13px;
                font-weight: 500;
                color: #888;
                margin-bottom: 24px;
                display: block;
            }

            .story-body {
                flex: 1 1 auto;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding: 0 28px 32px;
                min-height: 0;
                overscroll-behavior-y: contain;
            }
            .story-body::-webkit-scrollbar {
                width: 5px;
            }
            .story-body::-webkit-scrollbar-thumb {
                background: #D1D1D6;
                border-radius: 10px;
            }
            .story-body::-webkit-scrollbar-track {
                background: transparent;
                margin: 8px 0;
            }
            .story-body__cms-content {
                font-size: 15px;
                color: var(--text-sub);
                line-height: 1.6;
            }
            .story-body__cms-content p {
                margin-bottom: 16px;
            }

            .story-footer {
                display: none;
                flex-shrink: 0;
                gap: 14px;
                background: var(--surface);
                padding: 20px 28px 28px;
                position: sticky;
                bottom: 0;
                z-index: 20;
                border-top: 1px solid rgba(0,0,0,0.03);
            }
            .emote {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: space-around;
                background: var(--bg-gray);
                border-radius: 20px;
                padding: 0 8px;
                height: 56px;
            }
            .emote > div {
                font-size: 26px;
                cursor: pointer;
                padding: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: opacity 0.3s;
                user-select: none;
            }
            .story-footer-share {
                background: var(--bg-gray);
                border: none;
                border-radius: 20px;
                font-size: 24px;
                cursor: pointer;
                width: 56px;
                height: 56px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.3s;
                color: var(--text-main);
                flex-shrink: 0;
            }

            #reaction-container {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 15;
                overflow: hidden;
                contain: strict;
            }
            .particle {
                position: absolute;
                top: -10%;
                left: var(--x);
                font-size: var(--size);
                opacity: 0;
                will-change: transform,opacity;
                animation: drop-physics var(--duration) ease-in forwards;
                animation-delay: var(--delay);
                filter: blur(var(--blur)) drop-shadow(0 2px 6px rgba(0,0,0,0.4));
                z-index: var(--z);
            }
            @keyframes drop-physics {
                0% {
                    transform: translate3d(0,0,0) rotate(0deg);
                    opacity: 0;
                }
                10%,
                80% {
                    opacity: 1;
                }
                100% {
                    transform: translate3d(var(--drift),120vh,0) rotate(var(--rotation));
                    opacity: 0;
                }
            }

            @media(hover:hover) and (pointer:fine) {
                .layout-wrapper.is-ready .story-excerpt:hover {
                    opacity: 0.9;
                }
                .player-fab:hover {
                    background: rgba(255,255,255,0.25);
                    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
                }
                .reaction-option-btn:hover {
                    background: rgba(255,255,255,0.25);
                }
                .story-close-btn:hover {
                    background: #E9ECEF;
                    color: var(--text-main);
                }
                .emote > div:hover {
                    opacity: 0.7;
                }
                .story-footer-share:hover {
                    background: #E9ECEF;
                }
                .external-nav-btn:hover:not(.is-disabled) {
                    background: rgba(255,255,255,0.25);
                    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
                }
            }

            /* --- Mobile (< 768px) --- */
            @media(max-width:767px) {
                .story-container,
                .story-viewport {
                    border-radius: 0!important;
                }
                .story-popup {
                    display: none!important;
                }
                .external-nav-group {
                    display: none !important;
                }
                .story-group-wrapper {
                    width: 100%;
                }

                /* Posisi Close di Mobile (Di Dalam Screen/Video) */
                .story-close-player {
                    top: max(32px, env(safe-area-inset-top));
                    right: 16px;
                    transform: translateY(-20px);
                }

                /* Mobile Clean Mode Ikut Menghilangkan Tombol Close */
                .layout-wrapper.is-clean-mode .story-close-player {
                    opacity: 0 !important;
                    pointer-events: none !important;
                    transform: translateY(-20px) !important;
                }

                /* Blur/Hide saat Bottom Sheet (Konteks) Terbuka */
                .layout-wrapper.is-ui-open .story-viewport {
                    filter: blur(12px) brightness(0.5);
                    transform: scale(0.97);
                    border-radius: var(--frame-radius)!important;
                }
                .layout-wrapper.is-ui-open .story-close-player,
                .layout-wrapper.is-ui-open .story-excerpt,
                .layout-wrapper.is-ui-open .story-player-actions,
                .layout-wrapper.is-ui-open .story-top-actions {
                    opacity: 0;
                    pointer-events: none;
                }
            }

            /* --- Tablet (768px - 1489px) --- */
            @media(min-width:768px) and (max-width:1489px) {
                .story-sheet {
                    display: none!important;
                }
                .ambient-layer {
                    display: block;
                }
                .story-group-wrapper {
                    height: calc(100dvh - 64px);
                    width: auto;
                }
                .story-container {
                    width: auto;
                    height: 100%;
                    aspect-ratio: 9/16;
                    overflow: visible;
                    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
                }

                /* Posisi Navigasi & Close di Luar Frame Video Kanan */
                .external-nav-group {
                    right: -70px;
                    top: 50%;
                    transform: translateY(-50%);
                }
                .story-close-player {
                    right: -70px;
                    top: 0;
                    transform: translateY(0);
                }

                /* Hide Nav & Close saat Popup Tablet dibuka */
                .layout-wrapper.is-ui-open .external-nav-group,
                .layout-wrapper.is-ui-open .story-close-player {
                    opacity: 0;
                    pointer-events: none;
                }

                /* Efek Blur saat Popup Terbuka */
                .layout-wrapper.is-ui-open .story-viewport {
                    filter: blur(12px) brightness(0.6);
                    transform: scale(0.97);
                }
                .layout-wrapper.is-ui-open .story-excerpt,
                .layout-wrapper.is-ui-open .story-player-actions,
                .layout-wrapper.is-ui-open .story-top-actions {
                    opacity: 0;
                    pointer-events: none;
                }

                .story-body,
                .story-header {
                    padding: 0 36px;
                }
                .story-footer {
                    display: flex;
                    padding: 20px 36px 36px;
                }
                /* Tampilkan Action Modal di Tablet */
            }

            /* --- Large Desktop (>= 1490px) SHIFTING LAYOUT LOGIC --- */
            @media(min-width:1490px) {
                .story-popup,
                .story-sheet {
                    display: none!important;
                }
                .ambient-layer {
                    display: block;
                    opacity: 0.6;
                }

                /* Wrapper memeluk ukuran Video dan jadi penggerak layout */
                .story-group-wrapper {
                    width: max-content;
                    height: calc(100dvh - 80px);
                    position: relative;
                    transition: transform 0.6s var(--ease-spring);
                    margin: 0 auto;
                }
                .story-container {
                    width: auto;
                    height: 100%;
                    aspect-ratio: 9/16;
                    overflow: visible;
                    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
                    z-index: 10;
                }

                /* ANIMASI SHIFT (Menggeser Video ke kiri secara absolut agar seimbang di layar) */
                .layout-wrapper.is-ui-open .story-group-wrapper {
                    transform: translateX(-200px);
                    /* Jarak geser diatur agar tetap seimbang */
                }

                /* Setup Animasi Card Desktop (Tertanam posisi Fixed thd layar, merapat ke Navigasi) */
                .story-card {
                    display: flex;
                    position: fixed;
                    right: -450px;
                    /* Awalnya di luar layar kanan */
                    top: 50%;
                    transform: translateY(-50%);
                    margin: 0;
                    opacity: 0;
                    pointer-events: none;
                    transition: all 0.6s var(--ease-spring);
                    z-index: 15;
                }
                .layout-wrapper.is-ui-open .story-card {
                    opacity: 1;
                    pointer-events: auto;
                    right: 100px;
                    /* Tepat di kiri tombol navigasi */
                    transform: translateY(-50%);
                }

                /* Posisi Navigasi & Close Dipaku di Pojok Kanan Viewport - TIDAK IKUT BERGESER */
                .layout-wrapper .external-nav-group {
                    display: flex;
                    position: absolute;
                    right: 40px;
                    top: 50%;
                    transform: translateY(-50%);
                    z-index: 20;
                    opacity: 1;
                    pointer-events: auto;
                }
                .layout-wrapper .story-close-player {
                    position: absolute;
                    right: 40px;
                    top: max(40px, env(safe-area-inset-top));
                    z-index: 20;
                    transform: translateY(0);
                    opacity: 1;
                    pointer-events: auto;
                }

                /* Di Desktop, Nav dan Close TETAP TAMPIL saat Card bergeser */
                .layout-wrapper.is-ui-open .external-nav-group,
                .layout-wrapper.is-ui-open .story-close-player {
                    opacity: 1;
                    pointer-events: auto;
                }

                /* TIDAK ADA BLUR. Video & UI interaksi tetap normal berjalan */
                .layout-wrapper.is-ui-open .story-viewport {
                    filter: none;
                    transform: none;
                }

                /* ========================================================
                   PERBAIKAN: Pastikan seluruh UI Video Utama tetap tampil normal 
                   (termasuk Excerpt/Judul) saat Card Terbuka
                   ======================================================== */
                .layout-wrapper.is-ui-open .story-excerpt,
                .layout-wrapper.is-ui-open .story-player-actions,
                .layout-wrapper.is-ui-open .story-top-actions {
                    opacity: 1;
                    pointer-events: auto;
                }

                .story-body,
                .story-header {
                    padding: 0 36px;
                }
                /* Hilangkan Emote/Share di dalam Card Desktop, karena sudah ada di Player Utama */
                .story-card .story-footer {
                    display: none !important;
                }
            }
        </style>
    </head>
    <body>
        <div class="layout-wrapper" id="layoutWrapper">
            <div class="desktop-slider">

                <div class="story-group-wrapper" id="storyGroupWrapper">

                    <div class="story-container" id="storyContainer">
                        <div class="ambient-layer">
                            <div id="ambientPlayer"></div>
                        </div>
                        <div class="story-viewport">
                            <div class="story-loader">
                                <div class="story-loader__spinner"></div>
                            </div>
                            <div class="story-progress-bar">
                                <div class="story-progress-bar__fill" id="storyProgressFill"></div>
                            </div>

                            <div class="story-top-actions">
                                <button class="player-fab" id="btnPlayPause" aria-label="Pause Video" onclick="StoryManager.togglePlayPause(event)">⏸️</button>
                                <button class="player-fab" id="btnMute" aria-label="Mute Audio" onclick="StoryManager.toggleMute(event)">🔇</button>
                            </div>

                            <div class="story-video-wrapper">
                                <div id="youtubePlayer"></div>
                            </div>

                            <div class="story-click-layer" onclick="StoryManager.handleStoryClick(event)"></div>
                            <div id="reaction-container"></div>
                            <div class="story-center-play" id="centerPlayIndicator" aria-hidden="true">▶️</div>

                            <div class="story-excerpt" onclick="StoryManager.openContext()">
                                <span class="story-excerpt__badge">Kategori</span>
                                <h2 class="story-excerpt__title">Judul Video</h2>
                                <div class="story-excerpt__text">Deskripsi singkat video...</div>
                            </div>

                            <div class="story-player-actions">
                                <div class="reaction-wrapper" id="reactionWrapper">
                                    <div class="reaction-options">
                                        <button class="reaction-option-btn" onclick="StoryManager.react('❤️',event)">❤️</button>
                                        <button class="reaction-option-btn" onclick="StoryManager.react('🔥',event)">🔥</button>
                                        <button class="reaction-option-btn" onclick="StoryManager.react('🤣',event)">🤣</button>
                                        <button class="reaction-option-btn" onclick="StoryManager.react('👏🏻',event)">👏🏻</button>
                                        <button class="reaction-option-btn" onclick="StoryManager.react('😭',event)">😭</button>
                                    </div>
                                    <button class="player-fab" onclick="StoryManager.toggleReactionMenu(event)">🤍</button>
                                </div>
                                <button class="player-fab share-fab" onclick="StoryManager.nativeShare()">🔗</button>
                                <button class="player-fab fullscreen-fab" onclick="StoryManager.toggleCleanMode(event)">
                                    <span id="icon-enter-fs">🔲</span><span id="icon-exit-fs" style="display:none">✖️</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="story-card" id="storyCardDashboard">
                    <button class="story-close-btn" aria-label="Tutup Detail" onclick="StoryManager.closeContext()">✖️</button>
                    <div class="story-dynamic-area"></div>
                </div>

                <div class="external-nav-group">
                    <button id="btnPrevStory" class="external-nav-btn" aria-label="Video Sebelumnya" onclick="StoryManager.prevVideo(event)">🔼</button>
                    <button id="btnNextStory" class="external-nav-btn" aria-label="Video Selanjutnya" onclick="StoryManager.nextVideo(event)">🔽</button>
                </div>

                <button class="player-fab story-close-player" aria-label="Tutup Story" onclick="StoryManager.closeStory(event)">✖️</button>

            </div>

            <div class="story-sheet" id="storySheet" aria-modal="true" role="dialog">
                <div class="story-sheet__backdrop overlay-backdrop" onclick="StoryManager.closeContext()"></div>
                <div class="story-sheet__content">
                    <div class="story-sheet__handle-wrapper" id="storySheetHandle">
                        <div class="story-sheet__handle"></div>
                    </div>
                    <div class="story-dynamic-area"></div>
                </div>
            </div>
            <div class="story-popup" id="storyPopup" aria-modal="true" role="dialog">
                <div class="story-popup__backdrop overlay-backdrop" onclick="StoryManager.closeContext()"></div>
                <div class="story-popup__content">
                    <button class="story-close-btn" onclick="StoryManager.closeContext()">✖️</button>
                    <div class="story-dynamic-area"></div>
                </div>
            </div>
        </div>

        <template id="storyContentTemplate">
            <div class="story-view is-active">
                <div class="story-header">
                    <h3 class="story-view__title">Judul</h3>
                    <span class="story-view__meta" id="storyMeta">Informasi • Meta</span>
                </div>
                <div class="story-body">
                    <div class="story-body__cms-content"></div>
                </div>

                <div class="story-footer">
                    <div class="emote">
                        <div role="button" tabindex="0" onclick="StoryManager.react('😭', event)">😭</div>
                        <div role="button" tabindex="0" onclick="StoryManager.react('👏🏻', event)">👏🏻</div>
                        <div role="button" tabindex="0" onclick="StoryManager.react('🤣', event)">🤣</div>
                        <div role="button" tabindex="0" onclick="StoryManager.react('🔥', event)">🔥</div>
                        <div role="button" tabindex="0" onclick="StoryManager.react('❤️', event)">❤️</div>
                    </div>
                    <button class="story-footer-share" onclick="StoryManager.nativeShare()">🔗</button>
                </div>
            </div>
        </template>

        <script>
            let player,
                ambientPlayer;
            let currentVideoIndex = 0;

            const videoPlaylist = [
                {
                    id: 'kyPF1-VvOsQ',
                    badge: 'Product Insight',
                    title: 'Gaming Performa Cerdas 🔥',
                    meta: 'Asus ROG Series • 2 Jam yang lalu',
                    excerpt: 'Laptop Asus G Gaming K16 adalah laptop tangguh yang punya performa cerdas untuk memaksimalkan potensi kerja kreatif...',
                    content: '<p>Laptop Asus G Gaming K16 adalah laptop tangguh yang punya performa cerdas untuk memaksimalkan potensi kerja kreatif yang bisa main game.</p><p>Dilengkapi CPU Intel Core i5 generasi ke-13, GPU RTX 3050, dan fitur AI Noise Cancelling. Menggunakan teknologi Asus IceCool agar tetap dingin!</p><p>Bobot hanya 1.8 Kg, sangat <i>slim</i> namun bertenaga. Harga spesial promo hari ini <strong>Rp11.495.000!</strong></p><p>Layar Asus G Gaming K16 ini mengadopsi panel OLED 120Hz yang memberikan reproduksi warna presisi dengan DCI-P3 100% gamut. Sempurna bagi gamer dan kreator.</p>'
                }, {
                    id: 'dQw4w9WgXcQ',
                    badge: 'Tips & Trik',
                    title: 'Setup Meja Kerja Minimalis 💻',
                    meta: 'Workspace Hacks • 5 Jam yang lalu',
                    excerpt: 'Rahasia membuat meja kerja terlihat bersih tanpa kabel yang berantakan, bikin produktivitas meningkat tajam!',
                    content: '<p>Ruang kerja yang berantakan adalah musuh produktivitas. Mulailah dengan manajemen kabel menggunakan <i>cable tray</i> di bawah meja.</p><p>Gunakan lengan monitor (monitor arm) untuk membebaskan area meja, memberi ilusi ruang yang lebih luas dan lega.</p>'
                }, {
                    id: 'jNQXAC9IVRw',
                    badge: 'Tech Update',
                    title: 'Evolusi Teknologi AI 🤖',
                    meta: 'AI Review • 1 Hari yang lalu',
                    excerpt: 'Melihat bagaimana kecerdasan buatan berkembang sangat pesat dalam kurun waktu 5 tahun terakhir.',
                    content: '<p>Dari asisten virtual suara biasa menjadi model generatif kompleks yang mampu merancang kode aplikasi dan lukisan hiper-realistis.</p><p>Apa dampaknya bagi industri kreatif? Mari kita telusuri evolusinya dari tahun ke tahun.</p>'
                }
            ];

            const updateVideoUI = () => {
                const data = videoPlaylist[currentVideoIndex];

                const progressFill = document.getElementById('storyProgressFill');
                if (progressFill) 
                    progressFill.style.width = '0%';
                
                document
                    .querySelector('.story-excerpt__badge')
                    .innerText = data.badge;
                document
                    .querySelector('.story-excerpt__title')
                    .innerText = data.title;
                document
                    .querySelector('.story-excerpt__text')
                    .innerText = data.excerpt;

                document
                    .querySelectorAll('.story-view__title')
                    .forEach(el => el.innerText = data.title);
                document
                    .querySelectorAll('.story-view__meta')
                    .forEach(el => el.innerText = data.meta);
                document
                    .querySelectorAll('.story-body__cms-content')
                    .forEach(el => el.innerHTML = data.content);

                if (player && typeof player.loadVideoById === 'function') {
                    player.loadVideoById(data.id);
                }
                if (ambientPlayer && typeof ambientPlayer.loadVideoById === 'function') {
                    ambientPlayer.loadVideoById(data.id);
                }

                StoryManager.startProgressBar();
                StoryManager.checkNavState();
            };

            window.StoryManager = (() => {
                const state = {
                    isOpen: false,
                    startY: 0,
                    currentY: 0,
                    isDragging: false,
                    animFrameId: null,
                    lastClickTime: 0
                };
                const domRefs = {
                    layoutWrapper: document.getElementById('layoutWrapper'),
                    groupWrapper: document.getElementById('storyGroupWrapper'),
                    mainContainer: document.getElementById('storyContainer'),
                    progressFill: document.getElementById('storyProgressFill'),
                    mobileSheet: document.getElementById('storySheet'),
                    mobileHandle: document.getElementById('storySheetHandle'),
                    tabletPopup: document.getElementById('storyPopup'),
                    dashboardCard: document.getElementById('storyCardDashboard'),
                    contentTemplate: document.getElementById('storyContentTemplate'),
                    reactionWrapper: document.getElementById('reactionWrapper'),
                    btnPlayPause: document.getElementById('btnPlayPause'),
                    btnMute: document.getElementById('btnMute'),
                    iconEnter: document.getElementById('icon-enter-fs'),
                    iconExit: document.getElementById('icon-exit-fs'),
                    reactionContainer: document.getElementById('reaction-container'),
                    centerPlayIndicator: document.getElementById('centerPlayIndicator'),
                    btnPrevStory: document.getElementById('btnPrevStory'),
                    btnNextStory: document.getElementById('btnNextStory')
                };

                const getActiveContext = () => {
                    const w = window.innerWidth;
                    if (w >= 1490) 
                        return domRefs.dashboardCard;
                    return w >= 768
                        ? domRefs.tabletPopup
                        : domRefs.mobileSheet;
                };

                const injectTemplate = (el) => {
                    const target = el.querySelector('.story-dynamic-area');
                    if (target && target.innerHTML.trim() === '') {
                        target.appendChild(domRefs.contentTemplate.content.cloneNode(true));
                    }
                };
                [domRefs.mobileSheet, domRefs.tabletPopup, domRefs.dashboardCard].forEach(injectTemplate);

                const loopProgress = () => {
                    if (!state.isOpen && player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                        const duration = player.getDuration();
                        const currentTime = player.getCurrentTime();
                        if (duration > 0) {
                            const percent = (currentTime / duration) * 100;
                            domRefs.progressFill.style.width = `${percent}%`;
                        }
                    }
                    state.animFrameId = requestAnimationFrame(loopProgress);
                };

                const startProgressBar = () => {
                    if (state.animFrameId) 
                        cancelAnimationFrame(state.animFrameId);
                    domRefs.progressFill.style.width = '0%';
                    state.animFrameId = requestAnimationFrame(loopProgress);
                };

                const stopProgressBar = () => {
                    if (state.animFrameId) 
                        cancelAnimationFrame(state.animFrameId);
                    };
                
                let flashTimeout;
                const flashIcon = (iconStr) => {
                    const iconEl = domRefs.centerPlayIndicator;
                    if (!iconEl) 
                        return;
                    iconEl.innerText = iconStr;
                    iconEl
                        .classList
                        .remove('is-flashing');
                    void iconEl.offsetWidth;
                    iconEl
                        .classList
                        .add('is-flashing');
                    clearTimeout(flashTimeout);
                    flashTimeout = setTimeout(() => {
                        iconEl
                            .classList
                            .remove('is-flashing');
                    }, 500);
                };

                const checkNavState = () => {
                    if (domRefs.btnPrevStory) {
                        domRefs
                            .btnPrevStory
                            .classList
                            .toggle('is-disabled', currentVideoIndex === 0);
                    }
                    if (domRefs.btnNextStory) {
                        domRefs
                            .btnNextStory
                            .classList
                            .toggle('is-disabled', currentVideoIndex === videoPlaylist.length - 1);
                    }
                };

                const nextVideo = (e) => {
                    if (e) 
                        e.stopPropagation();
                    if (currentVideoIndex < videoPlaylist.length - 1) {
                        currentVideoIndex++;
                        updateVideoUI();
                        flashIcon('🔽');
                    }
                };

                const prevVideo = (e) => {
                    if (e) 
                        e.stopPropagation();
                    if (currentVideoIndex > 0) {
                        currentVideoIndex--;
                        updateVideoUI();
                        flashIcon('🔼');
                    }
                };

                const handleStoryClick = (e) => {
                    if (e) 
                        e.stopPropagation();
                    const screenWidth = window.innerWidth;
                    const clickX = e
                        .type
                        .includes('touch')
                            ? e
                                .touches[0]
                                .clientX
                            : e.clientX;

                    if (clickX < screenWidth * 0.25) {
                        if (currentVideoIndex > 0) 
                            prevVideo();
                        }
                    else if (clickX > screenWidth * 0.75) {
                        if (currentVideoIndex < videoPlaylist.length - 1) 
                            nextVideo();
                        }
                    else {
                        togglePlayPause();
                    }
                };

                const closeStory = (e) => {
                    if (e) 
                        e.stopPropagation();
                    if (player) 
                        player.pauseVideo();
                    if (ambientPlayer && typeof ambientPlayer.pauseVideo === 'function') 
                        ambientPlayer.pauseVideo();
                    
                    domRefs.layoutWrapper.style.opacity = '0';
                    setTimeout(() => {
                        domRefs.layoutWrapper.style.display = 'none';
                    }, 500);
                };

                const togglePlayPause = (e) => {
                    if (e) 
                        e.stopPropagation();
                    if (!player) 
                        return;
                    
                    const now = Date.now();
                    if (now - state.lastClickTime < 300) 
                        return;
                    state.lastClickTime = now;

                    if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                        player.pauseVideo();
                        if (ambientPlayer && typeof ambientPlayer.pauseVideo === 'function') 
                            ambientPlayer.pauseVideo();
                        flashIcon('⏸️');
                    } else {
                        player.playVideo();
                        if (ambientPlayer && typeof ambientPlayer.seekTo === 'function') {
                            ambientPlayer.seekTo(player.getCurrentTime(), true);
                            ambientPlayer.playVideo();
                        }
                        flashIcon('▶️');
                    }
                };

                const toggleMute = (e) => {
                    if (e) 
                        e.stopPropagation();
                    if (!player) 
                        return;
                    if (player.isMuted()) {
                        player.unMute();
                        domRefs.btnMute.innerText = '🔊';
                    } else {
                        player.mute();
                        domRefs.btnMute.innerText = '🔇';
                    }
                };

                const openContext = () => {
                    const ctx = getActiveContext();
                    if (!ctx) 
                        return;
                    
                    domRefs
                        .groupWrapper
                        .classList
                        .remove('is-clean-mode');
                    domRefs.iconEnter.style.display = 'block';
                    domRefs.iconExit.style.display = 'none';

                    state.isOpen = true;
                    domRefs
                        .layoutWrapper
                        .classList
                        .add('is-ui-open');
                    ctx
                        .classList
                        .add('is-active');

                    // Pause video HANYA di Mobile & Tablet. Desktop jalan terus.
                    if (window.innerWidth < 1490) {
                        if (player) 
                            player.pauseVideo();
                        if (ambientPlayer && typeof ambientPlayer.pauseVideo === 'function') 
                            ambientPlayer.pauseVideo();
                        }
                    closeReactionMenu();
                };

                const closeContext = () => {
                    if (!state.isOpen) 
                        return;
                    state.isOpen = false;
                    domRefs
                        .layoutWrapper
                        .classList
                        .remove('is-ui-open');

                    domRefs
                        .mobileSheet
                        .classList
                        .remove('is-active');
                    domRefs
                        .tabletPopup
                        .classList
                        .remove('is-active');
                    domRefs
                        .dashboardCard
                        .classList
                        .remove('is-active');

                    domRefs
                        .mobileSheet
                        .querySelector('.story-sheet__content')
                        .style
                        .transform = '';

                    if (window.innerWidth < 1490) {
                        if (player) 
                            player.playVideo();
                        if (ambientPlayer && typeof ambientPlayer.playVideo === 'function') 
                            ambientPlayer.playVideo();
                        }
                    };

                window.addEventListener('resize', () => {
                    if (state.isOpen) 
                        closeContext();
                    }
                );

                document.addEventListener('visibilitychange', () => {
                    if (document.hidden && player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                        togglePlayPause();
                    }
                });

                const toggleReactionMenu = (e) => {
                    if (e) 
                        e.stopPropagation();
                    if (domRefs.reactionWrapper) 
                        domRefs
                            .reactionWrapper
                            .classList
                            .toggle('is-active');
                    };
                
                const closeReactionMenu = () => {
                    if (domRefs.reactionWrapper) 
                        domRefs
                            .reactionWrapper
                            .classList
                            .remove('is-active');
                    };
                
                const toggleCleanMode = (e) => {
                    if (e) 
                        e.stopPropagation();
                    closeReactionMenu();
                    // Toggle clean mode pada layoutWrapper agar berdampak ke Navigasi/Close secara tepat
                    const isClean = domRefs
                        .groupWrapper
                        .classList
                        .toggle('is-clean-mode');
                    domRefs.iconEnter.style.display = isClean
                        ? 'none'
                        : 'block';
                    domRefs.iconExit.style.display = isClean
                        ? 'block'
                        : 'none';
                };

                document.addEventListener('click', (e) => {
                    if (domRefs.reactionWrapper && !domRefs.reactionWrapper.contains(e.target)) 
                        closeReactionMenu();
                    }
                );

                const nativeShare = async () => {
                    const data = {
                        title: videoPlaylist[currentVideoIndex].title,
                        url: `https://www.youtube.com/watch?v=${videoPlaylist[currentVideoIndex].id}`
                    };
                    try {
                        if (navigator.share) 
                            await navigator.share(data);
                        else {
                            navigator
                                .clipboard
                                .writeText(data.url);
                            alert("Tautan berhasil disalin!");
                        }
                    } catch (e) {}
                };

                const triggerReaction = (char) => {
                    const fragment = document.createDocumentFragment();
                    for (let i = 0; i < 35; i++) {
                        const el = document.createElement('div');
                        el.className = 'particle';
                        el.innerText = char;
                        const depth = Math.random();
                        el.style.cssText = `--x:${Math.random() * 100}%;--size:${ (depth * 1.2) + 1.2}rem;--blur:${depth < 0.2
                            ? '2px'
                            : '0px'};--z:${depth > 0.5
                                ? 20
                                : 1};--duration:${ 3500 - (depth * 1500)}ms;--delay:${Math.random() * 600}ms;--rotation:${ (Math.random() - 0.5) * 720}deg;--drift:${ (Math.random() - 0.5) * 120}px;`;

                        const removeEl = () => el.remove();
                        el.onanimationend = removeEl;
                        setTimeout(removeEl, 4000);

                        fragment.appendChild(el);
                    }
                    domRefs
                        .reactionContainer
                        .appendChild(fragment);
                    if (navigator.vibrate) 
                        navigator.vibrate(40);
                    };
                
                const react = (emoji, e) => {
                    if (e && typeof e.stopPropagation === 'function') 
                        e.stopPropagation();
                    triggerReaction(emoji);
                    const mainBtn = domRefs
                        .reactionWrapper
                        .querySelector('.player-fab');
                    if (mainBtn) {
                        mainBtn.innerText = emoji;
                        setTimeout(() => mainBtn.innerText = '🤍', 1500);
                    }
                    closeReactionMenu();
                };

                const initDrag = () => {
                    const move = (e) => {
                        if (!state.isDragging || window.innerWidth >= 768) 
                            return;
                        if (e.cancelable) 
                            e.preventDefault();
                        const y = e
                            .type
                            .includes('touch')
                                ? e
                                    .touches[0]
                                    .clientY
                                : e.clientY;
                        state.currentY = Math.max(0, y - state.startY);
                        domRefs
                            .mobileSheet
                            .querySelector('.story-sheet__content')
                            .style
                            .transform = `translateY(${state.currentY}px)`;
                    };

                    const end = () => {
                        if (!state.isDragging || window.innerWidth >= 768) 
                            return;
                        state.isDragging = false;
                        window.removeEventListener('mousemove', move);
                        window.removeEventListener('touchmove', move);
                        window.removeEventListener('mouseup', end);
                        window.removeEventListener('touchend', end);
                        if (state.currentY > 120) 
                            closeContext();
                        else 
                            domRefs
                                .mobileSheet
                                .querySelector('.story-sheet__content')
                                .style
                                .transform = '';
                        state.currentY = 0;
                    };

                    const start = (e) => {
                        if (window.innerWidth >= 768) 
                            return;
                        state.startY = e
                            .type
                            .includes('touch')
                                ? e
                                    .touches[0]
                                    .clientY
                                : e.clientY;
                        state.isDragging = true;
                        window.addEventListener('mousemove', move);
                        window.addEventListener('touchmove', move, {passive: false});
                        window.addEventListener('mouseup', end);
                        window.addEventListener('touchend', end);
                    };

                    if (domRefs.mobileHandle) {
                        domRefs
                            .mobileHandle
                            .addEventListener('mousedown', start);
                        domRefs
                            .mobileHandle
                            .addEventListener('touchstart', start, {passive: true});
                    }
                };

                initDrag();

                return {
                    startProgressBar,
                    stopProgressBar,
                    openContext,
                    closeContext,
                    handleStoryClick,
                    nativeShare,
                    react,
                    toggleReactionMenu,
                    toggleCleanMode,
                    togglePlayPause,
                    toggleMute,
                    nextVideo,
                    prevVideo,
                    closeStory,
                    checkNavState
                };
            })();

            function loadYouTubeAPI() {
                var tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                var firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag
                    .parentNode
                    .insertBefore(tag, firstScriptTag);
            }

            function onYouTubeIframeAPIReady() {
                updateVideoUI();

                const initialVideoId = videoPlaylist[currentVideoIndex].id;

                const ytOptions = {
                    videoId: initialVideoId,
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'loop': 0,
                        'mute': 1,
                        'modestbranding': 1,
                        'iv_load_policy': 3,
                        'rel': 0,
                        'playsinline': 1
                    }
                };

                player = new YT.Player('youtubePlayer', {
                    ...ytOptions,
                    events: {
                        'onReady': (e) => {
                            e
                                .target
                                .mute();
                            e
                                .target
                                .playVideo();
                            document
                                .getElementById('youtubePlayer')
                                .style
                                .opacity = '1';
                            document
                                .getElementById('layoutWrapper')
                                .classList
                                .add('is-ready');
                        },
                        'onError': (e) => {
                            console.error("YouTube Player Error:", e.data);
                            document
                                .getElementById('layoutWrapper')
                                .classList
                                .add('is-ready');
                        },
                        'onStateChange': (e) => {
                            const btn = document.getElementById('btnPlayPause');
                            const container = document.getElementById('storyContainer');

                            if (e.data === YT.PlayerState.PLAYING) {
                                if (btn) 
                                    btn.innerText = '⏸️';
                                container
                                    .classList
                                    .remove('is-paused');
                                if (ambientPlayer && typeof ambientPlayer.seekTo === 'function') {
                                    ambientPlayer.seekTo(player.getCurrentTime(), true);
                                }
                                StoryManager.startProgressBar();
                            } else if (e.data === YT.PlayerState.PAUSED) {
                                if (btn) 
                                    btn.innerText = '▶️';
                                container
                                    .classList
                                    .add('is-paused');
                                StoryManager.stopProgressBar();
                            } else if (e.data === YT.PlayerState.ENDED) {
                                StoryManager.stopProgressBar();
                                e
                                    .target
                                    .seekTo(0);
                                e
                                    .target
                                    .playVideo();
                            }
                        }
                    }
                });

                ambientPlayer = new YT.Player('ambientPlayer', {
                    ...ytOptions,
                    events: {
                        'onReady': (e) => {
                            e
                                .target
                                .mute();
                            e
                                .target
                                .playVideo();
                            document
                                .getElementById('ambientPlayer')
                                .style
                                .opacity = '1';
                        }
                    }
                });
            }

            loadYouTubeAPI();
        </script>
    </body>
</html>
