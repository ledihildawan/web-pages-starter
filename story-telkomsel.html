<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Telkomsel Story - Native Share & Auto Reset</title>
        <style>
            /* --- 1. DESIGN TOKENS --- */
            :root {
                --brand-red: #EE2D24;
                --brand-dark: #000000;
                --surface: #ffffff;
                --bg-gray: #F4F4F4;
                --text-main: #1a1a1a;
                --text-sub: #666666;
                --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
                --ease-spring: cubic-bezier(0.4, 1.2, 0.5, 1);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }
            body {
                background: #0a0a0a;
                height: 100dvh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                overflow: hidden;
                touch-action: none;
            }

            /* --- 2. STORY CONTAINER (WADAH UTAMA) --- */
            .story-container {
                position: relative;
                aspect-ratio: 9 / 16;
                min-width: 315px;
                min-height: 560px;
                width: 100%;
                max-width: min(430px, calc(100dvh * (9 / 16)));
                background: var(--brand-dark);
                overflow: hidden;
                border-radius: 24px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                transition: border-radius 0.5s, transform 0.5s var(--ease-out);
            }

            /* --- EFEK AMBILIGHT (DYNAMIC GLOW) --- */
            .ambient-layer {
                position: absolute;
                inset: 0;
                z-index: 1;
                filter: blur(40px) saturate(200%);
                opacity: 0.65;
                transform: scale(1.15);
                pointer-events: none;
                transition: opacity 0.5s;
            }
            .ambient-layer iframe {
                width: 100%;
                height: 100%;
                border: none;
            }

            .story-container.is-focused .ambient-layer {
                opacity: 0.3;
            }

            .story-viewport {
                position: absolute;
                inset: 0;
                z-index: 10;
                background: transparent;
                transition: transform 0.6s var(--ease-spring), filter 0.6s var(--ease-out), border-radius 0.6s var(--ease-out);
                will-change: transform, filter;
            }

            .story-video-wrapper {
                position: relative;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: var(--brand-dark);
            }

            /* --- VIGNETTE SEMANTIK DI DALAM VIDEO --- */
            .story-video-wrapper::after {
                content: '';
                position: absolute;
                inset: 0;
                pointer-events: none;
                z-index: 5;
                background: radial-gradient(ellipse at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 100%);
            }

            #youtubePlayer {
                width: 100%;
                height: 100%;
                border: none;
                pointer-events: none;
                transform: scale(1.02);
            }

            .story-progress-bar {
                position: absolute;
                top: 15px;
                left: 12px;
                right: 12px;
                height: 2px;
                background: rgba(255,255,255,0.2);
                z-index: 15;
                border-radius: 10px;
            }

            .story-progress-bar__fill {
                height: 100%;
                background: #fff;
                width: 0;
                transition: width 0.1s linear;
            }

            /* --- 3. STORY SHEET (MOBILE & TABLET DI BAWAH 1490px) --- */
            .story-sheet {
                position: absolute;
                inset: 0;
                z-index: 100;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                visibility: hidden;
                pointer-events: none;
            }
            .story-sheet.is-active {
                visibility: visible;
            }

            .story-sheet__backdrop {
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,0.6);
                opacity: 0;
                transition: opacity 0.4s;
                pointer-events: auto;
            }
            .story-sheet.is-active .story-sheet__backdrop {
                opacity: 1;
            }

            .story-sheet__content {
                position: relative;
                background: var(--surface);
                border-radius: 28px 28px 0 0;
                width: 100%;
                padding: 12px 24px 0;
                z-index: 101;
                transform: translateY(100%);
                pointer-events: auto;
                max-height: 85vh;
                overflow-y: auto;
                transition: transform 0.5s var(--ease-spring);
            }
            .story-sheet__content.is-dragging {
                transition: none;
                cursor: grabbing !important;
            }
            .story-sheet.is-active .story-sheet__content {
                transform: translateY(0);
            }

            .story-sheet__handle-wrapper {
                width: 100%;
                padding: 8px 0 20px;
                cursor: grab;
                display: flex;
                justify-content: center;
            }
            .story-sheet__handle {
                width: 40px;
                height: 5px;
                background: #E0E0E0;
                border-radius: 10px;
            }

            /* --- 4. STORY CARD (DESKTOP FLOATING CARD - KHUSUS 1490px+) --- */
            .story-card {
                position: absolute;
                top: 50%;
                right: 0;
                width: 400px;
                max-height: 100%;
                background: var(--surface);
                border-radius: 28px;
                padding: 50px 32px 0;
                z-index: 5;
                opacity: 0;
                pointer-events: none;
                transform: translate(0, -50%) scale(0.9);
                transition: all 0.6s var(--ease-spring);
                box-shadow: 0 10px 40px rgba(0,0,0,0.15);
                overflow-y: auto;
            }

            .story-card.is-active {
                opacity: 1;
                pointer-events: auto;
                transform: translate(calc(100% + 24px), -50%) scale(1);
            }

            .story-card__close-btn {
                position: absolute;
                top: 20px;
                right: 24px;
                width: 36px;
                height: 36px;
                border: none;
                background: #f2f2f2;
                border-radius: 50%;
                font-size: 16px;
                font-weight: bold;
                color: var(--text-main);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s;
            }
            .story-card__close-btn:hover {
                background: #e0e0e0;
            }

            /* --- 5. STORY VIEW CONTENT --- */
            .story-view {
                display: none;
            }
            .story-view.is-active {
                display: block;
                animation: viewFadeIn 0.4s var(--ease-out);
            }
            @keyframes viewFadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .story-badge {
                background: var(--bg-gray);
                color: var(--text-sub);
                font-size: 10px;
                font-weight: 800;
                text-transform: uppercase;
                padding: 4px 10px;
                border-radius: 6px;
                display: inline-block;
                margin-bottom: 12px;
            }

            .story-view__title {
                font-size: 20px;
                font-weight: 800;
                color: var(--text-main);
                margin-bottom: 4px;
                line-height: 1.3;
            }

            .story-view__meta {
                font-size: 12px;
                color: var(--text-sub);
                margin-bottom: 20px;
                display: block;
            }

            /* --- 6. STORY BODY (CMS CONTENT HANDLING) --- */
            .story-body {
                position: relative;
                margin-bottom: 24px;
            }

            .story-body__mask {
                position: relative;
                max-height: 80px;
                overflow: hidden;
                transition: max-height 0.6s var(--ease-spring);
            }

            .story-body__mask::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 40px;
                background: linear-gradient(to bottom, rgba(255,255,255,0), var(--surface));
                pointer-events: none;
                transition: opacity 0.3s;
            }

            .story-body__cms-content {
                font-size: 15px;
                color: var(--text-sub);
                line-height: 1.6;
            }
            .story-body__cms-content p {
                margin-bottom: 12px;
            }
            .story-body__cms-content p:last-child {
                margin-bottom: 0;
            }
            .story-body__cms-content img {
                max-width: 100%;
                height: auto;
                border-radius: 8px;
                margin: 12px 0;
            }
            .story-body__cms-content ol,
            .story-body__cms-content ul {
                padding-left: 20px;
                margin-bottom: 12px;
            }

            .story-body__toggle {
                background: none;
                border: none;
                color: var(--brand-red);
                font-weight: 700;
                font-size: 14px;
                cursor: pointer;
                padding: 12px 0 0;
                display: inline-block;
            }

            .story-body.is-expanded .story-body__mask {
                max-height: 2500px;
            }
            .story-body.is-expanded .story-body__mask::after {
                opacity: 0;
            }

            /* --- 7. STORY FOOTER & BUTTONS --- */
            .story-footer {
                display: flex;
                gap: 12px;
                position: sticky;
                bottom: 0;
                z-index: 20;
                background: var(--bg-gray);
                margin: 0 -24px;
                padding: 16px 24px 32px;
                box-shadow: 0 -10px 15px -10px rgba(0,0,0,0.05);
            }

            .emote {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: space-around;
                background: #FFFFFF;
                border-radius: 16px;
                padding: 0 12px;
                box-shadow: 0 2px 6px rgba(0,0,0,0.02);
                height: 56px;
            }

            .emote > div {
                font-size: 24px;
                cursor: pointer;
                padding: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.4s var(--ease-spring);
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }
            .emote > div:hover {
                transform: scale(1.25);
            }
            .emote > div:active {
                transform: scale(0.85);
            }

            .story-share-btn {
                background: #FFFFFF;
                border: none;
                border-radius: 16px;
                font-size: 24px;
                cursor: pointer;
                width: 56px;
                height: 56px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 6px rgba(0,0,0,0.02);
                transition: transform 0.4s var(--ease-spring);
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }
            .story-share-btn:hover {
                transform: scale(1.15);
            }
            .story-share-btn:active {
                transform: scale(0.9);
            }

            /* --- 8. UTILITIES & ANIMATIONS --- */
            .toast-notification {
                position: fixed;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%) translateY(40px);
                background: rgba(0,0,0,0.9);
                color: white;
                padding: 14px 28px;
                border-radius: 50px;
                font-size: 14px;
                font-weight: 600;
                z-index: 2000;
                opacity: 0;
                transition: all 0.4s var(--ease-spring);
                pointer-events: none;
            }
            .toast-notification.is-visible {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            .story-ui-trigger {
                position: absolute;
                bottom: 40px;
                left: 24px;
                right: 24px;
                z-index: 20;
                color: #fff;
                cursor: pointer;
                transition: transform 0.3s;
            }
            .story-ui-trigger:active {
                transform: scale(0.98);
            }

            .story-container.is-focused .story-viewport {
                transform: scale(0.92);
                border-radius: 32px;
                filter: blur(10px) brightness(0.6);
            }

            /* --- 9. SCOPE ISOLATION (MEDIA QUERIES) --- */
            @media (max-width: 1489px) {
                .story-card {
                    display: none !important;
                }
            }

            @media (min-width: 1490px) {
                .story-sheet {
                    display: none !important;
                }
                .story-container {
                    overflow: visible;
                }
                .story-viewport {
                    border-radius: 24px;
                    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
                }
                .story-container.is-focused .story-viewport {
                    transform: none !important;
                    filter: none !important;
                }
                .story-footer {
                    margin: 0 -32px;
                    padding: 16px 32px 32px;
                    border-radius: 0 0 28px 28px;
                }
            }
        </style>
    </head>
    <body>

        <div class="story-container" id="storyContainer">

            <div class="ambient-layer">
                <div id="ambientPlayer"></div>
            </div>

            <div class="story-viewport">
                <div class="story-progress-bar">
                    <div class="story-progress-bar__fill" id="storyProgressFill"></div>
                </div>

                <div class="story-video-wrapper">
                    <div id="youtubePlayer"></div>
                </div>

                <div class="story-ui-trigger" onclick="StoryManager.openContext()">
                    <span class="story-badge" style="background: rgba(255,255,255,0.2); color: #fff; backdrop-filter: blur(4px);">Product Insight</span>
                    <h2 style="font-size: 24px; margin-top: 8px; margin-bottom: 6px; text-shadow: 0 2px 15px rgba(0,0,0,0.8);">Gaming Performa Cerdas 🔥</h2>
                    <p style="font-size: 14px; opacity: 0.9; display: flex; align-items: center; gap: 6px; text-shadow: 0 1px 4px rgba(0,0,0,0.5);">
                        Cek Detail Produk
                        <span style="font-size: 18px;">↗</span>
                    </p>
                </div>
            </div>

            <div class="story-sheet" id="storySheet">
                <div class="story-sheet__backdrop" onclick="StoryManager.closeContext()"></div>
                <div class="story-sheet__content" id="storySheetContent">
                    <div class="story-sheet__handle-wrapper" id="storySheetHandle">
                        <div class="story-sheet__handle"></div>
                    </div>
                    <div class="story-dynamic-area"></div>
                </div>
            </div>

            <div class="story-card" id="storyCard">
                <button class="story-card__close-btn" onclick="StoryManager.closeContext()">✕</button>
                <div class="story-dynamic-area"></div>
            </div>
        </div>

        <div id="copyToastNotification" class="toast-notification">Link berhasil disalin!</div>

        <template id="storyContentTemplate">

            <div class="story-view story-view--detail is-active">
                <h3 class="story-view__title">Gaming Performa Cerdas 🔥</h3>
                <span class="story-view__meta">View Icon - 213213</span>

                <div class="story-body">
                    <div class="story-body__mask">
                        <div class="story-body__cms-content">
                            <p>Laptop Asus G Gaming K16 adalah laptop tangguh yang punya performa cerdas untuk memaksimalkan potensi kerja kreatif yang bisa main game.</p>
                            <p>Dilengkapi CPU Intel Core i5 generasi ke-13, GPU RTX 3050, dan fitur AI Noise Cancelling untuk kejernihan suara saat meeting. Menggunakan teknologi Asus IceCool agar tetap dingin!</p>
                            <p>Bobot hanya 1.8 Kg, slim namun bertenaga. Harga spesial Rp11.495.000!</p>
                        </div>
                    </div>
                    <button class="story-body__toggle" onclick="StoryManager.toggleTextExpansion(this)">Selengkapnya</button>
                </div>

                <div class="story-footer">
                    <div class="emote">
                        <div class="emote-icon-sad" data-emote="sad" onclick="StoryManager.react('😭')">😭</div>
                        <div class="emote-icon-clap" data-emote="clap" onclick="StoryManager.react('👏🏻')">👏🏻</div>
                        <div class="emote-icon-laugh" data-emote="laugh" onclick="StoryManager.react('🤣')">🤣</div>
                        <div class="emote-icon-celebrate" data-emote="celebrate" onclick="StoryManager.react('🎉')">🎉</div>
                        <div class="emote-icon-heart" data-emote="heart" onclick="StoryManager.react('❤️')">❤️</div>
                    </div>

                    <button class="story-share-btn" onclick="StoryManager.nativeShare()">✈️</button>
                </div>
            </div>

        </template>

        <script src="https://www.youtube.com/iframe_api"></script>
        <script>
            let player,
                ambientPlayer;
            function onYouTubeIframeAPIReady() {
                const ytOptions = {
                    videoId: 'IHolHlnDP9s',
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'loop': 1,
                        'playlist': 'IHolHlnDP9s',
                        'mute': 1,
                        'modestbranding': 1,
                        'iv_load_policy': 3,
                        'rel': 0
                    }
                };

                player = new YT.Player('youtubePlayer', {
                    ...ytOptions,
                    events: {
                        'onReady': (event) => {
                            event
                                .target
                                .playVideo();
                            StoryManager.startProgressBar();
                        }
                    }
                });

                ambientPlayer = new YT.Player('ambientPlayer', {
                    ...ytOptions,
                    events: {
                        'onReady': (event) => {
                            event
                                .target
                                .playVideo();
                        }
                    }
                });
            }

            const StoryManager = (() => {
                const state = {
                    isOpen: false,
                    progressInterval: null,
                    startY: 0,
                    currentY: 0,
                    isDragging: false
                };

                const domRefs = {
                    mainContainer: document.getElementById('storyContainer'),
                    progressFill: document.getElementById('storyProgressFill'),
                    mobileSheet: document.getElementById('storySheet'),
                    mobileContent: document.getElementById('storySheetContent'),
                    mobileHandle: document.getElementById('storySheetHandle'),
                    desktopCard: document.getElementById('storyCard'),
                    contentTemplate: document.getElementById('storyContentTemplate'),
                    toastNotification: document.getElementById('copyToastNotification')
                };

                const isDesktopView = () => window.innerWidth >= 1490;
                const getActiveContext = () => isDesktopView()
                    ? domRefs.desktopCard
                    : domRefs.mobileSheet;

                const injectTemplateToContext = (contextElement) => {
                    const targetArea = contextElement.querySelector('.story-dynamic-area');
                    if (targetArea && targetArea.innerHTML.trim() === '') {
                        const templateClone = domRefs
                            .contentTemplate
                            .content
                            .cloneNode(true);
                        targetArea.appendChild(templateClone);
                    }
                };

                injectTemplateToContext(domRefs.mobileSheet);
                injectTemplateToContext(domRefs.desktopCard);

                const startProgressBar = () => {
                    if (state.progressInterval) 
                        clearInterval(state.progressInterval);
                    
                    state.progressInterval = setInterval(() => {
                        if (!state.isOpen && player && typeof player.getDuration === 'function') {
                            const duration = player.getDuration();
                            const currentTime = player.getCurrentTime();

                            if (duration > 0) {
                                const progressPercent = (currentTime / duration) * 100;
                                domRefs.progressFill.style.width = `${progressPercent}%`;
                            }
                        }
                    }, 50);
                };

                const openContext = () => {
                    state.isOpen = true;
                    domRefs
                        .mainContainer
                        .classList
                        .add('is-focused');
                    getActiveContext()
                        .classList
                        .add('is-active');

                    if (!isDesktopView()) {
                        domRefs.mobileContent.style.transform = '';
                    }

                    if (player) 
                        player.pauseVideo();
                    if (ambientPlayer) 
                        ambientPlayer.pauseVideo();
                    };
                
                const closeContext = () => {
                    state.isOpen = false;
                    domRefs
                        .mainContainer
                        .classList
                        .remove('is-focused');
                    domRefs
                        .mobileSheet
                        .classList
                        .remove('is-active');
                    domRefs
                        .desktopCard
                        .classList
                        .remove('is-active');

                    // --- FUNGSI AUTO-RESET KONTEN ---
                    // Mengembalikan text yang diperluas ("Selengkapnya") ke kondisi tertutup
                    const activeBodies = document.querySelectorAll('.story-body.is-expanded');
                    activeBodies.forEach(body => {
                        body
                            .classList
                            .remove('is-expanded');
                        const toggleBtn = body.querySelector('.story-body__toggle');
                        if (toggleBtn) {
                            toggleBtn.innerText = "Selengkapnya";
                        }
                    });

                    if (player) 
                        player.playVideo();
                    if (ambientPlayer) 
                        ambientPlayer.playVideo();
                    };
                
                const toggleTextExpansion = (buttonElement) => {
                    const bodyContainer = buttonElement.closest('.story-body');
                    const isExpanded = bodyContainer
                        .classList
                        .toggle('is-expanded');
                    buttonElement.innerText = isExpanded
                        ? "Sembunyikan"
                        : "Selengkapnya";
                };

                // --- API NATIVE SHARE ---
                const nativeShare = async () => {
                    const shareData = {
                        title: 'Gaming Performa Cerdas 🔥',
                        text: 'Cek Detail Produk ini sekarang juga!',
                        url: 'https://www.youtube.com/watch?v=IHolHlnDP9s'
                    };

                    try {
                        // Mencoba memanggil Native Share milik HP (iOS/Android/Browser yang mendukung)
                        if (navigator.share) {
                            await navigator.share(shareData);
                        } else {
                            // Jika tidak didukung (misal di PC lawas), otomatis Copy Link dan munculkan Toast
                            navigator
                                .clipboard
                                .writeText(shareData.url)
                                .then(() => {
                                    domRefs.toastNotification.innerText = "Link berhasil disalin!";
                                    domRefs
                                        .toastNotification
                                        .classList
                                        .add('is-visible');
                                    setTimeout(() => domRefs.toastNotification.classList.remove('is-visible'), 2000);
                                });
                        }
                    } catch (err) {
                        // Error biasa terjadi karena pengguna meng-cancel / membatalkan dialog share
                        console.log('Share canceled / failed', err);
                    }
                };

                const react = (emoji) => {
                    domRefs.toastNotification.innerText = `Kamu bereaksi ${emoji}`;
                    domRefs
                        .toastNotification
                        .classList
                        .add('is-visible');
                    setTimeout(() => domRefs.toastNotification.classList.remove('is-visible'), 1500);
                };

                const initializeMobileDrag = () => {
                    const handleDragStart = (e) => {
                        if (isDesktopView()) 
                            return;
                        state.startY = e
                            .type
                            .includes('touch')
                                ? e
                                    .touches[0]
                                    .clientY
                                : e.clientY;
                        state.isDragging = true;
                        domRefs
                            .mobileContent
                            .classList
                            .add('is-dragging');
                    };

                    const handleDragMove = (e) => {
                        if (!state.isDragging || isDesktopView()) 
                            return;
                        const currentYPosition = e
                            .type
                            .includes('touch')
                                ? e
                                    .touches[0]
                                    .clientY
                                : e.clientY;
                        const deltaY = currentYPosition - state.startY;

                        if (deltaY > 0) {
                            state.currentY = deltaY;
                            domRefs.mobileContent.style.transform = `translateY(${deltaY}px)`;
                        }
                    };

                    const handleDragEnd = () => {
                        if (!state.isDragging || isDesktopView()) 
                            return;
                        state.isDragging = false;
                        domRefs
                            .mobileContent
                            .classList
                            .remove('is-dragging');

                        if (state.currentY > 150) {
                            closeContext();
                        } else {
                            domRefs.mobileContent.style.transform = `translateY(0)`;
                        }
                        state.currentY = 0;
                    };

                    [domRefs.mobileHandle, domRefs.mobileContent].forEach(el => {
                        el.addEventListener('mousedown', handleDragStart);
                        el.addEventListener('touchstart', handleDragStart, {passive: true});
                    });

                    window.addEventListener('mousemove', handleDragMove);
                    window.addEventListener('touchmove', handleDragMove, {passive: false});
                    window.addEventListener('mouseup', handleDragEnd);
                    window.addEventListener('touchend', handleDragEnd);
                };

                initializeMobileDrag();

                return {
                    startProgressBar,
                    openContext,
                    closeContext,
                    toggleTextExpansion,
                    nativeShare,
                    react
                };
            })();
        </script>
    </body>
</html>
