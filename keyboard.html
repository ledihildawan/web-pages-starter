<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>CORE-65 | Industrial Monospace Text Environment</title>
        <style>
            /* --- 0. PREMIUM FONT IMPORT --- */
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@700;800&display=swap');

            /* --- 1. CSS RESET & GLOBAL --- */
            *,
            *::after,
            *::before {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            :root {
                --u: 52px;
                --gap: 4px; 
                --radius-key: 6px;
                --radius-case: 32px;

                /* Theme Light */
                --bg-canvas: #f0f2f5;
                --mesh-1: #e2e8f0;
                --mesh-2: #cbd5e1;
                --mesh-3: #94a3b8;
                
                --text-ghost: rgba(0, 0, 0, 0.08);
                --caret-color: rgba(0, 0, 0, 0.5);
                --selection-bg: rgba(0, 0, 0, 0.15);
                --selection-fg: rgba(0, 0, 0, 0.6);

                --mat-case-base: oklch(0.85 0.01 240);
                --mat-case-slope: oklch(0.9 0.01 240);
                --mat-case-bezel: oklch(0.96 0.01 240);
                --mat-plate-inner: oklch(0.7 0.02 240);

                --key-alpha-base: oklch(0.88 0.01 240);
                --key-alpha-top: oklch(0.98 0.01 240);
                --key-alpha-fg: oklch(0.25 0.05 240);
                --key-mod-base: oklch(0.8 0.08 240);
                --key-mod-top: oklch(0.88 0.1 240);
                --key-mod-fg: oklch(0.25 0.05 240);
                --key-accent-base: oklch(0.2 0.12 255);
                --key-accent-top: oklch(0.3 0.12 255);
                --key-accent-fg: oklch(0.98 0.01 240);

                --led-active: oklch(0.6 0.2 250);
                --label-stealth: oklch(0.6 0.01 240);
            }

            [data-theme="dark"] {
                --bg-canvas: #0a0c10;
                --mesh-1: #1a1c24;
                --mesh-2: #0f172a;
                --mesh-3: #1e293b;
                
                --text-ghost: rgba(255, 255, 255, 0.05);
                --caret-color: rgba(255, 255, 255, 0.6);
                --selection-bg: rgba(255, 255, 255, 0.15);
                --selection-fg: rgba(255, 255, 255, 0.8);

                --mat-case-base: oklch(0.12 0.02 240);
                --mat-case-slope: oklch(0.18 0.02 240);
                --mat-case-bezel: oklch(0.28 0.02 240);
                --mat-plate-inner: oklch(0.08 0.02 240);
                --key-alpha-base: oklch(0.35 0.03 240);
                --key-alpha-top: oklch(0.42 0.03 240);
                --key-alpha-fg: oklch(0.95 0.01 240);
                --key-mod-base: oklch(0.25 0.08 240);
                --key-mod-top: oklch(0.32 0.1 240);
                --key-mod-fg: oklch(0.95 0.01 240);
                --key-accent-base: oklch(0.1 0.1 255);
                --key-accent-top: oklch(0.18 0.1 255);
                --key-accent-fg: oklch(0.9 0.05 240);
                --led-active: oklch(0.9 0.1 190);
                --label-stealth: oklch(0.4 0.01 240);
            }

            body {
                background-color: var(--bg-canvas);
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                overflow: hidden;
                text-rendering: optimizeLegibility;
            }

            /* --- CIRCULAR VIEW TRANSITION HARDWARE GRAPHICS --- */
            ::view-transition-old(root),
            ::view-transition-new(root) {
                animation: none;
                mix-blend-mode: normal;
            }
            ::view-transition-old(root) { z-index: 1; }
            ::view-transition-new(root) { z-index: 2; }

            .bg-studio {
                position: fixed;
                inset: 0;
                z-index: -2;
                background: radial-gradient(at 50% 0%, var(--mesh-1) 0px, transparent 50%), 
                            radial-gradient(at 100% 0%, var(--mesh-2) 0px, transparent 50%), 
                            radial-gradient(at 0% 100%, var(--mesh-3) 0px, transparent 50%);
                filter: blur(60px);
                opacity: 0.5;
            }

            /* --- 2. LAYER MASKING & SCROLLING --- */
            #editor-mask {
                position: fixed;
                inset: 0;
                z-index: 1;
                pointer-events: none; 
                -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
                mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            }

            #editor-scroller {
                position: absolute;
                inset: 0;
                overflow-y: auto;
                pointer-events: auto; 
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            #editor-scroller::-webkit-scrollbar { display: none; }

            #editor-container {
                display: grid;
                width: 100%;
                margin-top: 15vh;
                margin-bottom: 40vh;
                padding: 0 5vw;
            }

            #editor-container::after {
                content: attr(data-replicated-value) " ";
                white-space: pre-wrap;
                word-break: break-word;
                visibility: hidden;
                grid-area: 1 / 1 / 2 / 2;
                font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
                font-weight: 800;
                font-size: 6vw;
                line-height: 1.35; 
                letter-spacing: -0.03em; 
            }

            #editor-textarea {
                width: 100%;
                height: 100%; 
                grid-area: 1 / 1 / 2 / 2;
                background: transparent;
                border: none;
                outline: none;
                resize: none;
                font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
                font-weight: 800;
                font-size: 6vw;
                line-height: 1.35; 
                letter-spacing: -0.03em; 
                color: var(--text-ghost);
                caret-color: var(--caret-color);
                overflow: hidden; 
            }
            #editor-textarea::placeholder { 
                color: var(--text-ghost); 
                opacity: 0.5; 
                transition: opacity 0.3s ease;
            }
            #editor-textarea:focus::placeholder { opacity: 0.2; }
            #editor-textarea::selection {
                background-color: var(--selection-bg);
                color: var(--selection-fg);
            }

            /* --- 3. KEYBOARD HARDWARE CASE ASSEMBLIES --- */
            .keyboard-case {
                background-color: var(--mat-case-base);
                padding: 10px;
                border-radius: var(--radius-case);
                position: absolute;
                top: 75%;
                left: 50%;
                transform: translate(-50%, -50%); 
                box-shadow: 0 0 80px rgba(0,0,0,0.2), 0 20px 40px rgba(0,0,0,0.4);
                z-index: 10;
                pointer-events: auto;
                cursor: grab;
                will-change: transform;
                user-select: none;
            }
            .keyboard-case:active { cursor: grabbing; }
            
            .keyboard-case__slope {
                background-color: var(--mat-case-slope);
                padding: 8px;
                border-radius: 26px;
                box-shadow: inset 0 0 12px rgba(0,0,0,0.1);
            }
            .keyboard-case__bezel {
                background-color: var(--mat-case-bezel);
                padding: 12px 16px;
                border-radius: 20px;
                position: relative;
                box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            }
            .keyboard-switch-plate {
                background-color: var(--mat-plate-inner);
                padding: 8px;
                border-radius: 10px;
                box-shadow: inset 0 0 20px rgba(0,0,0,0.45);
                overflow: hidden;
            }
            .keyboard-matrix__row {
                display: flex;
                gap: var(--gap);
                margin-bottom: var(--gap);
            }
            .keyboard-matrix__row:last-child { margin-bottom: 0; }

            /* --- 4. DECOUPLED KEYCAP ULTRA-MODULAR 3x3 GRID SYSTEM --- */
            .key-switch {
                height: 52px;
                position: relative;
                border: none;
                cursor: pointer;
                outline: none;
                border-radius: var(--radius-key);
                background-color: var(--key-base);
                overflow: visible; 
                transition: transform 0.05s ease;
                transform-style: preserve-3d;
                user-select: none;
                touch-action: none; 
            }
            .keycap {
                position: absolute;
                top: 5px;
                left: 5px;
                right: 5px;
                bottom: 5px;
                border-radius: calc(var(--radius-key) - 2px);
                background-color: var(--key-top);
                color: var(--key-fg);
                font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
                box-shadow: inset 0 0 4px rgba(0,0,0,0.06);
                z-index: 2;
                transition: all 0.05s ease;
                padding: 5px 7px;
                
                /* Native 3x3 Grid Engine Core */
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(3, 1fr);
            }
            
            .keycap__legend {
                font-weight: 800;
                text-shadow: 0 1px 1px rgba(255,255,255,0.1);
                white-space: nowrap;
            }
            
            /* Pure 9-Point Alignment Matrix Mechanics */
            .keycap__legend--top-left      { grid-area: 1 / 1; justify-self: start;  align-self: start;  }
            .keycap__legend--top-center    { grid-area: 1 / 2; justify-self: center; align-self: start;  }
            .keycap__legend--top-right     { grid-area: 1 / 3; justify-self: end;    align-self: start;  }
            .keycap__legend--center-left   { grid-area: 2 / 1; justify-self: start;  align-self: center; }
            .keycap__legend--center        { grid-area: 2 / 2; justify-self: center; align-self: center; }
            .keycap__legend--center-right  { grid-area: 2 / 3; justify-self: end;    align-self: center; }
            .keycap__legend--bottom-left   { grid-area: 3 / 1; justify-self: start;  align-self: end;    }
            .keycap__legend--bottom-center { grid-area: 3 / 2; justify-self: center; align-self: end;    }
            .keycap__legend--bottom-right  { grid-area: 3 / 3; justify-self: end;    align-self: end;    }

            .switch-type--alpha    { --key-base: var(--key-alpha-base); --key-top: var(--key-alpha-top); --key-fg: var(--key-alpha-fg); }
            .switch-type--modifier { --key-base: var(--key-mod-base); --key-top: var(--key-mod-top); --key-fg: var(--key-mod-fg); }
            .switch-type--accent   { --key-base: var(--key-accent-base); --key-top: var(--key-accent-top); --key-fg: var(--key-accent-fg); }

            .key-switch.active { transform: scale(0.97); }
            .key-switch.active .keycap { filter: brightness(0.9); }

            .key-switch.shift-active .keycap,
            .key-switch.fn-active .keycap,
            .key-switch.ctrl-active .keycap,
            .key-switch.alt-active .keycap {
                background-color: var(--led-active);
                color: var(--bg-canvas);
                box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
            }

            /* LED STATUS PANEL */
            .status-indicator-panel {
                position: absolute;
                left: 6px;
                top: 38px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 3px;
            }
            .status-indicator__led {
                width: 8px;
                height: 2px;
                border-radius: 1px;
                background-color: oklch(from var(--mat-case-bezel) calc(l - 0.3) c h);
            }
            .status-indicator-panel.status-indicator--caps-active .status-indicator__led {
                background-color: var(--led-active);
                box-shadow: 0 0 10px var(--led-active);
            }
            .status-indicator__label {
                font-size: 7px;
                font-weight: 900;
                color: var(--label-stealth);
                font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
                opacity: 0.6;
            }

            /* CHASSIS MECHANICS SPECIFICATIONS */
            .key-width--1u    { width: var(--u); }
            .key-width--1-25u { width: calc(var(--u) * 1.25 + var(--gap) * 0.25); }
            .key-width--1-5u  { width: calc(var(--u) * 1.5 + var(--gap) * 0.5); }
            .key-width--1-75u { width: calc(var(--u) * 1.75 + var(--gap) * 0.75); }
            .key-width--2u    { width: calc(var(--u) * 2 + var(--gap)); }
            .key-width--2-25u { width: calc(var(--u) * 2.25 + var(--gap) * 1.25); }
            .key-width--flex  { flex: 1; }

            /* --- DEV PROFILE WATERMARK --- */
            .developer-profile-badge {
                position: fixed;
                top: 30px;
                right: 30px;
                width: 48px;
                height: 48px;
                border-radius: 50%;
                overflow: visible; 
                z-index: 100;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                border: 2px solid var(--mat-case-bezel);
                background-color: var(--mat-case-base);
                text-decoration: none;
                transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            }
            .developer-profile-badge img {
                width: 100%;
                height: 100%;
                border-radius: 50%;
                object-fit: cover;
                pointer-events: none; 
            }
            .developer-profile-badge::after {
                content: "@ledihildawan";
                position: absolute;
                right: calc(100% + 12px);
                top: 50%;
                transform: translateY(-50%) translateX(10px);
                background: var(--mat-case-bezel);
                color: var(--key-alpha-fg);
                padding: 6px 12px;
                border-radius: 20px;
                font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
                font-size: 11px;
                font-weight: 800;
                opacity: 0;
                pointer-events: none;
                transition: all 0.3s ease;
                white-space: nowrap;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }
            .developer-profile-badge:hover {
                transform: scale(1.1) translateY(-2px);
                box-shadow: 0 15px 35px rgba(0,0,0,0.3);
                border-color: var(--led-active);
            }
            .developer-profile-badge:hover::after {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }

            /* --- RGB LABS --- */
            .key-switch::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: inherit;
                z-index: -1;
                opacity: 0;
                transition: opacity 0.6s ease;
            }
            @keyframes aurora-flow {
                0%   { box-shadow: 0 0 10px 1px oklch(0.70 0.18 240 / 0.5); } 
                50%  { box-shadow: 0 0 10px 1px oklch(0.65 0.22 280 / 0.5); } 
                100% { box-shadow: 0 0 10px 1px oklch(0.75 0.15 190 / 0.5); } 
            }
            body.rgb-on .key-switch::before {
                opacity: 1;
                animation: aurora-flow 5s infinite alternate ease-in-out;
                animation-delay: var(--delay);
            }
            .key-switch::after {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: inherit;
                z-index: -1;
                opacity: 0;
                box-shadow: 0 0 12px 1px oklch(0.9 0.1 180 / 0.8), 0 0 6px 1px oklch(0.9 0.1 180 / 0.5) inset;
                transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            }
            body.rgb-on .key-switch.active::after {
                opacity: 1;
                transition: opacity 0.02s ease-out;
            }
        </style>
    </head>
    <body> 

        <div class="bg-studio"></div>

        <div id="editor-mask">
            <div id="editor-scroller">
                <div id="editor-container" data-replicated-value="">
                    <textarea id="editor-textarea" spellcheck="false" autofocus placeholder="Type anything here..."></textarea>
                </div>
            </div>
        </div>

        <a href="https://github.com/ledihildawan" target="_blank" rel="noopener noreferrer" class="developer-profile-badge">
            <img src="https://github.com/ledihildawan.png" alt="@ledihildawan" />
        </a>

        <div class="keyboard-case" id="main-shell">
            <div class="keyboard-case__slope">
                <div class="keyboard-case__bezel">
                    <div class="status-indicator-panel" id="caps-group">
                        <div class="status-indicator__led"></div>
                        <div class="status-indicator__label">C</div>
                    </div>
                    <div class="keyboard-switch-plate">
                        <div id="keyboard-switch-matrix"></div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // --- 0. WEB AUDIO MECHANICAL THOCK CORES ---
            const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            function playThock(isSpace = false) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(isSpace ? 70 : 105, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
                
                filter.type = 'lowpass';
                filter.frequency.value = isSpace ? 300 : 550;
                
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(now + 0.12);
            }

            // --- STATE PERSISTENCE CORE ---
            const savedTheme = localStorage.getItem('kb-theme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);

            const isRgbOn = localStorage.getItem('kb-rgb') === 'true';
            if (isRgbOn) document.body.classList.add('rgb-on');

            const capsGroup = document.getElementById('caps-group');
            let isCapsOn = localStorage.getItem('kb-caps') === 'true';
            if (isCapsOn) capsGroup.classList.add('status-indicator--caps-active');

            function updateCapsState(state) {
                if (isCapsOn !== state) {
                    isCapsOn = state;
                    capsGroup.classList.toggle('status-indicator--caps-active', isCapsOn);
                    localStorage.setItem('kb-caps', isCapsOn);
                }
            }

            let initialTranslateX = parseFloat(localStorage.getItem('kb-x')) || 0;
            let initialTranslateY = parseFloat(localStorage.getItem('kb-y')) || 0;
            const mainShell = document.getElementById('main-shell');
            mainShell.style.transform = `translate(calc(-50% + ${initialTranslateX}px), calc(-50% + ${initialTranslateY}px))`;

            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            window.addEventListener('touchstart', (e) => {
                if(e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            });

            // --- TEXT EDITOR MATRIX AND MANIPULATION ---
            const editor = document.getElementById('editor-textarea');
            const editorWrapper = document.getElementById('editor-container');
            const bgScroller = document.getElementById('editor-scroller');
            editor.value = localStorage.getItem('kb-text') || '';

            function updateEditorSize() {
                editorWrapper.dataset.replicatedValue = editor.value;
                localStorage.setItem('kb-text', editor.value);
            }
            editor.addEventListener('input', updateEditorSize);
            updateEditorSize(); 

            function insertTextAtCursor(text) {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + text.length;
                updateEditorSize();
            }

            function deleteAtCursor() {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                if (start === end && start > 0) {
                    editor.value = editor.value.substring(0, start - 1) + editor.value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start - 1;
                } else if (start !== end) {
                    editor.value = editor.value.substring(0, start) + editor.value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start;
                }
                updateEditorSize();
            }

            function deleteForwardAtCursor() {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                if (start === end && start < editor.value.length) {
                    editor.value = editor.value.substring(0, start) + editor.value.substring(start + 1);
                    editor.selectionStart = editor.selectionEnd = start;
                } else if (start !== end) {
                    editor.value = editor.value.substring(0, start) + editor.value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start;
                }
                updateEditorSize();
            }

            function moveCursor(dir) {
                if (dir === 'left') editor.selectionStart = editor.selectionEnd = Math.max(0, editor.selectionStart - 1);
                else if (dir === 'right') editor.selectionStart = editor.selectionEnd = Math.min(editor.value.length, editor.selectionStart + 1);
                else if (dir === 'start') editor.selectionStart = editor.selectionEnd = 0;
                else if (dir === 'end') editor.selectionStart = editor.selectionEnd = editor.value.length;
            }

            window.addEventListener('click', (e) => {
                if (!e.target.closest('#main-shell') && !e.target.closest('.developer-profile-badge')) {
                    editor.focus();
                }
            });

            function toggleThemeWithTransition(x, y) {
                if (!document.startViewTransition) {
                    toggleTheme();
                    return;
                }
                const endRadius = Math.hypot(Math.max(x, window.innerWidth - x), Math.max(y, window.innerHeight - y));
                const transition = document.startViewTransition(() => toggleTheme());
                transition.ready.then(() => {
                    document.documentElement.animate(
                        [
                            { clipPath: `circle(0px at ${x}px ${y}px)` },
                            { clipPath: `circle(${endRadius}px at ${x}px ${y}px)` },
                        ],
                        { duration: 600, easing: "cubic-bezier(0.4, 0, 0.2, 1)", pseudoElement: "::view-transition-new(root)" }
                    );
                });
            }

            function toggleTheme() {
                const current = document.body.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.body.setAttribute('data-theme', next);
                localStorage.setItem('kb-theme', next);
            }

            // --- 1. CLEAN PHYSICAL CHASSIS PCB LAYOUT CONFIGURATION ---
            const keyboardLayoutMap = [
                [
                    { keyCode: 'Escape', switchType: 'switch-type--accent', keyWidth: 'key-width--1u' },
                    { keyCode: 'Digit1', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' },
                    { keyCode: 'Digit2', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' },
                    { keyCode: 'Digit3', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' },
                    { keyCode: 'Digit4', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' },
                    { keyCode: 'Digit5', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' },
                    { keyCode: 'Digit6', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' },
                    { keyCode: 'Digit7', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' },
                    { keyCode: 'Digit8', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' },
                    { keyCode: 'Digit9', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' },

                ],
                [
                    { keyCode: 'ControlLeft', switchType: 'switch-type--modifier', keyWidth: 'key-width--1-25u' },

                    { keyCode: 'Fn', switchType: 'switch-type--modifier', keyWidth: 'key-width--1u' },
                    { keyCode: 'ControlRight', switchType: 'switch-type--modifier', keyWidth: 'key-width--1u' },

                    { keyCode: 'ArrowRight', switchType: 'switch-type--alpha', keyWidth: 'key-width--1u' }
                ]

            // --- 2. DECOUPLED KEYCAP DESIGN MATRIX (INDUSTRIAL TABULAR ALIGNMENT FORMAT) ---
            const baseKeycapSet = {
                Tab:          [{ text: '⇥ TAB',       pos: 'center-left',   size: '10px' }],
                CapsLock:     [{ text: '⇪ CAPS',       pos: 'center-left',   size: '10px' }],
                ShiftLeft:    [{ text: '⇧ SHIFT',      pos: 'center-left',   size: '10px' }],
                Backspace:    [{ text: '⌫ BACK',       pos: 'center-right',  size: '10px' }],
                Enter:        [{ text: '⏎ ENTER',      pos: 'center-right',  size: '10px' }],
                ShiftRight:   [{ text: 'SHIFT ⇧',      pos: 'center-right',  size: '10px' }],
                Escape:       [{ text: 'ESC',          pos: 'center',        size: '10px' }],
                Home:         [{ text: 'HOME',         pos: 'center',        size: '10px' }],

                AltLeft:      [{ text: 'ALT',          pos: 'center',        size: '10px' }],
                Space:        [{ text: '',             pos: 'center',        size: '13px' }],
                AltRight:     [{ text: 'ALT',          pos: 'center',        size: '10px' }],
                Fn:           [{ text: 'FN',           pos: 'center',        size: '10px' }],
                ControlRight: [{ text: 'CTRL',         pos: 'center',        size: '10px' }],
                ArrowUp:      [{ text: '▲',            pos: 'center',        size: '13px' }],
                ArrowLeft:    [{ text: '◀',            pos: 'center',        size: '13px' }],
                ArrowDown:    [{ text: '▼',            pos: 'center',        size: '13px' }],
                ArrowRight:   [{ text: '▶',            pos: 'center',        size: '13px' }],
                
                KeyQ:         [{ text: 'Q',            pos: 'top-left',      size: '14px' }],
                KeyW:         [{ text: 'W',            pos: 'top-left',      size: '14px' }],
                KeyE:         [{ text: 'E',            pos: 'top-left',      size: '14px' }],
                KeyR:         [{ text: 'R',            pos: 'top-left',      size: '14px' }],
                KeyT:         [{ text: 'T',            pos: 'top-left',      size: '14px' }],
                KeyY:         [{ text: 'Y',            pos: 'top-left',      size: '14px' }],
                KeyU:         [{ text: 'U',            pos: 'top-left',      size: '14px' }],
                KeyI:         [{ text: 'I',            pos: 'top-left',      size: '14px' }],
                KeyO:         [{ text: 'O',            pos: 'top-left',      size: '14px' }],
                KeyP:         [{ text: 'P',            pos: 'top-left',      size: '14px' }],
                KeyA:         [{ text: 'A',            pos: 'top-left',      size: '14px' }],
                KeyS:         [{ text: 'S',            pos: 'top-left',      size: '14px' }],
                KeyD:         [{ text: 'D',            pos: 'top-left',      size: '14px' }],
                KeyF:         [{ text: 'F',            pos: 'top-left',      size: '14px' }],
                KeyG:         [{ text: 'G',            pos: 'top-left',      size: '14px' }],
                KeyH:         [{ text: 'H',            pos: 'top-left',      size: '14px' }],
                KeyJ:         [{ text: 'J',            pos: 'top-left',      size: '14px' }],
                KeyK:         [{ text: 'K',            pos: 'top-left',      size: '14px' }],
                KeyL:         [{ text: 'L',            pos: 'top-left',      size: '14px' }],
                KeyZ:         [{ text: 'Z',            pos: 'top-left',      size: '14px' }],
                KeyX:         [{ text: 'X',            pos: 'top-left',      size: '14px' }],
                KeyC:         [{ text: 'C',            pos: 'top-left',      size: '14px' }],
                KeyV:         [{ text: 'V',            pos: 'top-left',      size: '14px' }],
                KeyB:         [{ text: 'B',            pos: 'top-left',      size: '14px' }],
                KeyN:         [{ text: 'N',            pos: 'top-left',      size: '14px' }],
                KeyM:         [{ text: 'M',            pos: 'top-left',      size: '14px' }],
                
                Digit1:       [{ text: '!',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '1', pos: 'bottom-left', size: '13px' }],
                Digit2:       [{ text: '@',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '2', pos: 'bottom-left', size: '13px' }],
                Digit3:       [{ text: '#',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '3', pos: 'bottom-left', size: '13px' }],
                Digit4:       [{ text: '$',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '4', pos: 'bottom-left', size: '13px' }],
                Digit5:       [{ text: '%',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '5', pos: 'bottom-left', size: '13px' }],
                Digit6:       [{ text: '^',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '6', pos: 'bottom-left', size: '13px' }],
                Digit7:       [{ text: '&',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '7', pos: 'bottom-left', size: '13px' }],
                Digit8:       [{ text: '*',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '8', pos: 'bottom-left', size: '13px' }],
                Digit9:       [{ text: '(',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '9', pos: 'bottom-left', size: '13px' }],
                Digit0:       [{ text: ')',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '0', pos: 'bottom-left', size: '13px' }],
                Minus:        [{ text: '_',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '-', pos: 'bottom-left', size: '13px' }],
                Equal:        [{ text: '+',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '=', pos: 'bottom-left', size: '13px' }],
                BracketLeft:  [{ text: '{',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '[', pos: 'bottom-left', size: '13px' }],
                BracketRight: [{ text: '}',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: ']', pos: 'bottom-left', size: '13px' }],
                Backslash:    [{ text: '|',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '\\',pos: 'bottom-left', size: '13px' }],
                Semicolon:    [{ text: ':',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: ';', pos: 'bottom-left', size: '13px' }],
                Quote:        [{ text: '"',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: "'", pos: 'bottom-left', size: '13px' }],
                Comma:        [{ text: '<',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: ',', pos: 'bottom-left', size: '13px' }],
                Period:       [{ text: '>',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '.', pos: 'bottom-left', size: '13px' }],
                Slash:        [{ text: '?',            pos: 'top-left',      size: '10px', color: 'oklch(0.6 0.01 240)', shift: true }, { text: '/', pos: 'bottom-left', size: '13px' }]
            };

            function injectKeycapComponent(switchElement, keyCode) {
                const keycapBody = document.createElement('div');
                keycapBody.className = 'keycap';

                const legendsArray = baseKeycapSet[keyCode];
                if (legendsArray && legendsArray.length > 0) {
                    legendsArray.forEach(legend => {
                        const span = document.createElement('span');
                        span.className = `keycap__legend keycap__legend--${legend.pos}`;
                        span.innerText = legend.text;
                        
                        if (legend.size) span.style.fontSize = legend.size;
                        if (legend.color) span.style.color = legend.color;
                        
                        keycapBody.appendChild(span);
                    });
                }
                switchElement.appendChild(keycapBody);
            }

            const matrixContainer = document.getElementById('keyboard-switch-matrix');
            let globalKeyCountIndex = 0;

            keyboardLayoutMap.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-matrix__row';
                
                row.forEach(switchNode => {
                    const btn = document.createElement('button');
                    btn.className = `key-switch ${switchNode.switchType} ${switchNode.keyWidth}`;
                    btn.id = switchNode.keyCode;
                    
                    btn.style.setProperty('--delay', `${globalKeyCountIndex * -0.05}s`);
                    globalKeyCountIndex++;

                    injectKeycapComponent(btn, switchNode.keyCode);

                    let repeatInterval, repeatTimeout;
                    const stopRepeat = () => {
                        clearTimeout(repeatTimeout);
                        clearInterval(repeatInterval);
                        handleRelease(switchNode.keyCode);
                    };

                    btn.addEventListener('pointerdown', (e) => {
                        e.preventDefault(); 
                        e.stopPropagation(); 
                        editor.focus();
                        handleVirtualPress(switchNode.keyCode);

                        const nonRepeatKeys = ['ShiftLeft', 'ShiftRight', 'Fn', 'AltLeft', 'AltRight', 'ControlLeft', 'ControlRight', 'MetaLeft'];
                        if (!nonRepeatKeys.includes(switchNode.keyCode)) {
                            repeatTimeout = setTimeout(() => {
                                repeatInterval = setInterval(() => {
                                    handleVirtualPress(switchNode.keyCode);
                                }, 80); 
                            }, 400); 
                        }
                    });
                    
                    btn.addEventListener('pointerup', stopRepeat);
                    btn.addEventListener('pointerleave', stopRepeat);
                    btn.addEventListener('pointercancel', stopRepeat);

                    rowDiv.appendChild(btn);
                });
                matrixContainer.appendChild(rowDiv);
            });

            let isVirtualShiftActive = false;
            let isVirtualFnActive = false;
            let isVirtualCtrlActive = false;
            let isVirtualAltActive = false;

            function resetVirtualModifiers() {
                isVirtualShiftActive = false;
                isVirtualCtrlActive = false;
                isVirtualAltActive = false;
                isVirtualFnActive = false;
                
                const modifiersList = [
                    { id: 'ShiftLeft', class: 'shift-active' },
                    { id: 'ShiftRight', class: 'shift-active' },
                    { id: 'ControlLeft', class: 'ctrl-active' },
                    { id: 'ControlRight', class: 'ctrl-active' },
                    { id: 'AltLeft', class: 'alt-active' },
                    { id: 'AltRight', class: 'alt-active' },
                    { id: 'Fn', class: 'fn-active' }
                ];

                modifiersList.forEach(mod => {
                    const el = document.getElementById(mod.id);
                    if (el) el.classList.remove(mod.class);
                });
            }

            window.addEventListener('blur', () => {
                resetVirtualModifiers();
                document.querySelectorAll('.key-switch').forEach(el => el.classList.remove('active'));
            });

            window.addEventListener('focus', () => {
                resetVirtualModifiers();
                document.querySelectorAll('.key-switch').forEach(el => el.classList.remove('active'));
            });

            function handleVirtualPress(code) {
                const el = document.getElementById(code);
                if (!el) return;

                if (!el.classList.contains('active')) el.classList.add('active');
                playThock(code === 'Space');

                let isCaps = capsGroup.classList.contains('status-indicator--caps-active');
                
                if (code === 'Backspace') deleteAtCursor();
                else if (code === 'Delete') deleteForwardAtCursor();
                else if (code === 'Enter') insertTextAtCursor("\n");
                else if (code === 'Space') insertTextAtCursor(" ");
                else if (code === 'Tab') insertTextAtCursor("\t");
                else if (code === 'ArrowLeft') moveCursor('left');
                else if (code === 'ArrowRight') moveCursor('right');
                else if (code === 'ArrowUp' || code === 'PageUp' || code === 'Home') moveCursor('start');
                else if (code === 'ArrowDown' || code === 'PageDown') moveCursor('end');
                else if (code === 'CapsLock') updateCapsState(!isCapsOn);
                else if (code === 'Fn') {
                    isVirtualFnActive = !isVirtualFnActive;
                    document.getElementById('Fn').classList.toggle('fn-active', isVirtualFnActive);
                    return;
                }
                else if (code === 'ShiftLeft' || code === 'ShiftRight') {
                    isVirtualShiftActive = !isVirtualShiftActive;
                    document.getElementById('ShiftLeft').classList.toggle('shift-active', isVirtualShiftActive);
                    document.getElementById('ShiftRight').classList.toggle('shift-active', isVirtualShiftActive);
                    return;
                } 
                else if (code === 'ControlLeft' || code === 'ControlRight') {
                    isVirtualCtrlActive = !isVirtualCtrlActive;
                    document.getElementById('ControlLeft').classList.toggle('ctrl-active', isVirtualCtrlActive);
                    document.getElementById('ControlRight').classList.toggle('ctrl-active', isVirtualCtrlActive);
                    return;
                }
                else if (code === 'AltLeft' || code === 'AltRight') {
                    isVirtualAltActive = !isVirtualAltActive;
                    document.getElementById('AltLeft').classList.toggle('alt-active', isVirtualAltActive);
                    document.getElementById('AltRight').classList.toggle('alt-active', isVirtualAltActive);
                    return;
                }
                else if (code === 'MetaLeft') return;
                else {
                    if (isVirtualFnActive) {
                        if (code === 'KeyX') {
                            const isOn = document.body.classList.toggle('rgb-on');
                            localStorage.setItem('kb-rgb', isOn);
                        }
                        isVirtualFnActive = false;
                        document.getElementById('Fn').classList.remove('fn-active');
                        return; 
                    }

                    if (isVirtualCtrlActive) {
                        let ok = false;
                        if (code === 'KeyA') { editor.select(); ok = true; }
                        else if (code === 'KeyC') { const t = editor.value.substring(editor.selectionStart, editor.selectionEnd); if (t) navigator.clipboard.writeText(t); ok = true; }
                        else if (code === 'KeyX') { const t = editor.value.substring(editor.selectionStart, editor.selectionEnd); if (t) { navigator.clipboard.writeText(t); deleteAtCursor(); } ok = true; }
                        else if (code === 'KeyV') { navigator.clipboard.readText().then(t => insertTextAtCursor(t)); ok = true; }
                        else if (code === 'KeyZ') { document.execCommand('undo'); updateEditorSize(); ok = true; }
                        else if (code === 'KeyY') { document.execCommand('redo'); updateEditorSize(); ok = true; }
                        if (ok) { resetVirtualModifiers(); return; }
                    }

                    if (isVirtualAltActive && code === 'KeyT') {
                        toggleThemeWithTransition(mouseX, mouseY);
                        resetVirtualModifiers();
                        return;
                    }

                    if (!isVirtualCtrlActive && !isVirtualAltActive) {
                        const set = baseKeycapSet[code];
                        if (set) {
                            const shiftL = set.find(l => l.shift);
                            const mainL = set.find(l => !l.shift) || set[0];
                            
                            let targetChar = "";
                            if (isVirtualShiftActive && shiftL) {
                                targetChar = shiftL.text; 
                            } else if (mainL && mainL.text) {
                                targetChar = mainL.text;
                                if (targetChar.length === 1 && targetChar.toUpperCase() !== targetChar.toLowerCase()) {
                                    targetChar = (isCapsOn !== isVirtualShiftActive) ? targetChar.toUpperCase() : targetChar.toLowerCase();
                                } else {
                                    targetChar = targetChar.toLowerCase(); 
                                }
                            }
                            if (targetChar) insertTextAtCursor(targetChar);
                        }
                    }
                    resetVirtualModifiers();
                }

                setTimeout(() => {
                    if(editor.selectionStart === editor.value.length) {
                        bgScroller.scrollTo({ top: bgScroller.scrollHeight, behavior: 'auto' });
                    }
                }, 10);
            }

            window.addEventListener('keydown', e => {
                resetVirtualModifiers();

                if (e.getModifierState) updateCapsState(e.getModifierState('CapsLock'));
                if (e.key === 'Tab') { e.preventDefault(); insertTextAtCursor("\t"); }

                if (e.code === 'KeyT' && e.altKey) {
                    e.preventDefault();
                    toggleThemeWithTransition(mouseX, mouseY);
                    const el = document.getElementById(e.code);
                    if (el) el.classList.add('active');
                    playThock(false);
                    return;
                }

                const el = document.getElementById(e.code);
                if (el && !el.classList.contains('active')) {
                    el.classList.add('active');
                    playThock(e.code === 'Space');
                }
                
                setTimeout(() => {
                    if(editor.selectionStart === editor.value.length) {
                        bgScroller.scrollTo({ top: bgScroller.scrollHeight, behavior: 'auto' });
                    }
                }, 10);
            });

            window.addEventListener('keyup', e => {
                if (e.getModifierState) updateCapsState(e.getModifierState('CapsLock'));
                handleRelease(e.code);
            });

            function handleRelease(code) {
                const el = document.getElementById(code);
                if (el) el.classList.remove('active');
            }

            let isDragging = false;
            let dragStartX, dragStartY;

            mainShell.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.key-switch')) return; 
                isDragging = true;
                dragStartX = e.clientX; dragStartY = e.clientY;
                mainShell.setPointerCapture(e.pointerId); 
            });

            mainShell.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragStartX; const dy = e.clientY - dragStartY;
                mainShell.style.transform = `translate(calc(-50% + ${initialTranslateX + dx}px), calc(-50% + ${initialTranslateY + dy}px))`;
            });

            mainShell.addEventListener('pointerup', (e) => {
                if (isDragging) {
                    isDragging = false;
                    initialTranslateX += (e.clientX - dragStartX);
                    initialTranslateY += (e.clientY - dragStartY);
                    mainShell.releasePointerCapture(e.pointerId);
                    localStorage.setItem('kb-x', initialTranslateX);
                    localStorage.setItem('kb-y', initialTranslateY);
                }
                editor.focus(); 
            });
        </script>
