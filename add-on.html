        <style>
            @layer reset, global, composition, block, exception, utility;

            /* =========================================
           1. RESET & NORMALIZE
           ========================================= */
            @layer reset {
                *,
                *::after,
                *::before {
                    box-sizing: border-box;
                    background-repeat: no-repeat;
                }
                * {
                    margin: 0;
                    padding: 0;
                }
                html {
                    -webkit-text-size-adjust: none;
                    text-size-adjust: none;
                    line-height: 1.5;
                    -webkit-font-smoothing: antialiased;
                    block-size: 100%;
                }
                body {
                    min-block-size: 100%;
                }
                img,
                svg {
                    display: block;
                    max-inline-size: 100%;
                }
                svg:not([fill]) {
                    fill: currentColor;
                }
                a {
                    text-decoration: none;
                    color: inherit;
                }
                button {
                    font: inherit;
                    line-height: 1.1;
                }
                h3,
                p {
                    overflow-wrap: break-word;
                }
                p {
                    text-wrap: pretty;
                    font-variant-numeric: proportional-nums;
                }
            }

            /* =========================================
           2. GLOBAL TOKENS
           ========================================= */
            @layer global {
                :root {
                    --gradient-purple: linear-gradient(to bottom, #bb2dff 0%, #8a12d8 22%, #5a0298 48%, #2f004f 78%, #140021 100%);
                    --gradient-orange: linear-gradient(to bottom, #ff860f 0%, #f07a09 22%, #d96b05 48%, #9a4700 78%, #4d2300 100%);
                    --gradient-blue: linear-gradient(to bottom, #1877f2 0%, #1568d4 22%, #1258b5 48%, #0c3f80 78%, #052142 100%);
                    --gradient-red: linear-gradient(to bottom, #c00020 0%, #a8001c 22%, #8f0017 48%, #5e000f 78%, #2b0007 100%);

                    --text-inverted: #FFF;
                    --overlay-white-25: color-mix(in srgb, var(--text-inverted) 25%, transparent);
                    --radius-l: clamp(1rem, 2vw, 1.5rem);
                    --radius-pill: 200px;

                    /* --- FLUID TYPOGRAPHY & HEIGHT (375px -> 1440px) --- */
                    --fs-title: clamp(0.875rem, calc(0.875rem + 0.375 * ((100vw - 23.4375rem) / 66.5625)), 1.25rem);
                    --lh-title: clamp(1.25rem, calc(1.25rem + 0.5 * ((100vw - 23.4375rem) / 66.5625)), 1.75rem);
                    --fs-small: clamp(0.75rem, calc(0.75rem + 0.25 * ((100vw - 23.4375rem) / 66.5625)), 1rem);
                    --lh-small: clamp(1rem, calc(1rem + 0.5 * ((100vw - 23.4375rem) / 66.5625)), 1.5rem);

                    --min-h-btn: clamp(1.5rem, calc(1.5rem + 0.5 * ((100vw - 23.4375rem) / 66.5625)), 2rem);

                    --min-h-card-full: clamp(9.5rem, calc(9.5rem + 3.5 * ((100vw - 23.4375rem) / 36.5625)), 13rem);
                    --min-h-card-half: clamp(18rem, calc(18rem + 10 * ((100vw - 23.4375rem) / 66.5625)), 28rem);

                    --size-media: clamp(7.5rem, calc(7.5rem + 6.25 * ((100vw - 23.4375rem) / 66.5625)), 13.75rem);

                    --size-icon-badge: clamp(0.875rem, calc(0.875rem + 0.375 * ((100vw - 23.4375rem) / 66.5625)), 1.25rem);
                    --size-icon-btn: clamp(1rem, calc(1rem + 0.5 * ((100vw - 23.4375rem) / 66.5625)), 1.5rem);
                    --size-icon-sm: clamp(0.875rem, 1vw, 1.25rem);

                    /* --- FLUID GAPS --- */
                    --gap-card: clamp(0.75rem, calc(0.75rem + 0.25 * ((100vw - 23.4375rem) / 66.5625)), 1rem);
                    --gap-content: clamp(0.5rem, calc(0.5rem + 0.25 * ((100vw - 23.4375rem) / 66.5625)), 0.75rem);
                }

                body {
                    font-family: 'Poppins', sans-serif;
                    padding: clamp(1rem, 3vw, 2rem);
                }
            }

            /* =========================================
           3. COMPOSITION
           ========================================= */
            @layer composition {
                .addon-widget {
                    display: grid;
                    grid-template-columns: repeat(4, 1fr);
                    gap: clamp(0.5rem, 1.5vw, 1rem);
                    max-inline-size: 75rem;
                    margin-inline: auto;
                    container: addon-container / inline-size;
                }
            }

            /* =========================================
           4. BLOCK
           ========================================= */
            @layer block {
                .addon-card {
                    container-type: inline-size;
                    display: flex;
                    flex-direction: column;
                    justify-content: flex-end;
                    align-items: center;
                    overflow: hidden;
                    border-radius: var(--radius-l);

                    --card-padding: 1rem;
                    --card-align: flex-start;
                    --card-text-align: left;

                    padding: var(--card-padding);
                    gap: var(--gap-card);

                    @container addon-container (width >= 60rem) {
                        --card-padding: 2.25rem 1rem 1.5rem;
                        --card-align: center;
                        --card-text-align: center;
                    }

                    & .addon-media {
                        aspect-ratio: 1 / 1;
                        inline-size: var(--size-media);
                        flex-shrink: 0;
                        display: grid;
                        place-items: center;
                    }
                    & .addon-media picture {
                        display: contents;
                    }
                    & .addon-media img {
                        inline-size: 100%;
                        block-size: 100%;
                        object-fit: contain;
                    }

                    & .addon-content {
                        display: flex;
                        flex-direction: column;
                        gap: var(--gap-content);
                        inline-size: 100%;
                        flex-grow: 1;
                        justify-content: flex-end;
                        align-items: var(--card-align);
                        text-align: var(--card-text-align);
                    }

                    & .addon-title-wrapper {
                        inline-size: 100%;
                        min-block-size: 3.75rem;
                        display: flex;
                        align-items: center;
                        justify-content: var(--card-align);
                        flex-grow: 1;
                    }

                    & .addon-title {
                        color: var(--text-inverted);
                        font-weight: 600;
                        font-size: var(--fs-title);
                        line-height: var(--lh-title);
                        display: -webkit-box;
                        -webkit-line-clamp: 3;
                        -webkit-box-orient: vertical;
                        overflow: hidden;
                    }
                }

                .addon-badge {
                    display: inline-flex;
                    align-items: center;
                    gap: 0.25rem;
                    border-radius: var(--radius-pill);
                    background: var(--overlay-white-25);
                    color: var(--text-inverted);
                    font-weight: 600;
                    font-size: var(--fs-small);
                    line-height: var(--lh-small);
                    padding: 0.25rem 1rem;
                    max-inline-size: 100%;

                    & .icon-wrapper {
                        --icon-size: var(--size-icon-badge);
                    }
                    & span:last-child {
                        white-space: nowrap;
                        overflow: hidden;
                        text-overflow: ellipsis;
                    }
                }

                .addon-btn {
                    display: inline-flex;
                    align-items: center;
                    gap: 0.25rem;
                    background: transparent;
                    color: var(--text-inverted);
                    border: none;
                    font-size: var(--fs-small);
                    line-height: var(--lh-small);
                    min-block-size: var(--min-h-btn);
                    cursor: pointer;
                    max-inline-size: 100%;

                    @container addon-container (width >= 60rem) {
                        gap: 0.5rem;
                    }

                    & span:first-child {
                        white-space: nowrap;
                        overflow: hidden;
                        text-overflow: ellipsis;
                        min-inline-size: 0;
                    }
                }

                .icon-wrapper {
                    display: grid;
                    place-items: center;
                    flex-shrink: 0;
                    inline-size: var(--icon-size, var(--size-icon-sm));
                    block-size: var(--icon-size, var(--size-icon-sm));
                    & svg {
                        block-size: var(--icon-scale, 100%);
                        inline-size: auto;
                    }
                }
                .addon-btn .icon-wrapper {
                    --icon-size: var(--size-icon-btn);
                    --icon-scale: 66%;
                }
            }

            /* =========================================
           5. EXCEPTION
           ========================================= */
            @layer exception {

                .addon-widget[data-layout="1x2"] > :nth-child(n+4),
                .addon-widget[data-layout="1x2x1"] > :nth-child(n+5),
                .addon-widget[data-layout="2x2"] > :nth-child(n+5) {
                    display: none !important;
                }

                /* --- HALF CARD --- */
                .addon-widget[data-layout="2x2"] > *,
                :is(.addon-widget[data-layout="1x2x1"], .addon-widget[data-layout="1x2"]) > :is(:nth-child(2), :nth-child(3)) {
                    --card-padding: 1rem 0.75rem;
                    --card-align: center;
                    --card-text-align: center;
                    min-block-size: var(--min-h-card-half);
                }

                @container addon-container (width >= 60rem) {
                    .addon-widget[data-layout="2x2"] > *,
                    :is(.addon-widget[data-layout="1x2x1"], .addon-widget[data-layout="1x2"]) > :is(:nth-child(2), :nth-child(3)) {
                        --card-padding: revert-layer;
                        --card-align: revert-layer;
                        --card-text-align: revert-layer;
                    }
                }

                .addon-widget[data-layout^="1x2"] > :nth-child(2) {
                    grid-column: 1 / 3;
                }
                .addon-widget[data-layout^="1x2"] > :nth-child(3) {
                    grid-column: 3 / 5;
                }
                .addon-widget[data-layout="2x2"] > * {
                    grid-column: span 2;
                }

                /* --- FULL CARD --- */
                :is(.addon-widget[data-layout="1x2x1"], .addon-widget[data-layout="1x2"]) > :first-child,
                .addon-widget[data-layout="1x2x1"] > :last-child {
                    grid-column: 1 / -1;
                    flex-direction: row-reverse;
                    block-size: 100%;
                    min-block-size: var(--min-h-card-full);

                    & .addon-content {
                        block-size: 100%;
                    }

                    & .addon-title-wrapper {
                        min-block-size: 3.5rem;
                    }
                }

                .addon-widget[data-layout="1x2x1"] > :is(:first-child, :last-child) .addon-content {
                    gap: 1.5rem;
                }

                /* --- RESET DESKTOP --- */
                @media (width >= 60rem) {
                    .addon-widget[data-layout="1x2"] {
                        grid-template-columns: repeat(3, 1fr);
                    }

                    .addon-widget[data-layout] > * {
                        grid-column: auto !important;
                        min-block-size: var(--min-h-card-half);
                    }

                    :is(.addon-widget[data-layout="1x2x1"], .addon-widget[data-layout="1x2"]) > :first-child,
                    .addon-widget[data-layout="1x2x1"] > :last-child {
                        flex-direction: column;
                        & .addon-content {
                            gap: var(--gap-content);
                        }
                    }
                }
            }

            /* =========================================
           6. UTILITY
           ========================================= */
            @layer utility {
                .u-bg-purple {
                    background: var(--gradient-purple) !important;
                }
                .u-bg-orange {
                    background: var(--gradient-orange) !important;
                }
                .u-bg-blue {
                    background: var(--gradient-blue) !important;
                }
                /* Tambahan utility red */
                .u-bg-red {
                    background: var(--gradient-red) !important;
                }
            }
        </style>
    </head>

                <figure class="addon-media">

                        <source media="(width >= 48rem)" srcset="public/lixov2qwe9agzwuewkjf.webp">
                        <img src="public/hkjhwlfsuuuv8rh1fjt1.webp" alt="Ilustrasi Promo Kilat" fetchpriority="high" decoding="sync" width="120" height="120">
                    </picture>

                        </span>

        </section>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const debounce = (func, delay) => {
                    let timer;
                    return function (...args) {
                        clearTimeout(timer);
                        timer = setTimeout(() => func.apply(this, args), delay);
                    };
                };

                const updateTooltips = () => {
                    const elements = document.querySelectorAll('.addon-title, .addon-badge span:last-child, .addon-btn span:first-child');

                    elements.forEach(el => {
                        const targetToTitle = el.parentElement.tagName === 'BUTTON'
                            ? el.parentElement
                            : el;
                        targetToTitle.removeAttribute('title');

                        if (el.scrollHeight > el.clientHeight || el.scrollWidth > el.clientWidth) {
                            targetToTitle.setAttribute('title', el.textContent.trim());
                        }
                    });
                };

                updateTooltips();
                window.addEventListener('resize', debounce(updateTooltips, 250));
            });
        </script>
