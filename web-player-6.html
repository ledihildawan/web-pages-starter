    <style>
      @layer reset, design-tokens, layout, components, utilities;

      @layer design-tokens {
        :root {
          color-scheme: dark;
          
          /* --- BASE COLORS (OKLCH) --- */
          --c-black: oklch(0% 0 0);
          --c-white: oklch(100% 0 0);
          --c-gray-900: oklch(15% 0.01 250); 
          --c-gray-800: oklch(22% 0.01 250);
          --c-gray-700: oklch(35% 0.01 250);
          --c-accent: oklch(95% 0.02 250);
          
          /* --- SEMANTIC TOKENS --- */
          --brand-dark: var(--c-black); 
          --surface: var(--c-white);              
          
          --text-main: color-mix(in oklch, var(--c-white) 98%, transparent);              
          --text-sub: color-mix(in oklch, var(--c-white) 60%, transparent);
          --text-muted: color-mix(in oklch, var(--c-white) 40%, transparent);              
          
          --surface-glass-bg: color-mix(in oklch, var(--c-gray-900) 65%, transparent);
          --glass-bg: color-mix(in oklch, var(--c-gray-800) 50%, transparent);        
          --glass-border: color-mix(in oklch, var(--c-white) 8%, transparent);
          --glass-highlight: inset 0 1px 0 0 color-mix(in oklch, var(--c-white) 12%, transparent);   
          --surface-glass-blur: blur(48px) saturate(200%);
          
          /* Utility metrics */
          --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
          --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
          --ease-snappy: cubic-bezier(0.16, 1, 0.3, 1);
          --card-inline-size: 440px;
          --fab-size: 46px; 
          --frame-radius: 24px;
        }
      }

      @layer reset {
        html, body { overscroll-behavior: none; touch-action: pan-y; overflow: hidden; background-color: var(--brand-dark); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; color: var(--text-main); opacity: 0; animation: smoothLoad 0.8s var(--ease-out) forwards; letter-spacing: -0.01em; }
        @keyframes smoothLoad { to { opacity: 1; } }
        :is(.story-excerpt, button, input[type=range]):focus-visible { outline: 2px solid var(--text-main); outline-offset: 4px; border-radius: 12px; }
        .player-fab:focus-visible, .reaction-option-btn:focus-visible, .volume-btn:focus-visible { border-radius: 50%; }
        .sr-only { position: absolute; inline-size: 1px; block-size: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0; }
        button { background: none; border: none; font-family: inherit; color: inherit; cursor: pointer; }
      }

      @layer layout {
        .layout-wrapper { position: relative; block-size: 100dvh; inline-size: 100vw; pointer-events: none; background: var(--c-black); }
        .layout-wrapper.is-ready { pointer-events: auto; }
        .story-feed { position: absolute; inset: 0; inline-size: 100%; block-size: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: transform 0.7s var(--ease-spring); overscroll-behavior-y: contain; }
        .story-feed::-webkit-scrollbar { display: none; }
        .layout-wrapper.is-ui-open .story-feed { overflow-y: hidden !important; touch-action: none !important; }
        .story-slot { position: relative; flex-shrink: 0; inline-size: 100%; block-size: 100dvh; scroll-snap-align: center; scroll-snap-stop: always; transform: translateZ(0); }
      }

      @layer components {
        .story-container, .story-dummy-card { position: absolute; inset: 0; inline-size: 100%; block-size: 100%; border-radius: 0; transform: translateZ(0); }
        .story-container { background-color: var(--brand-dark); z-index: 10; transition: border-radius 0.6s var(--ease-snappy), box-shadow 0.6s var(--ease-snappy); }
        .story-dummy-card { background-color: oklch(5% 0 0); overflow: hidden; filter: brightness(0.3); z-index: 5; transition: filter 0.6s var(--ease-out); pointer-events: auto; cursor: pointer; }
        .story-dummy-card:hover { filter: brightness(0.5); }
        .story-dummy-card::before { content: ''; position: absolute; inset: -10%; inline-size: 120%; block-size: 120%; background-image: var(--peek-img, none); background-size: cover; background-position: center; filter: blur(40px) brightness(0.3); opacity: var(--peek-blur, 0); z-index: 1; pointer-events: none; transition: background-image 0.5s ease; }
        .story-dummy-card::after { content: ''; position: absolute; inset: 0; background-image: var(--peek-img, none); background-size: var(--peek-fit, cover); background-position: center; background-repeat: no-repeat; z-index: 2; pointer-events: none; transition: background-image 0.5s ease; }
        .ambient-layer { display: none; position: absolute; inset-block-start: 50%; inset-inline-start: 50%; inline-size: 30%; block-size: 30%; margin-block-start: -15%; margin-inline-start: -15%; z-index: 1; pointer-events: none; transform: scale(3.5) translateZ(0); opacity: 0; filter: blur(48px) saturate(150%); transition: opacity 1s var(--ease-out), filter 1s var(--ease-out); will-change: transform, opacity, filter; }
        .story-container.has-started:not(.is-paused) .ambient-layer { opacity: 0.35; filter: blur(32px) saturate(200%); }
        .story-container.is-paused .ambient-layer { opacity: 0.1; filter: blur(48px) saturate(100%); }
        .layout-wrapper.is-ui-open .ambient-layer { opacity: 0.05; }
        @keyframes ambientBreathe { 0%, 100% { transform: scale(3.5) translateZ(0); } 50% { transform: scale(3.8) translateZ(0); } }
        .is-breathing { animation: ambientBreathe 10s ease-in-out infinite; }
        .media-container iframe, .media-container video, .media-container img { inline-size: 100%; block-size: 100%; border: none; pointer-events: none; }
        .ambient-media-container { inline-size: 100%; block-size: 100%; opacity: 0; transition: opacity 0.8s var(--ease-out); }
        .story-viewport { position: absolute; inset: 0; z-index: 10; overflow: hidden; border-radius: inherit; transition: filter 0.6s var(--ease-snappy), transform 0.6s var(--ease-spring); will-change: filter, transform; contain: paint; }
        .story-video-wrapper { position: relative; inline-size: 100%; block-size: 100%; background-color: var(--brand-dark); transition: filter 0.6s var(--ease-out); }
        .story-container.is-paused .story-video-wrapper { filter: brightness(0.6) contrast(1.1) grayscale(0.1); }
        .story-video-wrapper::after { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 5; background: linear-gradient(to bottom, color-mix(in oklch, var(--c-black) 50%, transparent) 0%, transparent 15%, transparent 60%, color-mix(in oklch, var(--c-black) 85%, transparent) 100%); transition: opacity 0.5s var(--ease-out); }
        .video-blur-bg { position: absolute; inset: -10%; inline-size: 120%; block-size: 120%; background-size: cover; background-position: center; filter: blur(30px) brightness(0.3); z-index: 1; opacity: 0; pointer-events: none; transition: opacity 0.6s ease, background-image 0.6s ease; will-change: opacity; }
        .thumbnail-overlay { position: absolute; inset: 0; inline-size: 100%; block-size: 100%; z-index: 8; pointer-events: none; transition: opacity 0.5s ease; color: transparent; will-change: opacity; }
        .main-media-container { position: absolute; inset: 0; inline-size: 100%; block-size: 100%; z-index: 2; pointer-events: none; opacity: 0; transition: opacity 0.3s var(--ease-out); will-change: opacity; } 
        .story-loader { position: absolute; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s var(--ease-out); pointer-events: none; }
        .story-container.has-started .story-loader { opacity: 0; }
        .story-container.has-started.is-loading .story-loader { opacity: 1; }
        .story-loader__spinner-simple { inline-size: 36px; block-size: 36px; border-radius: 50%; border: 3px solid color-mix(in oklch, var(--c-white) 10%, transparent); border-top-color: var(--text-main); animation: story-spin-simple 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; filter: drop-shadow(0 2px 8px color-mix(in oklch, var(--c-black) 50%, transparent));}
        @keyframes story-spin-simple { to { transform: rotate(1turn); } }
        .story-error-overlay { position: absolute; inset: 0; z-index: 60; background: color-mix(in oklch, var(--c-gray-900) 95%, transparent); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .story-error-overlay.is-visible { opacity: 1; pointer-events: auto; }
        .error-content { text-align: center; padding-inline: 32px; color: var(--text-main); } 
        .error-icon { font-size: 56px; margin-block-end: 20px; display: block; filter: drop-shadow(0 8px 16px color-mix(in oklch, var(--c-black) 50%, transparent)); } 
        .error-title { font-size: 22px; font-weight: 700; margin-block-end: 10px; letter-spacing: -0.02em; } 
        .error-desc { font-size: 15px; color: var(--text-sub); margin-block-end: 28px; line-height: 1.5; }
        .error-retry-btn { background: var(--text-main); color: var(--brand-dark); border: none; padding: 14px 32px; border-radius: 32px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s var(--ease-snappy); box-shadow: 0 8px 24px color-mix(in oklch, var(--c-white) 15%, transparent); } 
        .error-retry-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px color-mix(in oklch, var(--c-white) 25%, transparent); }
        .error-retry-btn:active { transform: scale(0.96); }
        .reaction-container-layer { position: absolute; inset: 0; z-index: 15; pointer-events: none; contain: strict; }
        .particle { position: absolute; inset-block-start: -10%; inset-inline-start: var(--x); font-size: var(--size); opacity: 0; animation: drop-physics var(--duration) ease-in forwards; animation-delay: var(--delay); filter: blur(var(--blur)) drop-shadow(0 4px 12px color-mix(in oklch, var(--c-black) 60%, transparent)); z-index: var(--z); will-change: transform, opacity; }
        @keyframes drop-physics { 0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; } 10%, 80% { opacity: 1; } 100% { transform: translate3d(var(--drift), 120dvh, 0) rotate(var(--rotation)); opacity: 0; } }
        .story-center-play { position: absolute; inset-block-start: 50%; inset-inline-start: 50%; transform: translate(-50%, -50%) scale(1.8); font-size: 88px; z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.5s ease-out, transform 0.5s ease-out; filter: drop-shadow(0 12px 32px color-mix(in oklch, var(--c-black) 60%, transparent)); will-change: transform, opacity; text-shadow: 0 0 40px color-mix(in oklch, var(--c-white) 20%, transparent); }
        :is(.story-center-play.is-flashing, .story-center-play.is-steady) { opacity: 1; transform: translate(-50%, -50%) scale(1); transition: opacity 0.15s ease-in, transform 0.3s var(--ease-spring); }
        .ripple-edge { position: absolute; inset-block: 0; inline-size: 40%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; z-index: 25; }
        .ripple-edge.is-animating { animation: edgeRippleAnim 0.7s var(--ease-out) forwards; }

        .ripple-edge--right { inset-inline-end: 0; background: radial-gradient(100% 50% at 100% 50%, color-mix(in oklch, var(--c-white) 8%, transparent) 0%, transparent 100%); }
        .ripple-edge__capsule { background: color-mix(in oklch, var(--c-black) 50%, transparent); color: var(--text-main); padding: 12px 24px; border-radius: 40px; font-size: 15px; font-weight: 700; -webkit-backdrop-filter: blur(20px) saturate(150%); backdrop-filter: blur(20px) saturate(150%); letter-spacing: 0.02em; box-shadow: 0 8px 24px color-mix(in oklch, var(--c-black) 40%, transparent), var(--glass-highlight); border: 1px solid var(--glass-border); }
        @keyframes edgeRippleAnim { 0% { opacity: 0; transform: scale(0.95); } 15% { opacity: 1; transform: scale(1); } 80% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.05); } }
        .story-gesture-layer { position: absolute; inset: 0; z-index: 20; display: flex; cursor: pointer; touch-action: pan-y; user-select: none; -webkit-touch-callout: none; }
        .gesture-zone { block-size: 100%; } .gesture-zone--left, .gesture-zone--right { inline-size: 30%; } .gesture-zone--center { inline-size: 40%; }
        .story-progress-bar-wrapper { position: absolute; inset-block-end: max(16px, env(safe-area-inset-bottom)); inset-inline: 16px; block-size: 24px; z-index: 55; cursor: pointer; display: flex; align-items: center; gap: 6px; opacity: 0; transition: opacity 0.8s var(--ease-out); filter: drop-shadow(0 2px 8px color-mix(in oklch, var(--c-black) 50%, transparent)); }
        .story-container.is-story-format .story-progress-bar-wrapper { opacity: 1 !important; transform: translateY(0) !important; pointer-events: auto !important; }
        .story-progress-bar { flex: 1; block-size: 3px; background: color-mix(in oklch, var(--c-white) 25%, transparent); border-radius: 4px; overflow: hidden; transition: block-size 0.2s var(--ease-snappy); }
        .story-progress-bar-wrapper:hover .story-progress-bar { block-size: 6px; background: color-mix(in oklch, var(--c-white) 35%, transparent); }
        .story-progress-bar__fill { block-size: 100%; inline-size: 100%; background: var(--c-white); transform-origin: left; transform: scaleX(0); border-radius: inherit; box-shadow: 0 0 10px color-mix(in oklch, var(--c-white) 60%, transparent); will-change: transform; transition: box-shadow 0.2s; }
        
        :is(.story-top-actions, .story-player-actions) { position: absolute; z-index: 55; display: flex; gap: 14px; opacity: 0; pointer-events: none; transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-spring); }
        .story-top-actions { inset-block-start: max(20px, env(safe-area-inset-top)); inset-inline-start: 20px; transform: translateY(-20px); }
        .story-player-actions { inset-block-end: max(56px, env(safe-area-inset-bottom)); inset-inline-end: 20px; flex-direction: column; align-items: center; transform: translateY(20px); }
        
        .volume-wrapper { display: flex; align-items: center; background-color: var(--glass-bg); -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%); border: 1px solid var(--glass-border); border-radius: 30px; inline-size: var(--fab-size); block-size: var(--fab-size); box-shadow: 0 8px 20px color-mix(in oklch, var(--c-black) 30%, transparent), var(--glass-highlight); transition: all 0.4s var(--ease-spring), background-color 0.3s; overflow: hidden; }
        .volume-btn { inline-size: var(--fab-size); block-size: var(--fab-size); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-main); background: transparent; border: none; cursor: pointer; transition: transform 0.2s var(--ease-spring); }
        .volume-btn:active { transform: scale(0.90); }
        .volume-slider-box { flex: 1; display: flex; align-items: center; padding-inline-end: 16px; opacity: 0; transform: translateX(-10px); transition: all 0.3s var(--ease-spring); pointer-events: none; }
        .volume-slider { -webkit-appearance: none; appearance: none; inline-size: 100%; block-size: 4px; background: linear-gradient(to right, var(--c-white) var(--vol, 100%), color-mix(in oklch, var(--c-white) 20%, transparent) var(--vol, 100%)); border-radius: 2px; outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--c-white); box-shadow: 0 0 4px color-mix(in oklch, var(--c-black) 50%, transparent); cursor: pointer; }
        .volume-slider::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; border: none; background: var(--c-white); box-shadow: 0 0 4px color-mix(in oklch, var(--c-black) 50%, transparent); cursor: pointer; }

        :is(.player-fab, .reaction-option-btn, .external-nav-btn) { inline-size: var(--fab-size); block-size: var(--fab-size); border-radius: 50%; background-color: var(--glass-bg); -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%); border: 1px solid var(--glass-border); color: var(--text-main); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px color-mix(in oklch, var(--c-black) 30%, transparent), var(--glass-highlight); transition: all 0.3s var(--ease-spring); }
        :is(.player-fab, .reaction-option-btn, .external-nav-btn):active:not(.is-disabled) { background-color: color-mix(in oklch, var(--c-gray-700) 60%, transparent); box-shadow: 0 2px 8px color-mix(in oklch, var(--c-black) 40%, transparent), var(--glass-highlight); transform: scale(0.92); }

        .story-view__badges .story-badge-item { background: var(--text-main); color: var(--brand-dark); border: none; box-shadow: 0 4px 12px color-mix(in oklch, var(--c-white) 20%, transparent); inset: none; }

                    AppState.currentSubIndex = 0; 
                    
                    clearTimeout(window.saveIndexTimer); 
                    window.saveIndexTimer = setTimeout(() => localStorage.setItem('ts_story_index', newIndex), 500); 
                    
                    resetVideoState(); 
                    requestAnimationFrame(() => { 
                      entry.target.appendChild(playerContainer); 
                      
                      // 3. Update virtualization setap user berpindah video
                      updateVirtualization(newIndex);
                      
                      updateVideoUI(); 
                      checkNavState(); 
                    }); 
                  }, 150); 
                } 
              } 
            }); 
          }, { root: feed, threshold: [0, 0.5, 1] });
          
          Array.from(slots).forEach(slot => scrollObserverInstance.observe(slot));
        };

        const initEventListeners = () => {
          const markInteracted = () => { AppState.userInteracted = true; };
          ['click', 'touchstart', 'keydown', 'pointerdown'].forEach(evt => EventRegistry.add(window, evt, markInteracted, { once: true, passive: true }));
          
          const urlParams = new URLSearchParams(window.location.search); const urlV = urlParams.get('v'); let isUrlIndexSet = false;
          if (urlV) { let foundIndex = urlV.startsWith('item_') ? parseInt(urlV.replace('item_', ''), 10) : CONFIG.PLAYLIST.findIndex(item => item.type === 'youtube' && Utils.parseYouTubeData(item.url).videoId === urlV); if (foundIndex > -1 && foundIndex < CONFIG.PLAYLIST.length) { AppState.currentVideoIndex = foundIndex; isUrlIndexSet = true; } }
          if (!isUrlIndexSet) { let savedIndex = parseInt(localStorage.getItem('ts_story_index'), 10); if (!isNaN(savedIndex) && savedIndex >= 0 && savedIndex < CONFIG.PLAYLIST.length) AppState.currentVideoIndex = savedIndex; }
          
          initScrollSnap(); initProgressBarGestures(); initGestures(); initDrag();
          
          const sliderEl = dom('.js-volume-slider');
          if(sliderEl) {
             EventRegistry.add(sliderEl, 'input', updateVolumeFromSlider);
          }

          EventRegistry.add(document, 'keydown', (e) => {
            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName) || state.isOpen || state.isAnimating) return;
            const groupData = CONFIG.PLAYLIST[AppState.currentVideoIndex]; const isMulti = groupData.items && groupData.items.length > 1;
            const isReady = dom('.js-story-container')?.classList.contains('has-started'); 

            const keyMap = { 
              Space: () => { e.preventDefault(); togglePlayPause(); }, 
              ArrowDown: () => switchVideo(1), 
              ArrowUp: () => switchVideo(-1), 
              ArrowRight: () => { 
                if (groupData.format === 'story' || isMulti) navigateNext(); 
                else if (isReady) { seekVideo(5); showRipple('right', `⏩ 5s`); } 
              }, 
              ArrowLeft: () => { 
                if (groupData.format === 'story' || isMulti) navigatePrev(); 
                else if (isReady) { seekVideo(-5); showRipple('left', `⏪ 5s`); } 
              } 
            };
            if (keyMap[e.code]) keyMap[e.code](); else if (e.key.toLowerCase() === 'm') toggleMute(); 
          });
          
          EventRegistry.add(document, 'click', (e) => {
            const t = e.target; 
            if (t.closest('.js-volume-slider')) return; 
            if (t.closest('.story-close-btn, .overlay-backdrop')) return closeContext(); if (t.closest('.reaction-option-btn')) return react(t.closest('.reaction-option-btn').dataset.reaction);
            const dummyClick = t.closest('.story-dummy-card'); if (dummyClick && !dummyClick.closest('.story-slot').classList.contains('is-active')) { dummyClick.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
            const actionMap = { '.js-btn-play': togglePlayPause, '.js-btn-mute': toggleMute, '.js-btn-prev': () => switchVideo(-1), '.js-btn-next': () => switchVideo(1), '.js-btn-close': () => { AppState.currentMedia?.pause(); rootContainer.style.opacity = '0'; setTimeout(() => (rootContainer.style.display = 'none'), 600); }, '.js-btn-open-context': openContext, '.js-btn-reaction': toggleReactionMenu, '.js-btn-share': async () => { const url = window.location.href; try { if (navigator.share) { await navigator.share({ title: CONFIG.PLAYLIST[AppState.currentVideoIndex].title, url }); } else if (navigator.clipboard) { await navigator.clipboard.writeText(url); Utils.showToast('Link disalin ke clipboard'); } else { Utils.showToast('Fitur share tidak didukung'); } } catch (err) { console.warn('Share gagal', err); } }, '.js-btn-clean': () => { closeReactionMenu(); rootContainer.classList.toggle('is-clean-mode'); } };
            for (let selector in actionMap) if (t.closest(selector)) return actionMap[selector](e);
            const reactionWrapper = dom('.js-reaction-wrapper'); if (reactionWrapper && !reactionWrapper.contains(t)) closeReactionMenu();
          });
          
          EventRegistry.add(window, 'offline', () => Utils.showToast('Koneksi internet terputus.'));
          EventRegistry.add(window, 'online', () => { Utils.showToast('Koneksi pulih.'); if (dom('.js-error-overlay')?.classList.contains('is-visible')) updateVideoUI(); });
          
          EventRegistry.add(window, 'popstate', (e) => {
            if (e.state && typeof e.state.index === 'number') { if (state.isAnimating) return; AppState.currentVideoIndex = e.state.index; AppState.currentSubIndex = e.state.subIndex || 0; resetVideoState(); updateVideoUI(); } else { const v = new URLSearchParams(window.location.search).get('v'); if (v) { let foundIndex = v.startsWith('item_') ? parseInt(v.replace('item_', ''), 10) : CONFIG.PLAYLIST.findIndex(item => item.type === 'youtube' && Utils.parseYouTubeData(item.url).videoId === v); if (foundIndex > -1 && foundIndex !== AppState.currentVideoIndex && foundIndex < CONFIG.PLAYLIST.length) { if (state.isAnimating) return; AppState.currentVideoIndex = foundIndex; AppState.currentSubIndex = 0; resetVideoState(); updateVideoUI(); } } }
          });
          
          EventRegistry.add(window, 'resize', Utils.debounce(() => { if (window.innerWidth < 768 && AppState.currentAmbient) { AppState.currentAmbient.destroy(); AppState.currentAmbient = null; } else if (window.innerWidth >= 768 && !AppState.currentAmbient && AppState.currentMedia) { const ambientContainer = dom('.ambient-media-container'); const data = getActiveData(); AppState.currentAmbient = MediaFactory.create(ambientContainer, data, { onReady: () => { AppState.currentAmbient.seekTo(AppState.currentMedia.getCurrentTime()); if (AppState.currentMedia.getState() === CONFIG.MEDIA_STATE.PLAYING) AppState.currentAmbient.play(); } }, true); AppState.currentAmbient.load(); } }, 150));
          
          const pauseMediaSafely = () => { AppState.wasPlayingBeforeHidden = (AppState.currentMedia?.getState() === CONFIG.MEDIA_STATE.PLAYING); if (AppState.wasPlayingBeforeHidden) { AppState.currentMedia.pause(); hideSteadyIcon(); hideSteadyRipple(); } if (AppState.currentAmbient?.getState() === CONFIG.MEDIA_STATE.PLAYING) { AppState.currentAmbient.pause(); } };
          const resumeMediaSafely = () => { if (AppState.wasPlayingBeforeHidden && !state.isOpen && !document.hidden) { AppState.currentMedia?.play(); AppState.currentAmbient?.play(); AppState.wasPlayingBeforeHidden = false; } };
          EventRegistry.add(document, 'visibilitychange', () => { document.hidden ? pauseMediaSafely() : resumeMediaSafely(); });
        };
        
        const destroy = () => { EventRegistry.clear(); if (AppState.currentMedia) AppState.currentMedia.destroy(); if (AppState.currentAmbient) AppState.currentAmbient.destroy(); if (scrollObserverInstance) scrollObserverInstance.disconnect(); cancelAnimationFrame(state.animFrameId); clearTimeout(AppState.crossfadeTimer); document.querySelector('.custom-toast')?.remove(); rootContainer.classList.remove('is-ready'); AppState.isApiReady = false; };
        initEventListeners();
        syncVolumeUI(); 
        
        document.addEventListener('touchmove', function(e) {
            const isFeed = e.target.closest('.js-story-feed');
            const isContentScroll = e.target.closest('.story-body');
            const isSheetDrag = e.target.closest('.story-sheet__content');
            
            if (!isFeed && !isContentScroll && !isSheetDrag) { e.preventDefault(); }
        }, { passive: false });

        return { startProgressBar, stopProgressBar, checkNavState, showSteadyIcon, hideSteadyIcon, switchVideo, navigateNext, navigatePrev, resetVideoState, updateVideoUI, syncVolumeUI, destroy, isContextOpen: () => state.isOpen, isAnimatingState: () => state.isAnimating };
      })();
      
      const loadYouTubeAPI = () => { if (window.YT && window.YT.Player) { AppState.isApiReady = true; if (window.StoryManager) window.StoryManager.updateVideoUI(); return; } const tag = document.createElement('script'); tag.src = 'https://www.youtube.com/iframe_api'; tag.async = true; document.head.appendChild(tag); };
      const existingYTCallback = window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady = function() { if (typeof existingYTCallback === 'function') existingYTCallback(); AppState.isApiReady = true; if (window.StoryManager) window.StoryManager.updateVideoUI(); };
      loadYouTubeAPI();
    </script>
  </body>
</html>
