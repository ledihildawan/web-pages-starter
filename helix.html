<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animasi Loading Helix DNA</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #0d0211; /* Ungu gelap futuristik */
      color: #ff00ff; /* Warna magenta untuk helix */
    }

    .loading-container {
      font-family: 'Courier New', Courier, monospace;
      font-size: 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      /* Efek neon yang kuat untuk struktur DNA */
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.7), 0 0 20px rgba(0, 255, 255, 0.4);
    }

    /* Elemen spinner Helix */
    .braille-helix::after {
      content: "⡈⠔⠢⢁"; /* Frame awal: Dua untai saling mengejar */
      display: inline-block;
      white-space: pre; 
      /* Animasi berputar cepat untuk memberikan kesan rotasi 3D */
      animation: dna-spin 0.6s step-end infinite; 
      color: #00ffff; /* Warna cyan sebagai aksen sekunder */
    }

    /* Keyframes untuk menggeser pola helix secara horizontal 
       ⡈ = Atas-Bawah
       ⠔ = Tengah-Atas & Tengah-Bawah
       ⠢ = Kebalikan Tengah
       ⢁ = Bawah-Atas
    */
    @keyframes dna-spin {
      0%   { content: "⡈⠔⠢⢁"; }
      25%  { content: "⢁⡈⠔⠢"; }
      50%  { content: "⠢⢁⡈⠔"; }
      75%  { content: "⠔⠢⢁⡈"; }
      100% { content: "⡈⠔⠢⢁"; }
    }

    .loading-text {
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 18px;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

  <div class="loading-container">
    <span class="braille-helix"></span> 
    <span class="loading-text">Sequencing DNA</span>
  </div>

</body>
</html>
