      window.StoryManager = (() => {
        let wasPlayingBeforeContext = false; 

        const state = { isOpen: false, startY: 0, currentY: 0, isDragging: false, animFrameId: null, isAnimating: false };
        const getActiveContext = () => window.innerWidth >= 1366 ? dom('.js-story-card') : window.innerWidth >= 768 ? dom('.js-story-popup') : dom('.js-story-sheet');
        
        let scrollObserverInstance = null;
        
        setTimeout(() => { 
          ['.js-story-sheet', '.js-story-popup', '.js-story-card'].forEach(sel => { 
            const target = dom(sel)?.querySelector('.story-dynamic-area'); 
            const template = document.querySelector('.js-story-template'); 
            if (target && template && !target.hasChildNodes()) target.append(template.content.cloneNode(true)); 
          }); 
        }, 0);
        
        let focusableElements = [], firstFocusable, lastFocusable;
        const handleFocusTrap = (e) => { 
          if (e.key !== 'Tab') return; 
          if (e.shiftKey && document.activeElement === firstFocusable) { 
            e.preventDefault(); lastFocusable?.focus(); 
          } else if (!e.shiftKey && document.activeElement === lastFocusable) { 
            e.preventDefault(); firstFocusable?.focus(); 
          } 
        };
        const initFocusTrap = (ctx) => { 
          focusableElements = ctx.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'); 
          if (focusableElements.length) { 
            firstFocusable = focusableElements[0]; 
            lastFocusable = focusableElements[focusableElements.length - 1]; 
            ctx.addEventListener('keydown', handleFocusTrap); 
          } 
        };
        
        let lastSyncCheck = 0;
        const loopProgress = () => {
          if (AppState.currentMedia?.getState() === CONFIG.MEDIA_STATE.PLAYING) {
            const duration = AppState.currentMedia.getDuration(); 
            const currentTime = AppState.currentMedia.getCurrentTime(); 
            const progressFill = dom(`[data-progress-index="${AppState.currentSubIndex}"]`); 
            if (duration > 0 && progressFill) {
              progressFill.style.transform = `scaleX(${currentTime / duration})`;
            }
            
            if (AppState.currentAmbient) { 
              const now = performance.now(); 
              if (now - lastSyncCheck > 1000) { 
                const diff = Math.abs(currentTime - AppState.currentAmbient.getCurrentTime());
                if (diff > 1.5) { 
                  const ambEl = dom('.ambient-media-container');
                  if (ambEl) ambEl.style.opacity = '0';
                  AppState.currentAmbient.seekTo(currentTime); 
                  setTimeout(() => { 
                    if (ambEl && AppState.currentMedia?.getState() === CONFIG.MEDIA_STATE.PLAYING) {
                      ambEl.style.opacity = '1'; 
                    }
                  }, 400);
                } 
                lastSyncCheck = now; 
              } 
            }
            state.animFrameId = requestAnimationFrame(loopProgress);
          } else {
            state.animFrameId = null;
          }
        };
        
        const startProgressBar = () => { 
          cancelAnimationFrame(state.animFrameId); 
          const progressFill = dom(`[data-progress-index="${AppState.currentSubIndex}"]`); 
          if (progressFill) progressFill.style.transform = 'scaleX(0)'; 
          state.animFrameId = requestAnimationFrame(loopProgress); 
        };
        const stopProgressBar = () => cancelAnimationFrame(state.animFrameId);
        
        let flashTimeout;
        const toggleIcon = (iconStr, type) => { 
          const iconEl = dom('.js-center-play'); 
          if (!iconEl) return; 
          clearTimeout(flashTimeout); 
          if (iconStr) iconEl.textContent = iconStr; 
          iconEl.className = 'story-center-play js-center-play'; 
          if (type) iconEl.classList.add(type); 
          if (type === 'is-flashing') flashTimeout = setTimeout(() => iconEl.classList.remove('is-flashing'), 500); 
        };
        const flashIcon = (iconStr) => { 
          toggleIcon('', ''); 
          void dom('.js-center-play')?.offsetWidth; 
          toggleIcon(iconStr, 'is-flashing'); 
        };
        const showSteadyIcon = (iconStr) => toggleIcon(iconStr, 'is-steady'); 
        const hideSteadyIcon = () => dom('.js-center-play')?.classList.remove('is-steady');

        const showRipple = (side, text) => {
            const el = dom(`.js-ripple-${side}`);
            const textEl = dom(`.js-ripple-text-${side}`);
            if (!el || !textEl) return;
            textEl.textContent = text;
            el.classList.remove('is-animating', 'is-steady');
            void el.offsetWidth; 
            el.classList.add('is-animating');
            navigator.vibrate?.(50);
            
            el.onanimationend = () => el.classList.remove('is-animating');
        };

        const showSteadyRipple = (side, text) => {
            const el = dom(`.js-ripple-${side}`);
            const textEl = dom(`.js-ripple-text-${side}`);
            if (!el || !textEl) return;
            textEl.textContent = text;
            el.classList.remove('is-animating');
            el.classList.add('is-steady');
            navigator.vibrate?.(50);
        };
        
        const hideSteadyRipple = () => {
            dom('.js-ripple-left')?.classList.remove('is-steady');
            dom('.js-ripple-right')?.classList.remove('is-steady');
        };
        
        const checkNavState = () => { 
            const isFirst = AppState.currentVideoIndex === 0 && AppState.currentSubIndex === 0;
            const currentGroup = CONFIG.PLAYLIST[AppState.currentVideoIndex];
            const isLast = AppState.currentVideoIndex === CONFIG.PLAYLIST.length - 1 && 
                           AppState.currentSubIndex === (currentGroup.items?.length ?? 1) - 1;

            dom('.js-btn-prev')?.classList.toggle('is-disabled', isFirst);
            dom('.js-btn-next')?.classList.toggle('is-disabled', isLast);
        };
        
        const resetVideoState = () => {
          clearTimeout(AppState.crossfadeTimer); 
          if (state.isOpen) closeContext(); 
          closeReactionMenu(); 
          hideSteadyIcon();
          
          dom('.js-ripple-left')?.classList.remove('is-animating', 'is-steady');
          dom('.js-ripple-right')?.classList.remove('is-animating', 'is-steady');
          
          const reactionContainer = dom('.js-reaction-container');
          if (reactionContainer) reactionContainer.replaceChildren();
          
          rootContainer.classList.remove('is-clean-mode'); 
          dom('.js-story-container')?.classList.remove('show-ui');
          
          AppState.currentMedia?.pause();
          
          const btnPlayPause = dom('.js-btn-play'); 
          if (btnPlayPause) { 
            btnPlayPause.textContent = '⏸️'; 
            btnPlayPause.setAttribute('aria-pressed', 'false'); 
          }
          
          dom('.js-story-container')?.classList.remove('is-paused'); 
          dom('.js-story-container')?.classList.add('is-loading');
          
          const thumbOverlay = dom('.js-thumbnail-overlay'); 
          if (thumbOverlay) { 
            thumbOverlay.style.transition = 'none'; 
            thumbOverlay.style.opacity = '1'; 
            thumbOverlay.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E"; 
            thumbOverlay.style.objectFit = ''; 
          }
          
          const blurBg = dom('.js-video-blur'); 
          if (blurBg) { 
            blurBg.style.transition = 'none'; 
            blurBg.style.backgroundImage = 'none'; 
            blurBg.style.opacity = '0'; 
            blurBg.classList.remove('is-inner-breathing'); 
          }
          
          const ambientWrapper = dom('.js-ambient-container'); 
          if (ambientWrapper) { 
            ambientWrapper.style.backgroundImage = 'none'; 
            ambientWrapper.classList?.remove('is-breathing'); 
          }
          
          [dom('.main-media-container'), dom('.ambient-media-container')].forEach(el => { 
            if (el) { 
              el.style.transition = 'none'; 
              el.style.opacity = '0'; 
              requestAnimationFrame(() => (el.style.transition = 'opacity 0.25s var(--ease-out)')); 
            } 
          });
        };

        const triggerTransition = (callback) => {
            state.isAnimating = true;
            const mainMedia = dom('.main-media-container');
            const ambientMedia = dom('.ambient-media-container');
            
            if (mainMedia) {
                mainMedia.style.transition = 'opacity 0.2s var(--ease-out)';
                mainMedia.style.opacity = '0';
            }
            if (ambientMedia) {
                ambientMedia.style.transition = 'opacity 0.2s var(--ease-out)';
                ambientMedia.style.opacity = '0';
            }
            
            setTimeout(() => {
                callback();
                setTimeout(() => { state.isAnimating = false; }, 50); 
            }, 200);
        };
        
        const seekVideo = (offset) => { 
          if (!AppState.currentMedia) return; 
          const duration = AppState.currentMedia.getDuration(); 
          if (!duration) return; 
          const newTime = Math.max(0, Math.min(AppState.currentMedia.getCurrentTime() + offset, duration)); 
          AppState.currentMedia.seekTo(newTime); 
          if (AppState.currentAmbient) AppState.currentAmbient.seekTo(newTime); 
          const progressFill = dom(`[data-progress-index="${AppState.currentSubIndex}"]`); 
          if (progressFill) progressFill.style.transform = `scaleX(${newTime / duration})`; 
        };
        
        const switchVideo = (step) => {
          const newIndex = AppState.currentVideoIndex + step; 
          const feed = dom('.js-story-feed');
          feed?.children?.[newIndex]?.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
        };

        const navigateNext = () => {
            if (state.isAnimating) return;
            const groupData = CONFIG.PLAYLIST[AppState.currentVideoIndex];
            const isMulti = (groupData.items?.length ?? 0) > 1;
            const subCount = groupData.items?.length ?? 1;
            
            if (groupData.format === 'story' || isMulti) {
                if (AppState.currentSubIndex < subCount - 1) {
                    triggerTransition(() => {
                        AppState.currentSubIndex++;
                        resetVideoState();
                        updateVideoUI();
                    });
                } else switchVideo(1);
            } else switchVideo(1);
        };

        const navigatePrev = () => {
            if (state.isAnimating) return;
            const groupData = CONFIG.PLAYLIST[AppState.currentVideoIndex];
            const isMulti = (groupData.items?.length ?? 0) > 1;
            
            if (groupData.format === 'story' || isMulti) {
                if (AppState.currentSubIndex > 0) {
                    triggerTransition(() => {
                        AppState.currentSubIndex--;
                        resetVideoState();
                        updateVideoUI();
                    });
                } else switchVideo(-1);
            } else switchVideo(-1);
        };
        
        const togglePlayPause = () => { 
          if (AppState.currentMedia?.getState() === CONFIG.MEDIA_STATE.PLAYING) { 
            AppState.currentMedia.pause(); 
            flashIcon('⏸️'); 
            dom('.js-btn-play')?.setAttribute('aria-pressed', 'false'); 
          } else { 
            AppState.currentMedia?.play(); 
            AppState.currentAmbient?.seekTo(AppState.currentMedia.getCurrentTime()); 
            AppState.currentAmbient?.play(); 
            flashIcon('▶️'); 
            dom('.js-btn-play')?.setAttribute('aria-pressed', 'true'); 
          } 
        };
        
        const toggleMute = () => { 
          AppState.isGlobalMuted = !AppState.isGlobalMuted; 
          localStorage.setItem('ts_story_mute', String(AppState.isGlobalMuted));
          AppState.isGlobalMuted ? AppState.currentMedia?.mute?.() : AppState.currentMedia?.unMute?.(); 
          const btnMute = dom('.js-btn-mute'); 
          if (btnMute) { 
            btnMute.textContent = AppState.isGlobalMuted ? '🔇' : '🔊'; 
            btnMute.setAttribute('aria-label', AppState.isGlobalMuted ? 'Unmute Audio' : 'Mute Audio'); 
            btnMute.setAttribute('aria-pressed', String(AppState.isGlobalMuted)); 
          } 
        };
        
        const toggleContext = (open) => {
          const ctx = getActiveContext(); 
          if (!ctx) return; 
          state.isOpen = open; 
          rootContainer.classList.toggle('is-ui-open', open); 
          rootContainer.classList.remove('is-clean-mode'); 
          ctx.classList.toggle('is-active', open);
          
          const sheetContent = dom('.js-story-sheet')?.querySelector('.story-sheet__content');
          
          if (open) { 
            // Simpan status video sebelum ditutupi sheet
            wasPlayingBeforeContext = AppState.currentMedia?.getState() === CONFIG.MEDIA_STATE.PLAYING;

            if (dom('.icon-enter-fs')) dom('.icon-enter-fs').style.display = 'block'; 
            if (dom('.icon-exit-fs')) dom('.icon-exit-fs').style.display = 'none'; 
            
            if (sheetContent) sheetContent.classList.remove('is-full-sheet');
            
            closeReactionMenu(); 
            initFocusTrap(ctx); 
            setTimeout(() => (ctx.querySelector('.story-view__title') || firstFocusable)?.focus(), 100); 
          } else { 
            dom('.js-story-sheet')?.classList.remove('is-active'); 
            dom('.js-story-popup')?.classList.remove('is-active'); 
            dom('.js-story-card')?.classList.remove('is-active'); 
            
            if (sheetContent) {
                sheetContent.style.transform = ''; 
                sheetContent.classList.remove('is-full-sheet'); 
            }
            
            ctx.removeEventListener('keydown', handleFocusTrap); 
            dom('.js-btn-open-context')?.focus(); 

            // Putar video hanya jika sebelum sheet dibuka videonya dalam keadaan play
            if (wasPlayingBeforeContext) {
                AppState.currentMedia?.play();
                AppState.currentAmbient?.play();
            }
          }
        };
        
        const openContext = () => toggleContext(true); 
        const closeContext = () => toggleContext(false);
        
        const toggleReactionMenu = () => { 
          const isActive = dom('.js-reaction-wrapper')?.classList.toggle('is-active'); 
          dom('.js-btn-reaction')?.setAttribute('aria-expanded', String(isActive)); 
        };
        const closeReactionMenu = () => { 
          dom('.js-reaction-wrapper')?.classList.remove('is-active'); 
          dom('.js-btn-reaction')?.setAttribute('aria-expanded', 'false'); 
        };
        
        const react = (emoji) => {
          const fragment = document.createDocumentFragment();
          Array.from({ length: 35 }).forEach(() => {
            const el = document.createElement('div'); 
            const depth = Math.random(); 
            el.className = 'particle'; 
            el.textContent = emoji;
            el.style.cssText = `--x:${Math.random() * 100}%;--size:${depth * 1.2 + 1.2}rem;--blur:${depth < 0.2 ? '0.125rem' : '0px'};--z:${depth > 0.5 ? 20 : 1};--duration:${3500 - depth * 1500}ms;--delay:${Math.random() * 600}ms;--rotation:${(Math.random() - 0.5) * 720}deg;--drift:${(Math.random() - 0.5) * 7.5}rem;`;
            el.onanimationend = () => el.remove(); 
            fragment.append(el);
          });
          
          dom('.js-reaction-container')?.append(fragment); 
          navigator.vibrate?.(40);
          
          const mainBtn = dom('.js-reaction-wrapper')?.querySelector('.player-fab'); 
          if (mainBtn) { 
            mainBtn.textContent = emoji; 
            setTimeout(() => (mainBtn.textContent = '🤍'), 1500); 
          }
          closeReactionMenu();
        };
        
        const getClientX = (e) => e.touches?.[0]?.clientX ?? e.clientX; 
        const getClientY = (e) => e.touches?.[0]?.clientY ?? e.clientY;
        
        const initProgressBarGestures = () => {
          let isScrubbing = false, wasPlaying = false, pendingSeekTime = 0;
          let scrubController = null;
          
          const updateUIOnly = (clientX) => { 
            const wrapper = dom('.js-progress-wrapper'); if (!wrapper) return; 
            const rect = wrapper.getBoundingClientRect(); 
            const percentage = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)); 
            const progressFill = dom(`[data-progress-index="${AppState.currentSubIndex}"]`); 
            if (progressFill) progressFill.style.transform = `scaleX(${percentage})`; 
            
            if (AppState.currentMedia && AppState.currentMedia.getDuration() > 0) {
                pendingSeekTime = AppState.currentMedia.getDuration() * percentage; 
            }
          };
          const moveScrub = (e) => { 
            if (!isScrubbing) return; 
            if (e.cancelable) e.preventDefault(); 
            updateUIOnly(getClientX(e)); 
          };
          const stopScrub = () => { 
            if (!isScrubbing) return; 
            isScrubbing = false; 
            if (pendingSeekTime > 0) {
                AppState.currentMedia?.seekTo(pendingSeekTime); 
                if (AppState.currentAmbient) AppState.currentAmbient.seekTo(pendingSeekTime);
            }
            if (wasPlaying) AppState.currentMedia?.play(); 
            
            if (scrubController) {
                scrubController.abort();
                scrubController = null;
            }
          };
          const startScrub = (e) => { 
            const groupData = CONFIG.PLAYLIST[AppState.currentVideoIndex];
            const isMulti = (groupData.items?.length ?? 0) > 1;
            if (groupData.format === 'story' || isMulti) return; 
            
            isScrubbing = true; 
            wasPlaying = AppState.currentMedia?.getState() === CONFIG.MEDIA_STATE.PLAYING; 
            if (wasPlaying) AppState.currentMedia?.pause(); 
            updateUIOnly(getClientX(e)); 
            
            if (scrubController) scrubController.abort(); 
            scrubController = new AbortController();
            const opts = { signal: scrubController.signal };
            const optsPassive = { passive: false, signal: scrubController.signal };
            
            window.addEventListener('mousemove', moveScrub, opts); 
            window.addEventListener('touchmove', moveScrub, optsPassive); 
            window.addEventListener('mouseup', stopScrub, opts); 
            window.addEventListener('touchend', stopScrub, opts); 
            window.addEventListener('touchcancel', stopScrub, opts); 
          };
          const wrapper = dom('.js-progress-wrapper'); 
          wrapper?.addEventListener('mousedown', startScrub); 
          wrapper?.addEventListener('touchstart', startScrub, { passive: true });
        };
        
        const initGestures = () => {
          let startX = 0, startY = 0, longPressTimer;
          let isLongPressActive = false, isSwiping = false, holdAction = null;
          
          let tapCount = 0;
          let singleTapTimer = null;
          let multiTapExecuteTimer = null;
          let cumulativeSeek = 0;
          let lastTapAction = null; 
          
          const layer = dom('.js-gesture-layer'); 
          layer?.addEventListener('contextmenu', (e) => e.preventDefault());
          
          layer?.addEventListener('pointerdown', (e) => {
            if (state.isAnimating || (e.pointerType === 'mouse' && e.button !== 0)) return;
            startX = e.clientX; 
            startY = e.clientY; 
            isLongPressActive = isSwiping = false; 
            holdAction = e.target.getAttribute('data-action'); 
            
            longPressTimer = setTimeout(() => { 
              isLongPressActive = true; 
              if (holdAction === 'playpause') { 
                rootContainer.classList.add('is-clean-mode'); 
                AppState.currentMedia?.pause(); 
              } else { 
                const rate = holdAction === 'forward' ? 2 : 0.5; 
                AppState.currentMedia?.setPlaybackRate(rate); 
                if (AppState.currentAmbient) AppState.currentAmbient.setPlaybackRate(rate); 
                showSteadyRipple(holdAction === 'forward' ? 'right' : 'left', holdAction === 'forward' ? '⏩ 2x' : '⏪ 0.5x'); 
              } 
            }, 400); 
          });
          
          layer?.addEventListener('pointermove', (e) => {
            if (state.isAnimating || !startX) return;
            
            if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10) { 
              clearTimeout(longPressTimer); 
              isSwiping = true; 
              
              if (isLongPressActive) { 
                isLongPressActive = false; 
                if (holdAction === 'playpause') { 
                  rootContainer.classList.remove('is-clean-mode'); 
                  AppState.currentMedia?.play(); 
                } else { 
                  AppState.currentMedia?.setPlaybackRate(1); 
                  if (AppState.currentAmbient) AppState.currentAmbient.setPlaybackRate(1); 
                  hideSteadyRipple(); 
                } 
              } 
            }
          });
          
          layer?.addEventListener('pointerup', (e) => {
            if (state.isAnimating || !startX) return; 
            clearTimeout(longPressTimer); 
            startX = 0;
            
            if (isLongPressActive) { 
              if (holdAction === 'playpause') { 
                rootContainer.classList.remove('is-clean-mode'); 
                AppState.currentMedia?.play(); 
              } else { 
                AppState.currentMedia?.setPlaybackRate(1); 
                if (AppState.currentAmbient) AppState.currentAmbient.setPlaybackRate(1); 
                hideSteadyRipple(); 
              } 
              return; 
            }
            
            if (isSwiping) return;

            const groupData = CONFIG.PLAYLIST[AppState.currentVideoIndex];
            const currentItemType = groupData.items?.[AppState.currentSubIndex]?.type ?? groupData.type;
            const isVideo = AppState.currentMedia && ['youtube', 'video'].includes(currentItemType) && AppState.currentMedia.getDuration() > 0;
            
            if (tapCount > 0 && holdAction !== lastTapAction) {
                clearTimeout(multiTapExecuteTimer);
                tapCount = 0;
                cumulativeSeek = 0;
            }
            lastTapAction = holdAction;
            
            tapCount++; 

            if (tapCount === 1) { 
              singleTapTimer = setTimeout(() => { 
                tapCount = 0; 
                cumulativeSeek = 0;
                
                if (holdAction === 'rewind') navigatePrev();
                else if (holdAction === 'forward') navigateNext();
                else if (holdAction === 'playpause') togglePlayPause(); 
                
              }, 200); 
              
            } else { 
              clearTimeout(singleTapTimer); 
              clearTimeout(multiTapExecuteTimer); 
              
              if (holdAction === 'playpause') { 
                react('❤️'); 
                flashIcon('❤️'); 
                tapCount = 0; 
              } 
              else if (holdAction === 'rewind' || holdAction === 'forward') { 
                if (isVideo) {
                    cumulativeSeek += 5;
                    const isFwd = holdAction === 'forward';
                    showRipple(isFwd ? 'right' : 'left', `${isFwd ? '⏩' : '⏪'} ${cumulativeSeek}s`);
                    
                    multiTapExecuteTimer = setTimeout(() => {
                        seekVideo(isFwd ? cumulativeSeek : -cumulativeSeek);
                        tapCount = 0;
                        cumulativeSeek = 0;
                    }, 400); 
                } else {
                    tapCount = 0; 
                }
              } 
            }
          });
          
          layer?.addEventListener('pointercancel', () => { 
              clearTimeout(longPressTimer); 
              clearTimeout(singleTapTimer);
              startX = 0; 
              tapCount = 0;
              
              if (isLongPressActive) {
                  isLongPressActive = false;
                  AppState.currentMedia?.setPlaybackRate(1);
                  if (AppState.currentAmbient) AppState.currentAmbient.setPlaybackRate(1);
                  hideSteadyRipple();
              }
          });
        };
        
        const initDrag = () => {
          let rAFDrag = null;
          let sheetState = 'half'; 
          let dragController = null;
          
          let lastY = 0;
          let lastTime = 0;
          let velocity = 0;
          let isContentScroll = false; 

          const move = (e) => { 
            if (!state.isDragging || window.innerWidth >= 768 || isContentScroll) return; 
            
            const currentClientY = getClientY(e);
            const deltaY = currentClientY - state.startY;
            
            const sheet = dom('.js-story-sheet')?.querySelector('.story-sheet__content');
            const scrollableArea = sheet?.querySelector('.story-body');
            const viewport = dom('.story-viewport');
            
            // Logika Cerdas: Cek apakah pengguna bermaksud untuk scroll teks bacaan alih-alih drag
            if (scrollableArea && scrollableArea.contains(e.target) && scrollableArea.scrollTop <= 0 && deltaY < 0) {
                isContentScroll = true;
                state.isDragging = false;
                if (sheet) sheet.classList.remove('is-dragging');
                
                if (viewport) {
                    viewport.style.transition = '';
                    viewport.style.transform = '';
                    viewport.style.borderRadius = '';
                }
                return;
            }

            if (e.cancelable) e.preventDefault(); 
            
            const now = performance.now();
            const dt = now - lastTime;
            /* Failsafe Velocity: Mencegah Infinity jika dt terlalu kecil */
            if (dt > 1) velocity = (currentClientY - lastY) / dt;
            
            lastY = currentClientY;
            lastTime = now;

            cancelAnimationFrame(rAFDrag); 
            rAFDrag = requestAnimationFrame(() => { 
              state.currentY = deltaY; 
              
              if (sheetState === 'full' && state.currentY < 0) {
                  state.currentY = state.currentY * 0.15; 
              } 
              
              if (sheet) sheet.style.transform = `translateY(${state.currentY}px)`; 

              /* REAL-TIME MINI PLAYER RESIZE (Keajaiban Spasial UI) */
              if (viewport) {
                  viewport.style.transition = 'none'; 
                  
                  if (sheetState === 'half' && state.currentY > 0) {
                      const progress = Math.min(1, state.currentY / 250); 
                      const scale = 0.35 + (0.65 * progress);
                      const radius = 2 - (2 * progress); 
                      
                      viewport.style.transform = `scale(${scale}) translateY(calc((env(safe-area-inset-top) + 2rem) * ${1 - progress}))`;
                      viewport.style.borderRadius = `${radius}rem`;
                  } else {
                      viewport.style.transform = `scale(0.35) translateY(calc(env(safe-area-inset-top) + 2rem))`;
                      viewport.style.borderRadius = `2rem`;
                  }
              }
            }); 
          };

          const end = () => { 
            if (!state.isDragging || window.innerWidth >= 768) return; 
            state.isDragging = false; 
            
            const sheet = dom('.js-story-sheet')?.querySelector('.story-sheet__content'); 
            const viewport = dom('.story-viewport');
            
            if (viewport) {
                viewport.style.transition = '';
                viewport.style.transform = '';
                viewport.style.borderRadius = '';
            }
            
            if (sheet) {
                sheet.classList.remove('is-dragging'); 
                sheet.style.transform = ''; 
                
                const isFastSwipeUp = velocity < -0.5;
                const isFastSwipeDown = velocity > 0.5;

                if (sheetState === 'half') {
                    if (state.currentY < -50 || isFastSwipeUp) { 
                        sheetState = 'full';
                        sheet.classList.add('is-full-sheet');
                        AppState.currentMedia?.pause(); 
                        AppState.currentAmbient?.pause();
                        navigator.vibrate?.(15); /* Haptic on Snap Full */
                    } else if (state.currentY > 50 || isFastSwipeDown) { 
                        sheetState = 'half';
                        closeContext();
                        navigator.vibrate?.(10); /* Haptic on Dismiss */
                    }
                } else if (sheetState === 'full') {
                    if (state.currentY > 150 || (isFastSwipeDown && state.currentY > 50)) { 
                        sheetState = 'half';
                        sheet.classList.remove('is-full-sheet');
                        closeContext();
                        navigator.vibrate?.(10);
                    } else if (state.currentY > 50 || (isFastSwipeDown && state.currentY > 10)) { 
                        sheetState = 'half';
                        sheet.classList.remove('is-full-sheet');
                        if (wasPlayingBeforeContext) {
                            AppState.currentMedia?.play();
                            AppState.currentAmbient?.play();
                        }
                        navigator.vibrate?.(15); /* Haptic on Snap Half */
                    }
                }
            }
            
            if (dragController) {
                dragController.abort();
                dragController = null;
            }
            
            state.currentY = 0; 
            velocity = 0;
            isContentScroll = false;
          };

          const start = (e) => { 
            if (window.innerWidth >= 768) return; 
            
            const sheet = dom('.js-story-sheet')?.querySelector('.story-sheet__content'); 
            const scrollableArea = sheet?.querySelector('.story-body');
            
            isContentScroll = false;
            if (scrollableArea && scrollableArea.contains(e.target) && scrollableArea.scrollTop > 0) {
                isContentScroll = true;
                return; 
            }

            state.startY = lastY = getClientY(e); 
            lastTime = performance.now();
            velocity = 0;
            state.isDragging = true; 
            
            if (sheet) {
                sheet.classList.add('is-dragging'); 
                sheetState = sheet.classList.contains('is-full-sheet') ? 'full' : 'half';
            }
            
            if (dragController) dragController.abort(); 
            dragController = new AbortController();
            const opts = { signal: dragController.signal };
            const optsPassive = { passive: false, signal: dragController.signal }; 
            
            window.addEventListener('mousemove', move, opts); 
            window.addEventListener('touchmove', move, optsPassive); 
            window.addEventListener('mouseup', end, opts); 
            window.addEventListener('touchend', end, opts); 
            window.addEventListener('touchcancel', end, opts); 
          };
          
          const sheetContent = dom('.js-story-sheet')?.querySelector('.story-sheet__content'); 
          sheetContent?.addEventListener('mousedown', start); 
          sheetContent?.addEventListener('touchstart', start, { passive: true });
        };
        
        const initScrollSnap = () => {
          const feed = dom('.js-story-feed');
          const playerContainer = dom('.js-story-container');
          playerContainer.style.display = '';

          scrollObserverInstance?.disconnect();

          CONFIG.PLAYLIST.forEach((item, index) => {
            const slot = document.createElement('div');
            slot.className = 'story-slot';
            slot.dataset.index = index;
            
            /* Inisialisasi slot pertama agar langsung aktif */
            if(index === AppState.currentVideoIndex) {
                slot.classList.add('is-active');
            }

            const dummyCard = document.createElement('div');
            dummyCard.className = 'story-dummy-card';
            dummyCard.dataset.srcIndex = index;
            window.peekObserver.observe(dummyCard);

            slot.append(dummyCard);
            feed.append(slot);
          });

          if(feed.children[AppState.currentVideoIndex]) {
              feed.children[AppState.currentVideoIndex].append(playerContainer);
              feed.children[AppState.currentVideoIndex].scrollIntoView({ block: 'center' });
          }

          scrollObserverInstance = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                  const targetIndex = parseInt(entry.target.dataset.index);
                  
                  if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
                      /* Efek 3D Card saat scroll masuk */
                      entry.target.classList.add('is-active');
                      
                      if (AppState.currentVideoIndex !== targetIndex) {
                          AppState.currentVideoIndex = targetIndex;
                          AppState.currentSubIndex = 0; 
                          localStorage.setItem('ts_story_index', String(targetIndex));
                          resetVideoState();
                          requestAnimationFrame(() => {
                              entry.target.append(playerContainer);
                              updateVideoUI();
                              checkNavState();
                          });
                      }
                  } else if (entry.intersectionRatio < 0.5) {
                      /* Lepas efek 3D saat scroll keluar */
                      entry.target.classList.remove('is-active');
                      
                      /* MEMORY MANAGEMENT: Hapus background gambar jika jarak video > 3 */
                      if (Math.abs(AppState.currentVideoIndex - targetIndex) > 3) {
                          const dummy = entry.target.querySelector('.story-dummy-card');
                          if (dummy && dummy.style.backgroundImage !== 'none' && dummy.style.backgroundImage !== '') {
                              dummy.style.backgroundImage = 'none';
                              window.peekObserver.observe(dummy); 
                          }
                      }
                  }
              });
          }, { root: feed, threshold: [0, 0.25, 0.5, 0.75, 1] });

          Array.from(feed.children).forEach(slot => scrollObserverInstance.observe(slot));
        };

        const initEventListeners = () => {
          const markInteracted = () => { AppState.userInteracted = true; };
          ['click', 'touchstart', 'keydown', 'pointerdown'].forEach(evt => EventRegistry.add(window, evt, markInteracted, { once: true, passive: true }));
          
          const applyUrlState = (paramUrl) => {
            if (!paramUrl) return false;
            let foundIndex = -1;
            let foundSubIndex = 0;
            let targetId = null;

            const match = paramUrl.match(/-id_([A-Za-z0-9_]+)$/);
            if (match) {
                targetId = match[1];
            } else {
                targetId = paramUrl; 
            }

            CONFIG.PLAYLIST.forEach((item, idx) => {
                if (item.id === targetId || (item.type === 'youtube' && Utils.parseYouTubeData(item.url).videoId === targetId)) {
                    foundIndex = idx;
                    foundSubIndex = 0;
                } else if (item.items) {
                    item.items.forEach((subItem, subIdx) => {
                        if (subItem.id === targetId || (subItem.type === 'youtube' && Utils.parseYouTubeData(subItem.url).videoId === targetId)) {
                            foundIndex = idx;
                            foundSubIndex = subIdx;
                        }
                    });
                }
            });

            if (foundIndex > -1 && foundIndex < CONFIG.PLAYLIST.length) {
                AppState.currentVideoIndex = foundIndex;
                AppState.currentSubIndex = foundSubIndex;
                return true;
            }
            return false;
          };

          const searchParams = new URLSearchParams(window.location.search);
          const urlParam = searchParams.get('story') || searchParams.get('v');
          const hasValidUrl = applyUrlState(urlParam);

          if (!hasValidUrl) {
              let savedIndex = parseInt(localStorage.getItem('ts_story_index'), 10);
              if (!isNaN(savedIndex) && savedIndex >= 0 && savedIndex < CONFIG.PLAYLIST.length) { 
                AppState.currentVideoIndex = savedIndex; 
                AppState.currentSubIndex = 0;
              }
          }
          
          window.peekObserver = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                  if (entry.isIntersecting) {
                      const idx = parseInt(entry.target.dataset.srcIndex, 10);
                      if (!isNaN(idx) && CONFIG.PLAYLIST[idx]) {
                          const groupData = CONFIG.PLAYLIST[idx];
                          const coverData = groupData.items?.[0] ?? groupData;

                          ThumbnailResolver.resolve(coverData, (url) => {
                              if (url) {
                                  const pShort = (coverData.type === 'youtube' && Utils.parseYouTubeData(coverData.url).isShort) || coverData.isVertical === true;
                                  entry.target.style.setProperty('--peek-img', `url(${url})`);
                                  entry.target.style.setProperty('--peek-fit', pShort ? 'cover' : 'contain');
                                  entry.target.style.setProperty('--peek-blur', pShort ? '0' : '1');
                              }
                          });
                          window.peekObserver.unobserve(entry.target);
                      }
                  }
              });
          }, { rootMargin: '100% 0px' });

          initScrollSnap(); 
          initProgressBarGestures(); 
          initGestures(); 
          initDrag();
          
          EventRegistry.add(document, 'keydown', (e) => {
            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName) || state.isOpen || state.isAnimating) return;

            const groupData = CONFIG.PLAYLIST[AppState.currentVideoIndex];
            const isMulti = (groupData.items?.length ?? 0) > 1;

            const keyMap = { 
              Space: () => { e.preventDefault(); togglePlayPause(); }, 
              ArrowDown: () => switchVideo(1), 
              ArrowUp: () => switchVideo(-1), 
              ArrowRight: () => { 
                if (groupData.format === 'story' || isMulti) navigateNext();
                else { seekVideo(5); showRipple('right', `⏩ 5s`); } 
              }, 
              ArrowLeft: () => { 
                if (groupData.format === 'story' || isMulti) navigatePrev();
                else { seekVideo(-5); showRipple('left', `⏪ 5s`); } 
              }
            };
            if (keyMap[e.code]) keyMap[e.code]();
            else if (e.key.toLowerCase() === 'm') toggleMute(); 
          });
          
          EventRegistry.add(document, 'click', (e) => {
            const t = e.target;
            if (t.closest('.story-close-btn, .overlay-backdrop')) return closeContext();
            if (t.closest('.reaction-option-btn')) return react(t.closest('.reaction-option-btn').dataset.reaction);
            
            const dummyClick = t.closest('.story-dummy-card');
            if (dummyClick && !dummyClick.closest('.story-slot').classList.contains('is-active')) {
                dummyClick.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            const actionMap = { 
              '.js-btn-play': togglePlayPause, 
              '.js-btn-mute': toggleMute, 
              '.js-btn-prev': () => switchVideo(-1), 
              '.js-btn-next': () => switchVideo(1), 
              '.js-btn-close': () => { AppState.currentMedia?.pause(); rootContainer.style.opacity = '0'; setTimeout(() => { rootContainer.style.display = 'none'; }, 500); }, 
              '.js-btn-open-context': openContext, 
              '.js-btn-reaction': toggleReactionMenu, 
              '.js-btn-share': async () => { 
                  const currentData = getActiveData();
                  const url = window.location.href; 
                  const shareTitle = currentData.title ?? CONFIG.PLAYLIST[AppState.currentVideoIndex].title ?? 'Telkomsel Story';
                  try { 
                      if (navigator.share) await navigator.share({ title: shareTitle, url }); 
                      else { await navigator.clipboard.writeText(url); Utils.showToast('Tautan berhasil disalin!'); } 
                  } catch (err) {} 
              }, 
              '.js-btn-clean': () => { closeReactionMenu(); rootContainer.classList.toggle('is-clean-mode'); } 
            };
            for (let selector in actionMap) if (t.closest(selector)) return actionMap[selector](e);
            
            const reactionWrapper = dom('.js-reaction-wrapper'); 
            if (reactionWrapper && !reactionWrapper.contains(t)) closeReactionMenu();
          });
          
          dom('.js-error-retry')?.addEventListener('click', () => { 
            dom('.js-error-overlay')?.classList.remove('is-visible'); 
            AppState.errorCount = 0; 
            updateVideoUI(); 
          });
          
          EventRegistry.add(window, 'offline', () => Utils.showToast('Anda sedang offline.'));
          EventRegistry.add(window, 'online', () => { 
            Utils.showToast('Koneksi kembali!'); 
            if (dom('.js-error-overlay')?.classList.contains('is-visible')) updateVideoUI(); 
          });
          
          EventRegistry.add(window, 'popstate', (e) => {
            if (state.isAnimating) return;
            if (e.state && typeof e.state.index === 'number') { 
                AppState.currentVideoIndex = e.state.index; 
                AppState.currentSubIndex = e.state.subIndex || 0; 
                resetVideoState();
                updateVideoUI(); 
            } else { 
                const searchParams = new URLSearchParams(window.location.search);
                const param = searchParams.get('story') || searchParams.get('v');
                if (applyUrlState(param)) { 
                    resetVideoState();
                    updateVideoUI(); 
                } 
            }
          });
          
          EventRegistry.add(window, 'resize', Utils.debounce(() => {
            if (window.innerWidth < 768 && AppState.currentAmbient) { 
              AppState.currentAmbient.destroy(); 
              AppState.currentAmbient = null; 
            } else if (window.innerWidth >= 768 && !AppState.currentAmbient && AppState.currentMedia) { 
              const ambientContainer = dom('.ambient-media-container'); 
              const data = getActiveData(); 
              AppState.currentAmbient = MediaFactory.create(ambientContainer, data, { 
                onReady: () => { 
                  AppState.currentAmbient.seekTo(AppState.currentMedia.getCurrentTime()); 
                  if (AppState.currentMedia.getState() === CONFIG.MEDIA_STATE.PLAYING) AppState.currentAmbient.play(); 
                } 
              }, true); 
              AppState.currentAmbient.load(); 
            }
          }, 150));
          
          const pauseMediaSafely = () => { 
            if (AppState.currentMedia?.getState() === CONFIG.MEDIA_STATE.PLAYING) { 
              AppState.wasPlayingBeforeHidden = true; 
              AppState.currentMedia.pause(); 
              hideSteadyIcon(); 
            } 
          };
          const resumeMediaSafely = () => { 
            if (AppState.wasPlayingBeforeHidden && !state.isOpen && !document.hidden) { 
              AppState.currentMedia?.play(); 
              AppState.currentAmbient?.play(); 
              AppState.wasPlayingBeforeHidden = false; 
            } 
          };
          EventRegistry.add(document, 'visibilitychange', () => { document.hidden ? pauseMediaSafely() : resumeMediaSafely(); });
          EventRegistry.add(window, 'blur', pauseMediaSafely); 
          EventRegistry.add(window, 'focus', resumeMediaSafely);
        };
        
        const destroy = () => {
            EventRegistry.clear();
            AppState.currentMedia?.destroy();
            AppState.currentAmbient?.destroy();
            window.peekObserver?.disconnect();
            scrollObserverInstance?.disconnect(); 
            
            cancelAnimationFrame(state.animFrameId);
            clearTimeout(AppState.crossfadeTimer);
            document.querySelector('.custom-toast')?.remove();
            rootContainer.classList.remove('is-ready');
            AppState.isApiReady = false;
        };

        initEventListeners();
        
        return { 
          startProgressBar, 
          stopProgressBar, 
          checkNavState, 
          showSteadyIcon, 
          hideSteadyIcon, 
          switchVideo, 
          navigateNext,
          navigatePrev,
          resetVideoState, 
          updateVideoUI, 
          destroy,
          isContextOpen: () => state.isOpen,
          isAnimatingState: () => state.isAnimating 
        };
      })();
      
      /**
       * ==========================================================
       * 7. YOUTUBE API INIT
       * ==========================================================
       */
      const loadYouTubeAPI = () => { 
          if (window.YT?.Player) {
              AppState.isApiReady = true;
              window.StoryManager?.updateVideoUI();
              return;
          }
          const tag = document.createElement('script'); 
          tag.src = 'https://www.youtube.com/iframe_api'; 
          tag.async = true; 
          document.head.append(tag); 
      };
      
      const existingYTCallback = window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady = function() { 
          if (typeof existingYTCallback === 'function') existingYTCallback();
          AppState.isApiReady = true; 
          window.StoryManager?.updateVideoUI(); 
      };
      loadYouTubeAPI();
    </script>
  </body>
</html>
