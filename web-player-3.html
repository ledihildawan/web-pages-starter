<!doctype html>
<html lang="id" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Telkomsel Story - Pengalaman Video Interaktif Premium" />
    
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    
    <title>Telkomsel Story - Premium Final Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" defer integrity="sha512-H9y4UaFp/qRoZ4O88A8y+D0S1sX77w1qGj2xHnEw7U/H3n4QJ11R7XjG6+A1B9L1Fq9Zq+GfD+1D3F2c==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
      @layer reset, design-tokens, layout, components, utilities;

      @layer design-tokens {
        :root {
          /* Warna Premium (OKLCH) */
          --brand-red: oklch(0.58 0.23 26.5);     
          --brand-dark: oklch(0.12 0 0);            
          --surface: oklch(0.16 0 0);               
          --text-main: oklch(0.98 0 0);              
          --text-sub: oklch(0.75 0 0);
          --bg-dark: oklch(0.10 0 0);              
          
          --glass-bg: color-mix(in oklch, var(--brand-dark) 40%, transparent);        
          --glass-border: color-mix(in oklch, oklch(1 0 0) 15%, transparent);   
          
          --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
          --ease-spring: cubic-bezier(0.34, 1.5, 0.64, 1);
          
          --card-inline-size: 26.25rem;
          --fab-size: 2.75rem;
          --frame-radius: 1rem;
        }
      }

      @layer reset {
        *, *::before, *::after { 
          box-sizing: border-box; 
          margin: 0; 
          padding: 0; 
          -webkit-tap-highlight-color: transparent; 
        }
        
        body {
          background-color: var(--bg-dark);
          font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, Arial, sans-serif;
          color: var(--text-main); 
          overflow: hidden; 
          overscroll-behavior-y: none; 
          opacity: 0; 
          animation: smoothLoad 0.6s var(--ease-out) forwards;
        }
        
        @keyframes smoothLoad { to { opacity: 1; } }
        
        :is(button) {
          font-family: inherit;
          user-select: none;
          &:focus-visible { 
            outline: 0.125rem solid var(--brand-red); 
            outline-offset: 0.25rem; 
            border-radius: 0.5rem; 
          }
        }
        
        :is(.player-fab, .reaction-option-btn) {
          &:focus-visible { border-radius: 50%; }
        }
        
        .sr-only { 
          position: absolute; inline-size: 1px; block-size: 1px; padding: 0; margin: -1px; 
          overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0; 
        }
      }

      @layer layout {
        .layout-wrapper { 
          position: relative; block-size: 100dvh; inline-size: 100vw; pointer-events: none; 
          
          &.is-ready { pointer-events: auto; }
          &.is-ui-open .ambient-layer { opacity: 0.05; }
          
          &.is-clean-mode {
            .story-viewport {
              :is(.reaction-wrapper, .share-fab, .story-excerpt, .story-top-actions, .story-progress-bar-wrapper) { 
                opacity: 0 !important; pointer-events: none !important; visibility: hidden !important; 
              }
            }
            .story-video-wrapper::after { opacity: 0 !important; visibility: hidden !important; }
            .icon-enter-fs { display: none !important; } 
            .icon-exit-fs { display: inline-block !important; }
          }
        }
        
        .story-feed {
          position: absolute; inset: 0; inline-size: 100%; block-size: 100dvh;
          overflow-y: scroll; scroll-snap-type: y mandatory; 
          scrollbar-width: none; -ms-overflow-style: none;
          -webkit-overflow-scrolling: touch; z-index: 10;
          display: flex; flex-direction: column; align-items: center; 
          transition: transform 0.6s var(--ease-spring); 
          
          &::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; -webkit-appearance: none !important; background: transparent !important; }
        }
        
        /* 3D SCROLL ANIMATION */
        .story-slot {
          position: relative; flex-shrink: 0; inline-size: 100%; block-size: 100dvh; 
          scroll-snap-align: center; scroll-snap-stop: always; 
          transform: scale(0.9) translateZ(0); opacity: 0.4; 
          transition: transform 0.5s var(--ease-spring), opacity 0.5s var(--ease-out); 
          will-change: transform, opacity;
        }
        .story-slot.is-active {
          transform: scale(1) translateZ(0); opacity: 1;
        }
      }

      @layer components {
        .story-container, .story-dummy-card {
          position: absolute; inset: 0; inline-size: 100%; block-size: 100%; 
          border-radius: 0; transform: translateZ(0);
        }
        
        .story-container { 
          background-color: var(--brand-dark); z-index: 10; 
          transition: border-radius 0.6s var(--ease-spring), box-shadow 0.6s var(--ease-spring); 
          
          &.has-started {
            &:not(.is-paused) .ambient-layer { opacity: 0.4; filter: blur(1rem) saturate(180%); }
            /* Loader transisi hilang tanpa nge-block UI */
            .story-loader { opacity: 0; pointer-events: none; transform: scale(0.9); }
            &.is-loading .story-loader { opacity: 1; transform: scale(1); }
          }
          
          &.is-paused {
            .ambient-layer { opacity: 0.15; filter: blur(1.75rem) saturate(80%); }
            .story-video-wrapper { filter: brightness(0.65) grayscale(0.2); }
          }
          
          &.is-story-format .story-progress-bar-wrapper { opacity: 1 !important; transform: translateY(0) !important; pointer-events: auto !important; }
          
          /* UI Cinematic Entrance */
          &.show-ui {
            :is(.story-excerpt, .story-player-actions, .story-progress-bar-wrapper, .story-top-actions) { 
              opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); 
            }
          }
        }
        
        .story-dummy-card { 
          background-color: var(--brand-dark); overflow: hidden; filter: brightness(0.4); 
          z-index: 5; transition: filter 0.6s var(--ease-out); pointer-events: auto; cursor: pointer; 
          
          &:hover { filter: brightness(0.6); }
          &::before { content: ''; position: absolute; inset: -10%; inline-size: 120%; block-size: 120%; background-image: var(--peek-img, none); background-size: cover; background-position: center; filter: blur(1.5rem) brightness(0.4); opacity: var(--peek-blur, 0); z-index: 1; pointer-events: none; transition: background-image 0.4s ease; }
          &::after { content: ''; position: absolute; inset: 0; background-image: var(--peek-img, none); background-size: var(--peek-fit, cover); background-position: center; background-repeat: no-repeat; z-index: 2; pointer-events: none; transition: background-image 0.4s ease; }
        }

        .ambient-layer {
          display: none; position: absolute; inset-block-start: 50%; inset-inline-start: 50%; 
          inline-size: 25%; block-size: 25%; margin-block-start: -12.5%; margin-inline-start: -12.5%;
          z-index: 1; pointer-events: none; transform: scale(4.5) translateZ(0); 
          opacity: 0; filter: blur(1.5rem) saturate(100%);
          transition: opacity 0.8s var(--ease-out), filter 0.8s var(--ease-out);
          will-change: transform, opacity, filter;
        }
        
        @keyframes ambientBreathe { 0%, 100% { transform: scale(4.5) translateZ(0); } 50% { transform: scale(4.8) translateZ(0); } }
        .is-breathing { animation: ambientBreathe 8s ease-in-out infinite; }
        
        /* Bunuh kalkulasi GPU saat video dijeda */
        .story-container.is-paused .is-breathing,
        .story-container.is-paused .is-inner-breathing {
          animation-play-state: paused !important;
        }

        .media-container {
          :is(iframe, video, img) { inline-size: 100%; block-size: 100%; border: none; pointer-events: none; }
        }
        
        .ambient-media-container { inline-size: 100%; block-size: 100%; opacity: 0; transition: opacity 0.6s var(--ease-out); }
        
        .story-viewport { 
          position: absolute; inset: 0; z-index: 10; overflow: hidden; border-radius: inherit; 
          transition: filter 0.6s var(--ease-out), transform 0.6s var(--ease-spring), border-radius 0.6s var(--ease-spring), box-shadow 0.6s var(--ease-spring); 
          will-change: filter, transform, border-radius, box-shadow; contain: paint; 
        }
        
        .story-video-wrapper { 
          position: relative; inline-size: 100%; block-size: 100%; background-color: var(--bg-dark); transition: filter 0.5s var(--ease-out); 
          &::after { 
            content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 5; 
            background: linear-gradient(to bottom, color-mix(in oklch, var(--bg-dark) 40%, transparent) 0%, transparent 15%, transparent 65%, color-mix(in oklch, var(--bg-dark) 85%, transparent) 100%); 
            transition: opacity 0.4s var(--ease-out); 
          }
        }
        
        .video-blur-bg { position: absolute; inset: -10%; inline-size: 120%; block-size: 120%; background-size: cover; background-position: center; filter: blur(1.5rem) brightness(0.4); z-index: 1; opacity: 0; pointer-events: none; transition: opacity 0.5s ease, background-image 0.5s ease; will-change: opacity; }
        .thumbnail-overlay { position: absolute; inset: 0; inline-size: 100%; block-size: 100%; z-index: 8; pointer-events: none; transition: opacity 0.4s ease; color: transparent; }
        .main-media-container { position: absolute; inset: 0; inline-size: 100%; block-size: 100%; z-index: 2; pointer-events: none; opacity: 0; transition: opacity 0.25s var(--ease-out); } 
        
        /* OPTIMASI LOADER: Background Transparan & Visibility Guard */
        .story-loader { 
          position: absolute; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; 
          background: transparent; /* Clean tanpa background gelap ganda */
          transition: opacity 0.4s var(--ease-spring), transform 0.4s var(--ease-spring), visibility 0.4s; 
          pointer-events: none; 
        }
        .story-container.has-started:not(.is-loading) .story-loader { opacity: 0; transform: scale(0.9); visibility: hidden; }
        .story-container.has-started.is-loading .story-loader { opacity: 1; transform: scale(1); visibility: visible; }
        
        .story-loader__spinner-simple { 
          inline-size: 2rem; block-size: 2rem; border-radius: 50%; 
          border: 0.125rem solid color-mix(in oklch, oklch(1 0 0) 15%, transparent); 
          border-top-color: var(--brand-red); 
          animation: story-spin-simple 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
          animation-play-state: running; 
        }
        
        /* Bunuh rotasi GPU saat selesai loading */
        .story-container.has-started:not(.is-loading) .story-loader__spinner-simple,
        .story-container.has-started:not(.is-loading) .story-loader__container,
        .story-container.has-started:not(.is-loading) .story-loader__rotator,
        .story-container.has-started:not(.is-loading) .story-loader__circle {
          animation-play-state: paused;
        }

        @keyframes story-spin-simple { to { transform: rotate(1turn); } }
        
        .story-error-overlay { 
          position: absolute; inset: 0; z-index: 60; background: oklch(0.12 0 0 / 0.95); 
          -webkit-backdrop-filter: blur(0.625rem); backdrop-filter: blur(0.625rem); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; 
          &.is-visible { opacity: 1; pointer-events: auto; }
          .error-content { text-align: center; padding-inline: 2rem; color: var(--text-main); } 
          .error-icon { font-size: 3rem; margin-block-end: 1rem; display: block; } 
          .error-title { font-size: 1.25rem; font-weight: 700; margin-block-end: 0.5rem; } 
          .error-desc { font-size: 0.875rem; color: var(--text-sub); margin-block-end: 1.5rem; }
          .error-retry-btn { background: var(--brand-red); color: oklch(1 0 0); border: none; padding: 0.75rem 1.5rem; border-radius: 2rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; &:active { transform: scale(0.95); } }
        }
        
        .reaction-container-layer { position: absolute; inset: 0; z-index: 15; pointer-events: none; contain: strict; }
        .particle { position: absolute; inset-block-start: -10%; inset-inline-start: var(--x); font-size: var(--size); opacity: 0; animation: drop-physics var(--duration) ease-in forwards; animation-delay: var(--delay); filter: blur(var(--blur)) drop-shadow(0 0.125rem 0.375rem oklch(0 0 0 / 0.5)); z-index: var(--z); will-change: transform, opacity; }
        @keyframes drop-physics { 0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; } 10%, 80% { opacity: 1; } 100% { transform: translate3d(var(--drift), 120vh, 0) rotate(var(--rotation)); opacity: 0; } }
        
        .story-center-play { 
          position: absolute; inset-block-start: 50%; inset-inline-start: 50%; transform: translate(-50%, -50%) scale(1.5); font-size: 4rem; z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.4s ease-out, transform 0.4s ease-out; filter: drop-shadow(0 0.25rem 0.75rem oklch(0 0 0 / 0.6)); will-change: transform, opacity; 
          &:is(.is-flashing, .is-steady) { opacity: 0.9; transform: translate(-50%, -50%) scale(1); transition: opacity 0.1s ease-in, transform 0.3s var(--ease-spring); }
        }
        
        .ripple-edge { 
          position: absolute; inset-block: 0; inline-size: 30%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; z-index: 25; 
          &.is-animating { animation: edgeRippleAnim 0.6s var(--ease-out) forwards; }
          &.is-steady { opacity: 1; transition: opacity 0.2s var(--ease-out); }
        }
        .ripple-edge--left { inset-inline-start: 0; background: radial-gradient(100% 50% at 0% 50%, color-mix(in oklch, oklch(1 0 0) 8%, transparent) 0%, transparent 100%); }
        .ripple-edge--right { inset-inline-end: 0; background: radial-gradient(100% 50% at 100% 50%, color-mix(in oklch, oklch(1 0 0) 8%, transparent) 0%, transparent 100%); }
        .ripple-edge__capsule { background: oklch(0 0 0 / 0.65); color: oklch(1 0 0); padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.875rem; font-weight: 700; -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); letter-spacing: 0.02em; border: 0.0625rem solid var(--glass-border); }
        
        @keyframes edgeRippleAnim { 0% { opacity: 0; } 15% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

        .story-gesture-layer { position: absolute; inset: 0; z-index: 20; display: flex; cursor: pointer; touch-action: pan-y; user-select: none; -webkit-touch-callout: none; }
        .gesture-zone { block-size: 100%; } .gesture-zone--left, .gesture-zone--right { inline-size: 30%; } .gesture-zone--center { inline-size: 40%; }
        
        .story-progress-bar-wrapper { 
          position: absolute; inset-block-end: max(0.75rem, env(safe-area-inset-bottom)); inset-inline: 1rem; block-size: 1.5rem; z-index: 55; cursor: pointer; display: flex; align-items: center; gap: 0.25rem; opacity: 0; transition: opacity 0.8s var(--ease-out); filter: drop-shadow(0 0.0625rem 0.25rem color-mix(in oklch, var(--bg-dark) 80%, transparent)); 
          &:hover .story-progress-bar { block-size: 0.375rem; }
        }
        
        .story-progress-bar { flex: 1; block-size: 0.2rem; background: color-mix(in oklch, oklch(1 0 0) 30%, transparent); border-radius: 0.25rem; overflow: hidden; transition: block-size 0.2s var(--ease-out); }
        .story-progress-bar__fill { block-size: 100%; inline-size: 100%; background: oklch(1 0 0); transform-origin: left; transform: scaleX(0); border-radius: inherit; box-shadow: 0 0 0.5rem color-mix(in oklch, oklch(1 0 0) 60%, transparent); will-change: transform; }
        
        /* -------------------------------------
           PLAYER OVERLAYS (Cinematic Entrance)
           ------------------------------------- */
        :is(.story-top-actions, .story-player-actions) { position: absolute; z-index: 55; display: flex; opacity: 0; pointer-events: none; transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-spring); }
        
        .story-top-actions { 
          inset-block-start: max(1rem, env(safe-area-inset-top)); inset-inline-start: 1rem; gap: 0.75rem; transform: translateY(-1.5rem) scale(0.95); 
        }
        
        .story-player-actions { 
          inset-block-end: max(2.5rem, env(safe-area-inset-bottom)); inset-inline-end: 0.75rem; flex-direction: column; align-items: center; gap: 1rem; transform: translateX(1.5rem) scale(0.95); 
        }
        
        :is(.player-fab, .reaction-option-btn, .external-nav-btn) { 
          inline-size: var(--fab-size); block-size: var(--fab-size); border-radius: 50%; 
          background-color: color-mix(in oklch, var(--bg-dark) 35%, transparent); 
          -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); 
          border: 0.0625rem solid var(--glass-border); color: oklch(1 0 0); font-size: 1.125rem; display: flex; align-items: center; justify-content: center; cursor: pointer; 
          box-shadow: 0 0.25rem 0.75rem oklch(0 0 0 / 0.3); transition: transform 0.3s var(--ease-spring), background-color 0.2s; 
          &:active:not(.is-disabled) { transform: scale(0.85); background-color: color-mix(in oklch, var(--bg-dark) 60%, transparent); }
        }
        .external-nav-btn.is-disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        
        .story-excerpt { 
          position: absolute; inset-block-end: max(2.5rem, env(safe-area-inset-bottom)); inset-inline-start: 1rem; 
          inline-size: calc(100% - 4.5rem); display: flex; flex-direction: column; align-items: flex-start; gap: 0.5rem;
          z-index: 55; color: var(--text-main); cursor: pointer; opacity: 0; pointer-events: none; 
          transform: translateY(1.5rem) scale(0.98); transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-spring); background: transparent; border: none; text-align: start; 
        }
        
        .story-excerpt__badges { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .story-badge-item { background: color-mix(in oklch, oklch(1 0 0) 15%, transparent); color: oklch(1 0 0); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); border: 0.0625rem solid var(--glass-border); font-size: 0.625rem; font-weight: 700; text-transform: uppercase; padding: 0.25rem 0.625rem; border-radius: 1rem; letter-spacing: 0.02em; }
        
        .story-excerpt__title { font-size: 1.125rem; font-weight: 800; text-shadow: 0 0.125rem 0.5rem oklch(0 0 0 / 0.8); line-height: 1.3; letter-spacing: -0.01em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .story-excerpt__text { font-size: 0.875rem; line-height: 1.4; color: color-mix(in oklch, oklch(1 0 0) 90%, transparent); text-shadow: 0 0.125rem 0.5rem oklch(0 0 0 / 0.8); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .story-read-more { font-weight: 800; color: oklch(1 0 0); margin-inline-start: 0.25rem; text-shadow: 0 1px 4px oklch(0 0 0 / 0.9); }
        
        .reaction-wrapper { 
          position: relative; display: flex; flex-direction: column; align-items: center; 
          &.is-active {
            .reaction-options { pointer-events: auto; }
            .reaction-option-btn { opacity: 1; transform: translateY(0) scale(1); margin-block-end: 0.5rem; }
            .player-fab { background-color: oklch(1 0 0); color: var(--bg-dark); transform: scale(1.05); }
            .reaction-option-btn:nth-child(4) { transition-delay: 0s; } .reaction-option-btn:nth-child(3) { transition-delay: 0.05s; } .reaction-option-btn:nth-child(2) { transition-delay: 0.1s; } .reaction-option-btn:nth-child(1) { transition-delay: 0.15s; }
          }
        }
        .reaction-options { position: absolute; inset-block-end: 100%; inset-inline-end: 0; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; pointer-events: none; padding-block-end: 0.5rem; }
        .reaction-option-btn { opacity: 0; transform: translateY(1rem) scale(0.6); transition: all 0.4s var(--ease-spring); font-size: 1.25rem; }
        .reaction-option-btn:nth-child(1) { transition-delay: 0s; } .reaction-option-btn:nth-child(2) { transition-delay: 0.04s; } .reaction-option-btn:nth-child(3) { transition-delay: 0.08s; } .reaction-option-btn:nth-child(4) { transition-delay: 0.12s; }
        
        .overlay-backdrop { position: absolute; inset: 0; background: oklch(0 0 0 / 0.7); -webkit-backdrop-filter: blur(0.25rem); backdrop-filter: blur(0.25rem); opacity: 0; transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1); pointer-events: auto; touch-action: none; }
        .is-active > .overlay-backdrop { opacity: 1; }
        
        /* -------------------------------------
           TAMPILAN DETAIL (CARD / SHEET / POPUP)
           ------------------------------------- */
        :is(.story-sheet, .story-popup) { position: fixed; inset: 0; z-index: 100; visibility: hidden; pointer-events: none; &.is-active { visibility: visible; } }
        .story-sheet { display: flex; flex-direction: column; justify-content: flex-end; } .story-popup { display: flex; justify-content: center; align-items: center; }
        
        :is(.story-sheet__content, .story-popup__content) { 
          position: relative; background-color: var(--surface); z-index: 101; pointer-events: auto; display: flex; flex-direction: column; contain: paint; 
        }
        
        .story-sheet__content { 
          border-radius: 1.5rem 1.5rem 0 0; inline-size: 100%; padding: 0; transform: translateY(100%); max-block-size: 88vh; 
          transition: transform 0.6s var(--ease-spring); box-shadow: 0 -0.5rem 2rem oklch(0 0 0 / 0.5); border-top: 1px solid color-mix(in oklch, oklch(1 0 0) 10%, transparent); will-change: transform; 
          &.is-dragging { transition: transform 0.1s ease-out; } 
        }
        .story-sheet.is-active .story-sheet__content { transform: translateY(0); } 
        
        .story-sheet__handle-wrapper { inline-size: 100%; padding-block: 0.75rem 0.5rem; cursor: grab; display: flex; justify-content: center; flex-shrink: 0; touch-action: none; }
        .story-sheet__handle { inline-size: 2.5rem; block-size: 0.3rem; background-color: color-mix(in oklch, oklch(1 0 0) 25%, transparent); border-radius: 1rem; transition: background-color 0.2s, transform 0.2s var(--ease-spring); }
        .story-sheet__content.is-dragging .story-sheet__handle { background-color: color-mix(in oklch, oklch(1 0 0) 45%, transparent); transform: scaleX(1.3); }

        }
      };

      const getActiveData = () => CONFIG.PLAYLIST[AppState.currentVideoIndex]?.items?.[AppState.currentSubIndex] ?? CONFIG.PLAYLIST[AppState.currentVideoIndex];
      
      const ThumbnailResolver = {
        cache: new Map(), 
        pendingCallbacks: new Map(),
        resolve: function (data, callback) {
          if (!data) return callback(null);
          
          let cacheKey = data.type === 'youtube' ? Utils.parseYouTubeData(data.url).videoId : data.url;
          
          if (this.cache.has(cacheKey)) { 
            const cached = this.cache.get(cacheKey); 
            if (cached === 'loading') {
              return this.pendingCallbacks.get(cacheKey).push(callback); 
            }
            return callback(cached); 
          }
          
          this.cache.set(cacheKey, 'loading'); 
          this.pendingCallbacks.set(cacheKey, [callback]);
          
          const saveAndCall = (resultUrl) => { 
            this.cache.set(cacheKey, resultUrl); 
            const callbacks = this.pendingCallbacks.get(cacheKey) ?? []; 
            callbacks.forEach(cb => cb(resultUrl)); 
            this.pendingCallbacks.delete(cacheKey); 
          };
          
          if (data.type === 'youtube') { 
            const img = new Image(); 
            const hqResUrl = `https://i.ytimg.com/vi/${cacheKey}/hqdefault.jpg`; 
            img.onload = () => saveAndCall(img.naturalWidth <= 120 && img.src.includes('maxresdefault') ? hqResUrl : img.src); 
            img.onerror = () => saveAndCall(hqResUrl); 
            img.src = `https://i.ytimg.com/vi/${cacheKey}/maxresdefault.jpg`; 
          } else if (data.type === 'video') { 
            saveAndCall(data.thumbnail ?? null); 
          } else { 
            saveAndCall(data.thumbnail ?? data.url); 
          }
        },
      };
      
      class BaseMediaHandler {
        constructor(container, data, callbacks = {}, isAmbient = false) { 
          this.container = container; 
          this.data = data; 
          this.callbacks = callbacks; 
          this.isAmbient = isAmbient; 
          this.isDestroyed = false; 
        }
        load() {} 
        play() {} 
        pause() {} 
        mute() {} 
        unMute() {} 
        seek(offset) { this.seekTo(this.getCurrentTime() + offset); } 
        seekTo(time) {} 
        getCurrentTime() { return 0; } 
        getDuration() { return 0; } 
        setPlaybackRate(rate) {} 
        isMuted() { return true; } 
        getState() { return CONFIG.MEDIA_STATE.UNSTARTED; } 
        destroy() { 
          this.isDestroyed = true; 
          this.container.replaceChildren(); 
        } 
        emitStateChange(state) { 
          this.callbacks.onStateChange?.(state); 
        }
      }
      
      class YouTubeHandler extends BaseMediaHandler {
        load() {
          if (typeof YT === 'undefined' || !YT.Player) { 
            this.callbacks.onError?.(); 
            return; 
          }
          const div = document.createElement('div'); 
          this.container.append(div); 
          const { videoId, isShort } = Utils.parseYouTubeData(this.data.url);
          
          this.player = new YT.Player(div, {
            videoId: videoId, 
            playerVars: { autoplay: 1, controls: 0, loop: 0, mute: 1, modestbranding: 1, iv_load_policy: 3, rel: 0, playsinline: 1 },
            events: {
              onReady: (e) => { 
                if (this.isDestroyed) return; 
                (this.isAmbient || AppState.isGlobalMuted) ? e.target.mute() : e.target.unMute(); 
                const iframe = e.target.getIframe(); 
                if (iframe) {
                  iframe.style.objectFit = (isShort || this.data.isVertical) ? 'cover' : 'contain'; 
                }
                this.callbacks.onReady?.(e); 
              },
              onStateChange: (e) => { 
                if (this.isDestroyed) return; 
                const states = { 
                  [YT.PlayerState.PLAYING]: CONFIG.MEDIA_STATE.PLAYING, 
                  [YT.PlayerState.PAUSED]: CONFIG.MEDIA_STATE.PAUSED, 
                  [YT.PlayerState.BUFFERING]: CONFIG.MEDIA_STATE.BUFFERING, 
                  [YT.PlayerState.ENDED]: CONFIG.MEDIA_STATE.ENDED 
                }; 
                this.emitStateChange(states[e.data] ?? CONFIG.MEDIA_STATE.UNSTARTED); 
              },
              onError: (e) => { 
                if (!this.isDestroyed) this.callbacks.onError?.(e); 
              }
            },
          });
        }
        
        play() { 
          if (!this.isAmbient && !AppState.userInteracted && !AppState.isGlobalMuted) {
            this.mute();
            AppState.isGlobalMuted = true;
            const btnMute = dom('.js-btn-mute');
            if (btnMute) { 
              btnMute.textContent = '🔇'; 
              btnMute.setAttribute('aria-pressed', 'true'); 
            }
          }
          
          this.player?.playVideo?.(); 
          
          clearTimeout(this.autoplayCheckTimer);
          this.autoplayCheckTimer = setTimeout(() => {
            if (this.isDestroyed) return;
            const state = this.player?.getPlayerState?.();
            if (state === -1 || state === 5) this.emitStateChange(CONFIG.MEDIA_STATE.PAUSED);
          }, 1500); 
        }
        
        pause() { this.player?.pauseVideo?.(); } 
        mute() { this.player?.mute?.(); } 
        unMute() { this.player?.unMute?.(); } 
        seekTo(time) { this.player?.seekTo?.(time, true); } 
        getCurrentTime() { return this.player?.getCurrentTime?.() ?? 0; } 
        getDuration() { return this.player?.getDuration?.() ?? 0; } 
        setPlaybackRate(rate) { this.player?.setPlaybackRate?.(rate); } 
        isMuted() { return this.player?.isMuted?.(); }
        
        getState() { 
          const states = { 
            [YT.PlayerState.PLAYING]: CONFIG.MEDIA_STATE.PLAYING, 
            [YT.PlayerState.PAUSED]: CONFIG.MEDIA_STATE.PAUSED, 
            [YT.PlayerState.BUFFERING]: CONFIG.MEDIA_STATE.BUFFERING, 
            [YT.PlayerState.ENDED]: CONFIG.MEDIA_STATE.ENDED 
          }; 
          return states[this.player?.getPlayerState?.()] ?? CONFIG.MEDIA_STATE.UNSTARTED; 
        } 
        
        destroy() { 
          clearTimeout(this.autoplayCheckTimer); 
          this.player?.destroy?.(); 
          super.destroy(); 
        }
      }
      
      class ImageHandler extends BaseMediaHandler {
        constructor(container, data, callbacks, isAmbient = false) { 
          super(container, data, callbacks, isAmbient); 
          this.duration = this.data.duration ?? 5; 
          this.currentTime = 0; 
          this.timer = null; 
          this.lastTick = 0; 
          this.state = CONFIG.MEDIA_STATE.UNSTARTED; 
        }
        
        load() {
          this.img = new Image(); 
          this.img.style.cssText = `inline-size: 100%; block-size: 100%; object-fit: ${this.data.isVertical ? 'cover' : 'contain'}; pointer-events: none;`; 
          this.container.append(this.img);
          
          const handleLoad = () => { 
            if (this.isDestroyed) return; 
            this.state = CONFIG.MEDIA_STATE.PAUSED; 
            this.callbacks.onReady?.({ target: this }); 
          };
          
          const handleError = () => { 
            if (this.isDestroyed) return; 
            if (this.data.thumbnail && this.img.src !== this.data.thumbnail) { 
              this.img.src = this.data.thumbnail; 
            } else { 
              this.state = CONFIG.MEDIA_STATE.ENDED; 
              this.emitStateChange(this.state); 
              this.callbacks.onError?.(); 
            } 
          };
          
          this.img.onload = handleLoad; 
          this.img.onerror = handleError; 
          this.img.src = this.data.url;
          
          if (this.img.complete && this.img.naturalHeight !== 0) handleLoad(); 
          else if (this.img.complete && this.img.naturalHeight === 0) handleError();
        }
        
        tick() { 
          if (this.state !== CONFIG.MEDIA_STATE.PLAYING || this.isDestroyed) return; 
          
          const now = Date.now(); 
          this.currentTime += (now - this.lastTick) / 1000; 
          this.lastTick = now; 
          
          if (this.currentTime >= this.duration) { 
            this.currentTime = this.duration; 
            this.state = CONFIG.MEDIA_STATE.ENDED; 
            this.emitStateChange(this.state); 
          } else { 
            this.timer = requestAnimationFrame(() => this.tick()); 
          } 
        }
        
        play() { 
          if (this.currentTime >= this.duration) this.currentTime = 0; 
          this.state = CONFIG.MEDIA_STATE.PLAYING; 
          this.lastTick = Date.now(); 
          this.emitStateChange(this.state); 
          this.tick(); 
        } 
        
        pause() { 
          this.state = CONFIG.MEDIA_STATE.PAUSED; 
          cancelAnimationFrame(this.timer); 
          this.emitStateChange(this.state); 
        } 
        
        seekTo(time) { this.currentTime = Math.max(0, Math.min(time, this.duration)); } 
        getCurrentTime() { return this.currentTime; } 
        getDuration() { return this.duration; } 
        getState() { return this.state; } 
        
        destroy() { 
          cancelAnimationFrame(this.timer); 
          super.destroy(); 
        }
      }
      
      class HTML5VideoHandler extends BaseMediaHandler {
        load() {
          this.video = document.createElement('video'); 
          this.video.src = this.data.url; 
          this.video.style.cssText = `inline-size: 100%; block-size: 100%; object-fit: ${this.data.isVertical ? 'cover' : 'contain'};`; 
          this.video.playsInline = true; 
          this.video.crossOrigin = 'anonymous'; 
          this.video.muted = this.isAmbient || AppState.isGlobalMuted; 
          this.container.append(this.video);
          
          this.video.addEventListener('loadedmetadata', () => { 
            if (!this.isDestroyed) this.callbacks.onReady?.({ target: this }); 
          });
          
          ['play', 'playing'].forEach(evt => this.video.addEventListener(evt, () => { 
            if (!this.isDestroyed) this.emitStateChange(CONFIG.MEDIA_STATE.PLAYING) 
          }));
          
          this.video.addEventListener('pause', () => { if (!this.isDestroyed) this.emitStateChange(CONFIG.MEDIA_STATE.PAUSED) }); 
          this.video.addEventListener('waiting', () => { if (!this.isDestroyed) this.emitStateChange(CONFIG.MEDIA_STATE.BUFFERING) }); 
          this.video.addEventListener('ended', () => { if (!this.isDestroyed) this.emitStateChange(CONFIG.MEDIA_STATE.ENDED) }); 
          this.video.addEventListener('error', (e) => { if (!this.isDestroyed) this.callbacks.onError?.(e) });
        }
        
        play() { 
          this.video?.play()?.catch(err => {
            if (err.name === 'NotAllowedError' && !this.isAmbient) {
              this.mute();
              this.video?.play();
              AppState.isGlobalMuted = true;
              const btnMute = dom('.js-btn-mute');
              if (btnMute) { 
                btnMute.textContent = '🔇'; 
                btnMute.setAttribute('aria-pressed', 'true'); 
              }
              Utils.showToast("Browser memblokir suara otomatis. Ketuk 🔇 untuk menyalakan.");
            } else {
              this.emitStateChange(CONFIG.MEDIA_STATE.PAUSED);
            }
          });
        }
        
        pause() { this.video?.pause(); } 
        mute() { if (this.video) this.video.muted = true; } 
        unMute() { if (this.video) this.video.muted = false; } 
        seekTo(time) { if (this.video) this.video.currentTime = time; } 
        getCurrentTime() { return this.video?.currentTime ?? 0; } 
        getDuration() { return this.video?.duration ?? 0; } 
        setPlaybackRate(rate) { if (this.video) this.video.playbackRate = rate; } 
        isMuted() { return this.video?.muted ?? false; }
        
        getState() { 
          if (!this.video) return CONFIG.MEDIA_STATE.UNSTARTED; 
          if (this.video.ended) return CONFIG.MEDIA_STATE.ENDED; 
          if (this.video.paused) return CONFIG.MEDIA_STATE.PAUSED; 
          if (this.video.readyState < 3) return CONFIG.MEDIA_STATE.BUFFERING; 
          return CONFIG.MEDIA_STATE.PLAYING; 
        } 
        
        destroy() { 
          if (this.video) { 
            this.video.pause(); 
            this.video.removeAttribute('src'); 
            this.video.load(); 
          } 
          super.destroy(); 
        }
      }
      
      class MediaFactory {
        static create(container, data, callbacks, isAmbient = false) { 
          switch (data.type) { 
            case 'youtube': return new YouTubeHandler(container, data, callbacks, isAmbient); 
            case 'image': return new ImageHandler(container, data, callbacks, isAmbient); 
            case 'video': return new HTML5VideoHandler(container, data, callbacks, isAmbient); 
            default: return null; 
          } 
        }
      }
      
      const handleMediaStateChange = (state) => {
        const btn = dom('.js-btn-play'); 
        const container = dom('.js-story-container'); 
        const thumbOverlay = dom('.js-thumbnail-overlay'); 
        const mainMediaContainer = dom('.main-media-container'); 
        const ambientMediaContainer = dom('.ambient-media-container'); 
        const blurBg = dom('.js-video-blur');
        
        if (state === CONFIG.MEDIA_STATE.PLAYING) {
          if (mainMediaContainer) mainMediaContainer.style.opacity = '1';
          if (btn) { 
            btn.textContent = '⏸️'; 
            btn.setAttribute('aria-pressed', 'true'); 
          }
          container?.classList.add('has-started', 'show-ui'); 
          container?.classList.remove('is-paused', 'is-loading');
          
          if (thumbOverlay && thumbOverlay.style.display !== 'none') { 
            thumbOverlay.style.transition = 'opacity 0.6s var(--ease-out)'; 
            AppState.crossfadeTimer = setTimeout(() => { thumbOverlay.style.opacity = '0'; }, 200); 
          }
          
          if (blurBg && AppState.currentMedia?.data?.type !== 'image') { 
            blurBg.style.transition = 'opacity 0.8s var(--ease-out)'; 
            blurBg.style.opacity = '0'; 
          }
          
          if (AppState.currentAmbient && AppState.currentMedia) { 
            AppState.currentAmbient.seekTo(AppState.currentMedia.getCurrentTime()); 
            AppState.currentAmbient.play(); 
            if (ambientMediaContainer) ambientMediaContainer.style.opacity = '1'; 
          }

          const ambientWrapper = dom('.js-ambient-container');
            if (ambientWrapper && AppState.currentMedia.data.type !== 'image') {
              setTimeout(() => {
                ambientWrapper.style.backgroundImage = 'none';
              }, 400);
            }
          window.StoryManager?.startProgressBar();
          
        } else if (state === CONFIG.MEDIA_STATE.PAUSED) {
          if (window.StoryManager && !StoryManager.isAnimatingState()) { 
            if (btn) { btn.textContent = '▶️'; btn.setAttribute('aria-pressed', 'false'); } 
            container?.classList.add('is-paused'); 
            container?.classList.remove('is-loading');
          }
          window.StoryManager?.stopProgressBar(); 
          AppState.currentAmbient?.pause();
          
        } else if (state === CONFIG.MEDIA_STATE.BUFFERING) { 
          AppState.currentAmbient?.pause(); 
          container?.classList.add('is-loading');
          
        } else if (state === CONFIG.MEDIA_STATE.ENDED) { 
          window.StoryManager?.stopProgressBar(); 
          
          const group = CONFIG.PLAYLIST[AppState.currentVideoIndex];
          const isMulti = (group?.items?.length ?? 0) > 1;
          const count = group?.items?.length ?? 1;
          
          if (window.StoryManager?.isContextOpen()) {
              AppState.currentMedia?.seekTo(0);
              AppState.currentMedia?.play();
              AppState.currentAmbient?.seekTo(0);
              AppState.currentAmbient?.play();
              window.StoryManager.startProgressBar();
              return; 
          }

          if (isMulti && AppState.currentSubIndex < count - 1) {
              window.StoryManager?.navigateNext();
          } else if (group?.format === 'story') {
              AppState.currentMedia?.seekTo(0);
              AppState.currentMedia?.pause();
              if (btn) {
                  btn.textContent = '▶️';
                  btn.setAttribute('aria-pressed', 'false');
              }
              container?.classList.add('is-paused');
          } else {
              AppState.currentSubIndex = 0;
              AppState.currentMedia?.seekTo(0); 
              AppState.currentMedia?.play(); 
              AppState.currentAmbient?.seekTo(0); 
              AppState.currentAmbient?.play();
          }
        }
      };
      
      const updateVideoUI = () => {
        if (!AppState.isApiReady) return;
        const groupData = CONFIG.PLAYLIST[AppState.currentVideoIndex];
        if (!groupData) return;
        
        const currentRenderIndex = AppState.currentVideoIndex;
        const currentRenderSubIndex = AppState.currentSubIndex; 
        const data = getActiveData();

        const container = dom('.js-story-container');
        const isStoryFormat = groupData.format === 'story' || (groupData.items?.length ?? 0) > 1;
        container?.classList.toggle('is-story-format', isStoryFormat);
        
        const wrapper = dom('.js-progress-wrapper');
        if (wrapper) {
            const count = groupData.items?.length ?? 1;
            wrapper.replaceChildren(...Array.from({ length: count }, (_, i) => {
                const bar = document.createElement('div');
                bar.className = 'story-progress-bar';
                const fill = document.createElement('div');
                fill.className = 'story-progress-bar__fill';
                fill.dataset.progressIndex = i;
                fill.style.transform = `scaleX(${i < AppState.currentSubIndex ? 1 : 0})`;
                bar.append(fill);
                return bar;
            }));
        }
        
        const btnMute = dom('.js-btn-mute');
        if (btnMute) { 
          btnMute.textContent = AppState.isGlobalMuted ? '🔇' : '🔊'; 
          btnMute.setAttribute('aria-label', AppState.isGlobalMuted ? 'Unmute Audio' : 'Mute Audio'); 
          btnMute.setAttribute('aria-pressed', String(AppState.isGlobalMuted));

        const displayTitle = data.title ?? groupData.title;
        const displayMeta = data.meta ?? groupData.meta;
        const displayExcerpt = data.excerpt ?? groupData.excerpt;
        const displayContent = data.content ?? groupData.content;

        const a11yAnnouncer = document.querySelector('.js-a11y');

        const hasDetailContent = Boolean(displayContent?.trim());
        rootContainer.querySelectorAll('.story-excerpt__text').forEach((el) => {
          const rawExcerpt = displayExcerpt?.trim() ?? '';
          if (rawExcerpt === '' && hasDetailContent) {
            el.innerHTML = '<span class="story-read-more" style="margin-inline-start: 0;">...See more</span>';
          } else if (rawExcerpt === '') {
            el.textContent = '';
          } else { 
            el.textContent = rawExcerpt; 
            if (hasDetailContent) { 
              requestAnimationFrame(() => { 
                if (el.scrollHeight <= el.clientHeight && !el.innerHTML.includes('story-read-more')) {
                  el.innerHTML = `${rawExcerpt}<span class="story-read-more"> ...See more</span>`; 
                }
              }); 
            } 
          }

        rootContainer.querySelectorAll('.story-excerpt__badges, .story-view__badges').forEach((container) => {
          container.replaceChildren(...(displayCategories ?? []).map(category => {
            const span = document.createElement('span');
            span.className = 'story-badge-item';
            span.textContent = category;
            return span;
          }));
        });
        
        const thumbOverlay = dom('.js-thumbnail-overlay'); 
        const blurBg = dom('.js-video-blur');
        const isShort = (data.type === 'youtube' && Utils.parseYouTubeData(data.url).isShort) || data.isVertical === true;
        const objectFitStyle = data.thumbnailFit ?? (isShort ? 'cover' : 'contain');
        
        if (thumbOverlay) { 
          thumbOverlay.style.transition = 'none'; 
          thumbOverlay.style.opacity = '1'; 
        }
        
        ThumbnailResolver.resolve(data, (url) => {
          if (!url || AppState.currentVideoIndex !== currentRenderIndex || AppState.currentSubIndex !== currentRenderSubIndex) {
              if (blurBg && AppState.currentVideoIndex === currentRenderIndex) {
                  blurBg.style.backgroundImage = 'none';
                  blurBg.style.opacity = '0';
              }
              if (thumbOverlay && AppState.currentVideoIndex === currentRenderIndex) {
                  thumbOverlay.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E";
              }

          if (blurBg) {

            blurBg.classList.toggle('is-inner-breathing', data.type === 'image'); 
          }
          if (thumbOverlay) {

          const ambientWrapper = dom('.js-ambient-container');
          if (ambientWrapper) {

            ambientWrapper.style.backgroundPosition = 'center'; 
            ambientWrapper.style.backgroundRepeat = 'no-repeat'; 
            ambientWrapper.classList.toggle('is-breathing', data.type === 'image'); 
          }
        });
        
        AppState.currentMedia?.destroy(); 
        AppState.currentAmbient?.destroy();
        
        const mainContainer = dom('.main-media-container'); 
        const ambientContainer = dom('.ambient-media-container');
        if (mainContainer) mainContainer.style.opacity = '0'; 
        if (ambientContainer) ambientContainer.style.opacity = '0';
        
        AppState.currentMedia = MediaFactory.create(mainContainer, data, {
          onReady: () => { 
            rootContainer.classList.add('is-ready'); 
            AppState.errorCount = 0; 
            dom('.js-error-overlay')?.classList.remove('is-visible'); 
            
            if (!document.hidden) AppState.currentMedia.play(); 
            else AppState.wasPlayingBeforeHidden = true;
          },
          onStateChange: handleMediaStateChange,
          onError: () => {
            if (!navigator.onLine) { 
              dom('.js-error-title').textContent = 'Koneksi Terputus';

        AppState.currentMedia?.load();
        
        const slug = Utils.slugify(displayTitle || 'telkomsel-story');
        const targetId = data.id || groupData.id;

        window.history.replaceState({ index: AppState.currentVideoIndex, subIndex: AppState.currentSubIndex }, '', newUrl);
