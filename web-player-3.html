      getState() { if (!this.videoElement) return MEDIA_STATE.UNSTARTED; if (this.videoElement.ended) return MEDIA_STATE.ENDED; if (this.videoElement.paused) return MEDIA_STATE.PAUSED; if (this.videoElement.readyState < 3) return MEDIA_STATE.BUFFERING; return MEDIA_STATE.PLAYING; }
      destroy() { this.#stopColorThief(); clearInterval(this.#bufferCheckInterval); if (this.abortController) { this.abortController.abort(); this.abortController = null; } if (this.videoElement) { MediaPool.releaseVideoElement(this.videoElement); this.videoElement = null; } super.destroy(); }
    }

    class CarouselMediaHandler extends BaseMediaHandler {
      constructor(config) {
        super(config);
        this.mediaItems = this.normalizeMediaData();
        this.currentIndex = this.state.currentSubIndex || 0;
        this.playbackState = MEDIA_STATE.UNSTARTED;
        this.cConfig = this.state.config.carousel || { maxVisibleDots: 7, videoAutoplay: true, videoLoop: true, videoMuted: true };
      }

      normalizeMediaData() {
        let safeItems = [];
        if (Array.isArray(this.data.items) && this.data.items.length > 0) {
          safeItems = this.data.items.map(item => {
            let mediaType = item.type;
            let mediaUrl = item.url;
            if (mediaType === 'youtube') {
              mediaType = 'image';
              mediaUrl = item.thumbnail || (item.url ? `https://i.ytimg.com/vi/${MediaUtils.parseYouTubeData(item.url).videoId}/hqdefault.jpg` : '');
            }
            if (!mediaType && mediaUrl && mediaUrl.match(/\.(mp4|webm|ogg)$/i)) mediaType = 'video';
            return { type: mediaType || 'image', url: mediaUrl || item.thumbnail, thumbnail: item.thumbnail };
          }).filter(m => m.url);
        } else if (Array.isArray(this.data.images) && this.data.images.length > 0) {
          safeItems = this.data.images.map(url => ({ type: 'image', url }));
        }
        return safeItems;
      }

      attachDragEvents() {
        let isDown = false;
        let startX;
        let scrollLeft;
        let holdTimer;

        const startInteraction = (e) => {
          isDown = true;
          this.carouselWrapper.classList.add('is-dragging');
          startX = e.pageX - this.carouselWrapper.offsetLeft;
          scrollLeft = this.carouselWrapper.scrollLeft;

          holdTimer = setTimeout(() => {
            const layoutWrapper = document.querySelector('.js-layout-wrapper');
            if (layoutWrapper) layoutWrapper.classList.add('is-gesture-active');

            const hideElement = (el) => {
              if (el) {
                el.style.transition = 'opacity 0.3s ease-out';
                el.style.opacity = '0';
                el.style.pointerEvents = 'none';
              }
            };
            
            hideElement(this.indicatorsWrapper);
            hideElement(this.btnPrev);
            hideElement(this.btnNext);
          }, 200); 
        };

        const endInteraction = () => {
          isDown = false;
          this.carouselWrapper.classList.remove('is-dragging');
          
          clearTimeout(holdTimer); 
          
          const layoutWrapper = document.querySelector('.js-layout-wrapper');
          if (layoutWrapper) layoutWrapper.classList.remove('is-gesture-active');

          const showElement = (el) => {
            if (el) {
              el.style.opacity = '';
              el.style.pointerEvents = '';
              setTimeout(() => { el.style.transition = ''; }, 300);
            }
          };
          
          showElement(this.indicatorsWrapper);
          showElement(this.btnPrev);
          showElement(this.btnNext);
        };

        const moveInteraction = (e) => {
          if (!isDown || e.pointerType === 'touch') return; 
          e.preventDefault(); 
          const x = e.clientX - this.carouselWrapper.offsetLeft;
          const deltaX = (x - startX);
          
          let targetScroll = scrollLeft - deltaX;
          const maxScroll = this.carouselWrapper.scrollWidth - this.carouselWrapper.clientWidth;

          const c = 0.55;
          const d = this.carouselWrapper.clientWidth;

          if (targetScroll < 0) {
            const overflow = Math.abs(targetScroll);
            targetScroll = -((overflow * c * d) / (d + c * overflow));
          } else if (targetScroll > maxScroll) {
            const overflow = targetScroll - maxScroll;
            targetScroll = maxScroll + ((overflow * c * d) / (d + c * overflow));
          }

          this.carouselWrapper.scrollLeft = targetScroll;
        };

        this.carouselWrapper.addEventListener('pointerdown', startInteraction);
        this.carouselWrapper.addEventListener('pointerup', endInteraction);
        this.carouselWrapper.addEventListener('pointerleave', endInteraction);
        this.carouselWrapper.addEventListener('pointercancel', endInteraction);
        this.carouselWrapper.addEventListener('pointermove', moveInteraction);
      }

      createNavArrow(direction, iconName, step) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `story-carousel-arrow story-carousel-arrow--${direction}`;
        
        const iconEl = document.createElement('i');
        iconEl.setAttribute('data-lucide', iconName);
        btn.appendChild(iconEl);

        if (direction === 'left') btn.style.display = 'none'; 
        
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          this.scrollToIndex(this.currentIndex + step);
        });
        return btn;
      }

      createMediaElement(media, index) {
        let el;
        if (media.type === 'video') {
          el = document.createElement('video');
          el.dataset.src = media.url; 
          el.muted = this.state.isGlobalMuted || this.cConfig.videoMuted;
          el.loop = this.cConfig.videoLoop;
          el.playsInline = true;
          el.preload = 'metadata';

          if (media.thumbnail) el.poster = media.thumbnail;
          
          const removePoster = () => {
            el.removeAttribute('poster');
          };

          el.addEventListener('playing', removePoster, { once: true });
          el.addEventListener('loadeddata', () => {
            if (el.readyState >= 3) removePoster();
          }, { once: true });

          if (index === 0 && this.cConfig.videoAutoplay) el.autoplay = true; 
          
          el.addEventListener('waiting', () => { if (this.currentIndex === index) this.emitStateChange(MEDIA_STATE.BUFFERING); });
          el.addEventListener('playing', () => { if (this.currentIndex === index) this.emitStateChange(MEDIA_STATE.PLAYING); });
          el.addEventListener('pause', () => { if (this.currentIndex === index) this.emitStateChange(MEDIA_STATE.PAUSED); });
        } else {
          el = new Image();
          el.dataset.src = media.url; 
        }

        el.crossOrigin = 'anonymous';
        el.style.cssText = `inline-size: 100%; block-size: 100%; object-fit: ${this.data.isVertical ? 'cover' : 'contain'}; pointer-events: none; user-select: none;`;
        return el;
      }

      scrollToIndex(index) {
        if (index < 0 || index >= this.mediaItems.length) return;
        const distance = Math.abs(this.currentIndex - index);
        const scrollBehavior = (this.state.prefersReducedMotion || distance > 1) ? 'auto' : 'smooth';
        const targetScroll = this.carouselWrapper.clientWidth * index;
        this.carouselWrapper.scrollTo({ left: targetScroll, behavior: scrollBehavior });
      }

      navigateCarousel(step) {
        if (!this.mediaItems) return false;
        const newIndex = this.currentIndex + step;
        if (newIndex >= 0 && newIndex < this.mediaItems.length) {
          this.scrollToIndex(newIndex);
          return true;
        }
        return false; 
      }

      getActiveVideo() {
        const el = this.slideElements[this.currentIndex];
        return el && el.tagName === 'VIDEO' ? el : null;
      }

      updateVideoUI() {
        const storyContainer = this.container.closest('.story-container');
        if (!storyContainer) return;
        const currentItem = this.mediaItems[this.currentIndex];
        if (currentItem && currentItem.type === 'video') {
          storyContainer.classList.add('has-active-video');
          const vid = this.getActiveVideo();
          if (vid) {
            if (vid.readyState < 3) this.emitStateChange(MEDIA_STATE.BUFFERING);
            else if (vid.paused) this.emitStateChange(MEDIA_STATE.PAUSED);
            else this.emitStateChange(MEDIA_STATE.PLAYING);
          }
        } else {
          storyContainer.classList.remove('has-active-video');
          this.emitStateChange(MEDIA_STATE.PLAYING);
        }
      }

      applyLazyLoading(targetIndex) {
        const windowSize = 1; 
        const min = Math.max(0, targetIndex - windowSize);
        const max = Math.min(this.mediaItems.length - 1, targetIndex + windowSize);

        for (let i = min; i <= max; i++) {
          const el = this.slideElements[i];
          if (el && el.dataset.src) {
            const originalSrc = el.dataset.src;
            el.src = originalSrc;
            el.removeAttribute('data-src');

            if (el.tagName === 'VIDEO') {
              el.load(); 
              
              if (el.readyState >= 3) {
                el.removeAttribute('poster');
              }
            }
          }
        }
      }

      async load() {
        const items = this.mediaItems || [];
        this.carouselWrapper = document.createElement('div');
        this.carouselWrapper.className = 'story-carousel-container';
        
        this.indicatorsWrapper = document.createElement('div');
        this.indicatorsWrapper.className = 'story-carousel-indicators';
        this.indicatorsWrapper.style.setProperty('--max-dots', this.cConfig.maxVisibleDots);
        
        this.indicatorsTrack = document.createElement('div');
        this.indicatorsTrack.className = 'story-carousel-track';
        this.indicatorsWrapper.appendChild(this.indicatorsTrack);

        this.slideElements = [];
        this.slideWrappers = []; // TAMBAHAN: Lacak bungkus slide
        this.dots = [];

        items.forEach((media, i) => {
          const slide = document.createElement('div');
          // TAMBAHAN: Beri class is-active pada slide yang sedang fokus
          slide.className = 'story-carousel-slide' + (i === this.currentIndex ? ' is-active' : '');
          const mediaEl = this.createMediaElement(media, i);
          
          slide.appendChild(mediaEl);
          this.carouselWrapper.appendChild(slide);
          this.slideElements.push(mediaEl);
          this.slideWrappers.push(slide); // Simpan referensi bungkus

          const dot = document.createElement('button');
          dot.type = 'button';
          dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
          const isActive = i === this.currentIndex;
          dot.className = 'story-carousel-dot' + (isActive ? ' is-active' : '');
          if (isActive) dot.setAttribute('aria-current', 'true');
          
          dot.addEventListener('click', (e) => {
            e.stopPropagation();
            if (this.currentIndex !== i) this.scrollToIndex(i);
          });

          this.indicatorsTrack.appendChild(dot);
          this.dots.push(dot);
        });

        this.container.appendChild(this.carouselWrapper);
        this.attachDragEvents();

        if (this.currentIndex > 0) {
          requestAnimationFrame(() => {
            if (this.carouselWrapper && this.carouselWrapper.clientWidth > 0) {
              this.carouselWrapper.scrollLeft = this.carouselWrapper.clientWidth * this.currentIndex;
            }
          });
        }
        
        if (items.length > 1 && !this.isAmbient) {
          const uiContainer = this.container.parentElement || this.container;
          uiContainer.appendChild(this.indicatorsWrapper);
          requestAnimationFrame(() => this.updateDotsUI());

          this.btnPrev = this.createNavArrow('left', 'chevron-left', -1);
          this.btnNext = this.createNavArrow('right', 'chevron-right', 1);

          uiContainer.appendChild(this.btnPrev);
          uiContainer.appendChild(this.btnNext);

          if (globalThis.lucide && typeof globalThis.lucide.createIcons === 'function') {
             globalThis.lucide.createIcons({
               attrs: { class: 'lucide lucide-icon', 'stroke-width': 2.5 },
               nameAttr: 'data-lucide',
               root: uiContainer 
             });
          }
        }

        this.carouselWrapper.addEventListener('scroll', () => {
          const scrollLeft = this.carouselWrapper.scrollLeft;
          const slideWidth = this.carouselWrapper.clientWidth;
          if (slideWidth === 0) return;
          
          const newIndex = Math.round(scrollLeft / slideWidth);
          if (newIndex !== this.currentIndex && newIndex >= 0 && newIndex < items.length) {
            
            // --- TAMBAHAN: Oper over class is-active secara real-time saat di-scroll ---
            if (this.slideWrappers[this.currentIndex]) this.slideWrappers[this.currentIndex].classList.remove('is-active');
            this.currentIndex = newIndex;
            if (this.slideWrappers[this.currentIndex]) this.slideWrappers[this.currentIndex].classList.add('is-active');
            // -------------------------------------------------------------------------

            this.state.currentSubIndex = newIndex;
            const groupData = this.state.playlist[this.state.currentVideoIndex];
            const urlId = MediaUtils.slugify(groupData.title || 'story') + `-${newIndex + 1}`;
            window.history.replaceState(
              { index: this.state.currentVideoIndex, subIndex: newIndex }, 
              '', 
              `${window.location.protocol}//${window.location.host}${window.location.pathname}?v=${urlId}`
            );
            
            const slideId = this.mediaItems[this.currentIndex].id || `${this.data.id}_slide_${this.currentIndex}`;
            this.appEvents.emit('ANALYTICS:START', slideId);

            if (!this.isAmbient && this.state && this.state.currentAmbient && typeof this.state.currentAmbient.scrollToIndex === 'function') {
                this.state.currentAmbient.scrollToIndex(newIndex);
            }
            
            this.applyLazyLoading(this.currentIndex);
            this.updateDotsUI();
            
            if (this.btnPrev) this.btnPrev.style.display = newIndex === 0 ? 'none' : 'flex';
            if (this.btnNext) this.btnNext.style.display = newIndex === items.length - 1 ? 'none' : 'flex';
            
            this.slideElements.forEach((el, index) => {
              if (el.tagName === 'VIDEO') {
                if (index === this.currentIndex && this.cConfig.videoAutoplay) {
                  setTimeout(() => {
                    const playPromise = el.play();
                    if (playPromise !== undefined) playPromise.catch(() => {});
                  }, 50);
                } else el.pause();
              }
            });

            this.updateVideoUI();
            this.extractCurrentColor();
          }
        }, { passive: true });

        this.applyLazyLoading(this.currentIndex);

        try {
            if (this.slideElements.length > 0) {
              const firstEl = this.slideElements[0];
              if (firstEl.tagName === 'IMG') await firstEl.decode();
              else if (firstEl.tagName === 'VIDEO') {
                await new Promise(res => {
                  if (firstEl.readyState >= 2) res();
                  else firstEl.addEventListener('loadeddata', res, { once: true });
                });
              }
            }
            this.handleSuccess();
        } catch(e) { this.handleSuccess(); }
      }

      updateDotsUI() {
        const total = this.mediaItems.length;
        const current = this.currentIndex;
        const maxDots = this.cConfig.maxVisibleDots;
        const halfDots = Math.floor(maxDots / 2);
        
        this.indicatorsWrapper.classList.toggle('is-centered', total <= maxDots);

        let windowStart = 0;
        if (total > maxDots && this.dots.length > 0) {
          windowStart = Math.max(0, Math.min(current - halfDots, total - maxDots));
          const inactiveDot = this.dots.find(d => !d.classList.contains('is-active')) || this.dots[0];
          const trackStyle = window.getComputedStyle(this.indicatorsTrack);
          const gap = parseFloat(trackStyle.gap) || 8;
          const dynamicStep = inactiveDot.offsetWidth + gap;
          if (dynamicStep > 0) {
            this.indicatorsTrack.style.transform = `translateX(-${windowStart * dynamicStep}px)`;
          }
        }

        this.dots.forEach((dot, i) => {
          dot.classList.remove('is-active', 'is-small', 'is-micro');
          if (i === current) {
            dot.classList.add('is-active');
            dot.setAttribute('aria-current', 'true');
          } else {
            dot.removeAttribute('aria-current');
            if (total > maxDots) {
              const relativePos = i - windowStart;
              if (relativePos < 0 || relativePos >= maxDots) {
                dot.classList.add('is-micro');
              } else if ((relativePos === 0 && windowStart > 0) || (relativePos === (maxDots - 1) && windowStart < total - maxDots)) {
                dot.classList.add('is-small');
              }
            }
          }
        });
      }

      play() {
        const vid = this.getActiveVideo();
        if (vid) {
            vid.muted = this.state.isGlobalMuted || this.cConfig.videoMuted;
            vid.play().catch(()=>{});
            
            if (vid.readyState < 3) {
              this.playbackState = MEDIA_STATE.BUFFERING;
              this.emitStateChange(MEDIA_STATE.BUFFERING);
            } else {
              this.playbackState = MEDIA_STATE.PLAYING;
              this.emitStateChange(MEDIA_STATE.PLAYING);
            }
        } else {
            this.playbackState = MEDIA_STATE.PLAYING;
            this.emitStateChange(this.playbackState);
        }
      }
      
      pause() {
        this.playbackState = MEDIA_STATE.PAUSED;
        const vid = this.getActiveVideo();
        if (vid) vid.pause();
        this.emitStateChange(this.playbackState);
      }

      mute() {
        this.cConfig.videoMuted = true;
        this.slideElements.forEach(el => { if (el.tagName === 'VIDEO') el.muted = true; });
      }

      unMute() {
        this.cConfig.videoMuted = false;
        this.slideElements.forEach(el => { if (el.tagName === 'VIDEO') el.muted = false; });
      }

      setVolume(level) {
        this.slideElements.forEach(el => { if (el.tagName === 'VIDEO') el.volume = level / 100; });
      }

      extractCurrentColor() {
         if (this.isAmbient || this.state.isEcoMode || this.isDestroyed) return;
         
         const currentMedia = this.slideElements[this.currentIndex];
         if (!currentMedia) return;

         const performExtraction = () => {
           if (this.isDestroyed || this.slideElements[this.currentIndex] !== currentMedia) return;

           const targets = [];
           if (this.container.parentElement) targets.push(this.container.parentElement);
           const ambient = document.querySelector('.js-ambient-container');
           if (ambient) targets.push(ambient);
           
           DominantColorService.extract(currentMedia, targets, true);
         };

         if (currentMedia.tagName === 'IMG') {
           if (currentMedia.complete && currentMedia.naturalWidth > 0) {
             performExtraction();
           } else {
             currentMedia.addEventListener('load', performExtraction, { once: true });
           }
         } else if (currentMedia.tagName === 'VIDEO') {
           if (currentMedia.readyState >= 2) {
             performExtraction();
           } else {
             currentMedia.addEventListener('loadeddata', performExtraction, { once: true });
           }
         } else {
           performExtraction();
         }
      }

      handleSuccess() {
        if (this.isDestroyed) return;
        this.playbackState = MEDIA_STATE.PAUSED;
        this.updateVideoUI();
        this.extractCurrentColor();
        if (this.callbacks.onReady) this.callbacks.onReady({ target: this });
      }
      
      seekTo(time) { /* no-op */ }
      getCurrentTime() { return 0; }
      getDuration() { return 0; }
      getLoadedFraction() { return 1; }
      getState() { return this.playbackState; }
      
      destroy() {
        if (this.slideElements) {
          this.slideElements.forEach(el => {
            if (el.tagName === 'VIDEO') {
              el.pause();
              el.removeAttribute('src');
              el.load();
            }
          });
        }
        if (this.carouselWrapper) {
          this.carouselWrapper.remove();
          this.indicatorsWrapper.remove();
          if (this.btnPrev) this.btnPrev.remove();
          if (this.btnNext) this.btnNext.remove();
        }
        super.destroy();
      }
    }

    class MediaFactory {
      static create(config) {
        if (config.data.format === 'carousel') {
          return new CarouselMediaHandler(config);
        }
        
        switch (config.data.type) {
          case 'youtube': return new YouTubeMediaHandler(config);
          case 'image': return new ImageMediaHandler(config);
          case 'video': return new HTML5VideoMediaHandler(config);
          default: 
            console.warn('NextGenStory: Unknown media type or format', config.data);
            return null;
        }
      }
    }

    class UIManager {
      constructor(state, appEvents) {
        this.state = state; this.appEvents = appEvents;
        this.activeProgressFill = null; this.activeBufferFill = null; this.cachedAmbientMedia = null; this.animFrameId = null;
        this.lastSyncCheck = 0; this.flashTimeout = null; this.focusTrapHandler = null; this.previousFocusElement = null;
        this.lastReactionTime = 0; this._lastVolIconState = '';
        
        this.dom = {
          volumeSlider: DOMHelper.select(DOM_SELECTORS.VOLUME_SLIDER), btnMute: DOMHelper.select(DOM_SELECTORS.BTN_MUTE),
          progressWrapper: DOMHelper.select(DOM_SELECTORS.PROGRESS_WRAPPER), storyContainer: DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER),
          btnPlay: DOMHelper.select(DOM_SELECTORS.BTN_PLAY), thumbOverlay: DOMHelper.select(DOM_SELECTORS.THUMBNAIL_OVERLAY),
          ambientMedia: DOMHelper.select(DOM_SELECTORS.AMBIENT_MEDIA), ambientWrapper: DOMHelper.select(DOM_SELECTORS.AMBIENT_WRAPPER),
          mainMedia: DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA), centerPlayIcon: DOMHelper.select(DOM_SELECTORS.CENTER_PLAY_ICON),
          centerReaction: DOMHelper.select(DOM_SELECTORS.CENTER_REACTION), reactionWrapper: DOMHelper.select(DOM_SELECTORS.REACTION_WRAPPER),
          reactionContainer: DOMHelper.select(DOM_SELECTORS.REACTION_CONTAINER), btnReaction: DOMHelper.select(DOM_SELECTORS.BTN_REACTION)
        };
        
        this.setupEventSubscriptions();
        if (this.dom.volumeSlider) { this.dom.volumeSlider.addEventListener('input', (e) => this.updateVolumeFromSlider(e), { passive: true }); }
        const volWrapper = DOMHelper.select('.js-volume-wrapper');
        if (volWrapper) { volWrapper.addEventListener('mouseleave', () => { if (this.dom.volumeSlider && document.activeElement === this.dom.volumeSlider) { this.dom.volumeSlider.blur(); } }, { passive: true }); }
      }

      buildReactionMenu() {
        const container = DOMHelper.select('.js-reaction-options');
        if (!container || !this.state.config.reactions) return;
        
        container.textContent = ''; 
        
        this.state.config.reactions.forEach(react => {
          const btn = document.createElement('button'); 
          btn.type = 'button'; 
          btn.className = 'reaction-option-btn'; 
          btn.dataset.id = react.id; 
          btn.setAttribute('aria-label', `React with ${react.id}`);
          
          let innerContent = '';
          if (react.type === 'image') { 
            innerContent = `<img src="${react.value}" style="width: 65%; height: 65%; object-fit: contain; pointer-events: none;">`; 
          } else if (react.type === 'html') { 
            innerContent = `<div style="width: 65%; height: 65%; display: flex; align-items: center; justify-content: center; pointer-events: none;">${react.value}</div>`; 
          } else { 
            innerContent = react.value; 
          }
          
          DOMHelper.injectSafeHTML(btn, innerContent); 
          container.appendChild(btn);
        });

        if (globalThis.lucide && globalThis.lucide.createIcons) {
          globalThis.lucide.createIcons({ root: container });
        }
      }
      
      setupEventSubscriptions() {
        this.appEvents.on('UI:SYNC_VOLUME', () => this.syncVolumeUI());
        this.appEvents.on('UI:RENDER_CORE', (payload) => this.renderCoreUI(payload));
        this.appEvents.on('UI:RESET_STATE', () => this.resetVideoStateUI());
        this.appEvents.on('MEDIA:STATE_CHANGE', (state) => this.handleMediaStateChange(state));
        this.appEvents.on('UI:FLASH_ICON', (icon) => this.flashIcon(icon));
        this.appEvents.on('UI:SHOW_RIPPLE', (data) => this.showRipple(data.side, data.text));
        this.appEvents.on('UI:TOGGLE_MUTE', () => this.toggleMute());
        this.appEvents.on('UI:TOGGLE_CONTEXT', (isOpen) => this.toggleContext(isOpen));
        this.appEvents.on('UI:TRIGGER_REACTION', (payload) => this.triggerReaction(payload));
        this.appEvents.on('UI:TOGGLE_REACTION_MENU', () => this.toggleReactionMenu());
        
        this.appEvents.on('PLAYER:NEXT', () => this.hideErrorOverlay());
        this.appEvents.on('PLAYER:PREV', () => this.hideErrorOverlay());
        this.appEvents.on('UI:SCROLL_TO_VIDEO', () => this.hideErrorOverlay());
        
        this.appEvents.on('UI:SYNC_PLAY_STATE', (isPlaying) => this.syncPlayStateUI(isPlaying));
        this.appEvents.on('UI:PLAY_BUMP_EFFECT', (payload) => this.playBumpEffectUI(payload.direction));
        this.appEvents.on('UI:ANIMATE_TRANSITION', (payload) => this.animateTransitionUI(payload.direction, payload.phase));
        this.appEvents.on('UI:UPDATE_NAV_BUTTONS', (payload) => this.updateNavButtonsUI(payload.isFirst, payload.isLast));
        this.appEvents.on('UI:SCROLL_TO_VIDEO', (payload) => this.scrollToVideoUI(payload.newIndex));
        this.appEvents.on('UI:SHOW_ERROR', (payload) => this.showErrorUI(payload.mediaData, payload.customMsg, payload.lastNavDirection));
        this.appEvents.on('UI:MOUNT_MEDIA', (payload) => this.mountMediaUI(payload));
        this.appEvents.on('STATE_UPDATED:isEcoMode', ({ newValue }) => {
          const rootLayer = DOMHelper.select(DOM_SELECTORS.ROOT);
          if (rootLayer) rootLayer.classList.toggle('is-eco-mode', newValue);
          if (newValue) ToastService.show(this.state.config.locale.batterySaving);
        });

          s.singleTapTimer = setTimeout(() => {

              if (!isCarousel || (isCarousel && isVideo)) {
                this.appEvents.emit('PLAYER:TOGGLE_PLAY');
              }
            }
            else if (s.holdAction === 'rewind') this.appEvents.emit('PLAYER:PREV');
            else if (s.holdAction === 'forward') this.appEvents.emit('PLAYER:NEXT');
            
            s.tapCount = 0; s.cumulativeSeek = 0;
          }, 250);
        } else if (s.tapCount >= 2) {
          if (s.holdAction === 'playpause') {
            if (iR && s.tapCount === 2) {
              const reactionToUse = this.state.getCurrentReactionOrDefault(mD?.id);
              this.appEvents.emit('UI:TRIGGER_REACTION', { ...reactionToUse, isDoubleTap: true });
            }
          } else if (s.holdAction === 'rewind' || s.holdAction === 'forward') {
            
            // 3. BONUS: Berlakukan pengecualian yang sama agar Double-Tap Seek (Skip 10s) 
            // juga bisa berfungsi untuk Video di dalam Carousel!
            if (iV && iR && (!isCarousel || (isCarousel && isVideo))) {
              s.cumulativeSeek += 10;
              const iF = s.holdAction === 'forward', iN = iF ? 'fast-forward' : 'rewind';
              const cH = `<div style="display: flex; align-items: center; gap: 4px;"><i data-lucide="${iN}" style="width: 1.2em; height: 1.2em;"></i> <span style="font-size: 1rem;">${s.cumulativeSeek}s</span></div>`;
              this.appEvents.emit('UI:SHOW_RIPPLE', { side: iF ? 'right' : 'left', text: cH });
              clearTimeout(s.tapResetTimer);
              s.tapResetTimer = setTimeout(() => {
                this.appEvents.emit('PLAYER:SEEK', iF ? s.cumulativeSeek : -s.cumulativeSeek);
                s.tapCount = 0; s.cumulativeSeek = 0;
                if (!this.state.prefersReducedMotion && !this.state.isEcoMode) HapticsEngine.medium();
              }, 400);
              return;
            } else if (s.tapCount === 2) {
              if (s.holdAction === 'rewind') this.appEvents.emit('PLAYER:PREV');
              else if (s.holdAction === 'forward') this.appEvents.emit('PLAYER:NEXT');
            }
          }
          
          if (s.holdAction === 'playpause' || (!iV && !isCarousel)) s.tapCount = 0;
        }
        s.tapResetTimer = setTimeout(() => { s.tapCount = 0; s.cumulativeSeek = 0; }, 400);
      }
      
      initPinchZoom() {
        let iD = 0, c = { x: 0, y: 0 }, pP = null, mE = null;
        const gD = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
        const gC = (t) => ({ x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 });
        
        EventRegistry.add(document, 'touchstart', (e) => {
          const l = e.target.closest(DOM_SELECTORS.GESTURE_LAYER);
          if (l && e.touches.length === 2) {
            this.gestureState.isPinching = true;
            this.gestureState.pinchJustEnded = false;
            iD = gD(e.touches);
            c = gC(e.touches);
            pP = this.state.currentMedia?.getState();
            if (pP === MEDIA_STATE.PLAYING) this.appEvents.emit('PLAYER:FORCE_PAUSE');
            
            DOMHelper.root.classList.add('is-gesture-active');
            DOMHelper.root.setAttribute('data-action', 'pinch');
            const mC = DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA);
            mE = mC?.firstElementChild;
            if (mE) {
              mE.style.transition = 'none';
              if (mC) mC.style.zIndex = '100';
            }
          }
        }, { passive: false }, 'app');
        
        EventRegistry.add(document, 'touchmove', (e) => {
          if (this.gestureState.isPinching && e.touches.length === 2) {
            if (e.cancelable) e.preventDefault();
            const cD = gD(e.touches), cC = gC(e.touches), sc = Math.max(1, cD / iD);
            let tX = cC.x - c.x, tY = cC.y - c.y;
            const mPX = (window.innerWidth * sc - window.innerWidth) / 2, mPY = (window.innerHeight * sc - window.innerHeight) / 2;
            tX = Math.max(-mPX, Math.min(mPX, tX));
            tY = Math.max(-mPY, Math.min(mPY, tY));
            if (mE && !this.state.prefersReducedMotion) {
              mE.style.transform = `translate3d(${tX}px, ${tY}px, 0) scale(${sc})`;
            }
          }
        }, { passive: false }, 'app');
        
        const eP = (e) => {
          if (this.gestureState.isPinching && e.touches.length < 2) {
            this.gestureState.isPinching = false;
            this.gestureState.pinchJustEnded = true;
            setTimeout(() => { this.gestureState.pinchJustEnded = false; }, 400);
            
            if (pP === MEDIA_STATE.PLAYING) this.appEvents.emit('PLAYER:FORCE_PLAY');
            DOMHelper.root.classList.remove('is-gesture-active');
            DOMHelper.root.removeAttribute('data-action');
            
            const mC = DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA);
            if (mE) {
              mE.style.transition = this.state.prefersReducedMotion ? 'none' : 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
              mE.style.transform = 'translate3d(0, 0, 0) scale(1)';
              setTimeout(() => {
                if (!this.gestureState.isPinching && mC) mC.style.zIndex = '';
                mE = null;
              }, 400);
            }
          }
        };
        EventRegistry.add(document, 'touchend', eP, { passive: true }, 'app');
        EventRegistry.add(document, 'touchcancel', eP, { passive: true }, 'app');
      }
      
      initSheetPhysics() {
        this.sheetY = window.innerHeight;
        this.sheetVelocity = 0;
        this.springAnimId = null;
        const s = 0.25, d = 0.72;
        
        this.appEvents.on('SHEET:SET_INITIAL', () => {
          this.sheetY = window.innerHeight;
          const sh = DOMHelper.select('.story-sheet__content');
          if (sh) {
            sh.style.transition = 'none';
            sh.style.transform = `translate3d(0, ${this.sheetY}px, 0)`;
          }
        });
        
        this.appEvents.on('SHEET:ANIMATE_TO', ({ state: st, velocity: v = 0, onComplete: oC }) => {
          const vh = window.innerHeight;
          let t = vh;
          if (st === 'full') t = 0;
          if (st === 'half') t = vh * 0.35;
          if (st === 'hidden') t = vh;
          
          this.sheetY = t;
          const sh = DOMHelper.select('.story-sheet__content');
          
          if (sh) {
            // Aktifkan kembali transition dari CSS yang menggunakan var(--ease-spring)
            sh.style.transition = 'transform 0.5s var(--ease-spring), border-radius 0.3s var(--ease-spatial-out)';
            sh.style.transform = `translate3d(0, ${this.sheetY}px, 0)`;
            sh.style.setProperty('--sheet-y', `${Math.max(0, this.sheetY)}px`);
            
            if (t === 0) sh.classList.add('is-full-sheet');
            else sh.classList.remove('is-full-sheet');
            
            // Tangkap akhir animasi secara native
            sh.addEventListener('transitionend', function handler(e) {
               if (e.propertyName !== 'transform') return;
               sh.removeEventListener('transitionend', handler);
               if (oC) oC();
            });
          }
          
          if (!this.state.prefersReducedMotion && t !== vh && !this.state.isEcoMode) HapticsEngine.tick();
        });
      }
      
      initDragSheet() {
        const sheetContent = DOMHelper.select(DOM_SELECTORS.SHEET_CONTENT);
        const dialog = DOMHelper.select('#story-sheet-dialog');
        if (!sheetContent) return;

        let isDragging = false;
        let startY = 0;
        let initialY = 0;
        let history = []; // Untuk merekam kecepatan (velocity) presisi tinggi

        // Ambil posisi Y asli dari matriks GPU untuk mencegah animasi melompat (interruptible)
        const getCurrentY = () => {
          try {
            const style = window.getComputedStyle(sheetContent);
            if (style.transform !== 'none') {
              const matrix = new DOMMatrix(style.transform);
              return matrix.m42;
            }
          } catch(err) {}
          return window.innerHeight; // fallback
        };

        const handlePointerDown = (e) => {
          if (window.innerWidth >= 768 || this.gestureState.isPinching) return;
          
          // Abaikan jika menekan tombol/link di dalam sheet
          if (e.target.closest('button, a, input, [role="button"]')) {
             if (!e.target.closest('.story-sheet__handle-wrapper')) return;
          }

          // Cek area scroll (resolusi konflik scroll vs drag)
          const isScrollArea = e.target.closest('.story-body');
          if (isScrollArea && isScrollArea.scrollTop > 0) return; // Biarkan native scroll bekerja

          isDragging = true;
          startY = e.clientY;
          initialY = getCurrentY();
          this.sheetY = initialY;
          history = [{ y: startY, t: performance.now() }];
          
          sheetContent.style.transition = 'none';
          sheetContent.classList.add('is-dragging');
          if (dialog) dialog.classList.add('is-dragging-backdrop');
        };

        const handlePointerMove = (e) => {
          if (!isDragging) return;
          
          const currentY = e.clientY;
          const deltaY = currentY - startY;
          const now = performance.now();
          
          // Handoff Scroll Mutlak: Jika drag ke atas di area teks, lepas kendali JS
          const isScrollArea = e.target.closest('.story-body');
          if (isScrollArea && deltaY < 0 && initialY <= 0) {
            isDragging = false;
            return;
          }
          
          // Simpan riwayat gerakan (maks 5 frame terakhir dalam 100ms)
          history.push({ y: currentY, t: now });
          if (history.length > 5) history.shift();
          
          let newY = initialY + deltaY;
          
          // Tahanan Karet (Rubber-banding) murni saat melewati batas atas
          if (newY < 0) {
            const resistance = 0.35; 
            newY = newY * resistance;
          }

          this.sheetY = newY;

          requestAnimationFrame(() => {
            if (!isDragging) return;
            sheetContent.style.transform = `translate3d(0, ${newY}px, 0)`;
            
            if (dialog) {
              const vh = window.innerHeight;
              const progress = Math.max(0, Math.min(1, 1 - (newY / (vh * 0.8))));
              dialog.style.setProperty('--bg-opacity', progress.toFixed(3));
            }
          });
        };

        const handlePointerUp = () => {
          if (!isDragging) return;
          isDragging = false;
          
          sheetContent.classList.remove('is-dragging');
          if (dialog) dialog.classList.remove('is-dragging-backdrop');
          
          // Gunakan kurva pegas (spring) yang persis seperti iOS native
          sheetContent.style.transition = 'transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), border-radius 0.3s ease';
          
          // 1. KALKULASI VELOCITY AKURAT (Bebas Lag/Zero-drop)
          const now = performance.now();
          const validHistory = history.filter(h => now - h.t < 100);
          let velocity = 0; // pixel per milidetik
          
          if (validHistory.length >= 2) {
            const oldest = validHistory[0];
            const newest = validHistory[validHistory.length - 1];
            const timeDelta = newest.t - oldest.t;
            if (timeDelta > 0) velocity = (newest.y - oldest.y) / timeDelta;
          }
          
          // 2. KINETIC PROJECTION (Hukum Newton untuk UI)
          const vh = window.innerHeight;
          const currentY = this.sheetY || getCurrentY();
          // Proyeksikan posisi jatuh: Posisi saat ini + (Kecepatan * Momentum)
          const projectedY = currentY + (velocity * 250); 
          
          const snapPoints = { full: 0, half: vh * 0.35, hidden: vh };
          let targetState = 'half';
          
          // 3. NEAREST NEIGHBOR SNAPPING (Otomatis ke titik terdekat)
          if (projectedY < snapPoints.half / 2) {
            targetState = 'full';
          } else if (projectedY > snapPoints.half + ((vh - snapPoints.half) / 2)) {
            targetState = 'hidden';
          } else {
            targetState = 'half';
          }
          
          // OVERRIDE: Lemparan Kuat (Flick)
          if (velocity > 1.2) targetState = 'hidden'; // Banting ke bawah -> Tutup
          if (velocity < -1.2) targetState = 'full';  // Banting ke atas -> Penuh

          if (targetState === 'hidden') {
            this.appEvents.emit('UI:TOGGLE_CONTEXT', false);
          } else {
            this.appEvents.emit('SHEET:ANIMATE_TO', { state: targetState });
          }
        };

        // Bind events menggunakan standar Pointer API (Universal)
        sheetContent.addEventListener('pointerdown', handlePointerDown, { passive: true });
        window.addEventListener('pointermove', handlePointerMove, { passive: true });
        window.addEventListener('pointerup', handlePointerUp, { passive: true });
        window.addEventListener('pointercancel', handlePointerUp, { passive: true });
      }
      
      initPopupSwipe() {

      initRubberBand() {
        let sY = 0, iP = false, lD = 0, sT = 0, rR = null;
        const th = 80;
        const topInd = DOMHelper.select('.js-pull-top'), botInd = DOMHelper.select('.js-pull-bottom'), topTxt = topInd?.querySelector('.pull-indicator__text'), botTxt = botInd?.querySelector('.pull-indicator__text');
        const applyRB = (d, dm) => (1.0 - (1.0 / ((d * 0.55 / dm) + 1.0))) * dm;
        
        EventRegistry.add(document, 'pointerdown', (e) => {
          if (!e.isPrimary) return;
          const f = e.target.closest(DOM_SELECTORS.FEED);
          if (!f || this.gestureState.isPinching || e.target.closest('.story-progress-bar-wrapper, .story-top-actions, .story-player-actions')) return;
          
          const iAT = f.scrollTop <= 0, iAB = Math.ceil(f.scrollTop + f.clientHeight) >= f.scrollHeight - 5;
          if (iAT || iAB) { sY = e.clientY; sT = performance.now(); iP = true; f.style.transition = 'none'; lD = 0; }
        }, { passive: true }, 'app');
        
        EventRegistry.add(document, 'pointermove', (e) => {
          const f = DOMHelper.select(DOM_SELECTORS.FEED); 
          if (!iP || !f || !e.isPrimary) return;
          
          const dY = e.clientY - sY, dm = window.innerHeight; 
          const iAT = f.scrollTop <= 0, iAB = Math.ceil(f.scrollTop + f.clientHeight) >= f.scrollHeight - 5;
          let tY = 0;
          
          if (iAT && dY > 0) { 
            if (e.cancelable) e.preventDefault(); lD = dY; tY = applyRB(dY, dm); 
            if (topInd) {
              const r = Math.min(lD / th, 1.2);
              topInd.classList.add('is-visible');
              topInd.style.transform = `translateX(-50%) translateY(${tY * 0.2}px) scale(${0.8 + (r * 0.2)})`;
              if (lD >= th) { topInd.classList.add('is-ready'); if (topTxt) topTxt.innerText = this.state.config.locale.pullToClose; if (!this.state.prefersReducedMotion && !topInd.dataset.hapticFired) { HapticsEngine.light(); topInd.dataset.hapticFired = 'true'; } } else { topInd.classList.remove('is-ready'); if (topTxt) topTxt.innerText = this.state.config.locale.pullDown; topInd.dataset.hapticFired = ''; }
            }
          } else if (iAB && dY < 0) { 
            if (e.cancelable) e.preventDefault(); lD = dY; tY = applyRB(Math.abs(dY), dm) * -1; 
            if (botInd) {
              const r = Math.min(Math.abs(lD) / th, 1.2);
              botInd.classList.add('is-visible');
              botInd.style.transform = `translateX(-50%) translateY(${tY * 0.2}px) scale(${0.8 + (r * 0.2)})`;
              if (Math.abs(lD) >= th) { botInd.classList.add('is-ready'); if (botTxt) botTxt.innerText = this.state.config.locale.pullToClose; if (!this.state.prefersReducedMotion && !botInd.dataset.hapticFired) { HapticsEngine.light(); botInd.dataset.hapticFired = 'true'; } } else { botInd.classList.remove('is-ready'); if (botTxt) botTxt.innerText = this.state.config.locale.pullUp; botInd.dataset.hapticFired = ''; }
            }
          } else { lD = 0; return; }
          
          if (rR) cancelAnimationFrame(rR); 
          rR = requestAnimationFrame(() => { f.style.transform = `translate3d(0, ${tY}px, 0)`; });
        }, { passive: false }, 'app');
        
        const endPull = (e) => {
          if (!e.isPrimary) return;
          const f = DOMHelper.select(DOM_SELECTORS.FEED);
          if (iP && f) {
            iP = false; 
            const tE = performance.now() - sT, v = Math.abs(lD) / tE;
            [topInd, botInd].forEach(ind => { if (ind) { ind.classList.remove('is-visible', 'is-ready'); ind.style.transform = 'translateX(-50%) scale(0.8)'; ind.dataset.hapticFired = ''; } });
            if (Math.abs(lD) >= th || (v > 0.4 && Math.abs(lD) > 30)) { this.appEvents.emit('APP:CLOSE'); return; }
            f.style.transition = this.state.prefersReducedMotion ? 'none' : 'transform 0.4s var(--ease-spring)'; 
            f.style.transform = ''; lD = 0;
          }
        };
        
        EventRegistry.add(document, 'pointerup', endPull, { passive: true }, 'app'); 
        EventRegistry.add(document, 'pointercancel', endPull, { passive: true }, 'app');
      }
    }

      prev() { this.appEvents.emit('PLAYER:PREV'); return this; }

      unmute() {

      setVolume(level) {
        if (this.state) {

          this.state.isGlobalMuted = (val === 0);

      fetchMoreIfNeeded() {
        if (this.state.currentVideoIndex >= this.state.playlist.length - 2 && !this.state.adapter.isLoading && this.state.adapter.hasMore) {
          this.state.adapter.getStories().then(newItems => {
            if (newItems.length === 0) return;

            this.state.playlist.push(...newItems);
            const feed = DOMHelper.select(DOM_SELECTORS.FEED);
            if (feed) {

      }
      
      initCoreEventListeners() {
        EventRegistry.add(document, 'pointerdown', (e) => { const target = e.target; if (target.closest('.fab-wrapper, .reaction-option-btn, .volume-wrapper, .story-excerpt, .story-badge-item')) { UISoundFX.play('pop', e.clientX / window.innerWidth); } }, { passive: true }, 'app');
        ['click', 'touchstart', 'keydown', 'pointerdown'].forEach(evt => EventRegistry.add(window, evt, () => { this.state.userInteracted = true; UISoundFX.init(); }, { once: true, passive: true }, 'app'));

        if (globalThis.lucide && document.querySelector('.js-layout-wrapper')) { globalThis.lucide.createIcons({ root: document.querySelector('.js-layout-wrapper') }); }
      }
      
      resolveInitialURL() {
        if (this.state.config.startIndex !== undefined) { this.state.currentVideoIndex = this.state.config.startIndex; this.state.currentSubIndex = 0; return; }
        if (window.history.state && window.history.state.index !== undefined) { this.state.currentVideoIndex = window.history.state.index; this.state.currentSubIndex = window.history.state.subIndex || 0; return; }
        
        const urlV = new URLSearchParams(window.location.search).get('v');
        if (urlV) {
          let foundIndex = -1, foundSubIndex = 0;
          for (let i = 0; i < this.state.playlist.length; i++) {
            const group = this.state.playlist[i];
            if (group.items) {
              for (let j = 0; j < group.items.length; j++) {
                const it = group.items[j], title = it.title || group.title || 'story';
                const itemSlug = it.type === 'youtube' ? MediaUtils.parseYouTubeData(it.url).videoId : MediaUtils.slugify(title) + `-${j + 1}`;
                if (itemSlug === urlV) { foundIndex = i; foundSubIndex = j; break; }
              }
            } else {
              const itemSlug = group.type === 'youtube' ? MediaUtils.parseYouTubeData(group.url).videoId : MediaUtils.slugify(group.title || 'story');
              if (itemSlug === urlV) { foundIndex = i; break; }
            }
            if (foundIndex > -1) break;
          }
          if (foundIndex > -1) { this.state.currentVideoIndex = foundIndex; this.state.currentSubIndex = foundSubIndex; return; }
        }
      }
      
      initScrollSnap() {
        const feed = DOMHelper.select(DOM_SELECTORS.FEED), playerContainer = DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER);
        if (!feed || !playerContainer) return;
        playerContainer.style.display = ''; feed.textContent = '';
        
        this.state.playlist.forEach((item, index) => { const slot = document.createElement('div'); slot.className = 'story-slot'; slot.dataset.index = index; feed.appendChild(slot); });
        
        const slots = feed.querySelectorAll('.story-slot');
        if (slots[this.state.currentVideoIndex]) {
          this.isProgrammaticScroll = true; slots[this.state.currentVideoIndex].appendChild(playerContainer); feed.scrollTop = slots[this.state.currentVideoIndex].offsetTop;
          setTimeout(() => { this.isProgrammaticScroll = false; }, 800);
        }
        
        this.uiManager.updateVirtualization(this.state.currentVideoIndex);
        
        let targetIndex = this.state.currentVideoIndex;
        const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting && entry.intersectionRatio >= 0.55) { if (!this.isProgrammaticScroll) { targetIndex = parseInt(entry.target.dataset.index, 10); } } }); }, { root: feed, threshold: [0.55] });
        slots.forEach(sl => observer.observe(sl)); this.observers.push(observer); this.feedObserver = observer;
        
        let isTouching = false, scrollTimeout;
        feed.addEventListener('touchstart', () => { isTouching = true; }, { passive: true });
        
        feed.addEventListener('scroll', () => {
          if (isTouching && !this.isProgrammaticScroll) { feed.classList.add('is-dragging'); if (this.state.currentMedia && !this.state.isGlobalMuted) { this.state.currentMedia.setVolume(this.state.volume * 0.3); } }
          clearTimeout(scrollTimeout);
          scrollTimeout = setTimeout(() => { if (feed.classList.contains('is-dragging')) { feed.classList.remove('is-dragging'); processScrollEnd(); } }, 150);
        }, { passive: true });
        
        feed.addEventListener('touchend', () => { isTouching = false; }, { passive: true });
        
        const processScrollEnd = () => {
          feed.classList.remove('is-dragging'); const wasProgrammatic = this.isProgrammaticScroll; this.isProgrammaticScroll = false;
          if (wasProgrammatic || this.state.currentVideoIndex === targetIndex) { if (this.state.currentMedia && !this.state.isGlobalMuted) { this.state.currentMedia.setVolume(this.state.volume); } return; }
          
          if (!this.state.prefersReducedMotion && !this.state.isEcoMode) { HapticsEngine.medium(); UISoundFX.play('tick', 0.5); }
          this.state.lastNavDirection = targetIndex > this.state.currentVideoIndex ? 1 : -1;
          this.state.currentVideoIndex = targetIndex; this.state.currentSubIndex = 0;
          this.fetchMoreIfNeeded(); if (this.gestureManager.gestureState.stopScrubCallback) this.gestureManager.gestureState.stopScrubCallback();
          this.appEvents.emit('UI:RESET_STATE');
          
          requestAnimationFrame(() => {

            if (newSlot) newSlot.appendChild(playerContainer);
            this.uiManager.updateVirtualization(this.state.currentVideoIndex);
            this.playerManager.updateVideoCore();
            DOMHelper.select(DOM_SELECTORS.ROOT)?.focus({ preventScroll: true });
          });

        feed.addEventListener('scrollend', processScrollEnd, { passive: true });
      }
      
      initOffScreenThrottling() {

      attachGlobalKeyBindings() {
        let kbSeekVal = 0, kbSeekTimer = null, kbDirection = null;
        EventRegistry.add(document, 'keydown', (e) => {

          const isContextOpen = this.uiManager.getActiveContext()?.classList.contains('is-active') || this.uiManager.getActiveContext()?.open;
          
          if (e.key === 'Escape') {
            if (isContextOpen) this.appEvents.emit('UI:TOGGLE_CONTEXT', false);

            else this.appEvents.emit('APP:CLOSE');

          if (isContextOpen || this.state.fsm.getState() === 'TRANSITIONING') return;
          
          const isReady = DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER)?.classList.contains('has-started');
          const keyActions = {
            Space: () => { e.preventDefault(); this.appEvents.emit('PLAYER:TOGGLE_PLAY'); },
            ArrowDown: () => { e.preventDefault(); this.appEvents.emit('PLAYER:SWITCH_VIDEO', 1); },
            ArrowUp: () => { e.preventDefault(); this.appEvents.emit('PLAYER:SWITCH_VIDEO', -1); },
            ArrowRight: () => {
              const media = this.state.currentMedia;
              if (media && typeof media.navigateCarousel === 'function') {
                if (media.navigateCarousel(1)) return; 
              }
              this.appEvents.emit('PLAYER:NEXT');
            },
            ArrowLeft: () => {
              const media = this.state.currentMedia;
              if (media && typeof media.navigateCarousel === 'function') {
                if (media.navigateCarousel(-1)) return;

              this.appEvents.emit('PLAYER:PREV');
            },
            KeyK: () => this.appEvents.emit('PLAYER:TOGGLE_PLAY'),

                const html = `<div style="display: flex; align-items: center; gap: 4px;"><i data-lucide="rewind" aria-hidden="true" style="width: 1.2em; height: 1.2em;"></i> <span>${kbSeekVal}s</span></div>`;

                this.appEvents.emit('UI:SHOW_RIPPLE', { side: 'right', text: html });

              if (!(document.fullscreenElement || rL.classList.contains('is-fullscreen'))) {
                if (rL.requestFullscreen && !/iPhone|iPad|iPod/i.test(navigator.userAgent)) { rL.requestFullscreen().catch(() => { rL.classList.add('is-fullscreen'); this.resetIdleTimer(); }); } 
                else { rL.classList.add('is-fullscreen'); this.resetIdleTimer(); }

                bI.forEach(i => IconHelper.update(i, '<i data-lucide="maximize-2" aria-hidden="true"></i>'));

            Equal: () => { const nV = Math.min(100, this.state.volume + 10); if (this.uiManager.dom.volumeSlider) { this.uiManager.dom.volumeSlider.value = nV; this.uiManager.dom.volumeSlider.dispatchEvent(new Event('input')); } }
          };
          
          if (keyActions[e.code]) keyActions[e.code]();
          else if (/^[0-9]$/.test(e.key) && isReady) {

            if (d > 0) {
              const tT = d * p; this.state.currentMedia.seekTo(tT); if (this.state.currentAmbient) this.state.currentAmbient.seekTo(tT);
              const side = p >= 0.5 ? 'right' : 'left', iN = p >= 0.5 ? 'fast-forward' : 'rewind';

      attachGlobalClickBindings() {

          if (this.state.ignoreNextTap) { e.preventDefault(); e.stopPropagation(); return; }
          const t = e.target;
          
          // PATCH: Cegat klik khusus pada tombol CTA Iklan
          const ctaBtn = t.closest('.js-cta-link');
          if (ctaBtn) {
            e.preventDefault();
            e.stopPropagation(); // Stop event bubbling ke Context Panel
            
            const url = ctaBtn.getAttribute('data-url');
            if (url) {
              window.open(url, '_blank', 'noopener,noreferrer');
              this.appEvents.emit('PLAYER:FORCE_PAUSE'); // Opsional: pause video saat pindah tab
            }
            return;
          }
          
          if (t.closest(DOM_SELECTORS.VOLUME_SLIDER)) return;
          if (t.nodeName === 'DIALOG' || t.closest('.story-close-btn, .overlay-backdrop')) { return this.appEvents.emit('UI:TOGGLE_CONTEXT', false); }
          if (t.closest('.reaction-option-btn')) {
            const btn = t.closest('.reaction-option-btn'), dataId = btn.getAttribute('data-id') || btn.dataset.id, reactObj = this.state.config.reactions.find(r => r.id === dataId);
            if (reactObj) { return this.appEvents.emit('UI:TRIGGER_REACTION', { value: reactObj.value, type: reactObj.type, id: reactObj.id, isDoubleTap: false }); }
          }
          
          const dC = t.closest('.story-dummy-card');
          if (dC && !dC.closest('.story-slot').classList.contains('is-active')) { dC.parentElement.scrollIntoView({ behavior: (this.state.prefersReducedMotion || this.state.isEcoMode) ? 'auto' : 'smooth', block: 'center' }); return; }
          
          const actionMap = {
            [DOM_SELECTORS.BTN_PLAY]: () => this.appEvents.emit('PLAYER:TOGGLE_PLAY'),
            [DOM_SELECTORS.BTN_MUTE]: () => this.appEvents.emit('UI:TOGGLE_MUTE'),
            [DOM_SELECTORS.BTN_PREV]: () => { if (!t.closest('.is-disabled')) this.appEvents.emit('PLAYER:SWITCH_VIDEO', -1); },
            [DOM_SELECTORS.BTN_NEXT]: () => { if (!t.closest('.is-disabled')) this.appEvents.emit('PLAYER:SWITCH_VIDEO', 1); },
            [DOM_SELECTORS.BTN_CLOSE]: () => this.appEvents.emit('APP:CLOSE'),
            [DOM_SELECTORS.BTN_OPEN_CONTEXT]: () => this.appEvents.emit('UI:TOGGLE_CONTEXT', true),
            [DOM_SELECTORS.BTN_CLEAN]: () => {
              this.uiManager.closeReactionMenu(); const rL = document.querySelector(DOM_SELECTORS.ROOT), bI = document.querySelectorAll('.js-btn-clean .fab-inner'); if (!rL) return;
              if (!(document.fullscreenElement || rL.classList.contains('is-fullscreen'))) {
                if (rL.requestFullscreen && !/iPhone|iPad|iPod/i.test(navigator.userAgent)) { rL.requestFullscreen().catch(() => { rL.classList.add('is-fullscreen'); this.resetIdleTimer(); }); } else { rL.classList.add('is-fullscreen'); this.resetIdleTimer(); }
                bI.forEach(i => IconHelper.update(i, '<i data-lucide="minimize-2" aria-hidden="true"></i>'));
              } else {
                if (document.exitFullscreen && document.fullscreenElement) document.exitFullscreen().catch(() => {}); else { rL.classList.remove('is-fullscreen', 'is-idle'); clearTimeout(this.interactionIdleTimer); }
                bI.forEach(i => IconHelper.update(i, '<i data-lucide="maximize-2" aria-hidden="true"></i>'));
              }
            },
            [DOM_SELECTORS.BTN_SHARE]: async () => {
            if (this.state.getActiveMediaData()?.hideActions) return;
              const cU = window.location.href, gD = this.state.playlist[this.state.currentVideoIndex], aD = gD.items ? gD.items[this.state.currentSubIndex] : gD, sD = { title: document.title, text: aD.excerpt || gD.excerpt || 'Checkout this immersive story!', url: cU };
              try { if (navigator.canShare && navigator.canShare(sD)) await navigator.share(sD); else { await navigator.clipboard.writeText(cU); ToastService.show(this.state.config.locale.copiedToClipboard); } } catch (err) { if (err.name !== 'AbortError') ToastService.show(this.state.config.locale.failedToShare); }
            }
          };
          
          for (let selector in actionMap) { if (t.closest(selector)) return actionMap[selector](e); }
          if (this.uiManager.dom.reactionWrapper && !this.uiManager.dom.reactionWrapper.contains(t) && !t.closest(DOM_SELECTORS.BTN_REACTION)) { this.uiManager.closeReactionMenu(); }
        }, {}, 'app');
      }
      
      resetIdleTimer() {
        const rootLayer = document.querySelector(DOM_SELECTORS.ROOT); if (!rootLayer) return false;
        const wasIdle = rootLayer.classList.contains('is-idle'); rootLayer.classList.remove('is-idle'); clearTimeout(this.interactionIdleTimer);
        if (this.state.currentMedia?.getState() === MEDIA_STATE.PLAYING && !this.uiManager.getActiveContext()?.classList.contains('is-active')) {
          if (document.fullscreenElement || rootLayer.classList.contains('is-fullscreen')) { this.interactionIdleTimer = setTimeout(() => { if (rootLayer) rootLayer.classList.add('is-idle'); }, 2500); }
        }
        return wasIdle;
      }
      
      attachWindowBindings() {
        const landscapeBlockerQuery = window.matchMedia('(orientation: landscape) and (max-height: 600px) and (pointer: coarse)');
        
        landscapeBlockerQuery.addEventListener('change', (e) => {
          const rootLayer = document.querySelector('.js-layout-wrapper');
          const isLandscapeAllowed = rootLayer?.getAttribute('data-allow-landscape') === 'true';
          
          if (e.matches && !isLandscapeAllowed) {
            if (this.state.currentMedia?.getState() === MEDIA_STATE.PLAYING) {
              this.state.wasPlayingBeforeLandscape = true;
              this.appEvents.emit('PLAYER:FORCE_PAUSE');
            }
          } else {
            if (this.state.wasPlayingBeforeLandscape && !rootLayer?.classList.contains('is-idle')) {
              this.appEvents.emit('PLAYER:FORCE_PLAY');
              this.state.wasPlayingBeforeLandscape = false;
            }
          }
        });

        EventRegistry.add(document, 'fullscreenchange', () => {
          this.isProgrammaticScroll = true; clearTimeout(this.fsLockTimer); this.fsLockTimer = setTimeout(() => this.isProgrammaticScroll = false, 800);
          const rootLayer = document.querySelector(DOM_SELECTORS.ROOT), bI = document.querySelectorAll('.js-btn-clean .fab-inner');
          if (!document.fullscreenElement) {
            if (rootLayer) rootLayer.classList.remove('is-fullscreen', 'is-idle'); bI.forEach(i => IconHelper.update(i, '<i data-lucide="maximize-2" aria-hidden="true"></i>'));
          } else {
            if (rootLayer) rootLayer.classList.add('is-fullscreen'); bI.forEach(i => IconHelper.update(i, '<i data-lucide="minimize-2" aria-hidden="true"></i>')); this.resetIdleTimer();
          }
        }, {}, 'app');
        EventRegistry.add(window, 'offline', () => ToastService.show(this.state.config.locale.internetDisconnected), {}, 'app');
        EventRegistry.add(window, 'online', () => { ToastService.show(this.state.config.locale.internetRestored); if (DOMHelper.select(DOM_SELECTORS.ERROR_OVERLAY)?.classList.contains('is-visible')) { this.playerManager.updateVideoCore(); } }, {}, 'app');
        EventRegistry.add(window, 'popstate', (e) => {
          if (e.state && typeof e.state.index === 'number') {
            if (this.state.fsm.getState() === 'TRANSITIONING') return;
            this.state.currentVideoIndex = e.state.index; this.state.currentSubIndex = e.state.subIndex || 0;
            if (this.gestureManager.gestureState.stopScrubCallback) this.gestureManager.gestureState.stopScrubCallback();
            this.appEvents.emit('UI:RESET_STATE'); this.playerManager.updateVideoCore();
          } else {
            const v = new URLSearchParams(window.location.search).get('v');
            if (v) {
              let fI = v.startsWith('item_') ? parseInt(v.replace('item_',''), 10) : this.state.playlist.findIndex(i => i.type === 'youtube' && MediaUtils.parseYouTubeData(i.url).videoId === v);
              if (fI > -1 && fI !== this.state.currentVideoIndex && fI < this.state.playlist.length) {
                if (this.state.fsm.getState() === 'TRANSITIONING') return;
                this.state.currentVideoIndex = fI; this.state.currentSubIndex = 0;
                if (this.gestureManager.gestureState.stopScrubCallback) this.gestureManager.gestureState.stopScrubCallback();
                this.appEvents.emit('UI:RESET_STATE'); this.playerManager.updateVideoCore();
              }
            }
          }
        }, {}, 'app');
        
        const feed = DOMHelper.select(DOM_SELECTORS.FEED);
        if (feed && window.ResizeObserver) {
          let resizeDebounce, lastHeight = window.innerHeight;
          const resizeObserver = new ResizeObserver(() => {
            clearTimeout(resizeDebounce);
            resizeDebounce = setTimeout(() => {
              const currentHeight = window.innerHeight, heightDiff = Math.abs(currentHeight - lastHeight) / lastHeight; lastHeight = currentHeight;
              if (heightDiff < 0.15) return;
              const slots = feed.querySelectorAll('.story-slot');
              if (slots[this.state.currentVideoIndex] && this.state.fsm.getState() !== 'TRANSITIONING') { this.isProgrammaticScroll = true; slots[this.state.currentVideoIndex].scrollIntoView({ block: 'center' }); setTimeout(() => this.isProgrammaticScroll = false, 300); }
              if (window.innerWidth < 768 && this.state.currentAmbient) { this.state.currentAmbient.destroy(); this.state.currentAmbient = null; } 
              else if (window.innerWidth >= 768 && !this.state.currentAmbient && this.state.currentMedia && !this.state.isEcoMode) {
                const aC = DOMHelper.select(DOM_SELECTORS.AMBIENT_MEDIA), data = this.state.getActiveMediaData();
                this.state.currentAmbient = MediaFactory.create({ container: aC, data: data, callbacks: { onReady: () => { this.state.currentAmbient.seekTo(this.state.currentMedia.getCurrentTime()); if (this.state.currentMedia.getState() === MEDIA_STATE.PLAYING) this.state.currentAmbient.play(); } }, isAmbient: true, appEvents: this.appEvents, state: this.state });
                this.state.currentAmbient.load();
              }
            }, 150);
          });
          resizeObserver.observe(feed); this.observers.push(resizeObserver);
        }
        
        EventRegistry.add(document, 'visibilitychange', () => {
          if (document.hidden) {
            this.state.wasPlayingBeforeHidden = (this.state.currentMedia?.getState() === MEDIA_STATE.PLAYING);
            if (this.state.wasPlayingBeforeHidden) { this.appEvents.emit('PLAYER:FORCE_PAUSE'); this.appEvents.emit('UI:FLASH_ICON', ''); }
            if (UISoundFX.ctx && UISoundFX.ctx.state === 'running') UISoundFX.ctx.suspend(); WakeLockManager.release();
          } else {
            if (this.state.wasPlayingBeforeHidden && !this.uiManager.getActiveContext()?.classList.contains('is-active') && !document.hidden) { this.appEvents.emit('PLAYER:FORCE_PLAY'); this.state.wasPlayingBeforeHidden = false; }
            if (UISoundFX.ctx && UISoundFX.ctx.state === 'suspended') UISoundFX.ctx.resume();
          }
        }, { passive: true }, 'app');
        EventRegistry.add(document, 'pointermove', () => this.resetIdleTimer(), { passive: true }, 'app');
        EventRegistry.add(document, 'pointerdown', (e) => { if (e.pointerType === 'touch' && this.resetIdleTimer()) { this.state.ignoreNextTap = true; setTimeout(() => this.state.ignoreNextTap = false, 400); } }, { passive: true }, 'app');
        EventRegistry.add(document, 'mouseleave', () => { const rootLayer = document.querySelector(DOM_SELECTORS.ROOT), isFullscreen = document.fullscreenElement || rootLayer?.classList.contains('is-fullscreen'); if (rootLayer && isFullscreen && this.state.currentMedia?.getState() === MEDIA_STATE.PLAYING) { rootLayer.classList.add('is-idle'); } clearTimeout(this.interactionIdleTimer); }, { passive: true }, 'app');
        window.addEventListener('orientationchange', () => { setTimeout(() => { const currentFeed = DOMHelper.select(DOM_SELECTORS.FEED); if (currentFeed) { const slots = currentFeed.querySelectorAll('.story-slot'); if (slots[this.state.currentVideoIndex]) { slots[this.state.currentVideoIndex].scrollIntoView({ block: 'center' }); } } }, 150); });
      }

      async destroy() {
        if (typeof this.state.config.onBeforeClose === 'function') {
          try {
            const wasPlaying = this.state.currentMedia?.getState() === MEDIA_STATE.PLAYING;
            if (wasPlaying) this.appEvents.emit('PLAYER:FORCE_PAUSE');
            const shouldClose = await Promise.resolve(this.state.config.onBeforeClose());
            if (shouldClose === false) { if (wasPlaying) this.appEvents.emit('PLAYER:FORCE_PLAY'); return; }
          } catch (err) { return; }
        }
        
        if (document.fullscreenElement) {
          document.exitFullscreen().catch(() => {});
        }
        
        const executeDestroy = async () => {
          const layout = document.querySelector(DOM_SELECTORS.ROOT); 
          
          // 1. Picu class is-closing untuk menjalankan animasi keluar (Exit Cinematic)
          if (layout) layout.classList.add('is-closing');
          
          this.playerManager.flushAnalytics();
          this.appEvents.emit('PLAYER:FORCE_PAUSE'); 
          
          await WakeLockManager.release(); 
          
          if ('mediaSession' in navigator) { 
            navigator.mediaSession.metadata = null; 
            navigator.mediaSession.playbackState = 'none'; 
          }
          
          EventRegistry.clear('app'); 
          if (this.feedObserver) { this.feedObserver.disconnect(); this.feedObserver = null; } 
          this.observers.forEach(obs => obs.disconnect()); 
          this.observers = [];
          
          try { this.state.currentMedia?.destroy(); } catch (e) {} 
          try { this.state.currentAmbient?.destroy(); } catch (e) {}
          
          this.state.currentMedia = null; 
          this.state.currentAmbient = null; 
          this.state.playlist = [];
          
          window.history.replaceState({}, '', window.location.pathname); 
          const metaTheme = document.getElementById('meta-theme-color'); 
          if (metaTheme) metaTheme.setAttribute('content', '#0f0f11');
          
          DominantColorService.destroy(); 
          MediaPool.clear();
          MemoryNetworkManager.destroyAll();
          this.hardwareManager.destroy();
          
          // 2. Beri waktu 450ms agar CSS filter/opacity/transform selesai merender sebelum DOM dibongkar
          setTimeout(() => { 
            if (layout) layout.remove(); 
          }, 450);
        };
        
        executeDestroy();
      }
    }
    
    globalThis.NextGenStory = NextGenStory;
  </script>

  <script id="demo-js">
    document.addEventListener('DOMContentLoaded', () => {
      const storyIds = ['vid_mixed_carousel', 'vid_1_1', 'vid_1_2', 'vid_1_3'];
      let activeStoryInstance = null;
      const storyRings = document.querySelectorAll('.story-ring-wrapper');
      
      const executeLaunch = async (customConfig = {}) => {
        if (activeStoryInstance) activeStoryInstance.destroy();
        
        // PATCH: Konfigurasi Excerpt untuk merender UI Ads
        const baseConfig = {
          renderExcerpt: (mediaData, groupData) => {
            // 1. Ekstraksi Data yang Konsisten (Prioritas: Item spesifik -> Grup -> Fallback default)
            const isAd = mediaData?.isAd || groupData?.isAd;
            const title = mediaData?.title || groupData?.title || 'Tanpa Judul';
            const desc = mediaData?.excerpt ?? groupData?.excerpt ?? '';
            const categories = mediaData?.categories || groupData?.categories || [];

            // 2. RENDER KHUSUS: IKLAN / SPONSOR (Tampilan Premium Emas)
            if (isAd) {
              const ctaText = mediaData?.ctaText || groupData?.ctaText || 'Pelajari Lebih Lanjut';
              const ctaLink = mediaData?.ctaLink || groupData?.ctaLink || '#';
              
              return `
                <div style="background: color-mix(in oklch, var(--ngs-bg) 60%, transparent); border: 1px solid #eab308; padding: 16px; border-radius: 16px; backdrop-filter: blur(12px); text-align: left;">
                  <div style="font-size: 0.7rem; color: #eab308; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;">Ad / Sponsor</div>
                  <h4 style="margin: 0 0 4px 0; font-size: 1.15rem; font-weight: 800; color: var(--ngs-text);">${title}</h4>
                  <p style="margin: 0 0 16px 0; font-size: 0.9rem; color: var(--ngs-text-sub); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${desc}</p>
                  
                  <div class="js-cta-link" data-url="${ctaLink}" style="background: #eab308; color: #000; padding: 10px 20px; border-radius: 24px; text-align: center; font-weight: 800; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 4px 12px rgba(234, 179, 8, 0.2);">
                    ${ctaText}
                    <i data-lucide="external-link" style="width: 16px; height: 16px;"></i>
                  </div>
                </div>
              `;
            }

            // 3. RENDER DEFAULT: KONTEN ORGANIK BIASA (Tampilan Clean & Minimalis)
            let badgesHtml = '';
            if (categories.length > 0) {
              badgesHtml = `
                <div class="story-excerpt__badges">
                  ${categories.map(cat => `<span class="story-badge-item">${cat}</span>`).join('')}
                </div>
              `;
            }

            return `
              ${badgesHtml}
              <span class="story-excerpt__title">${title}</span>
              <div class="story-excerpt__text">${desc}</div>
            `;
          }
        };

        const finalConfig = { ...baseConfig, ...customConfig };

        activeStoryInstance = new NextGenStory(finalConfig);
        
        const isReady = await activeStoryInstance.initialize();                               
        
        if (isReady) {
          activeStoryInstance.state.isApiReady = true;
          activeStoryInstance.playerManager.updateVideoCore();
        }
      };

      const safeLaunch = (config = {}) => {
        if (globalThis.YT && globalThis.YT.Player) {
          executeLaunch(config);
        } else {
          window.pendingStoryLaunch = () => executeLaunch(config);
          
          if (!document.querySelector('script[src*="youtube.com/iframe_api"]')) {
            const scriptTag = document.createElement('script');
            scriptTag.src = 'https://www.youtube.com/iframe_api';
            scriptTag.async = true;
            document.head.appendChild(scriptTag);
            
            window.onYouTubeIframeAPIReady = () => {
              if (typeof window.pendingStoryLaunch === 'function') {
                window.pendingStoryLaunch();
                window.pendingStoryLaunch = null;
              }
            };
          }
        }
      };

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('v')) {
        safeLaunch({}); 
      }

      storyRings.forEach((ring) => {
        ring.addEventListener('click', async () => {
          if (document.querySelector('.js-layout-wrapper')) return;
          
          const index = parseInt(ring.getAttribute('data-index'), 10);
          const targetId = storyIds[index];
                
          window.history.pushState({ index: index, subIndex: 0 }, '', `?v=${targetId}`);
          
          safeLaunch({ startIndex: index });
        });
      });
    });
  </script>
</body>
