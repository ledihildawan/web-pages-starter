<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Open Graph image">
  <title>Open Graph Image</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="200" cy="200" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1000" cy="500" r="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="16" fill="url(#accent)"/>
    <path d="M20 50V22h7v9.4h13V22h7v28h-7v-10.6H27V50h-7z" fill="#fff"/>
  </g>

  <g transform="translate(80, 240)" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
    <text x="0" y="0" font-size="92" font-weight="900" fill="#f8fafc" letter-spacing="-3">
      Build lightning-fast
    </text>
    <text x="0" y="100" font-size="92" font-weight="900" fill="url(#accent)" letter-spacing="-3">
      web applications.
    </text>
    <text x="0" y="190" font-size="32" font-weight="500" fill="#94a3b8">
      Modern web pages starter with i18n, PWA, and optimized performance.
    </text>
  </g>

  <g transform="translate(80, 540)">
    <rect width="220" height="56" rx="28" fill="#fff"/>
    <text x="110" y="36" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800" fill="#020617" text-anchor="middle">
      Get started →
    </text>
  </g>

  <g transform="translate(960, 540)" font-family="ui-monospace, monospace" font-size="18" fill="#64748b" text-anchor="end">
    <text x="160" y="0">example.com</text>
  </g>
</svg>
