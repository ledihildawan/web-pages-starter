name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - run: bunx biome ci .

      - run: bun run typecheck

      - run: bun run test
        env:
          NODE_ENV: test

      - run: bun run build
        env:
          NODE_ENV: production
          SITE_URL: https://ledihildawan.github.io/web-pages-starter
          BASE_PATH: /web-pages-starter/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
