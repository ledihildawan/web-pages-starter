<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animasi Loading Wave Rows</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #0d0d0d;
      color: #00d4ff; /* Warna biru laut cerah */
    }

    .loading-container {
      font-family: 'Courier New', Courier, monospace;
      font-size: 32px;
      display: flex;
      align-items: center;
      gap: 15px;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    /* Elemen spinner Wave Rows */
    .braille-wave::after {
      content: "⠁⠂⠄⡀⢀⠠⠐⠈"; /* Pola gelombang awal di 8 kolom */
      display: inline-block;
      white-space: pre; 
      /* Menggunakan linear agar pergeseran gelombang terasa mengalir */
      animation: wave-move 0.8s step-end infinite; 
    }

    /* Keyframes 8 langkah untuk menggeser pola 1 kolom ke kanan di setiap frame */
    @keyframes wave-move {
      0%   { content: "⠁⠂⠄⡀⢀⠠⠐⠈"; } /* Frame 1 */
      12.5% { content: "⠈⠁⠂⠄⡀⢀⠠⠐"; } /* Frame 2: Geser kanan */
      25%   { content: "⠐⠈⠁⠂⠄⡀⢀⠠"; } /* Frame 3 */
      37.5% { content: "⠠⠐⠈⠁⠂⠄⡀⢀"; } /* Frame 4 */
      50%   { content: "⢀⠠⠐⠈⠁⠂⠄⡀"; } /* Frame 5 */
      62.5% { content: "⡀⢀⠠⠐⠈⠁⠂⠄"; } /* Frame 6 */
      75%   { content: "⠄⡀⢀⠠⠐⠈⠁⠂"; } /* Frame 7 */
      87.5% { content: "⠂⠄⡀⢀⠠⠐⠈⠁"; } /* Frame 8 */
      100%  { content: "⠁⠂⠄⡀⢀⠠⠐⠈"; } /* Loop kembali */
    }

    /* Efek teks mengayun pelan */
    .loading-text {
      font-style: italic;
      animation: text-float 2s ease-in-out infinite alternate;
    }

    @keyframes text-float {
      from { transform: translateY(0); opacity: 0.7; }
      to { transform: translateY(-3px); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="loading-container">
    <span class="braille-wave"></span> 
    <span class="loading-text">Menyelaraskan data...</span>
  </div>

</body>
</html>
