<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="description" content="Telkomsel Story - Pengalaman Video Interaktif" />
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <title>Telkomsel Story - Enterprise Final (Snap + Peek)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" integrity="sha512-H9y4UaFp/qRoZ4O88A8y+D0S1sX77w1qGj2xHnEw7U/H3n4QJ11R7XjG6+A1B9L1Fq9Zq+GfD+1D3F2c==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
      /**
      * ==========================================================
      * 1. TOKENS & RESET
      * ==========================================================
      */
      :root {
      --brand-red: #ee2d24;
      --brand-dark: #050505;
      --surface: #ffffff;
      --bg-gray: #f8f9fa;
      --text-main: #111111;
      --text-sub: #555555;
      --glass-bg: rgba(20, 20, 20, 0.6);
      --glass-border: rgba(255, 255, 255, 0.15);
      --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-spring: cubic-bezier(0.34, 1.5, 0.64, 1);
      --card-width: 420px;
      --fab-size: 44px;
      --frame-radius: 16px;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      body {
      background-color: #0f0f11; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main); overflow: hidden; overscroll-behavior-y: none; opacity: 0; animation: smoothLoad 0.6s var(--ease-out) forwards;
      }
      @keyframes smoothLoad { to { opacity: 1; } }
      :is(.story-excerpt, button):focus-visible { outline: 2px solid var(--brand-red); outline-offset: 4px; border-radius: 8px; }
      .player-fab:focus-visible, .reaction-option-btn:focus-visible { border-radius: 50%; }
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0; }
      
      /**
      * ==========================================================
      * 2. CORE LAYOUT (NATIVE SCROLL SNAP)
      * ==========================================================
      */
      .layout-wrapper { position: relative; height: 100dvh; width: 100vw; pointer-events: none; }
      .layout-wrapper.is-ready { pointer-events: auto; }
      
      /* Wadah Scroll Snap Utama */
      .story-feed {
      position: absolute; inset: 0; width: 100%; height: 100dvh;
      overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none;
      -webkit-overflow-scrolling: touch; z-index: 10;
      transition: transform 0.6s var(--ease-spring); 
      }
      .story-feed::-webkit-scrollbar { display: none; }
      
      /* Slot berukuran penuh untuk snap target (Dioptimasi dengan contain: strict) */
      .story-slot {
      position: relative; width: 100%; height: 100dvh; scroll-snap-align: center; scroll-snap-stop: always;
      display: flex; justify-content: center; align-items: center;
      contain: strict; /* GPU Optimization Anti-Flicker */
      background-size: cover; background-position: center;
      }
      
      /* Blur Background untuk Slot di Mobile (sebelum Player masuk) */
      .story-slot::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(15, 15, 17, 0.7);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      z-index: 0;
      }

      /* Base Style untuk Player Asli dan Kartu Dummy agar identik */
      .story-container, .story-peek-card {
      position: absolute; width: 100%; height: 100dvh;
      max-width: calc(100dvh * 9 / 16); min-width: 320px;
      border-radius: var(--frame-radius); transform: translateZ(0);
      }
      
      .story-container { background-color: var(--brand-dark); z-index: 10; transition: border-radius 0.6s var(--ease-out), box-shadow 0.6s var(--ease-out); }
      
      /* Kartu Dummy sebagai pengganti Peek Frames lama */
      .story-peek-card {
      background-color: #111; overflow: hidden; filter: brightness(0.4); z-index: 5;
      transition: filter 0.6s var(--ease-out); pointer-events: auto; cursor: pointer;
      }
      .story-peek-card:hover { filter: brightness(0.6); }

      .story-peek-card::before {
      content: ''; position: absolute; inset: -10%; width: 120%; height: 120%;
      background-image: var(--peek-img, none); background-size: cover; background-position: center;
      filter: blur(25px) brightness(0.4); opacity: var(--peek-blur, 0); z-index: 1; pointer-events: none;
      }
      .story-peek-card::after {
      content: ''; position: absolute; inset: 0; background-image: var(--peek-img, none);
      background-size: var(--peek-fit, cover); background-position: center; background-repeat: no-repeat; z-index: 2; pointer-events: none;
      }

      /**
      * ==========================================================
      * 3. MEDIA LAYERS & EFFECTS
      * ==========================================================
      */
      .ambient-layer {
      display: none; position: absolute; top: 5%; left: -5%; width: 110%; height: 90%;
      z-index: 1; filter: blur(50px) saturate(150%); opacity: 0.4; pointer-events: none; transition: opacity 0.8s ease; transform: translateZ(0); will-change: opacity, filter;
      }
      .story-container.is-focused .ambient-layer { opacity: 0.25; }
      .media-container iframe, .media-container video, .media-container img { width: 100%; height: 100%; border: none; pointer-events: none; }
      #ambientMediaContainer { width: 100%; height: 100%; opacity: 0; transition: opacity 1s var(--ease-out); }
      .story-viewport { position: absolute; inset: 0; z-index: 10; overflow: hidden; border-radius: inherit; transition: filter 0.6s var(--ease-out), transform 0.6s var(--ease-out); will-change: filter, transform; contain: paint; }
      .story-video-wrapper { position: relative; width: 100%; height: 100%; background-color: var(--brand-dark); transition: filter 0.5s var(--ease-out); }
      .story-container.is-paused .story-video-wrapper { filter: brightness(0.65) grayscale(0.2); }
      .story-video-wrapper::after { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 5; background: linear-gradient(to bottom, rgba(0, 0, 0, 0.25) 0%, transparent 20%, transparent 65%, rgba(0, 0, 0, 0.85) 100%); transition: opacity 0.4s var(--ease-out); }
      .video-blur-bg { position: absolute; inset: -10%; width: 120%; height: 120%; background-size: cover; background-position: center; filter: blur(25px) brightness(0.4); z-index: 1; opacity: 0; pointer-events: none; transition: opacity 0.5s ease, background-image 0.5s ease; will-change: opacity; }
      .thumbnail-overlay { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 8; pointer-events: none; transition: opacity 0.4s ease; color: transparent; }
      #mainMediaContainer { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; opacity: 0; transition: opacity 0.4s var(--ease-out); }
      
      @keyframes ambientBreathe { 0%, 100% { transform: scale(1.05); opacity: 0.4; } 50% { transform: scale(1.15); filter: blur(60px) saturate(180%); opacity: 0.6; } }
      @keyframes innerBreathe { 0%, 100% { transform: scale(1); filter: blur(25px) brightness(0.4); } 50% { transform: scale(1.05); filter: blur(30px) brightness(0.5); } }
      .is-breathing { animation: ambientBreathe 8s ease-in-out infinite; }
      .is-inner-breathing { animation: innerBreathe 8s ease-in-out infinite; }
      
      /**
      * ==========================================================
      * 4. OVERLAYS & UI CONTROLS
      * ==========================================================
      */
      .story-loader { position: absolute; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.5); transition: opacity 0.3s var(--ease-out); }
      .story-container.has-started .story-loader { opacity: 0; pointer-events: none; }
      .story-container.has-started.is-loading .story-loader { opacity: 1; pointer-events: auto; }
      .story-loader__spinner-simple { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.15); border-top-color: var(--brand-red); animation: story-spin-simple 0.8s linear infinite; }
      @keyframes story-spin-simple { to { transform: rotate(1turn); } }
      .story-error-overlay { position: absolute; inset: 0; z-index: 60; background: rgba(15, 15, 17, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
      .story-error-overlay.is-visible { opacity: 1; pointer-events: auto; }
      .error-content { text-align: center; padding: 24px; color: #fff; } .error-icon { font-size: 48px; margin-bottom: 16px; display: block; } .error-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; } .error-desc { font-size: 14px; color: #aaa; margin-bottom: 24px; }
      .error-retry-btn { background: var(--brand-red); color: #fff; border: none; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.2s; } .error-retry-btn:active { transform: scale(0.95); }
      #reaction-container { position: absolute; inset: 0; z-index: 15; pointer-events: none; contain: strict; }
      .particle { position: absolute; top: -10%; left: var(--x); font-size: var(--size); opacity: 0; animation: drop-physics var(--duration) ease-in forwards; animation-delay: var(--delay); filter: blur(var(--blur)) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4)); z-index: var(--z); will-change: transform, opacity; }
      @keyframes drop-physics { 0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; } 10%, 80% { opacity: 1; } 100% { transform: translate3d(var(--drift), 120vh, 0) rotate(var(--rotation)); opacity: 0; } }
      .story-center-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.5); font-size: 80px; z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.4s ease-out, transform 0.4s ease-out; filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5)); will-change: transform, opacity; }
      :is(.story-center-play.is-flashing, .story-center-play.is-steady) { opacity: 0.9; transform: translate(-50%, -50%) scale(1); transition: opacity 0.1s ease-in, transform 0.2s var(--ease-spring); }
      
      .story-gesture-layer { position: absolute; inset: 0; z-index: 20; display: flex; cursor: pointer; touch-action: pan-y; user-select: none; -webkit-touch-callout: none; }
      .gesture-zone { height: 100%; } .gesture-zone--left, .gesture-zone--right { width: 30%; } .gesture-zone--center { width: 40%; }
      
      .story-progress-bar-wrapper { position: absolute; bottom: max(16px, env(safe-area-inset-bottom)); left: 16px; right: 16px; height: 24px; z-index: 30; cursor: pointer; display: flex; align-items: center; opacity: 0; transition: opacity 0.8s var(--ease-out); }
      .story-progress-bar { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.25); border-radius: 4px; overflow: hidden; transition: height 0.2s var(--ease-out); }
      .story-progress-bar-wrapper:hover .story-progress-bar { height: 8px; }
      .story-progress-bar__fill { height: 100%; width: 100%; background: rgba(255, 255, 255, 0.95); transform-origin: left; transform: scaleX(0); border-radius: inherit; box-shadow: 0 0 8px rgba(255, 255, 255, 0.5); will-change: transform; }
      
      :is(.story-top-actions, .story-player-actions) { position: absolute; z-index: 40; display: flex; gap: 12px; opacity: 0; pointer-events: none; transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-spring); }
      .story-top-actions { top: max(16px, env(safe-area-inset-top)); left: 16px; transform: translateY(-20px); }
      .story-player-actions { bottom: max(48px, env(safe-area-inset-bottom)); right: 16px; flex-direction: column; align-items: center; transform: translateY(20px); }
      :is(.player-fab, .reaction-option-btn, .external-nav-btn) { width: var(--fab-size); height: var(--fab-size); border-radius: 50%; background-color: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
      :is(.player-fab, .reaction-option-btn, .external-nav-btn):active:not(.is-disabled) { background-color: rgba(255, 255, 255, 0.1); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2); transform: scale(0.9); }
      .external-nav-btn.is-disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
      
      .story-excerpt { position: absolute; bottom: max(48px, env(safe-area-inset-bottom)); left: 20px; right: 20px; padding-right: 70px; z-index: 40; color: #fff; cursor: pointer; opacity: 0; pointer-events: none; transform: translateY(20px); transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-spring); background: transparent; border: none; text-align: left; font-family: inherit; display: block; }
      :is(.story-excerpt__badges, .story-view__badges) { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
      .story-badge-item { background: rgba(255, 255, 255, 0.15); color: #fff; backdrop-filter: blur(12px); border: 0.5px solid var(--glass-border); font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 6px 12px; border-radius: 8px; }
      .story-view__badges .story-badge-item { background: var(--brand-red); border: none; }
      .story-excerpt__title { display: block; font-size: 20px; font-weight: 800; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6); line-height: 1.2; }
      .story-excerpt__text { font-size: 14px; line-height: 1.5; opacity: 0.9; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6); }
      .story-read-more { opacity: 0.6; font-weight: 600; margin-left: 4px; }
      
      .reaction-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; }
      .reaction-options { position: absolute; bottom: 100%; right: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; padding-bottom: 12px; }
      .reaction-wrapper.is-active .reaction-options { pointer-events: auto; }
      .reaction-option-btn { opacity: 0; transform: translateY(20px) scale(0.6); transition: all 0.4s var(--ease-spring); font-size: 20px; }
      .reaction-wrapper.is-active .reaction-option-btn { opacity: 1; transform: translateY(0) scale(1); margin-bottom: 10px; }
      .reaction-wrapper.is-active .player-fab { background-color: rgba(255, 255, 255, 0.9); color: var(--brand-dark); }
      .reaction-option-btn:nth-child(1) { transition-delay: 0s; } .reaction-option-btn:nth-child(2) { transition-delay: 0.04s; } .reaction-option-btn:nth-child(3) { transition-delay: 0.08s; } .reaction-option-btn:nth-child(4) { transition-delay: 0.12s; }
      .reaction-wrapper.is-active .reaction-option-btn:nth-child(4) { transition-delay: 0s; } .reaction-wrapper.is-active .reaction-option-btn:nth-child(3) { transition-delay: 0.05s; } .reaction-wrapper.is-active .reaction-option-btn:nth-child(2) { transition-delay: 0.1s; } .reaction-wrapper.is-active .reaction-option-btn:nth-child(1) { transition-delay: 0.15s; }
      
      .story-container.show-ui :is(.story-excerpt, .story-player-actions, .story-progress-bar-wrapper, .story-top-actions) { opacity: 1; pointer-events: auto; transform: translateY(0); }
      .layout-wrapper.is-clean-mode :is(.reaction-wrapper, .share-fab, .story-excerpt, .story-top-actions) { opacity: 0 !important; pointer-events: none !important; visibility: hidden !important; }
      .layout-wrapper.is-clean-mode .story-top-actions { transform: translateY(-20px) !important; }
      .layout-wrapper.is-clean-mode .story-video-wrapper::after { opacity: 0 !important; visibility: hidden !important; }
      .layout-wrapper.is-clean-mode #icon-enter-fs { display: none !important; } .layout-wrapper.is-clean-mode #icon-exit-fs { display: inline-block !important; }
      
      /**
      * ==========================================================
      * 5. MODALS, SHEETS, & POPUPS
      * ==========================================================
      */
      .overlay-backdrop { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.5s; pointer-events: auto; touch-action: none; }
      .is-active > .overlay-backdrop { opacity: 1; }
      :is(.story-sheet, .story-popup) { position: fixed; inset: 0; z-index: 100; visibility: hidden; pointer-events: none; }
      .story-sheet { display: flex; flex-direction: column; justify-content: flex-end; } .story-popup { display: flex; justify-content: center; align-items: center; }
      :is(.story-sheet, .story-popup).is-active { visibility: visible; }
      :is(.story-sheet__content, .story-popup__content) { position: relative; background-color: var(--surface); z-index: 101; pointer-events: auto; display: flex; flex-direction: column; contain: paint; }
      .story-sheet__content { border-radius: 28px 28px 0 0; width: 100%; padding: 12px 0 0; transform: translateY(100%); max-height: 88vh; transition: transform 0.6s var(--ease-spring); box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2); will-change: transform; }
      .story-sheet.is-active .story-sheet__content { transform: translateY(0); } .story-sheet__content.is-dragging { transition: transform 0.1s ease-out; }
      .story-sheet__handle-wrapper { width: 100%; padding: 10px 0 24px; cursor: grab; display: flex; justify-content: center; flex-shrink: 0; touch-action: none; }
      .story-sheet__handle { width: 44px; height: 5px; background-color: #d1d1d6; border-radius: 10px; }
      .story-popup__content { width: var(--card-width); padding: 24px 0; opacity: 0; transform: translateY(40px); max-height: calc(100dvh - 64px); border-radius: var(--frame-radius); transition: transform 0.6s var(--ease-spring), opacity 0.6s var(--ease-spring); box-shadow: 0 24px 64px rgba(0, 0, 0, 0.25); }
      .story-popup.is-active .story-popup__content { opacity: 1; transform: translateY(0); }
      .story-card { display: none; width: var(--card-width); max-height: calc(100dvh - 80px); background-color: var(--surface); border-radius: var(--frame-radius); padding: 24px 0 0; z-index: 100; position: relative; flex-direction: column; overflow: hidden; box-shadow: 0 32px 72px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); }
      .story-close-btn { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border: none; background-color: var(--bg-gray); border-radius: 50%; font-size: 14px; font-weight: bold; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; z-index: 30; }
      :is(.story-dynamic-area, .story-view) { display: flex; flex-direction: column; min-height: 0; flex: 1 1 auto; }
      .story-header { flex-shrink: 0; padding: 0 64px 0 28px; margin-bottom: 16px; }
      .story-view__title { font-size: 24px; font-weight: 800; color: var(--text-main); margin-bottom: 6px; line-height: 1.25; outline: none; } .story-view__meta { font-size: 13px; font-weight: 500; color: #888; display: block; }
      .story-body { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 28px 32px; min-height: 0; overscroll-behavior-y: contain; }
      .story-body::-webkit-scrollbar { width: 5px; } .story-body::-webkit-scrollbar-thumb { background-color: #d1d1d6; border-radius: 10px; } .story-body::-webkit-scrollbar-track { background-color: transparent; margin: 8px 0; }
      .story-body__cms-content { font-size: 15px; color: var(--text-sub); line-height: 1.6; } .story-body__cms-content p { margin-bottom: 16px; }
      .custom-toast { position: fixed; bottom: max(32px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(17, 17, 17, 0.9); color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 500; z-index: 1000; opacity: 0; transition: all 0.4s var(--ease-spring); backdrop-filter: blur(8px); pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
      .custom-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
      
      /**
      * ==========================================================
      * 6. RESPONSIVE MEDIA QUERIES
      * ==========================================================
      */
      @media (min-width: 768px) {
      .story-loader__spinner-simple { display: none; }
      .story-loader__spinner-complex { display: block; width: 64px; height: 64px; position: relative; pointer-events: none; }
      .story-loader__container { position: absolute; width: 100%; height: 100%; animation: story-spin-linear 1.568s linear infinite; }
      .story-loader__rotator { position: absolute; width: 100%; height: 100%; animation: story-spin-ease 5332ms cubic-bezier(0.4, 0, 0.2, 1) infinite both; }
      .story-loader__left, .story-loader__right { position: absolute; top: 0; bottom: 0; overflow: hidden; }
      .story-loader__left { left: 0; right: 49%; } .story-loader__right { left: 49%; right: 0; }
      .story-loader__circle { box-sizing: border-box; position: absolute; width: 200%; height: 100%; border-style: solid; border-color: var(--brand-red) var(--brand-red) transparent; border-radius: 50%; border-width: 6px; }
      .story-loader__left .story-loader__circle { left: 0; right: -100%; border-right-color: transparent; animation: story-spin-left 1333ms cubic-bezier(0.4, 0, 0.2, 1) infinite both; }
      .story-loader__right .story-loader__circle { left: -100%; right: 0; border-left-color: transparent; animation: story-spin-right 1333ms cubic-bezier(0.4, 0, 0.2, 1) infinite both; }
      @keyframes story-spin-linear { to { transform: rotate(1turn); } }
      @keyframes story-spin-ease { 12.5% { transform: rotate(135deg); } 25% { transform: rotate(270deg); } 37.5% { transform: rotate(405deg); } 50% { transform: rotate(540deg); } 62.5% { transform: rotate(675deg); } 75% { transform: rotate(810deg); } 87.5% { transform: rotate(945deg); } to { transform: rotate(3turn); } }
      @keyframes story-spin-left { from { transform: rotate(130deg); } 50% { transform: rotate(-5deg); } to { transform: rotate(130deg); } }
      @keyframes story-spin-right { from { transform: rotate(-130deg); } 50% { transform: rotate(5deg); } to { transform: rotate(-130deg); } }
      }
      
      @media (hover: hover) and (pointer: fine) {
      .story-container.show-ui .story-excerpt:hover { opacity: 0.9; }
      :is(.player-fab, .reaction-option-btn, .external-nav-btn:not(.is-disabled)):hover { background-color: rgba(255, 255, 255, 0.25); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
      .story-close-btn:hover { background-color: #e9ecef; color: var(--text-main); }
      }
      
      .desktop-controls-wrapper { position: fixed; right: 16px; top: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 60; opacity: 1; transition: opacity 0.8s var(--ease-out); }
      .desktop-controls-wrapper > * { pointer-events: auto; }
      .story-close-player { position: fixed; top: max(16px, env(safe-area-inset-top)); right: 16px; }
      .external-nav-group { display: none; flex-direction: column; gap: 12px; }
      
      @media (max-width: 767px) {
      .story-container { border-radius: 0; }
      /* SEMBUNYIKAN DUMMY CARD DI MOBILE (ANTI-OVERLAP) */
      .story-peek-card { display: none !important; }
      
      .story-popup { display: none; }

      document.addEventListener('keydown', (e) => {
      if (['INPUT', 'TEXTAREA'].includes(e.target.tagName) || state.isOpen || state.isAnimating) return;
      const keyMap = { Space: () => { e.preventDefault(); togglePlayPause(); }, ArrowDown: () => switchVideo(1), ArrowUp: () => switchVideo(-1), ArrowRight: () => { const jump = seekVideo('forward'); flashIcon(`⏩ ${jump}s`); }, ArrowLeft: () => { const jump = seekVideo('rewind'); flashIcon(`⏪ ${jump}s`); } };
      keyMap[e.code]?.();
      });
      
      document.addEventListener('click', (e) => {
      const t = e.target;
      if (t.closest('.story-close-btn, .overlay-backdrop')) return closeContext();
      if (t.closest('.reaction-option-btn')) return react(t.closest('.reaction-option-btn').dataset.reaction);
      const actionMap = { '#btnPlayPause': togglePlayPause, '#btnMute': toggleMute, '#btnPrevStory': () => switchVideo(-1), '#btnNextStory': () => switchVideo(1), '#btnStoryClosePlayer': () => { AppState.currentMedia?.pause(); const wrapper = dom('layoutWrapper'); if (wrapper) { wrapper.style.opacity = '0'; setTimeout(() => (wrapper.style.display = 'none'), 500); } }, '#btnOpenContext': openContext, '#btnToggleReaction': toggleReactionMenu, '#btnShare': async () => { const url = window.location.href; try { if (navigator.share) await navigator.share({ title: CONFIG.PLAYLIST[AppState.currentVideoIndex].title, url }); else { navigator.clipboard.writeText(url); Utils.showToast('Tautan berhasil disalin!'); } } catch (err) {} }, '#btnCleanMode': () => { closeReactionMenu(); dom('layoutWrapper')?.classList.toggle('is-clean-mode'); },
        '#peekPrev': () => switchVideo(-1), '#peekNext': () => switchVideo(1)
      };
      for (let selector in actionMap) if (t.closest(selector)) return actionMap[selector](e);
      const reactionWrapper = dom('reactionWrapper'); if (reactionWrapper && !reactionWrapper.contains(t)) closeReactionMenu();
      });
      
      dom('btnRetry')?.addEventListener('click', () => { dom('errorOverlay')?.classList.remove('is-visible'); AppState.errorCount = 0; updateVideoUI(); });
      window.addEventListener('offline', () => Utils.showToast('Anda sedang offline.'));
      window.addEventListener('online', () => { Utils.showToast('Koneksi kembali!'); if (dom('errorOverlay')?.classList.contains('is-visible')) updateVideoUI(); });
      
      const urlParams = new URLSearchParams(window.location.search); const videoParam = urlParams.get('v');
      if (videoParam) { let foundIndex = videoParam.startsWith('item_') ? parseInt(videoParam.replace('item_', ''), 10) : CONFIG.PLAYLIST.findIndex(v => v.type === 'youtube' && Utils.parseYouTubeData(v.url).videoId === videoParam); if (foundIndex >= 0 && foundIndex < CONFIG.PLAYLIST.length) AppState.currentVideoIndex = foundIndex; }
      
      window.addEventListener('popstate', (e) => {
      if (e.state && typeof e.state.index === 'number') { if (state.isAnimating) return; AppState.currentVideoIndex = e.state.index; updateVideoUI(); } else { const v = new URLSearchParams(window.location.search).get('v'); if (v) { let foundIndex = v.startsWith('item_') ? parseInt(v.replace('item_', ''), 10) : CONFIG.PLAYLIST.findIndex(item => item.type === 'youtube' && Utils.parseYouTubeData(item.url).videoId === v); if (foundIndex > -1 && foundIndex !== AppState.currentVideoIndex && foundIndex < CONFIG.PLAYLIST.length) { if (state.isAnimating) return; AppState.currentVideoIndex = foundIndex; updateVideoUI(); } } }
      });
      
      window.addEventListener('resize', Utils.debounce(() => {
      if (window.innerWidth < 768 && AppState.currentAmbient) { AppState.currentAmbient.destroy(); AppState.currentAmbient = null; } else if (window.innerWidth >= 768 && !AppState.currentAmbient && AppState.currentMedia) { const ambientContainer = Utils.getEl('ambientMediaContainer'); const data = CONFIG.PLAYLIST[AppState.currentVideoIndex]; AppState.currentAmbient = MediaFactory.create(ambientContainer, data, { onReady: () => { AppState.currentAmbient.seekTo(AppState.currentMedia.getCurrentTime()); if (AppState.currentMedia.getState() === CONFIG.MEDIA_STATE.PLAYING) AppState.currentAmbient.play(); } }, true); AppState.currentAmbient.load(); }
      }, 150));
      
      const pauseMediaSafely = () => { if (AppState.currentMedia?.getState() === CONFIG.MEDIA_STATE.PLAYING) { AppState.wasPlayingBeforeHidden = true; AppState.currentMedia.pause(); hideSteadyIcon(); } };
      const resumeMediaSafely = () => { if (AppState.wasPlayingBeforeHidden && !state.isOpen && !document.hidden) { AppState.currentMedia?.play(); AppState.currentAmbient?.play(); AppState.wasPlayingBeforeHidden = false; } };
      document.addEventListener('visibilitychange', () => { document.hidden ? pauseMediaSafely() : resumeMediaSafely(); });
      window.addEventListener('blur', pauseMediaSafely); window.addEventListener('focus', resumeMediaSafely);
      };
      
      initEventListeners();
      
      return { startProgressBar, stopProgressBar, checkNavState, showSteadyIcon, hideSteadyIcon, switchVideo, isAnimatingState: () => state.isAnimating };
      })();
      
      /**
      * ==========================================================
      * 7. YOUTUBE API INIT
      * ==========================================================
      */
      const loadYouTubeAPI = () => { const tag = document.createElement('script'); tag.src = 'https://www.youtube.com/iframe_api'; tag.async = true; document.head.appendChild(tag); };
      window.onYouTubeIframeAPIReady = function() { AppState.isApiReady = true; updateVideoUI(); };
      loadYouTubeAPI();
    </script>
  </body>
</html>
