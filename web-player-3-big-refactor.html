  <style>
    @layer reset, design-tokens, layout, components, utilities;

    @layer design-tokens {
      :root {
        color-scheme: light dark; 
        
        /* --- ABSOLUTE NEUTRALS --- */
        --c-white-pure: oklch(100% 0 0);

        /* Semantic Tokens - Dark Mode (Cinematic OLED) */

        --text-sub: oklch(70% 0 0);
        --text-muted: oklch(50% 0 0);
        
        /* Ultra-Premium Dark Frosted Glass */
        --surface-glass-bg: color-mix(in oklch, oklch(10% 0 0) 60%, transparent);
        --glass-bg: color-mix(in oklch, oklch(15% 0 0) 50%, transparent);
        --glass-border: color-mix(in oklch, var(--c-white-pure) 12%, transparent);
        --glass-highlight: inset 0 1px 0 0 color-mix(in oklch, var(--c-white-pure) 10%, transparent);
        
        --shadow-base: color-mix(in oklch, var(--c-black-pure) 80%, transparent);
        --overlay-bg: color-mix(in oklch, var(--c-black-pure) 70%, transparent);
        --video-gradient: var(--c-black-pure); 

        /* Stabilized Modern Easings */
        --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1); 
        --ease-spring: cubic-bezier(0.2, 0.9, 0.3, 1); 
        --ease-bounce: cubic-bezier(0.25, 1.2, 0.5, 1);
        --ease-snappy: cubic-bezier(0.1, 0.8, 0.2, 1);
        --card-inline-size: 27.5rem; 
        --fab-size: 2.875rem; 
        --frame-radius: 1.5rem;
      }

      /* Semantic Tokens - Light Mode Override (Studio Clean) */
      @media (prefers-color-scheme: light) {
        :root {
          --bg-base: var(--c-white-pure); 
          --surface: oklch(96% 0 0);
          --text-main: oklch(10% 0 0); 
          --text-sub: oklch(45% 0 0);
          --text-muted: oklch(65% 0 0);
          
          /* Ultra-Premium Light Frosted Glass */
          --surface-glass-bg: color-mix(in oklch, var(--c-white-pure) 75%, transparent);
          --glass-bg: color-mix(in oklch, var(--c-white-pure) 65%, transparent);
          --glass-border: color-mix(in oklch, var(--c-black-pure) 8%, transparent);
          --glass-highlight: inset 0 1px 0 0 color-mix(in oklch, var(--c-white-pure) 100%, transparent);

          --overlay-bg: color-mix(in oklch, var(--c-black-pure) 30%, transparent);
          --video-gradient: var(--c-white-pure);

      }
    }

        if (foundIndex > -1) { this.state.currentVideoIndex = foundIndex; this.state.currentSubIndex = foundSubIndex; isUrlIndexSet = true; }
      }
      if (!isUrlIndexSet) { let savedIndex = parseInt(this.state.getStoredInteger(this.state.config.STORAGE_KEYS.INDEX, -1)); if (savedIndex >= 0 && savedIndex < this.state.playlist.length) this.state.currentVideoIndex = savedIndex; }
    }

    initScrollSnap() {
      const feed = DOMHelper.select(DOM_SELECTORS.FEED), playerContainer = DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER); playerContainer.style.display = ''; feed.innerHTML = '';
      this.state.playlist.forEach((item, index) => { const slot = document.createElement('div'); slot.className = 'story-slot'; slot.dataset.index = index; feed.appendChild(slot); });
      const slots = feed.querySelectorAll('.story-slot'); if (slots[this.state.currentVideoIndex]) { slots[this.state.currentVideoIndex].appendChild(playerContainer); feed.scrollTop = slots[this.state.currentVideoIndex].offsetTop; }
      this.updateVirtualization(this.state.currentVideoIndex);
      
      let scrollTimeout = null, targetIndex = this.state.currentVideoIndex;
      const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting && entry.intersectionRatio >= 0.55) { targetIndex = parseInt(entry.target.dataset.index, 10); } }); }, { root: feed, threshold: [0.55] });
      slots.forEach(slot => observer.observe(slot));
      this.observers.push(observer);

      const processScrollEnd = () => {
        if (this.isProgrammaticScroll || this.state.currentVideoIndex === targetIndex) return;
        this.state.currentVideoIndex = targetIndex; 
        this.state.currentSubIndex = 0;
        
        if (this.gestureManager.gestureState.stopScrubCallback) this.gestureManager.gestureState.stopScrubCallback();
        this.appEvents.emit('UI:RESET_STATE');
        requestAnimationFrame(() => { slots[this.state.currentVideoIndex].appendChild(playerContainer); this.updateVirtualization(this.state.currentVideoIndex); this.playerManager.updateVideoCore(); });
      };
      if ('onscrollend' in window) { feed.addEventListener('scrollend', processScrollEnd); } else { feed.addEventListener('scroll', () => { clearTimeout(scrollTimeout); scrollTimeout = setTimeout(processScrollEnd, 150); }, { passive: true }); }
    }

    updateVirtualization(currentIndex) {
      const feed = DOMHelper.select(DOM_SELECTORS.FEED), slots = feed.querySelectorAll('.story-slot'), playerContainer = DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER);
      slots.forEach((slot, index) => {
        const isInsideWindow = Math.abs(index - currentIndex) <= this.state.config.VIRTUAL_WINDOW_SIZE;
        if (isInsideWindow) {
          if (!slot.querySelector('.story-dummy-card') && slot !== playerContainer.parentElement) {
            const groupData = this.state.playlist[index]; if (!groupData) return;
            const dummyCard = document.createElement('div'); dummyCard.className = 'story-dummy-card'; slot.appendChild(dummyCard);
            const coverData = groupData.items ? groupData.items[0] : groupData;
            ThumbnailResolver.resolve(coverData, (url) => { if (url && slot.contains(dummyCard)) { const isShortMedia = (coverData.type === 'youtube' && MediaUtils.parseYouTubeData(coverData.url).isShort) || coverData.isVertical === true; dummyCard.style.setProperty('--peek-img', `url(${url})`); dummyCard.style.setProperty('--peek-fit', isShortMedia ? 'cover' : 'contain'); dummyCard.style.setProperty('--peek-blur', isShortMedia ? '0' : '1'); } });
          }
        } else if (slot !== playerContainer.parentElement) slot.innerHTML = '';
      });
    }

    attachGlobalKeyBindings() {
      EventRegistry.add(document, 'keydown', (event) => {
        if (['INPUT', 'TEXTAREA'].includes(event.target.tagName)) return;
        const isContextOpen = this.uiManager.isContextOpen;
        if (event.key === 'Escape') {
          if (isContextOpen) { this.appEvents.emit('UI:TOGGLE_CONTEXT', false); } else if (DOMHelper.root.classList.contains('is-clean-mode')) { DOMHelper.root.classList.remove('is-clean-mode'); }
          return;
        }
        if (isContextOpen || this.playerManager.isAnimatingTransition) return;
        const groupData = this.state.playlist[this.state.currentVideoIndex], isMulti = groupData.items && groupData.items.length > 1, isReady = DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER)?.classList.contains('has-started');
        const keyActions = {
          Space: () => { event.preventDefault(); this.appEvents.emit('PLAYER:TOGGLE_PLAY'); },
          ArrowDown: () => { event.preventDefault(); this.appEvents.emit('PLAYER:SWITCH_VIDEO', 1); },
          ArrowUp: () => { event.preventDefault(); this.appEvents.emit('PLAYER:SWITCH_VIDEO', -1); },
          ArrowRight: () => { if (groupData.format === 'story' || isMulti) this.appEvents.emit('PLAYER:NEXT'); else if (isReady) { this.appEvents.emit('PLAYER:SEEK', 5); this.appEvents.emit('UI:SHOW_RIPPLE', {side: 'right', text: '⏩ 5s'}); } },
          ArrowLeft: () => { if (groupData.format === 'story' || isMulti) this.appEvents.emit('PLAYER:PREV'); else if (isReady) { this.appEvents.emit('PLAYER:SEEK', -5); this.appEvents.emit('UI:SHOW_RIPPLE', {side: 'left', text: '⏪ 5s'}); } },
          KeyM: () => this.appEvents.emit('UI:TOGGLE_MUTE'),
          KeyC: () => { this.uiManager.closeReactionMenu(); DOMHelper.root.classList.toggle('is-clean-mode'); }
        };
        if (keyActions[event.code]) keyActions[event.code]();
      }, {}, 'app');
    }

    attachGlobalClickBindings() {
      EventRegistry.add(document, 'click', async (event) => {
        const target = event.target; if (target.closest(DOM_SELECTORS.VOLUME_SLIDER)) return;
        
        if (target.nodeName === 'DIALOG') return this.appEvents.emit('UI:TOGGLE_CONTEXT', false);
        if (target.closest('.story-close-btn, .overlay-backdrop')) return this.appEvents.emit('UI:TOGGLE_CONTEXT', false);
        
        if (target.closest('.reaction-option-btn')) return this.appEvents.emit('UI:TRIGGER_REACTION', target.closest('.reaction-option-btn').dataset.reaction);
        const dummyClick = target.closest('.story-dummy-card'); if (dummyClick && !dummyClick.closest('.story-slot').classList.contains('is-active')) { dummyClick.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
        const actionMap = {
          [DOM_SELECTORS.BTN_PLAY]: () => this.appEvents.emit('PLAYER:TOGGLE_PLAY'), [DOM_SELECTORS.BTN_MUTE]: () => this.appEvents.emit('UI:TOGGLE_MUTE'),
          [DOM_SELECTORS.BTN_PREV]: () => { if (!target.closest('.is-disabled')) this.appEvents.emit('PLAYER:SWITCH_VIDEO', -1); }, [DOM_SELECTORS.BTN_NEXT]: () => { if (!target.closest('.is-disabled')) this.appEvents.emit('PLAYER:SWITCH_VIDEO', 1); },
          [DOM_SELECTORS.BTN_CLOSE]: () => this.appEvents.emit('APP:CLOSE'), [DOM_SELECTORS.BTN_OPEN_CONTEXT]: () => this.appEvents.emit('UI:TOGGLE_CONTEXT', true),
          [DOM_SELECTORS.BTN_REACTION]: () => this.appEvents.emit('UI:TOGGLE_REACTION_MENU'), [DOM_SELECTORS.BTN_CLEAN]: () => { this.uiManager.closeReactionMenu(); DOMHelper.root.classList.toggle('is-clean-mode'); },
          [DOM_SELECTORS.BTN_SHARE]: async () => { const currentUrl = window.location.href, groupData = this.state.playlist[this.state.currentVideoIndex], activeData = (groupData.items) ? groupData.items[this.state.currentSubIndex] : groupData, shareData = { title: document.title, text: activeData.excerpt || groupData.excerpt || 'Checkout this immersive story!', url: currentUrl }; try { if (navigator.canShare && navigator.canShare(shareData)) await navigator.share(shareData); else { await navigator.clipboard.writeText(currentUrl); ToastService.show('Tautan berhasil disalin ke clipboard 📋'); } } catch (err) { if (err.name !== 'AbortError') ToastService.show('Gagal membagikan tautan.'); } }
        };
        for (let selector in actionMap) { if (target.closest(selector)) return actionMap[selector](event); }
        if (this.uiManager.dom.reactionWrapper && !this.uiManager.dom.reactionWrapper.contains(target)) this.uiManager.closeReactionMenu();
      }, {}, 'app');
    }

    attachWindowBindings() {
      EventRegistry.add(window, 'offline', () => ToastService.show('Koneksi internet terputus.'), {}, 'app');
      EventRegistry.add(window, 'online', () => { ToastService.show('Koneksi pulih.'); if (DOMHelper.select(DOM_SELECTORS.ERROR_OVERLAY)?.classList.contains('is-visible')) this.playerManager.updateVideoCore(); }, {}, 'app');
      EventRegistry.add(window, 'popstate', (event) => {
        if (event.state && typeof event.state.index === 'number') {
          if (this.playerManager.isAnimatingTransition) return;
          this.state.currentVideoIndex = event.state.index; this.state.currentSubIndex = event.state.subIndex || 0;
          if (this.gestureManager.gestureState.stopScrubCallback) this.gestureManager.gestureState.stopScrubCallback();
          this.appEvents.emit('UI:RESET_STATE'); this.playerManager.updateVideoCore();
        } else {
          const val = new URLSearchParams(window.location.search).get('v');
          if (val) {
            let foundIndex = val.startsWith('item_') ? parseInt(val.replace('item_',''), 10) : this.state.playlist.findIndex(item => item.type === 'youtube' && MediaUtils.parseYouTubeData(item.url).videoId === val);
            if (foundIndex > -1 && foundIndex !== this.state.currentVideoIndex && foundIndex < this.state.playlist.length) {
              if (this.playerManager.isAnimatingTransition) return;
              this.state.currentVideoIndex = foundIndex; this.state.currentSubIndex = 0;
              if (this.gestureManager.gestureState.stopScrubCallback) this.gestureManager.gestureState.stopScrubCallback();
              this.appEvents.emit('UI:RESET_STATE'); this.playerManager.updateVideoCore();
            }
          }
        }
      }, {}, 'app');

      const feed = DOMHelper.select(DOM_SELECTORS.FEED);
      if (feed && window.ResizeObserver) {
        let resizeDebounce; let lastHeight = window.innerHeight;
        const resizeObserver = new ResizeObserver(() => {
          clearTimeout(resizeDebounce);
          resizeDebounce = setTimeout(() => {
            const currentHeight = window.innerHeight; const heightDiff = Math.abs(currentHeight - lastHeight) / lastHeight; lastHeight = currentHeight;
            if (heightDiff < 0.15) return; 
            const slots = feed.querySelectorAll('.story-slot');
            if (slots[this.state.currentVideoIndex] && !this.playerManager.isAnimatingTransition) { this.isProgrammaticScroll = true; slots[this.state.currentVideoIndex].scrollIntoView({ block: 'center' }); setTimeout(() => { this.isProgrammaticScroll = false; }, 300); }
            if (window.innerWidth < 768 && this.state.currentAmbient) { this.state.currentAmbient.destroy(); this.state.currentAmbient = null; } else if (window.innerWidth >= 768 && !this.state.currentAmbient && this.state.currentMedia) {
              const ambientContainer = DOMHelper.select(DOM_SELECTORS.AMBIENT_MEDIA); const data = this.state.getActiveMediaData();
              this.state.currentAmbient = MediaFactory.create(ambientContainer, data, { onReady: () => { this.state.currentAmbient.seekTo(this.state.currentMedia.getCurrentTime()); if (this.state.currentMedia.getState() === MEDIA_STATE.PLAYING) this.state.currentAmbient.play(); } }, true, this.appEvents, this.state); this.state.currentAmbient.load();
            }
          }, 150);
        });
        resizeObserver.observe(feed);
        this.observers.push(resizeObserver);
      }

      EventRegistry.add(document, 'visibilitychange', () => {
        if (document.hidden) {
          this.state.wasPlayingBeforeHidden = (this.state.currentMedia?.getState() === MEDIA_STATE.PLAYING);
          if (this.state.wasPlayingBeforeHidden) { this.appEvents.emit('PLAYER:FORCE_PAUSE'); this.appEvents.emit('UI:FLASH_ICON', ''); }
          WakeLockManager.release();
        } else {
          if (this.state.wasPlayingBeforeHidden && !this.uiManager.isContextOpen && !document.hidden) { this.appEvents.emit('PLAYER:FORCE_PLAY'); this.state.wasPlayingBeforeHidden = false; }
        }
      }, {}, 'app');

      let mouseIdleTimer;
      EventRegistry.add(document, 'mousemove', () => {
        DOMHelper.root.classList.remove('is-mouse-idle'); clearTimeout(mouseIdleTimer);
        if (this.state.currentMedia?.getState() === MEDIA_STATE.PLAYING && !this.uiManager.isContextOpen) { mouseIdleTimer = setTimeout(() => { DOMHelper.root.classList.add('is-mouse-idle'); }, 2500); }
      }, {}, 'app');
    }

    destroy() {
      const layout = DOMHelper.select(DOM_SELECTORS.ROOT);
      if (layout) layout.classList.add('is-closing');
      this.appEvents.emit('PLAYER:FORCE_PAUSE');
      EventRegistry.clear('app'); 
      this.observers.forEach(obs => obs.disconnect());
      
      try { this.state.currentMedia?.destroy(); } catch (e) {}
      try { this.state.currentAmbient?.destroy(); } catch (e) {}
      
      setTimeout(() => { 
        if (layout) layout.style.display = 'none'; 
      }, 600);
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
      if (!window.ytCallbacks) window.ytCallbacks = [];
      const initStory = async () => {
        window.storyInstance = new NextGenStory();
        const isReady = await window.storyInstance.initialize();
        if (isReady) {
          window.storyInstance.state.isApiReady = true;
          window.storyInstance.playerManager.updateVideoCore();
        }
      }

      if (window.YT && window.YT.Player) {
        initStory();
      } else {
        window.ytCallbacks.push(initStory);
        if (!document.querySelector('script[src*="youtube.com/iframe_api"]')) {
          const scriptTag = document.createElement('script');
          scriptTag.src = 'https://www.youtube.com/iframe_api';
          document.head.appendChild(scriptTag);
          window.onYouTubeIframeAPIReady = () => { window.ytCallbacks.forEach(cb => cb()); };
        }
      }
  });

  })();
  </script>
</body>
