<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Telkomsel Story - Floating Card Layout</title>
        <style>
            /* --- 1. DESIGN TOKENS --- */
            :root {
                --brand-red: #EE2D24;
                --brand-dark: #000000;
                --surface: #ffffff;
                --text-main: #1a1a1a;
                --text-sub: #666666;
                --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
                --ease-spring: cubic-bezier(0.4, 1.2, 0.5, 1);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }
            body {
                background: var(--brand-dark);
                height: 100dvh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                overflow: hidden;
                touch-action: none;
            }

            /* --- 2. STORY CONTAINER (WADAH UTAMA) --- */
            .story-container {
                position: relative;
                width: 100%;
                max-width: 430px;
                height: 100%;
                background: #000;
                /* Di mobile, disembunyikan agar bottom sheet tidak tembus kiri-kanan */
                overflow: hidden;
                transition: border-radius 0.5s;
            }

            .story-viewport {
                position: absolute;
                inset: 0;
                z-index: 10;
                /* Z-index lebih tinggi dari Card Desktop */
                background: #000;
                transition: transform 0.6s var(--ease-spring), filter 0.6s var(--ease-out), border-radius 0.6s var(--ease-out);
                will-change: transform, filter;
            }

            .video-wrapper {
                position: relative;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #000;
            }
            #ytPlayer {
                width: 100%;
                height: 100%;
                border: none;
                pointer-events: none;
                transform: scale(1.3);
            }

            .story-progress-bar {
                position: absolute;
                top: 15px;
                left: 12px;
                right: 12px;
                height: 2px;
                background: rgba(255,255,255,0.2);
                z-index: 10;
                border-radius: 10px;
            }
            .story-progress-bar__fill {
                height: 100%;
                background: #fff;
                width: 0;
                transition: width 0.1s linear;
            }

            /* --- 3. SKELETON A: BOTTOM SHEET (MOBILE) --- */
            .bottom-sheet {
                position: absolute;
                inset: 0;
                z-index: 100;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                visibility: hidden;
                pointer-events: none;
            }
            .bottom-sheet.is-active {
                visibility: visible;
            }

            .bottom-sheet__backdrop {
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,0.6);
                opacity: 0;
                transition: opacity 0.4s;
                pointer-events: auto;
            }
            .bottom-sheet.is-active .bottom-sheet__backdrop {
                opacity: 1;
            }

            .bottom-sheet__content {
                position: relative;
                background: var(--surface);
                border-radius: 28px 28px 0 0;
                width: 100%;
                padding: 12px 24px 40px;
                z-index: 101;
                transform: translateY(100%);
                pointer-events: auto;
                max-height: 85vh;
                overflow-y: auto;
                transition: transform 0.5s var(--ease-spring);
            }
            .bottom-sheet__content.is-dragging {
                transition: none;
                cursor: grabbing !important;
            }
            .bottom-sheet.is-active .bottom-sheet__content {
                transform: translateY(0);
            }

            .bottom-sheet__handle-wrapper {
                width: 100%;
                padding: 8px 0 20px;
                cursor: grab;
                display: flex;
                justify-content: center;
            }
            .bottom-sheet__handle {
                width: 40px;
                height: 5px;
                background: #E0E0E0;
                border-radius: 10px;
            }

            /* --- 4. SKELETON B: FLOATING CARD (DESKTOP) --- */
            .desktop-card {
                position: absolute;
                top: 0;
                right: 0;
                bottom: 0;
                /* Mengikuti tinggi video */
                width: 400px;
                background: var(--surface);
                border-radius: 28px;
                padding: 50px 32px 40px;
                z-index: 5;
                /* Berada di bawah story-viewport */
                opacity: 0;
                pointer-events: none;

                /* Mulai bersembunyi tepat di belakang video dengan sedikit mengecil */
                transform: translateX(0) scale(0.9);
                transition: all 0.6s var(--ease-spring);
                box-shadow: 0 10px 40px rgba(0,0,0,0.15);
                overflow-y: auto;
            }

            /* Class saat Card aktif/terbuka */
            .desktop-card.is-active {
                opacity: 1;
                pointer-events: auto;
                /* Bergeser ke kanan sebesar lebar elemennya (100%) + Gap (24px) */
                transform: translateX(calc(100% + 24px)) scale(1);
            }

            .desktop-card__close-btn {
                position: absolute;
                top: 20px;
                right: 24px;
                width: 36px;
                height: 36px;
                border: none;
                background: #f2f2f2;
                border-radius: 50%;
                font-size: 16px;
                font-weight: bold;
                color: var(--text-main);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s;
            }
            .desktop-card__close-btn:hover {
                background: #e0e0e0;
            }

            /* --- 5. SHARED CONTENT STYLES --- */
            .view {
                display: none;
            }
            .view.is-active {
                display: block;
                animation: viewFadeIn 0.4s var(--ease-out);
            }
            @keyframes viewFadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .category-badge {
                background: #f2f2f2;
                color: var(--text-sub);
                font-size: 10px;
                font-weight: 800;
                text-transform: uppercase;
                padding: 4px 10px;
                border-radius: 6px;
                display: inline-block;
                margin-bottom: 12px;
            }
            .view-title {
                font-size: 20px;
                font-weight: 800;
                color: var(--text-main);
                margin-bottom: 4px;
                line-height: 1.3;
            }
            .view-meta {
                font-size: 12px;
                color: var(--text-sub);
                margin-bottom: 20px;
                display: block;
            }

            .content-body__text {
                font-size: 15px;
                color: var(--text-sub);
                line-height: 1.6;
                max-height: 80px;
                overflow: hidden;
                position: relative;
                transition: max-height 0.5s var(--ease-spring);
            }
            .content-body.is-expanded .content-body__text {
                max-height: 1000px;
            }

            .content-body__toggle {
                color: var(--brand-red);
                font-weight: 700;
                font-size: 14px;
                cursor: pointer;
                display: inline-block;
                padding: 10px 0;
            }

            .tags-container {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin: 16px 0 24px;
            }
            .tag-item {
                color: var(--brand-red);
                font-size: 13px;
                font-weight: 600;
                text-decoration: none;
            }

            .btn-group {
                display: flex;
                gap: 12px;
            }
            .btn-base {
                border: none;
                border-radius: 16px;
                font-weight: 700;
                font-size: 15px;
                cursor: pointer;
                transition: all 0.3s var(--ease-out);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 18px;
            }
            .btn-base--primary {
                flex: 3;
                background: var(--brand-red);
                color: #fff;
            }
            .btn-base--secondary {
                flex: 1.2;
                background: #F2F2F2;
                color: var(--text-main);
            }
            .btn-base:hover {
                transform: translateY(-2px);
                filter: brightness(1.05);
            }
            .btn-base:active {
                transform: scale(0.95);
            }

            .share-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                margin: 10px 0 24px;
            }
            .share-item {
                text-align: center;
                font-size: 11px;
                color: var(--text-sub);
                font-weight: 600;
                cursor: pointer;
            }
            .share-icon {
                width: 56px;
                height: 56px;
                background: #F8F8F8;
                border-radius: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 22px;
                margin: 0 auto 8px;
            }

            .toast {
                position: fixed;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%) translateY(40px);
                background: rgba(0,0,0,0.9);
                color: white;
                padding: 14px 28px;
                border-radius: 50px;
                font-size: 14px;
                font-weight: 600;
                z-index: 2000;
                opacity: 0;
                transition: all 0.4s var(--ease-spring);
                pointer-events: none;
            }
            .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            .story-ui-trigger {
                position: absolute;
                bottom: 40px;
                left: 24px;
                right: 24px;
                z-index: 15;
                color: #fff;
                cursor: pointer;
                transition: transform 0.3s;
            }
            .story-ui-trigger:active {
                transform: scale(0.98);
            }

            /* Animasi fokus mobile */
            .story-container.is-focused .story-viewport {
                transform: scale(0.92);
                border-radius: 32px;
                filter: blur(10px) brightness(0.6);
            }

            /* --- 6. SCOPE ISOLATION (MEDIA QUERIES) --- */
            @media (max-width: 767px) {
                .desktop-card {
                    display: none !important;
                }
            }

            @media (min-width: 768px) {
                .bottom-sheet {
                    display: none !important;
                }

                /* PENTING: Buka overflow agar Card bisa keluar dari wadah utama */
                .story-container {
                    overflow: visible;
                    border-radius: 20px;
                }

                /* Berikan border-radius pada video di desktop */
                .story-viewport {
                    border-radius: 20px;
                    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
                    /* Efek melayang untuk video */
                }

                /* Matikan animasi blur bawaan mobile untuk desktop */
                .story-container.is-focused .story-viewport {
                    transform: none !important;
                    filter: none !important;
                }
            }
        </style>
    </head>
    <body>

        <div class="story-container" id="storyApp">

            <div class="story-viewport">
                <div class="story-progress-bar">
                    <div class="story-progress-bar__fill" id="pFill"></div>
                </div>
                <div class="video-wrapper">
                    <div id="ytPlayer"></div>
                </div>

                <div class="story-ui-trigger" onclick="StoryManager.open()">
                    <span class="category-badge" style="background: rgba(255,255,255,0.2); color: #fff; backdrop-filter: blur(4px); margin-bottom: 8px;">Product Insight</span>
                    <h2 style="font-size: 24px; margin-bottom: 6px; text-shadow: 0 2px 15px rgba(0,0,0,0.6);">Gaming Performa Cerdas 🔥</h2>
                    <p style="font-size: 14px; opacity: 0.8; display: flex; align-items: center; gap: 6px;">
                        Cek Detail Produk
                        <span style="font-size: 18px;">↗</span>
                    </p>
                </div>
            </div>

            <div class="bottom-sheet" id="mobileSkeleton">
                <div class="bottom-sheet__backdrop" onclick="StoryManager.close()"></div>
                <div class="bottom-sheet__content" id="mobileSheetContent">
                    <div class="bottom-sheet__handle-wrapper" id="sheetHandle">
                        <div class="bottom-sheet__handle"></div>
                    </div>
                    <div class="dynamic-content-area"></div>
                </div>
            </div>

            <div class="desktop-card" id="desktopSkeleton">
                <button class="desktop-card__close-btn" onclick="StoryManager.close()">✕</button>
                <div class="dynamic-content-area"></div>
            </div>
        </div>

        <div id="toast" class="toast">Link berhasil disalin!</div>

        <template id="storyContentTemplate">
            <div class="view js-view-detail is-active">
                <span class="category-badge">Education & Technology</span>
                <h3 class="view-title">GApai Mimpi dan rankING = GAMING</h3>
                <span class="view-meta">Oleh okemudin • 1.4M Penonton</span>

                <div class="content-body">
                    <div class="content-body__text">
                        <p>Laptop Asus G Gaming K16 adalah laptop tangguh yang punya performa cerdas untuk memaksimalkan potensi kerja kreatif yang bisa main game.</p><br>
                        <p>Dilengkapi CPU Intel Core i5 generasi ke-13, GPU RTX 3050, dan fitur AI Noise Cancelling untuk kejernihan suara saat meeting. Menggunakan teknologi Asus IceCool agar tetap dingin!</p><br>
                        <p>Bobot hanya 1.8 Kg, slim namun bertenaga. Harga spesial Rp11.495.000!</p>
                    </div>
                    <span class="content-body__toggle" onclick="StoryManager.toggleMore(this)">Selengkapnya</span>

                    <div class="tags-container">
                        <a href="#" class="tag-item">#AsusGaming</a>
                        <a href="#" class="tag-item">#LaptopReview</a>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn-base btn-base--primary" onclick="window.open('https://www.youtube.com/shorts/504Fi_Y4qMo')">BELI SEKARANG</button>
                    <button class="btn-base btn-base--secondary" onclick="StoryManager.switchView('js-view-share')">BAGIKAN</button>
                </div>
            </div>

            <div class="view js-view-share">
                <h3 class="view-title" style="text-align: center; margin-bottom: 24px;">Bagikan Ke Teman</h3>
                <div class="share-grid">
                    <div class="share-item">
                        <div class="share-icon">💬</div>WA</div>
                    <div class="share-item">
                        <div class="share-icon">✈️</div>Telegram</div>
                    <div class="share-item">
                        <div class="share-icon">📸</div>Stories</div>
                    <div class="share-item" onclick="StoryManager.copyLink()">
                        <div class="share-icon">🔗</div>Salin</div>
                </div>
                <button class="btn-base btn-base--secondary" style="width: 100%" onclick="StoryManager.switchView('js-view-detail')">KEMBALI</button>
            </div>
        </template>

        <script src="https://www.youtube.com/iframe_api"></script>
        <script>
            let player;
            function onYouTubeIframeAPIReady() {
                player = new YT.Player('ytPlayer', {
                    videoId: '504Fi_Y4qMo',
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'loop': 1,
                        'playlist': '504Fi_Y4qMo',
                        'mute': 1,
                        'modestbranding': 1,
                        'iv_load_policy': 3,
                        'rel': 0
                    },
                    events: {
                        'onReady': (e) => {
                            e
                                .target
                                .playVideo();
                            StoryManager.startProgress();
                        }
                    }
                });
            }

            const StoryManager = (() => {
                const state = {
                    isOpen: false,
                    progress: 0,
                    startY: 0,
                    currentY: 0,
                    isDragging: false
                };

                const refs = {
                    app: document.getElementById('storyApp'),
                    pFill: document.getElementById('pFill'),
                    mobileSkeleton: document.getElementById('mobileSkeleton'),
                    mobileContent: document.getElementById('mobileSheetContent'),
                    mobileHandle: document.getElementById('sheetHandle'),
                    desktopSkeleton: document.getElementById('desktopSkeleton'),
                    template: document.getElementById('storyContentTemplate'),
                    toast: document.getElementById('toast')
                };

                const isDesktop = () => window.innerWidth >= 768;
                const getActiveContext = () => isDesktop()
                    ? refs.desktopSkeleton
                    : refs.mobileSkeleton;

                // --- INJECT CONTENT SAAT HALAMAN DILOAD ---
                const injectToContext = (context) => {
                    const targetArea = context.querySelector('.dynamic-content-area');
                    if (targetArea && targetArea.innerHTML.trim() === '') {
                        const clone = refs
                            .template
                            .content
                            .cloneNode(true);
                        targetArea.appendChild(clone);
                    }
                };

                injectToContext(refs.mobileSkeleton);
                injectToContext(refs.desktopSkeleton);

                // --- PROGRESS BAR ---
                const startProgress = () => {
                    setInterval(() => {
                        if (!state.isOpen && state.progress < 100) {
                            state.progress += 0.15;
                            refs.pFill.style.width = `${state.progress}%`;
                        }
                    }, 30);
                };

                // --- OPEN / CLOSE UNTUK MOBILE & DESKTOP ---
                const open = () => {
                    state.isOpen = true;
                    refs
                        .app
                        .classList
                        .add('is-focused');

                    // Mengaktifkan skeleton yang sesuai dengan device
                    getActiveContext()
                        .classList
                        .add('is-active');

                    if (!isDesktop()) 
                        refs.mobileContent.style.transform = '';
                    if (player) 
                        player.pauseVideo();
                    };
                
                const close = () => {
                    state.isOpen = false;
                    refs
                        .app
                        .classList
                        .remove('is-focused');

                    // Menutup kedua skeleton untuk amannya
                    refs
                        .mobileSkeleton
                        .classList
                        .remove('is-active');
                    refs
                        .desktopSkeleton
                        .classList
                        .remove('is-active');

                    switchView('js-view-detail');
                    if (player) 
                        player.playVideo();
                    };
                
                // --- UI INTERACTIONS ---
                const toggleMore = (btnEl) => {
                    const container = btnEl.closest('.content-body');
                    const isExpanded = container
                        .classList
                        .toggle('is-expanded');
                    btnEl.innerText = isExpanded
                        ? "Sembunyikan"
                        : "Selengkapnya";
                };

                const switchView = (targetClass) => {
                    const ctx = getActiveContext();
                    const views = ctx.querySelectorAll('.view');
                    views.forEach(v => v.classList.remove('is-active'));
                    ctx
                        .querySelector(`.${targetClass}`)
                        .classList
                        .add('is-active');
                };

                const copyLink = () => {
                    navigator
                        .clipboard
                        .writeText("https://www.youtube.com/shorts/504Fi_Y4qMo")
                        .then(() => {
                            refs
                                .toast
                                .classList
                                .add('show');
                            setTimeout(() => refs.toast.classList.remove('show'), 2000);
                        });
                };

                // --- DRAG ENGINE (KHUSUS MOBILE) ---
                const initMobileDrag = () => {
                    const handleDragStart = (e) => {
                        if (isDesktop()) 
                            return;
                        state.startY = e
                            .type
                            .includes('touch')
                                ? e
                                    .touches[0]
                                    .clientY
                                : e.clientY;
                        state.isDragging = true;
                        refs
                            .mobileContent
                            .classList
                            .add('is-dragging');
                    };

                    const handleDragMove = (e) => {
                        if (!state.isDragging || isDesktop()) 
                            return;
                        const y = e
                            .type
                            .includes('touch')
                                ? e
                                    .touches[0]
                                    .clientY
                                : e.clientY;
                        const deltaY = y - state.startY;

                        if (deltaY > 0) {
                            state.currentY = deltaY;
                            refs.mobileContent.style.transform = `translateY(${deltaY}px)`;
                        }
                    };

                    const handleDragEnd = () => {
                        if (!state.isDragging || isDesktop()) 
                            return;
                        state.isDragging = false;
                        refs
                            .mobileContent
                            .classList
                            .remove('is-dragging');

                        if (state.currentY > 150) {
                            close();
                        } else {
                            refs.mobileContent.style.transform = `translateY(0)`;
                        }
                        state.currentY = 0;
                    };

                    [refs.mobileHandle, refs.mobileContent].forEach(el => {
                        el.addEventListener('mousedown', handleDragStart);
                        el.addEventListener('touchstart', handleDragStart, {passive: true});
                    });

                    window.addEventListener('mousemove', handleDragMove);
                    window.addEventListener('touchmove', handleDragMove, {passive: false});
                    window.addEventListener('mouseup', handleDragEnd);
                    window.addEventListener('touchend', handleDragEnd);
                };

                initMobileDrag();

                return {
                    startProgress,
                    open,
                    close,
                    toggleMore,
                    switchView,
                    copyLink
                };
            })();
        </script>
    </body>
</html>
