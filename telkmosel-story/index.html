<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Video Story Component</title>

        <link rel="stylesheet" href="./styles.css">

        <style>
            /* CSS Reset & Styling Basic Halaman Depan */
            *,
            *::after,
            *::before {
                box-sizing: border-box;
            }
            body {
                font-family: 'Arial', sans-serif;
                margin: 0;
                padding: 0;
                background-color: #fafafb;
            }
            .header-title {
                text-align: center;
                color: #001A41;
                margin-top: 40px;
            }
            .thumbnail-container {
                display: flex;
                gap: 20px;
                padding: 24px;
                justify-content: center;
                flex-wrap: wrap;
            }
            .video-thumbnail {
                cursor: pointer;
                background: #fff;
                border-radius: 16px;
                padding: 20px;
                text-align: center;
                border: 2px solid #e9e8ed;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
                transition: transform 0.2s ease, border-color 0.2s ease;
                width: 220px;
            }
            .video-thumbnail:hover {
                transform: translateY(-5px);
                border-color: #ed0226;
            }
            .video-thumbnail h3 {
                margin: 0 0 10px;
                font-size: 18px;
                color: #001A41;
            }
            .video-thumbnail p {
                margin: 0;
                font-size: 14px;
                color: #666;
            }
        </style>
    </head>
    <body>

        <h2 class="header-title">Pilih Video Story</h2>

        <div class="thumbnail-container">

            <div class="video-thumbnail" data-story-group="data-story-group" data-story-format="default">
                <h3>🎬 Story 1</h3>
                <p>Default (YouTube)</p>

                <div style="display: none;">
                    <div data-story-item="data-story-item" data-story-id="vid-001" data-story-type="youtube" data-story-url="https://www.youtube.com/embed/IHolHlnDP9s" data-story-title="Pantes aja betah dan ketinggalan di rumah!" data-story-views="380" data-story-desc-content="<p>Ini adalah deskripsi lucu dari video pertama. Tonton sampe habis yaa! 😁 #komedi</p>"></div>
                </div>
            </div>

            <div class="video-thumbnail" data-story-group="data-story-group" data-story-format="default">
                <h3>🎬 Story 2</h3>
                <p>Default (MP4)</p>

                <div style="display: none;">
                    <div data-story-item="data-story-item" data-story-id="vid-002" data-story-type="mp4" data-story-url="https://assets.telkomsel.com/public/2025-08/simpati-terbaikuntukmu-video-content.mp4" data-story-title="Seru banget jalan-jalan hari ini! ✈️" data-story-views="5.4K" data-story-desc-content="<p>Vlog perjalanan seru ke tempat-tempat indah. Ikuti perjalanannya dari awal sampai akhir.</p>"></div>
                </div>
            </div>

            <div class="video-thumbnail" data-story-group="data-story-group" data-story-format="webstory">
                <h3>📱 IG Story Style</h3>
                <p>3 Segmen (Video & Gambar)</p>

                <div style="display: none;">
                    <div data-story-item="data-story-item" data-story-id="ws-001" data-story-type="mp4" data-story-url="https://assets.telkomsel.com/public/2025-08/simpati-terbaikuntukmu-video-content.mp4" data-story-title="🎉 Promo Spesial 1" data-story-desc-content="<p>Tonton video ini sampai habis!</p>"></div>

                    <div data-story-item="data-story-item" data-story-id="ws-002" data-story-type="image" data-story-url="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1000&auto=format&fit=crop" data-story-title="🎮 Mode Gaming" data-story-desc-content="<p>Mabar makin lancar pakai layanan terbaik kami!</p>"></div>

                    <div data-story-item="data-story-item" data-story-id="ws-003" data-story-type="mp4" data-story-url="https://assets.telkomsel.com/public/2025-08/simpati-terbaikuntukmu-video-content.mp4" data-story-title="🚀 Extra Kuota" data-story-desc-content="<p>Dapatkan sekarang juga di aplikasi.</p>"></div>
                </div>
            </div>

        </div>

        <script src="./script.js"></script>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const groups = document.querySelectorAll('[data-story-group]');

                groups.forEach(group => {
                    group.addEventListener('click', function () {
                        new VideoStoryPlayer({
                            triggerGroup: this,
                            nestedIndex: 0,
                            onClose: () => document
                                .body
                                .classList
                                .remove('no-scroll')
                        });
                        document
                            .body
                            .classList
                            .add('no-scroll');
                    });
                });

                // Auto-play via parameter URL (misal: ?video=ws-002)
                VideoStoryPlayer.initFromURL();
            });
        </script>
    </body>
</html>
