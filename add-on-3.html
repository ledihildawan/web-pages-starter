<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CUBE CSS Refactor - Final Enterprise Architecture</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

        <style>
            @layer reset, global, composition, block, exception, utility;

            @layer reset {
                *,
                *::after,
                *::before {
                    box-sizing: border-box;
                    background-repeat: no-repeat;
                }
                * {
                    margin: 0;
                    padding: 0;
                }
                html {
                    -webkit-text-size-adjust: none;
                    line-height: 1.5;
                    -webkit-font-smoothing: antialiased;
                    block-size: 100%;
                }
                body {
                    min-block-size: 100%;
                }
                img,
                svg {
                    display: block;
                    max-inline-size: 100%;
                }
                svg:not([fill]) {
                    fill: currentColor;
                }
                a {
                    text-decoration: none;
                    color: inherit;
                    text-decoration-skip-ink: all;
                }
                button {
                    font: inherit;
                    line-height: 1.1;
                }
                h3,
                p {
                    overflow-wrap: break-word;
                }
                p {
                    text-wrap: pretty;
                }
            }

            @layer global {
                :root {
                    --gradient-purple: linear-gradient(to bottom, #bb2dff 0%, #8a12d8 22%, #5a0298 48%, #2f004f 78%, #140021 100%);
                    --gradient-orange: linear-gradient(to bottom, #ff860f 0%, #f07a09 22%, #d96b05 48%, #9a4700 78%, #4d2300 100%);
                    --gradient-blue: linear-gradient(to bottom, #1877f2 0%, #1568d4 22%, #1258b5 48%, #0c3f80 78%, #052142 100%);

                    --text-inverted: #FFF;
                    --overlay-white-25: color-mix(in srgb, var(--text-inverted) 25%, transparent);

                    --radius-l: clamp(1rem, 2vw, 1.5rem);
                    --radius-pill: 200px;

                    --fs-title: clamp(0.875rem, calc(0.875rem + 0.375 * ((100vw - 23.4375rem) / 66.5625)), 1.25rem);
                    --lh-title: clamp(1.25rem, calc(1.25rem + 0.5 * ((100vw - 23.4375rem) / 66.5625)), 1.75rem);

                    --fs-small: clamp(0.75rem, calc(0.75rem + 0.25 * ((100vw - 23.4375rem) / 66.5625)), 1rem);
                    --lh-small: clamp(1rem, calc(1rem + 0.5 * ((100vw - 23.4375rem) / 66.5625)), 1.5rem);

                    --h-button: clamp(1.5rem, calc(1.5rem + 0.5 * ((100vw - 23.4375rem) / 66.5625)), 2rem);

                    --size-icon-sm: round(nearest, clamp(0.875rem, calc(0.875rem + 0.375 * ((100vw - 23.4375rem) / 66.5625)), 1.25rem), 1px);
                    --size-icon-md: round(nearest, clamp(1rem, calc(1rem + 0.5 * ((100vw - 23.4375rem) / 66.5625)), 1.5rem), 1px);
                }

                body {
                    font-family: 'Poppins', sans-serif;
                    padding: clamp(1rem, 3vw, 2rem);
                }
            }

            @layer composition {
                .l-grid {
                    display: grid;
                    grid-template-columns: repeat(4, 1fr);
                    gap: clamp(0.5rem, 1.5vw, 1rem);
                    max-inline-size: 80rem;
                    margin-inline: auto;
                }
            }

            @layer block {
                .card {
                    display: flex;
                    flex-direction: column;
                    justify-content: flex-end;
                    align-items: center;
                    gap: 1.5rem;
                    overflow: hidden;
                    border-radius: var(--radius-l);

                    --card-padding: 1rem;
                    --card-align: flex-start;
                    --card-text-align: left;

                    padding: var(--card-padding);

                    @media (width >= 60rem) {
                        --card-padding: 2.25rem 1rem 1.5rem;
                        --card-align: center;
                        --card-text-align: center;
                    }

                    & .media {
                        aspect-ratio: 1 / 1;
                        inline-size: clamp(7.5rem, 30%, 13.75rem);
                        flex-shrink: 0;
                        display: grid;
                        place-items: center;
                    }
                    & .media picture {
                        display: contents;
                    }
                    & .media img {
                        inline-size: 100%;
                        block-size: 100%;
                        object-fit: contain;
                    }

                    & .content {
                        display: flex;
                        flex-direction: column;
                        gap: 0.5rem;
                        inline-size: 100%;
                        flex-grow: 1;
                        justify-content: flex-end;
                        align-items: var(--card-align);
                        text-align: var(--card-text-align);
                    }

                    & .title-wrapper {
                        inline-size: 100%;
                        min-block-size: 3.75rem;
                        display: flex;
                        align-items: center;
                        justify-content: var(--card-align);
                    }

                    & .title {
                        color: var(--text-inverted);
                        font-weight: 600;
                        font-size: var(--fs-title);
                        line-height: var(--lh-title);
                        display: -webkit-box;
                        -webkit-line-clamp: 3;
                        -webkit-box-orient: vertical;
                        overflow: hidden;
                    }
                }

                .badge {
                    display: inline-flex;
                    align-items: center;
                    gap: 0.25rem;
                    border-radius: var(--radius-pill);
                    background: var(--overlay-white-25);
                    color: var(--text-inverted);
                    font-weight: 600;
                    font-size: var(--fs-small);
                    line-height: var(--lh-small);
                    padding: 0.25rem 1rem;
                    max-inline-size: 100%;

                    & span:last-child {
                        white-space: nowrap;
                        overflow: hidden;
                        text-overflow: ellipsis;
                    }
                }

                .button {
                    display: inline-flex;
                    align-items: center;
                    gap: 0.25rem;
                    background: transparent;
                    color: var(--text-inverted);
                    border: none;
                    font-size: var(--fs-small);
                    line-height: var(--lh-small);
                    min-block-size: var(--h-button);
                    cursor: pointer;

                    @media (width >= 60rem) {
                        gap: 0.5rem;
                    }

                    & .icon-wrapper {
                        --icon-size: var(--size-icon-md);
                        --icon-scale: 66%;
                    }
                }

                .icon-wrapper {
                    display: grid;
                    place-items: center;
                    flex-shrink: 0;
                    inline-size: var(--icon-size, var(--size-icon-sm));
                    block-size: var(--icon-size, var(--size-icon-sm));

                    & svg {
                        block-size: var(--icon-scale, 100%);
                        inline-size: auto;
                    }
                }
            }

            @layer exception {
                .l-grid[data-layout="1x2x1"] {
                    & > :first-child,
                    & > :last-child {
                        grid-column: 1 / -1;
                        flex-direction: row-reverse;
                        & .content {
                            gap: 1.5rem;
                        }
                        & .title-wrapper {
                            min-block-size: 3.5rem;
                        }
                    }
                    & > :nth-child(2) {
                        grid-column: 1 / 3;
                    }
                    & > :nth-child(3) {
                        grid-column: 3 / 5;
                    }

                    & > :nth-child(2),
                    & > :nth-child(3) {
                        --card-padding: 1rem 0.75rem;
                        --card-align: center;
                        --card-text-align: center;
                    }

                    @media (width >= 60rem) {
                        & > * {
                            grid-column: auto !important;
                        }
                        & > :first-child,
                        & > :last-child {
                            flex-direction: column;
                            & .content {
                                gap: 0.75rem;
                            }
                        }
                        & > :nth-child(2),
                        & > :nth-child(3) {
                            --card-padding: revert-layer;
                            --card-align: revert-layer;
                            --card-text-align: revert-layer;
                        }
                    }
                }

                .l-grid[data-layout="1x2"] {
                    & > :first-child {
                        grid-column: 1 / -1;
                        flex-direction: row-reverse;
                        & .title-wrapper {
                            min-block-size: 3.5rem;
                        }
                    }
                    & > :nth-child(2) {
                        grid-column: 1 / 3;
                    }
                    & > :nth-child(3) {
                        grid-column: 3 / 5;
                    }

                    & > :nth-child(2),
                    & > :nth-child(3) {
                        --card-padding: 1rem 0.75rem;
                        --card-align: center;
                        --card-text-align: center;
                    }

                    @media (width >= 60rem) {
                        grid-template-columns: repeat(3, 1fr);
                        & > * {
                            grid-column: auto !important;
                        }
                        & > :first-child {
                            flex-direction: column;
                        }
                        & > :nth-child(2),
                        & > :nth-child(3) {
                            --card-padding: revert-layer;
                            --card-align: revert-layer;
                            --card-text-align: revert-layer;
                        }
                    }
                }

                .l-grid[data-layout="2x2"] {
                    & > * {
                        grid-column: span 2;
                        --card-padding: 1rem 0.75rem;
                        --card-align: center;
                        --card-text-align: center;
                    }

                    @media (width >= 60rem) {
                        & > * {
                            grid-column: auto !important;
                            --card-padding: revert-layer;
                            --card-align: revert-layer;
                            --card-text-align: revert-layer;
                        }
                    }
                }
            }

            @layer utility {
                .u-bg-purple {
                    background: var(--gradient-purple) !important;
                }
                .u-bg-orange {
                    background: var(--gradient-orange) !important;
                }
                .u-bg-blue {
                    background: var(--gradient-blue) !important;
                }
            }
        </style>
    </head>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const applyTooltipIfTruncated = (elements) => {
                    elements.forEach(el => {
                        if (el.scrollHeight > el.clientHeight || el.scrollWidth > el.clientWidth) {
                            el.setAttribute('title', el.textContent.trim());
                        }
                    });
                };
                applyTooltipIfTruncated(document.querySelectorAll('.title, .badge span:last-child'));
            });
        </script>
