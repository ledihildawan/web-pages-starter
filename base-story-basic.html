<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>Telkomsel Story - Desktop Integrated Edition</title>
        <style>
            :root {
                --brand-red: #EE2D24;
                --brand-dark: #000000;
                --surface: #ffffff;
                --text-main: #1a1a1a;
                --text-sub: #666666;
                --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
                --ease-spring: cubic-bezier(0.4, 1.2, 0.5, 1);
                --container-width: 430px;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }

            body {
                background: #0f0f0f;
                height: 100vh;
                height: 100dvh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                overflow: hidden;
            }

            /* --- MAIN CONTAINER --- */
            .story-container {
                position: relative;
                width: 100%;
                max-width: var(--container-width);
                height: 100%;
                max-height: 900px;
                background: #000;
                overflow: hidden;
                box-shadow: 0 40px 100px rgba(0,0,0,0.8);
                display: flex;
                flex-direction: column;
            }

            /* Desktop Specific: Rounded Corners */
            @media (min-width: 481px) {
                .story-container {
                    border-radius: 24px;
                    border: 1px solid rgba(255,255,255,0.1);
                }
            }

            @media (max-width: 480px) {
                .story-container {
                    max-width: 100%;
                    max-height: 100%;
                    border-radius: 0;
                }
            }

            /* --- VIDEO VIEWPORT --- */
            .story-viewport {
                position: relative;
                flex: 1;
                /* Di desktop, ini akan berbagi ruang dengan detail jika diperlukan */
                width: 100%;
                overflow: hidden;
                background: #000;
            }

            #ytPlayer {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 100%;
                height: 100%;
                transform: translate(-50%, -50%) scale(1.6);
                pointer-events: none;
            }

            .story-progress-bar {
                position: absolute;
                top: calc(15px + env(safe-area-inset-top));
                left: 12px;
                right: 12px;
                height: 3px;
                background: rgba(255,255,255,0.2);
                z-index: 20;
                border-radius: 10px;
            }
            .story-progress-bar__fill {
                height: 100%;
                background: var(--brand-red);
                width: 0;
                transition: width 0.1s linear;
            }

            /* --- BOTTOM SHEET & INTEGRATED DETAIL --- */
            .bottom-sheet {
                position: absolute;
                inset: 0;
                z-index: 100;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
            }

            .bottom-sheet__content {
                position: relative;
                background: var(--surface);
                width: 100%;
                padding: 24px;
                z-index: 101;
                transition: transform 0.5s var(--ease-spring);
            }

            /* LAYOUT DESKTOP: v-detail langsung tampil */
            @media (min-width: 481px) {
                .bottom-sheet {
                    position: relative;
                    /* Menjadi bagian dari flow container */
                    visibility: visible !important;
                    pointer-events: auto !important;
                }
                .bottom-sheet__backdrop,
                .bottom-sheet__handle-wrapper,
                .story-ui-trigger {
                    display: none !important;
                    /* Hilangkan elemen interaksi mobile */
                }
                .bottom-sheet__content {
                    transform: translateY(0) !important;
                    border-radius: 0;
                    box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
                }
                .story-viewport {
                    flex: 1.2;
                    /* Berikan ruang lebih untuk video */
                }
            }

            /* LAYOUT MOBILE: Tetap sebagai Swipe-up */
            @media (max-width: 480px) {
                .bottom-sheet {
                    visibility: hidden;
                    pointer-events: none;
                }
                .bottom-sheet.is-active {
                    visibility: visible;
                }
                .bottom-sheet__content {
                    border-radius: 28px 28px 0 0;
                    transform: translateY(100%);
                    pointer-events: auto;
                    max-height: 70dvh;
                    padding-bottom: calc(24px + env(safe-area-inset-bottom));
                }
                .bottom-sheet.is-active .bottom-sheet__content {
                    transform: translateY(0);
                }
                .bottom-sheet__backdrop {
                    position: absolute;
                    inset: 0;
                    background: rgba(0,0,0,0.7);
                    backdrop-filter: blur(8px);
                    opacity: 0;
                    transition: opacity 0.4s;
                    pointer-events: auto;
                }
                .bottom-sheet.is-active .bottom-sheet__backdrop {
                    opacity: 1;
                }
            }

            /* --- UI ELEMENTS --- */
            .story-ui-trigger {
                position: absolute;
                bottom: 30px;
                left: 20px;
                right: 20px;
                z-index: 5;
                color: #fff;
                cursor: pointer;
            }

            .category-badge {
                background: #f2f2f2;
                color: var(--text-sub);
                font-size: 10px;
                font-weight: 800;
                text-transform: uppercase;
                padding: 4px 10px;
                border-radius: 6px;
                display: inline-block;
                margin-bottom: 12px;
            }

            .view-title {
                font-size: 20px;
                font-weight: 800;
                color: var(--text-main);
                line-height: 1.2;
                margin-bottom: 8px;
            }

            .content-text {
                font-size: 14px;
                color: var(--text-sub);
                line-height: 1.5;
                margin-bottom: 20px;
            }

            .btn-primary {
                background: var(--brand-red);
                color: #fff;
                border: none;
                border-radius: 14px;
                padding: 16px;
                width: 100%;
                font-weight: 700;
                font-size: 15px;
                cursor: pointer;
                transition: transform 0.2s;
            }

            .btn-primary:hover {
                transform: scale(1.02);
                background: #d12018;
            }

            .bottom-sheet__handle-wrapper {
                width: 100%;
                padding: 0 0 15px;
                display: flex;
                justify-content: center;
                cursor: grab;
            }

            .bottom-sheet__handle {
                width: 40px;
                height: 4px;
                background: #ddd;
                border-radius: 2px;
            }
        </style>
    </head>
    <body>

        <div class="story-container" id="storyApp">
            <div class="story-viewport" id="viewport">
                <div class="story-progress-bar">
                    <div class="story-progress-bar__fill" id="pFill"></div>
                </div>
                <div class="video-wrapper">
                    <div id="ytPlayer"></div>
                </div>

                <div class="story-ui-trigger" onclick="StoryManager.open()">
                    <span class="category-badge" style="background: rgba(255,255,255,0.2); color: #fff;">Layanan</span>
                    <h2 style="font-size: 22px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">Paket Darurat Telkomsel</h2>
                    <p style="font-size: 13px; opacity: 0.8; margin-top: 5px;">Swipe up untuk detail ↑</p>
                </div>
            </div>

            <div class="bottom-sheet" id="bottomSheet">
                <div class="bottom-sheet__backdrop" onclick="StoryManager.close()"></div>
                <div class="bottom-sheet__content" id="sheetContent">
                    <div class="bottom-sheet__handle-wrapper">
                        <div class="bottom-sheet__handle"></div>
                    </div>

                    <div class="view-content">
                        <span class="category-badge">Edukasi</span>
                        <h3 class="view-title">Solusi Pulsa Habis Saat Darurat</h3>
                        <p class="content-text">
                            Jangan biarkan komunikasi terputus. Aktifkan Paket Darurat Telkomsel dan tetaplah terkoneksi dengan orang tercinta. Bayar kemudian saat isi pulsa!
                        </p>
                        <button class="btn-primary" onclick="window.open('https://www.youtube.com/shorts/HZCPIjJNVYU')">AKTIFKAN SEKARANG</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://www.youtube.com/iframe_api"></script>

        <script>
            let player;
            function onYouTubeIframeAPIReady() {
                player = new YT.Player('ytPlayer', {
                    videoId: 'HZCPIjJNVYU',
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'loop': 1,
                        'playlist': 'HZCPIjJNVYU',
                        'mute': 1,
                        'modestbranding': 1,
                        'rel': 0,
                        'playsinline': 1
                    },
                    events: {
                        'onReady': (e) => {
                            e
                                .target
                                .playVideo();
                            StoryManager.startProgress();
                        },
                        'onStateChange': (e) => {
                            if (e.data === YT.PlayerState.ENDED) 
                                e
                                    .target
                                    .playVideo();
                            }
                        }
                });
            }

            const StoryManager = (() => {
                const state = {
                    isOpen: false
                };
                const isDesktop = () => window.innerWidth > 480;

                const refs = {
                    app: document.getElementById('storyApp'),
                    pFill: document.getElementById('pFill'),
                    sheet: document.getElementById('bottomSheet'),
                    content: document.getElementById('sheetContent')
                };

                const startProgress = () => {
                    setInterval(() => {
                        if (player && player.getCurrentTime) {
                            const dur = player.getDuration();
                            const cur = player.getCurrentTime();
                            if (dur > 0) 
                                refs.pFill.style.width = `${ (cur / dur) * 100}%`;
                            }
                        }, 100);
                };

                const open = () => {
                    if (isDesktop()) 
                        return;
                    state.isOpen = true;
                    refs
                        .sheet
                        .classList
                        .add('is-active');
                    refs
                        .app
                        .classList
                        .add('is-focused'); // Opsional: Beri efek blur pada viewport
                };

                const close = () => {
                    if (isDesktop()) 
                        return;
                    state.isOpen = false;
                    refs
                        .sheet
                        .classList
                        .remove('is-active');
                    refs
                        .app
                        .classList
                        .remove('is-focused');
                };

                // Deteksi Resize untuk menyesuaikan state
                window.addEventListener('resize', () => {
                    if (isDesktop()) {
                        refs
                            .sheet
                            .classList
                            .remove('is-active');
                        refs.content.style.transform = '';
                    }
                });

                return {startProgress, open, close};
            })();
        </script>
    </body>
</html>
