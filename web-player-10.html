  class UIManager {
    #state;
    #activeProgressFill = null;
    #animFrameId = null;
    #lastSyncCheck = 0;
    #flashTimeout = null;
    
    constructor(state) {
      this.#state = state; 
      this.isContextOpen = false;
      this.dom = {
        volumeSlider: DOMHelper.select(DOM_SELECTORS.VOLUME_SLIDER), btnMute: DOMHelper.select(DOM_SELECTORS.BTN_MUTE), progressWrapper: DOMHelper.select(DOM_SELECTORS.PROGRESS_WRAPPER),
        storyContainer: DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER), btnPlay: DOMHelper.select(DOM_SELECTORS.BTN_PLAY), thumbOverlay: DOMHelper.select(DOM_SELECTORS.THUMBNAIL_OVERLAY),
        videoBlur: DOMHelper.select(DOM_SELECTORS.VIDEO_BLUR), ambientMedia: DOMHelper.select(DOM_SELECTORS.AMBIENT_MEDIA), ambientWrapper: DOMHelper.select(DOM_SELECTORS.AMBIENT_WRAPPER),
        mainMedia: DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA), centerPlayIcon: DOMHelper.select(DOM_SELECTORS.CENTER_PLAY_ICON), reactionWrapper: DOMHelper.select(DOM_SELECTORS.REACTION_WRAPPER),
        reactionContainer: DOMHelper.select(DOM_SELECTORS.REACTION_CONTAINER), btnReaction: DOMHelper.select(DOM_SELECTORS.BTN_REACTION),
      };
      
      this.setupEventSubscriptions(); 
      this.dom.volumeSlider?.addEventListener('input', (e) => this.updateVolumeFromSlider(e));
    }

    setupEventSubscriptions() {
      AppEvents.on('UI:SYNC_VOLUME', () => this.syncVolumeUI()); 
      AppEvents.on('UI:RENDER_CORE', (payload) => this.renderCoreUI(payload));
      AppEvents.on('UI:RESET_STATE', () => this.resetVideoStateUI()); 
      AppEvents.on('MEDIA:STATE_CHANGE', (mediaState) => this.handleMediaStateChange(mediaState));
      AppEvents.on('UI:FLASH_ICON', (icon) => this.flashIcon(icon)); 
      AppEvents.on('UI:SHOW_RIPPLE', (data) => this.showRipple(data.side, data.text));
      AppEvents.on('UI:TOGGLE_MUTE', () => this.toggleMute()); 
      AppEvents.on('UI:TOGGLE_CONTEXT', (isOpen) => this.toggleContext(isOpen));
      AppEvents.on('UI:TRIGGER_REACTION', (emoji) => this.triggerReaction(emoji)); 
      AppEvents.on('UI:TOGGLE_REACTION_MENU', () => this.toggleReactionMenu());
      AppEvents.on('UI:TRIGGER_LOCALIZED_REACTION', (data) => this.triggerLocalizedReaction(data.emoji, data.x, data.y));
    }

    syncVolumeUI() {
      const currentVolumeValue = this.#state.isGlobalMuted ? 0 : this.#state.volume;
      const isFullyMuted = this.#state.isGlobalMuted || this.#state.volume === 0;
      
      if (this.dom.volumeSlider) { 
        this.dom.volumeSlider.style.setProperty('--vol', `${currentVolumeValue}%`); 
        this.dom.volumeSlider.setAttribute('aria-valuenow', currentVolumeValue); 
        this.dom.volumeSlider.value = currentVolumeValue; 
      }
      
      if (this.dom.btnMute) {
        if (isFullyMuted) { 
          this.dom.btnMute.innerText = '🔇'; 
          this.dom.btnMute.setAttribute('aria-label', 'Nyalakan Audio'); 
          this.dom.btnMute.setAttribute('aria-pressed', 'true'); 
        } else { 
          const icon = this.#state.volume < 50 ? '🔉' : '🔊'; 
          this.dom.btnMute.innerText = icon; 
          this.dom.btnMute.setAttribute('aria-label', 'Matikan Audio'); 
          this.dom.btnMute.setAttribute('aria-pressed', 'false'); 
        }
      }
    }

    renderCoreUI({ groupData, mediaData, renderIndex, renderSubIndex }) {
      const isStoryFormat = groupData.format === 'story' || (groupData.items && groupData.items.length > 1);
      
      if (this.dom.storyContainer) { 
        this.dom.storyContainer.classList.add('is-loading'); 
        this.dom.storyContainer.classList.remove('has-started'); 
        this.dom.storyContainer.classList.toggle('is-story-format', isStoryFormat); 
        this.dom.storyContainer.classList.toggle('is-sub-item', renderSubIndex > 0);
      }
      
      this.renderProgressBars(groupData); 
      this.syncVolumeUI(); 
      this.updateTextContents(mediaData, groupData); 
      this.updateBadges(mediaData, groupData); 
      this.updateThumbnailsAndBackgrounds(mediaData, renderIndex, renderSubIndex);
    }

    renderProgressBars(groupData) {
      if (!this.dom.progressWrapper) return;
      this.dom.progressWrapper.innerHTML = '';
      
      const count = groupData.items?.length || 1;
      for (let i = 0; i < count; i++) {
        const bar = document.createElement('div'), fill = document.createElement('div');
        bar.className = 'story-progress-bar'; 
        fill.className = 'story-progress-bar__fill'; 
        fill.setAttribute('data-progress-index', i.toString());
        
        if (i < this.#state.currentSubIndex) { 
          bar.classList.add('is-viewed'); fill.style.transform = 'scaleX(1)'; 
        } else if (i === this.#state.currentSubIndex) { 
          bar.classList.add('is-current'); fill.style.transform = 'scaleX(0)'; 
        } else { 
          bar.classList.add('is-upcoming'); fill.style.transform = 'scaleX(0)'; 
        }
        
        bar.appendChild(fill); 
        this.dom.progressWrapper.appendChild(bar);
      }
    }

    updateTextContents(mediaData, groupData) {
      const displayTitle = mediaData.title || groupData.title;
      const displayMeta = mediaData.meta || groupData.meta;
      const displayExcerpt = mediaData.excerpt ?? groupData.excerpt;
      const displayContent = mediaData.content || groupData.content;
      
      document.title = displayTitle ? `${displayTitle} - NextGen Story` : 'NextGen Story';
      DOMHelper.updateElements('.story-excerpt__title, .story-view__title', 'innerText', displayTitle); 
      DOMHelper.updateElements('.js-story-meta', 'innerText', displayMeta); 
      DOMHelper.updateElements('.story-body__cms-content', 'innerHTML', DOMHelper.sanitizeHTML(displayContent));
      
      A11yService.announce(`Memutar: ${displayTitle}. ${displayExcerpt || ''}`);

      const hasDetailContent = displayContent && displayContent.trim() !== '';
      DOMHelper.selectAll('.story-excerpt__text').forEach((element) => {
        const rawExcerpt = displayExcerpt?.trim() || '';
        if (rawExcerpt === '' && hasDetailContent) {
          element.innerHTML = '<span class="story-read-more" style="margin-inline-start: 0;">Lihat detail</span>';
        } else if (rawExcerpt === '') {
          element.innerHTML = '';
        } else {
          element.innerHTML = rawExcerpt;
          if (hasDetailContent) {
            requestAnimationFrame(() => { 
              if (element.scrollHeight <= element.clientHeight && !element.innerHTML.includes('story-read-more')) {
                element.innerHTML = rawExcerpt + '<span class="story-read-more"> ...</span>'; 
              }
            });
          }
        }
      });
    }

    updateBadges(mediaData, groupData) {
      const displayCategories = mediaData.categories || groupData.categories;
      DOMHelper.selectAll('.story-excerpt__badges, .story-view__badges').forEach((container) => {
        container.innerHTML = ''; 
        displayCategories?.forEach((category) => { 
          const span = document.createElement('span'); 
          span.className = 'story-badge-item'; 
          span.innerText = category; 
          container.appendChild(span); 
        });
      });
    }

    updateThumbnailsAndBackgrounds(mediaData, renderIndex, renderSubIndex) {
      const isShort = (mediaData.type === 'youtube' && MediaUtils.parseYouTubeData(mediaData.url).isShort) || mediaData.isVertical === true;
      const objectFitStyle = mediaData.thumbnailFit || (isShort ? 'cover' : 'contain');
      const emptySvg = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='1' height='1'/%3E";
      
      if (this.dom.thumbOverlay && !this.dom.thumbOverlay.hasAttribute('data-error-handled')) {
        this.dom.thumbOverlay.addEventListener('error', (e) => {
          e.target.style.opacity = '0';
          e.target.src = emptySvg;
        });
        this.dom.thumbOverlay.setAttribute('data-error-handled', 'true');
      }

      ThumbnailResolver.resolve(mediaData, (url) => {
        if (this.#state.currentVideoIndex !== renderIndex || this.#state.currentSubIndex !== renderSubIndex) return;
        
        if (this.dom.videoBlur) { 
          this.dom.videoBlur.style.transition = 'none'; 
          this.dom.videoBlur.style.backgroundImage = url ? `url(${url})` : 'none'; 
          this.dom.videoBlur.style.backgroundSize = 'cover'; 
          this.dom.videoBlur.style.opacity = (isShort && url) ? '0' : (url ? '1' : '0'); 
          this.dom.videoBlur.classList.toggle('is-inner-breathing', mediaData.type === 'image'); 
        }
        
        if (this.dom.thumbOverlay) { 
          this.dom.thumbOverlay.src = url || emptySvg; 
          this.dom.thumbOverlay.style.objectFit = objectFitStyle; 
          this.dom.thumbOverlay.style.display = ''; 
          this.dom.thumbOverlay.style.transition = 'none'; 
          this.dom.thumbOverlay.style.opacity = url ? '1' : '0'; 
        }
        
        if (this.dom.ambientWrapper) { 
          this.dom.ambientWrapper.style.transition = 'opacity .8s var(--ease-out), filter .8s var(--ease-out), transform 1.2s var(--ease-spring)'; 
          this.dom.ambientWrapper.style.backgroundImage = url ? `url(${url})` : 'none'; 
          this.dom.ambientWrapper.style.backgroundSize = objectFitStyle; 
          this.dom.ambientWrapper.style.backgroundPosition = 'center'; 
          this.dom.ambientWrapper.style.backgroundRepeat = 'no-repeat'; 
          this.dom.ambientWrapper.classList.toggle('is-breathing', mediaData.type === 'image'); 
        }
      });
    }

    handleMediaStateChange(mediaState) {
      const stateActions = {
        [MEDIA_STATE.PLAYING]: () => {
          clearTimeout(this.#state.timers.loading);
          
          if (this.#state.isInitialLoad) {
            this.#state.isInitialLoad = false;
            DOMHelper.root.classList.remove('is-initial-load');
          }

          if (this.dom.mainMedia) { this.dom.mainMedia.style.transition = 'opacity 0.2s ease-in'; this.dom.mainMedia.style.opacity = '1'; }
          
          if (this.dom.btnPlay) { 
            const icon = this.dom.btnPlay.querySelector('.fab-inner'); 
            if(icon) icon.innerText = '⏸️'; 
            this.dom.btnPlay.setAttribute('aria-pressed', 'true'); 
          }
          
          if (this.dom.storyContainer) { 
            this.dom.storyContainer.classList.add('has-started', 'show-ui'); 
            this.dom.storyContainer.classList.remove('is-paused', 'is-loading'); 
          }
          
          if (this.dom.thumbOverlay && this.dom.thumbOverlay.style.opacity !== '0') { 
            this.dom.thumbOverlay.style.transition = 'opacity 0.25s ease-out'; 
            this.dom.thumbOverlay.style.opacity = '0'; 
          }
          
          if (this.#state.currentMedia?.data?.type !== 'image' && this.dom.videoBlur) { 
            this.dom.videoBlur.style.transition = 'opacity 0.6s var(--ease-out)'; 
            this.dom.videoBlur.style.opacity = '0'; 
            setTimeout(() => { 
              if (this.#state.currentMedia?.getState() === MEDIA_STATE.PLAYING && this.dom.ambientWrapper) this.dom.ambientWrapper.style.backgroundImage = 'none'; 
            }, 600); 
          }
          
          if (this.#state.currentAmbient && this.#state.currentMedia && this.dom.ambientMedia) {
            this.dom.ambientMedia.style.opacity = '1';
          }
          
          this.startProgressBar();
        },
        [MEDIA_STATE.PAUSED]: () => {
          if (this.dom.btnPlay) { 
            const icon = this.dom.btnPlay.querySelector('.fab-inner'); 
            if(icon) icon.innerText = '▶️'; 
            this.dom.btnPlay.setAttribute('aria-pressed', 'false'); 
          }
          if (this.dom.storyContainer) { 
            this.dom.storyContainer.classList.add('is-paused'); 
            this.dom.storyContainer.classList.remove('is-loading'); 
          }
          this.stopProgressBar();
        },
        [MEDIA_STATE.BUFFERING]: () => { 
          clearTimeout(this.#state.timers.loading); 
          this.#state.timers.loading = setTimeout(() => this.dom.storyContainer?.classList.add('is-loading'), 350); 
        },
        [MEDIA_STATE.ENDED]: () => { 
          this.stopProgressBar(); 
          if (APP_CONFIG.PLAYLIST[this.#state.currentVideoIndex]?.format === 'story') { 
            if(this.dom.btnPlay) { 
              const icon = this.dom.btnPlay.querySelector('.fab-inner'); 
              if(icon) icon.innerText = '▶️'; 
              this.dom.btnPlay.setAttribute('aria-pressed', 'false'); 
            } 
            this.dom.storyContainer?.classList.add('is-paused'); 
          } 
        }
      };
      
      stateActions[mediaState]?.();
    }

    #loopProgress = () => {
      if (this.#state.currentMedia?.getState() === MEDIA_STATE.PLAYING) {
        const duration = this.#state.currentMedia.getDuration(); 
        const currentTime = this.#state.currentMedia.getCurrentTime();
        
        if (duration > 0 && this.#activeProgressFill) {
          this.#activeProgressFill.style.transform = `scaleX(${currentTime / duration})`;
        }
        
        if (this.#state.currentAmbient) {
          const now = performance.now();
          if (now - this.#lastSyncCheck > 1000) {
            const diff = Math.abs(currentTime - this.#state.currentAmbient.getCurrentTime());
            if (diff > 1.5) {
              if (this.dom.ambientMedia) this.dom.ambientMedia.style.opacity = '0';
              this.#state.currentAmbient.seekTo(currentTime);
              setTimeout(() => { 
                if (this.dom.ambientMedia && this.#state.currentMedia?.getState() === MEDIA_STATE.PLAYING) {
                  this.dom.ambientMedia.style.opacity = '1'; 
                }
              }, 400);
            }
            this.#lastSyncCheck = now;
          }
        }
        this.#animFrameId = requestAnimationFrame(this.#loopProgress);
      } else {
        this.#animFrameId = null;
      }
    }

    startProgressBar() { 
      cancelAnimationFrame(this.#animFrameId); 
      this.#activeProgressFill = DOMHelper.select(`[data-progress-index="${this.#state.currentSubIndex}"]`); 
      this.#animFrameId = requestAnimationFrame(this.#loopProgress); 
    }
    
    stopProgressBar() { 
      cancelAnimationFrame(this.#animFrameId); 
    }

    flashIcon(iconString) {
      if(this.dom.centerPlayIcon) { 
        this.dom.centerPlayIcon.classList.remove('is-steady'); 
        void this.dom.centerPlayIcon.offsetWidth; 
        this.dom.centerPlayIcon.innerText = iconString; 
        this.dom.centerPlayIcon.classList.add('is-flashing'); 
        clearTimeout(this.#flashTimeout); 
        this.#flashTimeout = setTimeout(() => this.dom.centerPlayIcon.classList.remove('is-flashing'), 400); 
      }
    }

    showRipple(side, text) {
      const element = DOMHelper.select(`.js-ripple-${side}`);
      const textElement = DOMHelper.select(`.js-ripple-text-${side}`); 
      if (!element || !textElement) return;
      
      textElement.innerText = text; 
      element.classList.remove('is-animating', 'is-steady'); 
      void element.offsetWidth;
      element.classList.add('is-animating'); 
      element.onanimationend = () => element.classList.remove('is-animating'); 
      HapticsEngine.medium();
    }

    resetVideoStateUI() {
      clearTimeout(this.#state.timers.crossfade); 
      this.stopProgressBar(); 
      if (this.isContextOpen) this.toggleContext(false); 
      this.closeReactionMenu();
      
      this.dom.centerPlayIcon?.classList.remove('is-steady'); 
      DOMHelper.select('.js-ripple-left')?.classList.remove('is-animating', 'is-steady'); 
      DOMHelper.select('.js-ripple-right')?.classList.remove('is-animating', 'is-steady'); 
      if(this.dom.reactionContainer) this.dom.reactionContainer.innerHTML = ''; 
      DOMHelper.root.classList.remove('is-clean-mode');
      
      if(this.dom.storyContainer) { 
        this.dom.storyContainer.classList.remove('show-ui', 'has-started', 'is-paused'); 
        this.dom.storyContainer.classList.add('is-loading'); 
      }
      
      if(this.dom.btnPlay) { 
        const icon = this.dom.btnPlay.querySelector('.fab-inner'); 
        if(icon) icon.innerText = '⏸️'; 
        this.dom.btnPlay.setAttribute('aria-pressed', 'false'); 
      }
      
      if(this.dom.thumbOverlay) { 
        this.dom.thumbOverlay.style.transition = 'none'; 
        this.dom.thumbOverlay.style.opacity = '0'; 
        this.dom.thumbOverlay.src = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='1' height='1'/%3E";
        this.dom.thumbOverlay.style.objectFit = ''; 
      }
      
      if(this.dom.videoBlur) { 
        this.dom.videoBlur.style.transition = 'none'; 
        this.dom.videoBlur.style.opacity = '0'; 
        this.dom.videoBlur.style.backgroundImage = 'none'; 
        this.dom.videoBlur.classList.remove('is-inner-breathing'); 
      }
      
      if(this.dom.ambientWrapper) { 
        this.dom.ambientWrapper.style.transition = 'none'; 
        this.dom.ambientWrapper.style.backgroundImage = 'none'; 
        this.dom.ambientWrapper.classList.remove('is-breathing'); 
      }
      
      [this.dom.mainMedia, this.dom.ambientMedia].forEach(element => {
        if(element) { 
          element.style.transition = 'none'; 
          element.style.opacity = '0'; 
          element.innerHTML = ''; 
          requestAnimationFrame(() => element.style.transition = 'opacity 0.2s ease-in'); 
        }
      });
      
      const sheetContent = DOMHelper.select(DOM_SELECTORS.SHEET_CONTENT);
      if(sheetContent) { 
        sheetContent.style.transform = ''; 
        sheetContent.style.height = ''; 
        sheetContent.classList.remove('is-dragging', 'is-full-sheet'); 
      }
    }

    toggleContext(openState) {
      const contextElement = window.innerWidth >= 1366 ? DOMHelper.select('.js-story-card') : window.innerWidth >= 768 ? DOMHelper.select('.js-story-popup') : DOMHelper.select('.js-story-sheet');
      if (!contextElement) return;
      
      this.isContextOpen = openState; 
      DOMHelper.root.classList.toggle('is-ui-open', openState); 
      DOMHelper.root.classList.remove('is-clean-mode');
      
      if (openState) {
        window.history.pushState({ modalOpen: true }, '');
        contextElement.classList.add('is-active'); 
        
        const iconEnter = DOMHelper.select('.icon-enter-fs'), iconExit = DOMHelper.select('.icon-exit-fs');
        if(iconEnter) iconEnter.style.display = 'block'; 
        if(iconExit) iconExit.style.display = 'none';
        
        if (window.innerWidth < 1366 && window.innerWidth >= 768) AppEvents.emit('PLAYER:FORCE_PAUSE');
        DOMHelper.select(DOM_SELECTORS.SHEET_CONTENT)?.classList.remove('is-full-sheet');
        
        this.closeReactionMenu(); 
        setTimeout(() => contextElement.querySelector('.story-view__title')?.focus(), 150);
      } else {
        DOMHelper.select('.js-story-sheet')?.classList.remove('is-active'); 
        DOMHelper.select('.js-story-popup')?.classList.remove('is-active'); 
        DOMHelper.select('.js-story-card')?.classList.remove('is-active');
        
        const sheetContent = DOMHelper.select(DOM_SELECTORS.SHEET_CONTENT); 
        if(sheetContent) { sheetContent.style.transform = ''; sheetContent.classList.remove('is-full-sheet'); }
        
        if (window.innerWidth < 1366) AppEvents.emit('PLAYER:FORCE_PLAY'); 
        DOMHelper.select(DOM_SELECTORS.BTN_OPEN_CONTEXT)?.focus();
      }
      HapticsEngine.light();
    }

    toggleMute() {
      const isMutedNow = this.#state.isGlobalMuted || this.#state.volume === 0;
      if (isMutedNow) {
        this.#state.isGlobalMuted = false; 
        this.#state.volume = this.#state.savedVolume > 0 ? this.#state.savedVolume : 100;
        MediaUtils.rampUpVolume(this.#state.currentMedia, this.#state.volume); 
        ToastService.show('🔊 Audio Diaktifkan');
      } else {
        this.#state.isGlobalMuted = true; 
        this.#state.savedVolume = this.#state.volume; 
        this.#state.currentMedia?.mute?.(); 
        ToastService.show('🔇 Audio Dibisukan');
      }
      this.#state.saveVolumeState(); 
      HapticsEngine.light(); 
      this.syncVolumeUI();
    }

    updateVolumeFromSlider(event) {
      const val = parseInt(event.target.value, 10);
      if (val === 0) { 
        this.#state.isGlobalMuted = true; 
        this.#state.volume = 0; 
        this.#state.currentMedia?.mute?.(); 
      } else {
        if (this.#state.isGlobalMuted) { 
          this.#state.isGlobalMuted = false; 
          this.#state.currentMedia?.unMute?.(); 
        }
        this.#state.volume = val; 
        this.#state.savedVolume = val; 
        this.#state.currentMedia?.setVolume?.(val);
      }
      this.#state.saveVolumeState(); 
      this.syncVolumeUI();
    }

    toggleReactionMenu() { 
      if(this.dom.reactionWrapper) { 
        const isActive = this.dom.reactionWrapper.classList.toggle('is-active'); 
        this.dom.btnReaction?.setAttribute('aria-expanded', isActive); 
      } 
    }
    
    closeReactionMenu() { 
      this.dom.reactionWrapper?.classList.remove('is-active'); 
      this.dom.btnReaction?.setAttribute('aria-expanded', 'false'); 
    }

    triggerLocalizedReaction(emojiStr, x, y) {
      this.triggerReaction(emojiStr);

      const heart = document.createElement('div');
      heart.style.cssText = `
        position: fixed; left: ${x}px; top: ${y}px; font-size: 4rem; 
        pointer-events: none; z-index: 9999; transform: translate(-50%, -50%) scale(0); 
        opacity: 1; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); 
        animation: popHeart 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      `;
      heart.innerText = emojiStr;
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 1000);
    }

    triggerReaction(emojiStr) {
      if (this.dom.reactionContainer && this.dom.reactionContainer.childElementCount > 50) return;
      
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div'), depth = Math.random();
        particle.className = 'particle'; particle.innerText = emojiStr;
        particle.style.cssText = `--x: ${Math.random() * 100}%; --size: ${depth * 1.5 + 1}rem; --blur: ${depth < 0.2 ? '3px' : '0px'}; --z: ${depth > 0.5 ? 20 : 1}; --duration: ${3500 - depth * 1500}ms; --delay: ${Math.random() * 500}ms; --rotation: ${(Math.random() - 0.5) * 720}deg; --drift: ${(Math.random() - 0.5) * 150}px;`;
        particle.onanimationend = () => particle.remove();
        fragment.appendChild(particle);
      }
      
      this.dom.reactionContainer?.appendChild(fragment); 
      HapticsEngine.heavy();
      
      const mainBtn = this.dom.reactionWrapper?.querySelector('.fab-inner'); 
      if (mainBtn) { 
        mainBtn.innerText = emojiStr; 
        setTimeout(() => mainBtn.innerText = '🤍', 1500); 
      }
      this.closeReactionMenu();
    }
  }

  /** =========================================================================
   * 6. PLAYER MANAGER 
   * ========================================================================= */
  class PlayerManager {
    #state;
    #uiManager;
    
    constructor(state, uiManager) { 
      this.#state = state; 
      this.#uiManager = uiManager; 
      this.isAnimatingTransition = false; 
      this.lastInteractionTime = 0; 
      this.setupEventSubscriptions(); 
    }
    
    setupEventSubscriptions() {
      AppEvents.on('PLAYER:TOGGLE_PLAY', () => this.togglePlayPause());
      AppEvents.on('PLAYER:FORCE_PLAY', () => { this.#state.currentMedia?.play(); this.#state.currentAmbient?.play(); });
      AppEvents.on('PLAYER:FORCE_PAUSE', () => { this.#state.currentMedia?.pause(); this.#state.currentAmbient?.pause(); });
      AppEvents.on('PLAYER:SEEK', (offset) => this.seekVideo(offset));
      AppEvents.on('PLAYER:NEXT', () => this.navigateNext()); 
      AppEvents.on('PLAYER:PREV', () => this.navigatePrev());
      AppEvents.on('PLAYER:SWITCH_VIDEO', (step) => this.switchVideo(step));
    }
    
    handleMediaStateChange(mediaState) {
      const stateActions = {
        [MEDIA_STATE.PLAYING]: () => { 
          clearTimeout(this.#state.timers.loading); 
          WakeLockManager.request(); 
          if (this.#state.currentAmbient && this.#state.currentMedia) { 
            this.#state.currentAmbient.seekTo(this.#state.currentMedia.getCurrentTime()); 
            this.#state.currentAmbient.play(); 
          } 
        },
        [MEDIA_STATE.PAUSED]: () => { 
          clearTimeout(this.#state.timers.loading); 
          WakeLockManager.release(); 
          this.#state.currentAmbient?.pause(); 
        },
        [MEDIA_STATE.BUFFERING]: () => { this.#state.currentAmbient?.pause(); },
        [MEDIA_STATE.ENDED]: () => {
          clearTimeout(this.#state.timers.loading); 
          WakeLockManager.release();
          const isContextOpen = DOMHelper.root.classList.contains('is-ui-open');
          const group = APP_CONFIG.PLAYLIST[this.#state.currentVideoIndex];
          const isStoryFormat = group?.format === 'story'; 
          const hasMultipleItems = group?.items && group.items.length > 1;
          const totalSubItems = hasMultipleItems ? group.items.length : 1; 
          const hasMoreSubItems = this.#state.currentSubIndex < totalSubItems - 1;

          if (isContextOpen) { 
            this.#state.currentMedia?.seekTo(0); 
            this.#state.currentMedia?.play(); 
            this.#state.currentAmbient?.seekTo(0); 
            this.#state.currentAmbient?.play(); 
            AppEvents.emit('MEDIA:STATE_CHANGE', MEDIA_STATE.PLAYING); 
            return; 
          }
          
          if (hasMultipleItems && hasMoreSubItems) this.navigateNext();
          else if (isStoryFormat) { this.#state.currentMedia?.seekTo(0); this.#state.currentMedia?.pause(); }
          else { 
            this.#state.currentSubIndex = 0; 
            this.#state.currentMedia?.seekTo(0); 
            this.#state.currentMedia?.play(); 
            this.#state.currentAmbient?.seekTo(0); 
            this.#state.currentAmbient?.play(); 
          }
        }
      };
      
      stateActions[mediaState]?.(); 
      AppEvents.emit('MEDIA:STATE_CHANGE', mediaState);
    }

    updateVideoCore() {
      if (!this.#state.isApiReady) return;
      const groupData = APP_CONFIG.PLAYLIST[this.#state.currentVideoIndex]; 
      if (!groupData) return;
      
      const mediaData = this.#state.getActiveMediaData();
      AppEvents.emit('UI:RENDER_CORE', { groupData, mediaData, renderIndex: this.#state.currentVideoIndex, renderSubIndex: this.#state.currentSubIndex });

      this.#state.currentMedia?.destroy(); 
      this.#state.currentAmbient?.destroy();
      
      const mainContainer = DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA);
      const ambientContainer = DOMHelper.select(DOM_SELECTORS.AMBIENT_MEDIA);
      
      this.#state.currentMedia = MediaFactory.create({
        container: mainContainer, data: mediaData, isAmbient: false,
        callbacks: {
          onReady: () => { 
            DOMHelper.root.classList.add('is-ready'); 
            this.#state.errorCount = 0; 
            DOMHelper.select(DOM_SELECTORS.ERROR_OVERLAY)?.classList.remove('is-visible'); 
            
            if (!document.hidden) this.#state.currentMedia.play(); 
            else this.#state.wasPlayingBeforeHidden = true; 
          },
          onStateChange: (mediaState) => this.handleMediaStateChange(mediaState),
          onError: (errEvent, customMsg) => this.handleMediaError(mediaData, customMsg)
        }
      });

      if (window.innerWidth >= 768 && ambientContainer) {
        this.#state.currentAmbient = MediaFactory.create({ 
          container: ambientContainer, data: mediaData, isAmbient: true, 
          callbacks: { onReady: () => { if (!document.hidden) this.#state.currentAmbient.play(); } } 
        });
        this.#state.currentAmbient?.load();
      }

      this.#state.currentMedia?.load(); 
      this.updateURLState(mediaData, groupData); 
      this.checkNavigationState(); 
      this.handlePreloading(groupData);
    }

    handleMediaError(mediaData, customMsg) {
      const btnRetry = DOMHelper.select(DOM_SELECTORS.ERROR_RETRY), overlay = DOMHelper.select(DOM_SELECTORS.ERROR_OVERLAY);
      if(!overlay) return;
      
      const title = DOMHelper.select(DOM_SELECTORS.ERROR_TITLE), desc = DOMHelper.select(DOM_SELECTORS.ERROR_DESC);
      
      if (customMsg) {
        if(title) title.innerText = 'Akses Ditolak'; 
        if(desc) desc.innerText = customMsg;
        if(btnRetry) { btnRetry.innerText = 'Buka di YouTube'; btnRetry.onclick = () => window.open(mediaData.url, '_blank'); } 
        overlay.classList.add('is-visible');
      } else if (!navigator.onLine) {
        if(title) title.innerText = 'Koneksi Terputus'; 
        if(desc) desc.innerText = 'Harap periksa jaringan Anda.';
        if(btnRetry) { btnRetry.innerText = 'Coba Lagi'; btnRetry.onclick = () => this.updateVideoCore(); } 
        overlay.classList.add('is-visible');
      } else {
        this.#state.errorCount++;
        if (this.#state.errorCount > 2) {
          if(title) title.innerText = 'Kesalahan Pemutaran'; 
          if(desc) desc.innerText = 'Streaming gagal secara tak terduga.';
          if(btnRetry) { btnRetry.innerText = 'Lewati Video'; btnRetry.onclick = () => { overlay.classList.remove('is-visible'); this.switchVideo(1); }; } 
          overlay.classList.add('is-visible');
        } else this.switchVideo(1);
      }
    }

    updateURLState(mediaData, groupData) {
      let urlId;
      if (mediaData.type === 'youtube') {
        const displayTitle = mediaData.title || groupData.title;
        urlId = displayTitle ? MediaUtils.slugify(displayTitle) : MediaUtils.parseYouTubeData(mediaData.url).videoId;
      } else { 
        const displayTitle = mediaData.title || groupData.title; 
        urlId = MediaUtils.slugify(displayTitle || 'media'); 
      }
      
      if (groupData.items && groupData.items.length > 1) {
        urlId += `-pt${this.#state.currentSubIndex + 1}`; 
      }
      
      const newUrl = `${window.location.protocol}//${window.location.host}${window.location.pathname}?watch=${urlId}`;
      window.history.replaceState({ index: this.#state.currentVideoIndex, subIndex: this.#state.currentSubIndex }, '', newUrl);
    }

    handlePreloading(groupData) {
      document.getElementById('mediaPreloadLink')?.remove();
      
      if (MediaUtils.checkNetworkPreload()) {
        const nextData = groupData.items?.[this.#state.currentSubIndex + 1] ?? APP_CONFIG.PLAYLIST[this.#state.currentVideoIndex + 1];
        if (nextData) {
          const link = document.createElement('link'); 
          link.id = 'mediaPreloadLink'; 
          link.rel = 'preload';
          if (nextData.type === 'video') { link.as = 'video'; link.href = nextData.url; } 
          else if (nextData.type === 'image') { link.as = 'image'; link.href = nextData.url; }
          
          if (link.href) document.head.appendChild(link);
        }
      }
    }

    checkNavigationState() {
      const isFirstItem = this.#state.currentVideoIndex === 0 && this.#state.currentSubIndex === 0;
      const isLastGroup = this.#state.currentVideoIndex === APP_CONFIG.PLAYLIST.length - 1;
      const groupItems = APP_CONFIG.PLAYLIST[this.#state.currentVideoIndex].items;
      const isLastSubItem = !groupItems || this.#state.currentSubIndex === groupItems.length - 1;
      
      DOMHelper.select(DOM_SELECTORS.BTN_PREV)?.classList.toggle('is-disabled', isFirstItem);
      DOMHelper.select(DOM_SELECTORS.BTN_NEXT)?.classList.toggle('is-disabled', isLastGroup && isLastSubItem);
    }

    triggerTransition(callback) {
      const now = Date.now();
      if (this.isAnimatingTransition || (now - this.lastInteractionTime < 400)) return;
      this.lastInteractionTime = now; 
      this.isAnimatingTransition = true;
      
      const executeFallback = () => {
        const mainMedia = DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA);
        if(mainMedia) { mainMedia.style.transition = 'opacity 0.2s ease-out'; mainMedia.style.opacity = '0'; }
        setTimeout(() => { callback(); setTimeout(() => { this.isAnimatingTransition = false; }, 300); }, 200);
      };
      
      try {
        if (document.startViewTransition) {
          const transition = document.startViewTransition(() => { 
            const mainMedia = DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA); 
            if(mainMedia) { mainMedia.style.transition = 'none'; mainMedia.style.opacity = '1'; } 
            callback(); 
          });
          transition.finished.finally(() => { this.isAnimatingTransition = false; });
        } else executeFallback();
      } catch (err) { executeFallback(); }
    }

    seekVideo(offsetSeconds) {
      if (!this.#state.currentMedia) return;
      const duration = this.#state.currentMedia.getDuration(); 
      if (!duration) return;
      
      const newTime = Math.max(0, Math.min(this.#state.currentMedia.getCurrentTime() + offsetSeconds, duration));
      this.#state.currentMedia.seekTo(newTime); 
      this.#state.currentAmbient?.seekTo(newTime);
    }

    switchVideo(stepOffset) {
      const now = Date.now();
      if (this.isAnimatingTransition || (now - this.lastInteractionTime < 500)) return;
      this.lastInteractionTime = now;
      
      const newIndex = this.#state.currentVideoIndex + stepOffset;
      
      if (newIndex >= 0 && newIndex < APP_CONFIG.PLAYLIST.length) { 
        this.isAnimatingTransition = true; 
        this.#state.currentVideoIndex = newIndex;
        this.#state.currentSubIndex = 0;
        
        AppEvents.emit('UI:RESET_STATE');
        this.updateVideoCore();
        AppEvents.emit('SCROLL_TO_INDEX', newIndex);
        
        setTimeout(() => { this.isAnimatingTransition = false; }, 600); 
      } else {
        AppEvents.emit('APP:CLOSE');
      }
    }

    navigateNext() {
      if (this.isAnimatingTransition) return;
      const groupData = APP_CONFIG.PLAYLIST[this.#state.currentVideoIndex];
      const hasMultipleItems = groupData.items?.length > 1;
      const isStoryFormat = groupData.format === 'story';
      const canNavigateSubItems = this.#state.currentSubIndex < (hasMultipleItems ? groupData.items.length : 1) - 1;
      
      if (isStoryFormat || hasMultipleItems) {
        if (canNavigateSubItems) {
          this.triggerTransition(() => { 
            this.#state.currentSubIndex++; 
            AppEvents.emit('UI:RESET_STATE'); 
            this.updateVideoCore(); 
          });
        } else this.switchVideo(1);
      } else this.switchVideo(1);
    }

    navigatePrev() {
      if (this.isAnimatingTransition) return;
      const groupData = APP_CONFIG.PLAYLIST[this.#state.currentVideoIndex];
      const hasMultipleItems = groupData.items?.length > 1;
      const isStoryFormat = groupData.format === 'story';
      
      if (isStoryFormat || hasMultipleItems) {
        if (this.#state.currentSubIndex > 0) {
          this.triggerTransition(() => { 
            this.#state.currentSubIndex--; 
            AppEvents.emit('UI:RESET_STATE'); 
            this.updateVideoCore(); 
          });
        } else this.switchVideo(-1);
      } else this.switchVideo(-1);
    }

    togglePlayPause() {
      if (!DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER)?.classList.contains('has-started')) return;
      
      if (this.#state.currentMedia?.getState() === MEDIA_STATE.PLAYING) { 
        this.#state.currentMedia.pause(); 
        AppEvents.emit('UI:FLASH_ICON', '⏸️'); 
      } else { 
        this.#state.currentMedia?.play(); 
        this.#state.currentAmbient?.seekTo(this.#state.currentMedia.getCurrentTime()); 
        this.#state.currentAmbient?.play(); 
        AppEvents.emit('UI:FLASH_ICON', '▶️'); 
      }
    }

    closeApplication() { ToastService.show('Aplikasi ditutup.'); }
  }

  /** =========================================================================
   * 7. GESTURE MANAGER
   * ========================================================================= */
  class GestureManager {
    #state;
    
    constructor(state) {
      this.#state = state;
      this.gestureState = { isPinching: false, isDragging: false, startY: 0, currentY: 0, stopScrubCallback: null };
      this.initProgressBarGestures(); 
      this.initScreenGestures(); 
      this.initPinchZoom(); 
      this.initDragSheet(); 
      this.initRubberBand();
    }

    getClientX = (event) => event.touches?.[0]?.clientX ?? event.clientX;
    getClientY = (event) => event.touches?.[0]?.clientY ?? event.clientY;

    initProgressBarGestures() {
      let isScrubbing = false, wasPlaying = false, wasMuted = false;
      let pendingSeekTime = -1, scrubController = null, rAFScrub = null, lastMediaSeek = 0, lastHapticPercent = 0, activeScrubBar = null;

      const updateUIOnly = (clientX) => {
        if (!activeScrubBar) return;
        const rect = activeScrubBar.getBoundingClientRect();
        let localPercentage = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        
        const fill = activeScrubBar.querySelector('.story-progress-bar__fill');
        if(fill) fill.style.transform = `scaleX(${localPercentage})`;
        
        if (this.#state.currentMedia?.getDuration() > 0) pendingSeekTime = this.#state.currentMedia.getDuration() * localPercentage;
        
        const percentInt = Math.floor(localPercentage * 20);
        if (percentInt !== lastHapticPercent) { HapticsEngine.tick(); lastHapticPercent = percentInt; }
      };

      const moveScrub = (event) => {
        if (!isScrubbing) return;
        if (event.cancelable) event.preventDefault();
        if (rAFScrub) cancelAnimationFrame(rAFScrub);
        
        rAFScrub = requestAnimationFrame(() => {
          updateUIOnly(this.getClientX(event));
          if (pendingSeekTime >= 0) {
            const now = performance.now();
            if (now - lastMediaSeek > 150) {
              AppEvents.emit('PLAYER:SEEK', pendingSeekTime - this.#state.currentMedia.getCurrentTime()); 
              lastMediaSeek = now; 
            }
          }
        });
      };

      const stopScrub = () => {
        if (!isScrubbing) return;
        isScrubbing = false;
        DOMHelper.select(DOM_SELECTORS.PROGRESS_WRAPPER)?.classList.remove('is-scrubbing');
        DOMHelper.root.classList.remove('is-scrub-locked');
        
        if (!wasMuted) { 
          this.#state.currentMedia?.unMute(); 
          this.#state.currentMedia?.setVolume(this.#state.volume); 
          this.#state.isGlobalMuted = false; 
        }
        
        if (pendingSeekTime >= 0) AppEvents.emit('PLAYER:SEEK', pendingSeekTime - this.#state.currentMedia.getCurrentTime());
        if (wasPlaying) AppEvents.emit('PLAYER:FORCE_PLAY');
        if (scrubController) { scrubController.abort(); scrubController = null; }
        
        pendingSeekTime = -1; activeScrubBar = null;
      };

      const startScrub = (event) => {
        if (isScrubbing || !DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER)?.classList.contains('has-started')) return;
        activeScrubBar = DOMHelper.select('.story-progress-bar.is-current');
        if (!activeScrubBar || (event.target.closest('.story-progress-bar') && event.target.closest('.story-progress-bar') !== activeScrubBar)) return;
        
        const rect = activeScrubBar.getBoundingClientRect();
        const clientX = this.getClientX(event);
        if (clientX < rect.left - 30 || clientX > rect.right + 30) return;
        
        if (event.type === 'touchstart' && event.cancelable) event.preventDefault();

        isScrubbing = true;
        DOMHelper.select(DOM_SELECTORS.PROGRESS_WRAPPER)?.classList.add('is-scrubbing');
        DOMHelper.root.classList.add('is-scrub-locked');
        
        wasPlaying = this.#state.currentMedia?.getState() === MEDIA_STATE.PLAYING;
        wasMuted = this.#state.isGlobalMuted || this.#state.currentMedia?.isMuted();
        
        this.#state.currentMedia?.mute();
        if (wasPlaying) AppEvents.emit('PLAYER:FORCE_PAUSE');
        
        updateUIOnly(clientX);
        scrubController = new AbortController();
        const opts = { passive: false, signal: scrubController.signal };
        
        window.addEventListener('mousemove', moveScrub, opts); window.addEventListener('touchmove', moveScrub, opts);
        window.addEventListener('mouseup', stopScrub, opts); window.addEventListener('touchend', stopScrub, opts);
        window.addEventListener('touchcancel', stopScrub, opts);
      };

      const wrapper = DOMHelper.select(DOM_SELECTORS.PROGRESS_WRAPPER);
      wrapper?.addEventListener('mousedown', startScrub); 
      wrapper?.addEventListener('touchstart', startScrub, { passive: false });
      this.gestureState.stopScrubCallback = stopScrub;
    }

    initScreenGestures() {
      let startX = 0, startY = 0, longPressTimer = null, isLongPressActive = false, isSwiping = false, holdAction = null;
      let tapCount = 0, singleTapTimer = null, tapResetTimer = null, cumulativeSeek = 0;
      const layer = DOMHelper.select(DOM_SELECTORS.GESTURE_LAYER);
      
      layer?.addEventListener('contextmenu', (e) => e.preventDefault());
      
      layer?.addEventListener('pointerdown', (e) => {
        if (this.gestureState.isPinching || (e.pointerType === 'mouse' && e.button !== 0) || !e.isPrimary || e.target.closest('button, input, .volume-wrapper, .story-progress-bar-wrapper, .story-top-actions, .story-player-actions')) return;
        
        startX = e.clientX; startY = e.clientY; 
        isLongPressActive = false; isSwiping = false; 
        holdAction = e.target.getAttribute('data-action'); 
        
        longPressTimer = setTimeout(() => {
          if (!DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER)?.classList.contains('has-started') || this.gestureState.isPinching || isSwiping) return;
          isLongPressActive = true; 
          HapticsEngine.light();
          
          if (holdAction === 'playpause') { 
            DOMHelper.root.classList.add('is-clean-mode'); 
            AppEvents.emit('PLAYER:FORCE_PAUSE'); 
          } else { 
            const rate = holdAction === 'forward' ? 2 : 0.5; 
            this.#state.currentMedia?.setPlaybackRate(rate); 
            this.#state.currentAmbient?.setPlaybackRate(rate); 
            AppEvents.emit('UI:SHOW_RIPPLE', { side: holdAction === 'forward' ? 'right' : 'left', text: holdAction === 'forward' ? '⏩ 2x' : '⏪ 0.5x' }); 
          }
        }, 300);
      });

      layer?.addEventListener('pointermove', (e) => {
        if (this.gestureState.isPinching || !startX) return;
        if (Math.abs(e.clientX - startX) > 15 || Math.abs(e.clientY - startY) > 15) {
          clearTimeout(longPressTimer); 
          isSwiping = true;
          if (isLongPressActive) {
            isLongPressActive = false;
            if (holdAction === 'playpause') { 
              DOMHelper.root.classList.remove('is-clean-mode'); 
              AppEvents.emit('PLAYER:FORCE_PLAY'); 
            } else { 
              this.#state.currentMedia?.setPlaybackRate(1); 
              this.#state.currentAmbient?.setPlaybackRate(1); 
            }
          }
        }
      });

      const handlePointerUp = (e) => {
        if (this.gestureState.isPinching || !startX) return;
        clearTimeout(longPressTimer); 
        startX = 0;

        if (isLongPressActive) {
          isLongPressActive = false;
          if (holdAction === 'playpause') { 
            DOMHelper.root.classList.remove('is-clean-mode'); 
            AppEvents.emit('PLAYER:FORCE_PLAY'); 
          } else { 
            this.#state.currentMedia?.setPlaybackRate(1); 
            this.#state.currentAmbient?.setPlaybackRate(1); 
          }
          return; 
        }

        if (isSwiping) return; 

        tapCount++; 
        clearTimeout(singleTapTimer); 
        clearTimeout(tapResetTimer);
        
        const isVideo = this.#state.currentMedia && ['youtube', 'video'].includes(this.#state.getActiveMediaData().type);
        const isReady = DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER)?.classList.contains('has-started');
        const isDoubleTap = tapCount === 2;

        if (tapCount === 1) {
          singleTapTimer = setTimeout(() => {
            const tapActions = { 'playpause': 'PLAYER:TOGGLE_PLAY', 'rewind': 'PLAYER:PREV', 'forward': 'PLAYER:NEXT' };
            if (tapActions[holdAction]) AppEvents.emit(tapActions[holdAction]);
            tapCount = 0; cumulativeSeek = 0;
          }, 250); 
        } else if (tapCount >= 2) {
          if (holdAction === 'playpause' && isReady && isDoubleTap) { 
            AppEvents.emit('UI:TRIGGER_LOCALIZED_REACTION', { emoji: '❤️', x: e.clientX, y: e.clientY });
          } else if ((holdAction === 'rewind' || holdAction === 'forward')) {
            if (isVideo && isReady) {
              cumulativeSeek += 10; const isFwd = holdAction === 'forward';
              AppEvents.emit('UI:SHOW_RIPPLE', { side: isFwd ? 'right' : 'left', text: `${isFwd ? '⏩' : '⏪'} ${cumulativeSeek}s` });
              clearTimeout(tapResetTimer);
              tapResetTimer = setTimeout(() => { 
                AppEvents.emit('PLAYER:SEEK', isFwd ? cumulativeSeek : -cumulativeSeek); 
                tapCount = 0; cumulativeSeek = 0; HapticsEngine.medium(); 
              }, 400);
              return; 
            } else if (isDoubleTap) {
              AppEvents.emit(holdAction === 'rewind' ? 'PLAYER:PREV' : 'PLAYER:NEXT');
            }
          }
          if (holdAction === 'playpause' || !isVideo) tapCount = 0;
        }
        tapResetTimer = setTimeout(() => { tapCount = 0; cumulativeSeek = 0; }, 400);
      };

      layer?.addEventListener('pointerup', handlePointerUp); 
      layer?.addEventListener('pointercancel', handlePointerUp);
    }

    initPinchZoom() {
      const layer = DOMHelper.select(DOM_SELECTORS.GESTURE_LAYER);
      if (!layer) return;
      let initialDist = 0, center = { x: 0, y: 0 };
      const getDist = (touches) => Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
      const getCenter = (touches) => ({ x: (touches[0].clientX + touches[1].clientX) / 2, y: (touches[0].clientY + touches[1].clientY) / 2 });
      
      layer.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2 && this.#state.getActiveMediaData().type === 'image') {
          this.gestureState.isPinching = true; 
          initialDist = getDist(e.touches); 
          center = getCenter(e.touches);
          const mainMedia = DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA);
          if(mainMedia) { 
            mainMedia.style.zIndex = '100'; 
            const img = mainMedia.querySelector('img'); 
            if(img) img.style.transition = 'none'; 
          }
        }
      }, { passive: false });
      
      layer.addEventListener('touchmove', (e) => {
        if (this.gestureState.isPinching && e.touches.length === 2) {
          if (e.cancelable) e.preventDefault();
          const scale = Math.max(1, getDist(e.touches) / initialDist), currentCenter = getCenter(e.touches);
          const maxPanX = (window.innerWidth * scale - window.innerWidth) / 2, maxPanY = (window.innerHeight * scale - window.innerHeight) / 2;
          const translateX = Math.max(-maxPanX, Math.min(maxPanX, currentCenter.x - center.x));
          const translateY = Math.max(-maxPanY, Math.min(maxPanY, currentCenter.y - center.y));
          
          const img = DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA)?.querySelector('img');
          if (img) img.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
        }
      }, { passive: false });
      
      const endPinch = (e) => {
        if (this.gestureState.isPinching && e.touches.length < 2) {
          this.gestureState.isPinching = false; 
          const mediaContainer = DOMHelper.select(DOM_SELECTORS.MAIN_MEDIA);
          if (mediaContainer) {
            const img = mediaContainer.querySelector('img');
            if(img) { 
              img.style.transition = 'transform 0.4s var(--ease-spring)'; 
              img.style.transform = 'translate3d(0, 0, 0) scale(1)'; 
            }
            setTimeout(() => { if (!this.gestureState.isPinching) mediaContainer.style.zIndex = ''; }, 400);
          }
        }
      };
      layer.addEventListener('touchend', endPinch); 
      layer.addEventListener('touchcancel', endPinch);
    }

    initDragSheet() {
      let rAFDrag = null, sheetState = 'half', dragController = null, startY = 0, currentY = 0, lastY = 0, velocity = 0, lastTime = 0;

      const move = (event) => {
        if (!this.gestureState.isDragging || window.innerWidth >= 768) return;
        const y = this.getClientY(event), now = performance.now(), deltaTime = now - lastTime;
        if (deltaTime > 0) velocity = (y - lastY) / deltaTime; 
        lastY = y; lastTime = now; currentY = y - startY;

        const scrollableArea = event.target.closest('.story-body');
        if (scrollableArea && scrollableArea.scrollTop > 0 && currentY < 0) return;
        if (event.cancelable) event.preventDefault();
        cancelAnimationFrame(rAFDrag);
        
        rAFDrag = requestAnimationFrame(() => {
          const sheet = DOMHelper.select(DOM_SELECTORS.SHEET_CONTENT); if (!sheet) return;
          if (sheetState === 'half') {
            if (currentY < 0) { 
              sheet.style.transform = `translate3d(0, 0, 0)`; 
              sheet.style.height = `calc(65dvh + ${Math.abs(currentY)}px)`; 
            } else { 
              sheet.style.transform = `translate3d(0, ${currentY}px, 0)`; 
              sheet.style.height = ''; 
            }
          } else if (sheetState === 'full') {
            sheet.style.transform = `translate3d(0, ${currentY < 0 ? currentY * 0.12 : currentY}px, 0)`;
          }
        });
      };

      const end = () => {
        if (!this.gestureState.isDragging || window.innerWidth >= 768) return;
        this.gestureState.isDragging = false;
        
        const sheet = DOMHelper.select(DOM_SELECTORS.SHEET_CONTENT);
        if (sheet) {
          sheet.classList.remove('is-dragging'); sheet.style.transform = ''; sheet.style.height = ''; 
          const momentumY = currentY + (velocity * 180); 
          if (sheetState === 'half') {
            if (momentumY < -120 || currentY < -80) { 
              sheetState = 'full'; sheet.classList.add('is-full-sheet'); AppEvents.emit('PLAYER:FORCE_PAUSE'); 
            } else if (momentumY > 150 || currentY > 80) { 
              sheetState = 'half'; AppEvents.emit('UI:TOGGLE_CONTEXT', false); 
            }
          } else if (sheetState === 'full') {
            if (momentumY > 500 || currentY > 300) { 
              sheetState = 'half'; sheet.classList.remove('is-full-sheet'); AppEvents.emit('UI:TOGGLE_CONTEXT', false); 
            } else if (momentumY > 150 || currentY > 80) { 
              sheetState = 'half'; sheet.classList.remove('is-full-sheet'); AppEvents.emit('PLAYER:FORCE_PLAY'); 
            }
          }
        }
        if (dragController) { dragController.abort(); dragController = null; }
        currentY = 0; velocity = 0; 
      };

      const start = (event) => {
        if ((event.touches?.length > 1) || this.gestureState.isPinching || window.innerWidth >= 768) return;
        const scrollableArea = event.target.closest('.story-body'); 
        if (scrollableArea && scrollableArea.scrollTop > 0) return;
        
        startY = this.getClientY(event); lastY = startY; lastTime = performance.now(); currentY = 0; velocity = 0; 
        this.gestureState.isDragging = true;
        
        const sheet = DOMHelper.select(DOM_SELECTORS.SHEET_CONTENT);
        if (sheet) { 
          sheet.classList.add('is-dragging'); 
          sheetState = sheet.classList.contains('is-full-sheet') ? 'full' : 'half'; 
        }
        
        dragController = new AbortController(); 
        const opts = { signal: dragController.signal }, optsPassive = { passive: false, signal: dragController.signal };
        
        window.addEventListener('mousemove', move, opts); 
        window.addEventListener('touchmove', move, optsPassive);
        window.addEventListener('mouseup', end, opts); 
        window.addEventListener('touchend', end, opts);
      };
      
      const sheetContent = DOMHelper.select(DOM_SELECTORS.SHEET_CONTENT);
      sheetContent?.addEventListener('mousedown', start); 
      sheetContent?.addEventListener('touchstart', start, { passive: true });
    }

    initRubberBand() {
      const feed = DOMHelper.select(DOM_SELECTORS.FEED); if (!feed) return;
      let startY = 0, isPulling = false;
      
      feed.addEventListener('touchstart', (e) => {
        if ((e.touches?.length > 1) || this.gestureState.isPinching || e.target.closest('.story-progress-bar-wrapper, .story-top-actions, .story-player-actions')) return;
        startY = e.touches[0].clientY; 
        isPulling = true;
      }, { passive: true });
      
      feed.addEventListener('touchmove', (e) => {
        if (!isPulling) return;
        // Native scroll-snap natively handles middle items, no heavy JS manipulation needed
      }, { passive: true });
      
      const endPull = () => { if (isPulling) isPulling = false; };
      feed.addEventListener('touchend', endPull); 
      feed.addEventListener('touchcancel', endPull);
    }
  }

  /** =========================================================================
   * 8. MAIN ORCHESTRATOR
   * ========================================================================= */
  class StoryOrchestrator {
    #state;
    #uiManager;
    #playerManager;
    #gestureManager;
    #isProgrammaticScroll = false;
    #slotObserver = null;
    #scrollLockTimer = null;

    constructor() {
      this.#state = GlobalState; 
      this.#uiManager = new UIManager(this.#state);
      this.#playerManager = new PlayerManager(this.#state, this.#uiManager); 
      this.#gestureManager = new GestureManager(this.#state);
      
      this.initDummyTemplates(); 
      this.initCoreEventListeners();
      AppEvents.on('APP:CLOSE', () => this.#playerManager.closeApplication());
    }

    initDummyTemplates() {
      setTimeout(() => {
        ['.js-story-sheet', '.js-story-popup', '.js-story-card'].forEach(selector => {
          const element = DOMHelper.select(selector), targetArea = element?.querySelector('.story-dynamic-area'), template = document.querySelector('.js-story-template');
          if (targetArea && template && !targetArea.innerHTML.trim()) targetArea.appendChild(template.content.cloneNode(true));
        });
      }, 0);
    }

    updateVideoUI() { this.#playerManager.updateVideoCore(); }

    initCoreEventListeners() {
      ['click', 'touchstart', 'keydown', 'pointerdown'].forEach(evt => EventRegistry.add(window, evt, () => { this.#state.userInteracted = true; }, { once: true, passive: true }, 'app'));
      this.resolveInitialURL(); 
      this.initScrollSnap(); 
      this.attachGlobalKeyBindings(); 
      this.attachGlobalClickBindings(); 
      this.attachWindowBindings();
      
      AppEvents.on('SCROLL_TO_INDEX', (index) => {
        const feed = DOMHelper.select(DOM_SELECTORS.FEED), slots = feed.querySelectorAll('.story-slot');
        if (slots[index]) {
          this.#isProgrammaticScroll = true; 
          slots[index].appendChild(DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER));
          this.updateVirtualization(index);
          slots[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
          
          clearTimeout(this.#scrollLockTimer);
          this.#scrollLockTimer = setTimeout(() => { this.#isProgrammaticScroll = false; }, 800);
        }
      });
    }

    resolveInitialURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const urlId = urlParams.get('watch') || urlParams.get('v'); 
      let isUrlIndexSet = false;

      if (urlId) {
        let foundIndex = -1, foundSubIndex = 0;
        for (let i = 0; i < APP_CONFIG.PLAYLIST.length; i++) {
          const group = APP_CONFIG.PLAYLIST[i];
          
          if (group.items) {
            for (let j = 0; j < group.items.length; j++) {
              const displayTitle = group.items[j].title || group.title;
              const baseSlug = group.items[j].type === 'youtube' 
                ? (displayTitle ? MediaUtils.slugify(displayTitle) : MediaUtils.parseYouTubeData(group.items[j].url).videoId) 
                : MediaUtils.slugify(displayTitle || 'media');
              
              const itemSlug = `${baseSlug}-pt${j + 1}`;
              if (itemSlug === urlId || baseSlug === urlId) { foundIndex = i; foundSubIndex = j; break; }
            }
          } else {
            const displayTitle = group.title;
            const itemSlug = group.type === 'youtube' 
              ? (displayTitle ? MediaUtils.slugify(displayTitle) : MediaUtils.parseYouTubeData(group.url).videoId) 
              : MediaUtils.slugify(displayTitle || 'media');
            
            if (itemSlug === urlId) foundIndex = i;
          }
          if (foundIndex > -1) break;
        }
        
        if (foundIndex > -1) { 
          this.#state.currentVideoIndex = foundIndex; 
          this.#state.currentSubIndex = foundSubIndex; 
          isUrlIndexSet = true; 
        }
      }
      
      if (!isUrlIndexSet) {
        let savedIndex = parseInt(localStorage.getItem(APP_CONFIG.STORAGE_KEYS.INDEX), 10);
        if (!isNaN(savedIndex) && savedIndex >= 0 && savedIndex < APP_CONFIG.PLAYLIST.length) {
          this.#state.currentVideoIndex = savedIndex;
        }
      }
    }

    initScrollSnap() {
      const feed = DOMHelper.select(DOM_SELECTORS.FEED), playerContainer = DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER);
      playerContainer.style.display = ''; feed.innerHTML = '';
      
      const fragment = document.createDocumentFragment();
      APP_CONFIG.PLAYLIST.forEach((_, index) => {
        const slot = document.createElement('div');
        slot.className = 'story-slot'; slot.dataset.index = index; 
        fragment.appendChild(slot);
      });
      feed.appendChild(fragment);
      
      const slots = feed.querySelectorAll('.story-slot');
      if (slots[this.#state.currentVideoIndex]) { 
        slots[this.#state.currentVideoIndex].appendChild(playerContainer); 
        feed.scrollTop = slots[this.#state.currentVideoIndex].offsetTop; 
      }
      this.updateVirtualization(this.#state.currentVideoIndex);
      
      let scrollTimeout = null, targetIndex = this.#state.currentVideoIndex;
      
      this.#slotObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting && entry.intersectionRatio >= 0.5) targetIndex = parseInt(entry.target.dataset.index, 10); });
      }, { root: feed, threshold: 0.5 }); 
      
      slots.forEach(slot => this.#slotObserver.observe(slot));

      const processScrollEnd = () => {
        if (this.#isProgrammaticScroll) {
          this.#isProgrammaticScroll = false;
          clearTimeout(this.#scrollLockTimer);
          return;
        }
        
        if (this.#state.currentVideoIndex === targetIndex) return;
        
        this.#state.currentVideoIndex = targetIndex; 
        this.#state.currentSubIndex = 0;
        
        clearTimeout(globalThis.saveIndexTimer); 
        globalThis.saveIndexTimer = setTimeout(() => this.#state.saveIndexState(), 500);
        this.#gestureManager.gestureState.stopScrubCallback?.();
        
        AppEvents.emit('UI:RESET_STATE');
        
        requestAnimationFrame(() => { 
          const currentSlots = feed.querySelectorAll('.story-slot');
          currentSlots[this.#state.currentVideoIndex].appendChild(playerContainer); 
          this.updateVirtualization(this.#state.currentVideoIndex); 
          this.#playerManager.updateVideoCore(); 
          this.checkAndLoadMore();
        });
      };

      if ('onscrollend' in window) feed.addEventListener('scrollend', processScrollEnd);
      else feed.addEventListener('scroll', () => { clearTimeout(scrollTimeout); scrollTimeout = setTimeout(processScrollEnd, 150); }, { passive: true });
    }

    async checkAndLoadMore() {
      if (this.#state.isLoadingNextPage || !this.#state.hasMorePages) return;

      const THRESHOLD = APP_CONFIG.VIRTUAL_WINDOW_SIZE + 1; 
      const remainingVideos = APP_CONFIG.PLAYLIST.length - 1 - this.#state.currentVideoIndex;

      if (remainingVideos <= THRESHOLD) {
        this.#state.isLoadingNextPage = true;
        
        try {
          const newData = await this.fetchMockAPI(this.#state.currentPage + 1);

          if (newData?.length > 0) {
            this.#state.currentPage++;
            const startIndex = APP_CONFIG.PLAYLIST.length;
            APP_CONFIG.PLAYLIST.push(...newData);

            const feed = DOMHelper.select(DOM_SELECTORS.FEED);
            const fragment = document.createDocumentFragment();
            
            newData.forEach((_, idx) => {
              const actualIndex = startIndex + idx;
              const slot = document.createElement('div');
              slot.className = 'story-slot'; 
              slot.dataset.index = actualIndex;
              fragment.appendChild(slot);
              this.#slotObserver?.observe(slot);
            });
            feed.appendChild(fragment);
            this.updateVirtualization(this.#state.currentVideoIndex);
          } else {
            this.#state.hasMorePages = false;
            ToastService.show('Semua media telah dimuat.');
          }
        } catch (error) {
          ToastService.show('Koneksi terganggu saat memuat media baru.');
        } finally {
          this.#state.isLoadingNextPage = false;
        }
      }
    }

    fetchMockAPI(page) {
      return new Promise((resolve) => {
        setTimeout(() => {
          if (page > 3) return resolve([]); 
          resolve([
            { format: 'reels', type: 'video', url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4', categories: ['Eksplorasi', `Batch ${page}`], isVertical: false, thumbnailFit: 'cover', title: `Misi Rahasia ${page}`, meta: 'Deep Space • Baru Saja', excerpt: 'Infiltrasi markas untuk mengambil data.', content: '<p>Diambil langsung dari database sekuensial.</p>' },
            { format: 'reels', type: 'image', url: `https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1080&auto=format&fit=crop&page=${page}`, categories: ['Estetika', `Batch ${page}`], title: `Ruang Abstrak ${page}`, meta: 'Galeri Virtual', excerpt: 'Seni digital tanpa batas.', content: '<p>Render grafis mulus dari batch pagination baru.</p>' }
          ]);
        }, 1200);
      });
    }

    updateVirtualization(currentIndex) {
      const feed = DOMHelper.select(DOM_SELECTORS.FEED), playerContainer = DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER);
      
      feed.querySelectorAll('.story-slot').forEach((slot, index) => {
        const isInsideWindow = Math.abs(index - currentIndex) <= APP_CONFIG.VIRTUAL_WINDOW_SIZE;
        if (isInsideWindow) {
          if (!slot.querySelector('.story-dummy-card') && slot !== playerContainer.parentElement) {
            const groupData = APP_CONFIG.PLAYLIST[index]; if (!groupData) return;
            const dummyCard = document.createElement('div');
            dummyCard.className = 'story-dummy-card'; slot.appendChild(dummyCard);
            
            const coverData = groupData.items?.[0] ?? groupData;
            ThumbnailResolver.resolve(coverData, (url) => {
              if (url && slot.contains(dummyCard)) {
                const isShortMedia = (coverData.type === 'youtube' && MediaUtils.parseYouTubeData(coverData.url).isShort) || coverData.isVertical === true;
                dummyCard.style.setProperty('--peek-img', `url(${url})`);
                dummyCard.style.setProperty('--peek-fit', isShortMedia ? 'cover' : 'contain');
                dummyCard.style.setProperty('--peek-blur', isShortMedia ? '0' : '1');
              }
            });
          }
        } else if (slot !== playerContainer.parentElement) {
          slot.innerHTML = '';
        }
      });
    }

    attachGlobalKeyBindings() {
      EventRegistry.add(document, 'keydown', (event) => {
        if (['INPUT', 'TEXTAREA'].includes(event.target.tagName) || this.#uiManager.isContextOpen || this.#playerManager.isAnimatingTransition) return;
        const groupData = APP_CONFIG.PLAYLIST[this.#state.currentVideoIndex], isMulti = groupData.items?.length > 1;
        const isStoryFormat = groupData.format === 'story', isReady = DOMHelper.select(DOM_SELECTORS.STORY_CONTAINER)?.classList.contains('has-started'), canNavigateInternal = isStoryFormat || isMulti;
        
        const keyActions = {
          Space: () => { event.preventDefault(); AppEvents.emit('PLAYER:TOGGLE_PLAY'); },
          ArrowDown: () => AppEvents.emit('PLAYER:SWITCH_VIDEO', 1), 
          ArrowUp: () => AppEvents.emit('PLAYER:SWITCH_VIDEO', -1),
          ArrowRight: () => { if (canNavigateInternal) AppEvents.emit('PLAYER:NEXT'); else if (isReady) { AppEvents.emit('PLAYER:SEEK', 5); AppEvents.emit('UI:SHOW_RIPPLE', {side: 'right', text: '⏩ 5s'}); } },
          ArrowLeft: () => { if (canNavigateInternal) AppEvents.emit('PLAYER:PREV'); else if (isReady) { AppEvents.emit('PLAYER:SEEK', -5); AppEvents.emit('UI:SHOW_RIPPLE', {side: 'left', text: '⏪ 5s'}); } }
        };
        
        if (keyActions[event.code]) keyActions[event.code](); 
        else if (event.key.toLowerCase() === 'm') AppEvents.emit('UI:TOGGLE_MUTE');
      }, {}, 'app');
    }

    attachGlobalClickBindings() {
      EventRegistry.add(document, 'click', async (event) => {
        const target = event.target;
        if (target.closest(DOM_SELECTORS.VOLUME_SLIDER)) return;
        if (target.closest('.story-close-btn, .overlay-backdrop')) return AppEvents.emit('UI:TOGGLE_CONTEXT', false);
        if (target.closest('.reaction-option-btn')) return AppEvents.emit('UI:TRIGGER_REACTION', target.closest('.reaction-option-btn').dataset.reaction);
        
        const dummyClick = target.closest('.story-dummy-card');
        if (dummyClick && !dummyClick.closest('.story-slot').classList.contains('is-active')) { dummyClick.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
        
        const actionMap = {
          [DOM_SELECTORS.BTN_PLAY]: () => AppEvents.emit('PLAYER:TOGGLE_PLAY'),
          [DOM_SELECTORS.BTN_MUTE]: () => AppEvents.emit('UI:TOGGLE_MUTE'),
          [DOM_SELECTORS.BTN_PREV]: () => { if (!target.closest('.is-disabled')) AppEvents.emit('PLAYER:SWITCH_VIDEO', -1); },
          [DOM_SELECTORS.BTN_NEXT]: () => { if (!target.closest('.is-disabled')) AppEvents.emit('PLAYER:SWITCH_VIDEO', 1); },
          [DOM_SELECTORS.BTN_CLOSE]: () => AppEvents.emit('APP:CLOSE'),
          [DOM_SELECTORS.BTN_OPEN_CONTEXT]: () => AppEvents.emit('UI:TOGGLE_CONTEXT', true),
          [DOM_SELECTORS.BTN_REACTION]: () => AppEvents.emit('UI:TOGGLE_REACTION_MENU'),
          [DOM_SELECTORS.BTN_CLEAN]: () => { this.#uiManager.closeReactionMenu(); DOMHelper.root.classList.toggle('is-clean-mode'); },
          
          [DOM_SELECTORS.BTN_SHARE]: async () => {
            const currentUrl = window.location.href;
            const groupData = APP_CONFIG.PLAYLIST[this.#state.currentVideoIndex];
            const activeData = groupData.items?.[this.#state.currentSubIndex] ?? groupData;
            
            const shareTitle = activeData.title || groupData.title || 'Konten Interaktif';
            const shareExcerpt = activeData.excerpt || groupData.excerpt || 'Lihat pengalaman visual ini.';
            const shareText = `Tonton "${shareTitle}" ✨\n\n${shareExcerpt}`;
            const shareData = { title: shareTitle, text: shareText, url: currentUrl };
            
            try { 
              if (navigator.canShare?.(shareData)) {
                await navigator.share(shareData); 
              } else { 
                await navigator.clipboard.writeText(`${shareText}\n\nKlik tautan ini: ${currentUrl}`); 
                ToastService.show('Tautan disalin ke clipboard 📋'); 
              } 
            } catch (err) { 
              if (err.name !== 'AbortError') ToastService.show('Gagal membagikan tautan.'); 
            }
          }
        };

        for (const selector in actionMap) { if (target.closest(selector)) return actionMap[selector](); }
        if (this.#uiManager.dom.reactionWrapper && !this.#uiManager.dom.reactionWrapper.contains(target)) this.#uiManager.closeReactionMenu();
      }, {}, 'app');
    }

    attachWindowBindings() {
      EventRegistry.add(window, 'offline', () => ToastService.show('Koneksi internet terputus.'), {}, 'app');
      EventRegistry.add(window, 'online', () => { 
        ToastService.show('Koneksi pulih.'); 
        if (DOMHelper.select(DOM_SELECTORS.ERROR_OVERLAY)?.classList.contains('is-visible')) this.#playerManager.updateVideoCore(); 
      }, {}, 'app');

      EventRegistry.add(window, 'popstate', (event) => {
        if (this.#uiManager.isContextOpen) {
          this.#uiManager.toggleContext(false);
          return;
        }

        if (typeof event.state?.index === 'number') {
          if (this.#playerManager.isAnimatingTransition) return;
          this.#state.currentVideoIndex = event.state.index; 
          this.#state.currentSubIndex = event.state.subIndex || 0;
          this.#gestureManager.gestureState.stopScrubCallback?.();
          AppEvents.emit('UI:RESET_STATE'); 
          this.#playerManager.updateVideoCore();
        }
      }, {}, 'app');

      const feed = DOMHelper.select(DOM_SELECTORS.FEED);
      if (feed && globalThis.ResizeObserver) {
        let resizeDebounce, lastHeight = window.innerHeight;
        new ResizeObserver(() => {
          clearTimeout(resizeDebounce);
          resizeDebounce = setTimeout(() => {
            const currentHeight = window.innerHeight;
            if (Math.abs(currentHeight - lastHeight) / lastHeight < 0.15) return; 
            lastHeight = currentHeight;
            const slots = feed.querySelectorAll('.story-slot');
            if (slots[this.#state.currentVideoIndex] && !this.#playerManager.isAnimatingTransition) {
              this.#isProgrammaticScroll = true; 
              slots[this.#state.currentVideoIndex].scrollIntoView({ block: 'center' });
              setTimeout(() => { this.#isProgrammaticScroll = false; }, 300);
            }
            if (window.innerWidth < 768 && this.#state.currentAmbient) { 
              this.#state.currentAmbient.destroy(); 
              this.#state.currentAmbient = null; 
            } else if (window.innerWidth >= 768 && !this.#state.currentAmbient && this.#state.currentMedia) {
              this.#state.currentAmbient = MediaFactory.create({ 
                container: DOMHelper.select(DOM_SELECTORS.AMBIENT_MEDIA), data: this.#state.getActiveMediaData(), isAmbient: true, 
                callbacks: { onReady: () => { 
                  this.#state.currentAmbient.seekTo(this.#state.currentMedia.getCurrentTime()); 
                  if (this.#state.currentMedia.getState() === MEDIA_STATE.PLAYING) this.#state.currentAmbient.play(); 
                } } 
              });
              this.#state.currentAmbient.load();
            }
          }, 150);
        }).observe(feed);
      }

      EventRegistry.add(document, 'visibilitychange', () => {
        if (document.hidden) {
          this.#state.wasPlayingBeforeHidden = (this.#state.currentMedia?.getState() === MEDIA_STATE.PLAYING);
          if (this.#state.wasPlayingBeforeHidden) { 
            AppEvents.emit('PLAYER:FORCE_PAUSE'); AppEvents.emit('UI:FLASH_ICON', ''); 
          }
          WakeLockManager.release();
        } else {
          if (this.#state.wasPlayingBeforeHidden && !this.#uiManager.isContextOpen) { 
            AppEvents.emit('PLAYER:FORCE_PLAY'); 
            this.#state.wasPlayingBeforeHidden = false; 
            if (this.#state.currentMedia?.data?.type === 'image') {
              this.#state.currentMedia.lastTickTime = performance.now();
            }
          }
        }
      }, {}, 'app');

      let mouseIdleTimer;
      EventRegistry.add(document, 'mousemove', () => {
        DOMHelper.root.classList.remove('is-mouse-idle'); clearTimeout(mouseIdleTimer);
        if (this.#state.currentMedia?.getState() === MEDIA_STATE.PLAYING && !this.#uiManager.isContextOpen) {
          mouseIdleTimer = setTimeout(() => DOMHelper.root.classList.add('is-mouse-idle'), 2500);
        }
      }, {}, 'app');
    }
  }

  /** =========================================================================
   * 9. BOOTSTRAP API
   * ========================================================================= */
  const initializeApplication = () => {
    PowerManager.init();

    globalThis.StoryAppInstance = new StoryOrchestrator();
    const existingYTCallback = globalThis.onYouTubeIframeAPIReady;
    
    globalThis.onYouTubeIframeAPIReady = () => {
      existingYTCallback?.();
      GlobalState.isApiReady = true;
      globalThis.StoryAppInstance.updateVideoUI();
    };

    if (globalThis.YT?.Player) {
      GlobalState.isApiReady = true; 
      globalThis.StoryAppInstance.updateVideoUI();
    } else {
      const scriptTag = document.createElement('script');
      scriptTag.src = 'https://www.youtube.com/iframe_api';
      scriptTag.async = true;
      document.head.appendChild(scriptTag);
    }
  };

  initializeApplication();

  </script>
