<!doctype html>
<html lang="id" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="NextGen Story - Pengalaman Interaktif Premium" />
  <title>NextGen Story - Edisi Premium</title>
  
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  
  <style>
    /* ==========================================================================
       MODERN CSS: Native Nesting, @layer, Color-Mix, OKLCH, :is()
       ========================================================================== */
    @layer reset, design-tokens, layout, components, utilities;

    @layer design-tokens {
      :root {
        color-scheme: dark;
        --c-black: oklch(0% 0 0);
        --c-white: oklch(100% 0 0);
        --c-gray-900: oklch(15% 0.01 250);
        --c-gray-800: oklch(22% 0.01 250);
        --c-gray-700: oklch(35% 0.01 250);
        
        --brand-dark: var(--c-black);
        --text-main: color-mix(in oklch, var(--c-white) 98%, transparent);
        --text-sub: color-mix(in oklch, var(--c-white) 60%, transparent);
        --text-muted: color-mix(in oklch, var(--c-white) 40%, transparent);
        
        --glass-bg: color-mix(in oklch, var(--c-gray-800) 65%, transparent);
        --surface-glass-bg: color-mix(in oklch, var(--c-gray-900) 70%, transparent);
        --glass-border: color-mix(in oklch, var(--c-white) 6%, transparent);
        --glass-highlight: inset 0 1px 0 0 color-mix(in oklch, var(--c-white) 8%, transparent);
        --surface-glass-blur: blur(54px) saturate(180%);
        
        --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
        --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
        --ease-snappy: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-gravity: cubic-bezier(0.55, 0.085, 0.68, 0.53);
        
        --card-inline-size: 27.5rem;
        --frame-radius: 1.5rem;
        
        /* RESPONSIVE BUTTON SIZES (Default Mobile) */
        --fab-size: 2.75rem;
        --fab-icon-size: 1.25rem;
        --vol-expanded-width: 9.5rem;
      }
    }

    @layer reset {
      html, body { 
        overscroll-behavior: none; touch-action: pan-y; overflow: hidden; background-color: var(--brand-dark); 
      }
      *, *::before, *::after { 
        box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; 
      }
      body {
        font-family: 'SF Pro Display', 'Inter', -apple-system, sans-serif;
        color: var(--text-main);
        opacity: 0;
        animation: smoothLoad .8s var(--ease-out) forwards;
        user-select: none;
      }
      @keyframes smoothLoad { to { opacity: 1; } }
      
      :is(.story-excerpt, .fab-wrapper, .volume-wrapper, .reaction-option-btn, input[type=range]):focus-visible {
        outline: none; box-shadow: 0 0 0 4px color-mix(in oklch, var(--c-white) 25%, transparent); border-radius: 50%;
      }
      .story-excerpt:focus-visible { border-radius: .75rem; }
      .volume-wrapper:focus-visible { border-radius: 2.5rem; }
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
      button { background: none; border: none; font-family: inherit; color: inherit; cursor: pointer; }
      :is(.story-body__cms-content, .story-view__title) { cursor: text; user-select: text; }
    }

    @layer layout {
      .layout-wrapper { 
        position: relative; height: 100dvh; width: 100vw; pointer-events: none; background: var(--c-black); 
        transition: transform .6s var(--ease-spring), opacity .5s var(--ease-out); transform-origin: center; 
        
        &.is-ready { pointer-events: auto; }
        &.is-mouse-idle * { cursor: none !important; }
        &.is-scrub-locked * { cursor: grabbing !important; }
        
        &.is-initial-load :is(.story-top-actions, .story-player-actions, .story-excerpt) {
          opacity: 0 !important; pointer-events: none !important; transform: translateY(24px) !important; transition: none !important;
        }

        &.is-ui-open, &.is-scrub-locked {
          & .story-feed { overflow-y: hidden !important; touch-action: none !important; }
        }
      }

      .story-feed { 
        position: absolute; inset: 0; width: 100%; height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; 
        scrollbar-width: none; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: transform .5s var(--ease-spring); 
        &::-webkit-scrollbar { display: none; }
      }
      .story-slot { 
        position: relative; flex-shrink: 0; width: 100%; height: 100dvh; scroll-snap-align: center; scroll-snap-stop: always; transform: translateZ(0); 
      }
    }

    @layer components {
      .story-container, .story-dummy-card { position: absolute; inset: 0; width: 100%; height: 100%; transform: translateZ(0); }
      
      .story-container { 
        background-color: var(--brand-dark); z-index: 10; transition: border-radius .6s var(--ease-snappy), box-shadow .6s var(--ease-snappy), transform .4s var(--ease-spring); 
        &.is-loading .story-viewport { cursor: progress; }
        &.has-started:not(.is-paused):not(.is-loading) .ambient-layer { opacity: .45; filter: blur(32px) saturate(220%); transform: scale(3.5) translateZ(0); }
        &.is-paused {
          & .ambient-layer { opacity: .15; filter: blur(48px) saturate(100%); transform: scale(3.2) translateZ(0); }
          & .story-video-wrapper { filter: brightness(.8) contrast(1.1) grayscale(.1); }
        }
        
        /* Logic Visibility */
        &.show-ui :is(.story-excerpt, .story-player-actions, .story-top-actions) { opacity: 1; pointer-events: auto; transform: translateY(0); }
        &.show-ui .story-progress-bar-wrapper { opacity: 1; pointer-events: auto; transform: translateY(0); }
        &.is-story-format.is-sub-item .story-progress-bar-wrapper { opacity: 1; pointer-events: auto; transform: translateY(0); }
      }
      
      .story-dummy-card { 
        background-color: oklch(5% 0 0); overflow: hidden; filter: brightness(.3); z-index: 5; transition: filter .6s var(--ease-out), transform .2s var(--ease-out); pointer-events: auto; cursor: pointer; 
        &:active { transform: scale(.98); }
        &::before { content: ''; position: absolute; inset: -10%; width: 120%; height: 120%; background-image: var(--peek-img, none); background-size: cover; background-position: center; filter: blur(40px) brightness(.3); opacity: var(--peek-blur, 0); z-index: 1; }
        &::after { content: ''; position: absolute; inset: 0; background-image: var(--peek-img, none); background-size: var(--peek-fit, cover); background-position: center; background-repeat: no-repeat; z-index: 2; }
      }

      .ambient-layer { 
        will-change: filter, transform, opacity;
        display: none; position: absolute; top: 50%; left: 50%; width: 30%; height: 30%; margin-top: -15%; margin-left: -15%; z-index: 1; pointer-events: none; transform: scale(3) translateZ(0); opacity: 0; filter: blur(60px) saturate(50%); transition: opacity .8s var(--ease-out), filter .8s var(--ease-out), transform 1.2s var(--ease-spring); 
      }
      :is(.story-container.is-loading, .layout-wrapper.is-scrub-locked) .ambient-layer { opacity: .05; filter: blur(64px) saturate(50%); transform: scale(2.8) translateZ(0); transition: opacity .3s var(--ease-out), filter .3s var(--ease-out), transform .5s var(--ease-out); }
      .layout-wrapper.is-ui-open .ambient-layer { opacity: .02 !important; }
      @keyframes ambientBreathe { 0%, 100% { transform: scale(3.5) translateZ(0); } 50% { transform: scale(3.7) translateZ(0); } }
      .is-breathing { animation: ambientBreathe 10s ease-in-out infinite; }

      .media-container :is(iframe, video, img) { width: 100%; height: 100%; border: none; pointer-events: none; transform: translateZ(0); transform-origin: center; }
      .ambient-media-container { width: 100%; height: 100%; opacity: 0; transition: opacity .8s var(--ease-out); }
      
      .story-viewport { 
        will-change: transform, filter;
        position: absolute; inset: 0; z-index: 10; overflow: hidden; border-radius: inherit; transition: filter .6s var(--ease-snappy), transform .6s var(--ease-spring); contain: paint; 
      }
      
      .story-video-wrapper { 
        position: relative; width: 100%; height: 100%; background-color: var(--brand-dark); transition: filter .6s var(--ease-out); 
        &::before { content: ''; position: absolute; inset: 0; z-index: 6; pointer-events: none; box-shadow: inset 0 0 120px color-mix(in oklch, var(--c-black) 90%, transparent); opacity: .8; transition: opacity .5s var(--ease-out); }
        &::after { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 5; background: linear-gradient(to bottom, color-mix(in oklch, var(--c-black) 60%, transparent) 0%, transparent 15%, transparent 60%, color-mix(in oklch, var(--c-black) 90%, transparent) 100%); transition: opacity .5s var(--ease-out); }
      }

      .video-blur-bg { position: absolute; inset: -10%; width: 120%; height: 120%; background-size: cover; background-position: center; filter: blur(30px) brightness(.3); z-index: 1; opacity: 0; transition: opacity .6s ease, background-image .6s ease; }
      .thumbnail-overlay { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 8; transition: opacity .3s ease-out; color: transparent; }
      .main-media-container { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; opacity: 0; transition: opacity .25s ease-in; }

      .story-loader { 
        position: absolute; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; transition: opacity .4s var(--ease-out); pointer-events: none; opacity: 0;
      }
      .story-container.is-loading .story-loader { opacity: 1; }
      .story-loader__spinner-simple { width: 2.25rem; height: 2.25rem; border-radius: 50%; border: 3px solid color-mix(in oklch, var(--c-white) 10%, transparent); border-top-color: var(--text-main); animation: story-spin-simple .8s cubic-bezier(.4, 0, .2, 1) infinite; filter: drop-shadow(0 2px 8px color-mix(in oklch, var(--c-black) 50%, transparent)); }
      @keyframes story-spin-simple { to { transform: rotate(1turn); } }

      .story-error-overlay { 
        position: absolute; inset: 0; z-index: 60; background: color-mix(in oklch, var(--c-gray-900) 95%, transparent); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .4s ease; 
        &.is-visible { opacity: 1; pointer-events: auto; }
      }
      .error-content { text-align: center; padding-inline: 2rem; color: var(--text-main); }
      .error-icon { font-size: 3.5rem; margin-block-end: 1.25rem; display: block; filter: drop-shadow(0 8px 16px color-mix(in oklch, var(--c-black) 50%, transparent)); }
      .error-title { font-size: 1.375rem; font-weight: 700; margin-block-end: .625rem; letter-spacing: -.02em; }
      .error-desc { font-size: .9375rem; color: var(--text-sub); margin-block-end: 1.75rem; line-height: 1.5; }
      .error-retry-btn { 
        background: var(--text-main); color: var(--brand-dark); padding: .875rem 2rem; border-radius: 2rem; font-size: .9375rem; font-weight: 700; cursor: pointer; transition: all .2s var(--ease-snappy); box-shadow: 0 8px 24px color-mix(in oklch, var(--c-white) 15%, transparent); 
        &:active { transform: scale(.96); }
      }

      .reaction-container-layer { position: absolute; inset: 0; z-index: 15; pointer-events: none; contain: strict; }
      .particle { position: absolute; top: -10%; left: var(--x); font-size: var(--size); opacity: 0; animation: drop-physics var(--duration) var(--ease-gravity) forwards; animation-delay: var(--delay); filter: blur(var(--blur)) drop-shadow(0 4px 12px color-mix(in oklch, var(--c-black) 60%, transparent)); z-index: var(--z); }
      @keyframes drop-physics { 0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; } 10%, 80% { opacity: 1; } 100% { transform: translate3d(var(--drift), 120dvh, 0) rotate(var(--rotation)); opacity: 0; } }

      .story-center-play { 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.8); font-size: 5.5rem; z-index: 15; opacity: 0; pointer-events: none; transition: opacity .5s ease-out, transform .5s ease-out; filter: drop-shadow(0 12px 32px color-mix(in oklch, var(--c-black) 60%, transparent)); text-shadow: 0 0 40px color-mix(in oklch, var(--c-white) 20%, transparent); 
        &.is-flashing, &.is-steady { opacity: 1; transform: translate(-50%, -50%) scale(1); transition: opacity .15s ease-in, transform .3s var(--ease-spring); }
      }

      .ripple-edge { 
        position: absolute; inset-block: 0; width: 40%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; z-index: 25; 
        &.is-animating { animation: edgeRippleAnim .7s var(--ease-out) forwards; }
        &.is-steady { opacity: 1; transition: opacity .3s var(--ease-out); }
        &--left { left: 0; background: radial-gradient(100% 50% at 0% 50%, color-mix(in oklch, var(--c-white) 8%, transparent) 0%, transparent 100%); }
        &--right { right: 0; background: radial-gradient(100% 50% at 100% 50%, color-mix(in oklch, var(--c-white) 8%, transparent) 0%, transparent 100%); }
      }
      .ripple-edge__capsule { background: color-mix(in oklch, var(--c-black) 50%, transparent); padding: .75rem 1.5rem; border-radius: 2.5rem; font-size: .9375rem; font-weight: 700; -webkit-backdrop-filter: blur(20px) saturate(150%); backdrop-filter: blur(20px) saturate(150%); box-shadow: 0 8px 24px color-mix(in oklch, var(--c-black) 40%, transparent), var(--glass-highlight); border: 1px solid var(--glass-border); }
      @keyframes edgeRippleAnim { 0% { opacity: 0; transform: scale(.9); } 15% { opacity: 1; transform: scale(1.05); } 30% { opacity: 1; transform: scale(1); } 80% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.08); } }

      .story-gesture-layer { position: absolute; inset: 0; z-index: 20; display: flex; cursor: default; touch-action: pan-y; -webkit-touch-callout: none; }
      .gesture-zone { height: 100%; cursor: pointer; }
      .gesture-zone--left, .gesture-zone--right { width: 30%; } .gesture-zone--center { width: 40%; }

      .story-progress-bar-wrapper { 
        position: absolute; bottom: max(1rem, env(safe-area-inset-bottom)); left: 1rem; right: 1rem; block-size: 2.5rem; z-index: 60; display: flex; align-items: center; gap: .375rem; 
        opacity: 0; pointer-events: none; transition: opacity .8s var(--ease-out), transform .8s var(--ease-spring); filter: drop-shadow(0 2px 8px color-mix(in oklch, var(--c-black) 50%, transparent)); touch-action: none; 
        
        &.is-scrubbing, &.is-scrubbing * { cursor: grabbing !important; }
      }
      
      .story-progress-bar { 
        flex: 1; height: 3px; background: color-mix(in oklch, var(--c-white) 20%, transparent); border-radius: 4px; overflow: hidden; transition: height .2s var(--ease-snappy), background .3s var(--ease-out), opacity .3s var(--ease-out); opacity: .5; cursor: default; 
        &.is-viewed { opacity: .9; background: color-mix(in oklch, var(--c-white) 35%, transparent); }
        &.is-current { 
          opacity: 1; background: color-mix(in oklch, var(--c-white) 40%, transparent); height: 4px; cursor: pointer; position: relative; 
          &::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, color-mix(in oklch, var(--c-white) 80%, transparent) 50%, transparent 100%); background-size: 200% 100%; opacity: 0; transition: opacity .4s var(--ease-out); animation: progressBarBuffering 1.5s infinite linear; pointer-events: none; border-radius: inherit; }
        }
        &.is-upcoming { opacity: .4; }
      }
      
      .story-progress-bar__fill { 
        will-change: transform;
        width: 100%; height: 100%; background: var(--c-white); transform-origin: left; transform: scaleX(0); border-radius: inherit; box-shadow: 0 0 10px color-mix(in oklch, var(--c-white) 60%, transparent); cursor: inherit; 
      }
      .story-progress-bar-wrapper:not(.is-scrubbing) .story-progress-bar__fill { transition: transform .1s linear; }
      @keyframes progressBarBuffering { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

      /* KORDINAT DEFAULT (TABLET/DESKTOP MENENGAH) */
      :is(.story-top-actions, .story-player-actions) { position: absolute; z-index: 55; display: flex; gap: .875rem; opacity: 0; pointer-events: none; transition: opacity .8s var(--ease-out), transform .8s var(--ease-spring); }
      .story-top-actions { top: max(1.25rem, env(safe-area-inset-top)); left: 1.25rem; transform: translateY(-1.25rem); align-items: center; }
      .story-player-actions { bottom: max(3.5rem, env(safe-area-inset-bottom)); right: 1.25rem; flex-direction: column; align-items: center; transform: translateY(1.25rem); }
      
      /* GLOBAL NAV ALIGNMENT */
      .story-close-btn { position: absolute; top: 1.25rem; right: 1.25rem; z-index: 30; }
      .story-close-player { position: fixed; top: max(1.25rem, env(safe-area-inset-top)); right: 1.25rem; cursor: pointer; z-index: 61; }
      .desktop-controls-wrapper { 
        position: fixed; right: 1.5rem; top: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 60; transition: opacity .8s var(--ease-out); 
        & > * { pointer-events: auto; }
      }

      :is(.fab-wrapper, .volume-wrapper) { 
        display: flex; align-items: center; justify-content: center; padding: .125rem; width: calc(var(--fab-size) + .25rem); height: calc(var(--fab-size) + .25rem); border-radius: 50%; transition: all .4s var(--ease-spring); cursor: pointer; background-color: var(--glass-bg); -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%); border: 1px solid var(--glass-border); box-shadow: 0 8px 20px color-mix(in oklch, var(--c-black) 30%, transparent), var(--glass-highlight); 
        &:active:not(.is-disabled) { transform: scale(.95); }
        &:active:not(.is-disabled) :is(.fab-inner, .volume-inner) { background-color: color-mix(in oklch, var(--c-white) 15%, transparent); }
        &.is-disabled { opacity: .2; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }
      }
      .volume-wrapper { border-radius: 2.5rem; justify-content: flex-start; }
      
      :is(.fab-inner, .volume-inner) { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background-color: transparent; font-size: var(--fab-icon-size); transition: all .3s var(--ease-spring); }
      .fab-inner { border-radius: 50%; }
      .volume-inner { border-radius: 2.25rem; overflow: hidden; justify-content: flex-start; }

      .volume-btn { width: var(--fab-size); height: var(--fab-size); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: var(--fab-icon-size); }
      .volume-slider-box { flex: 1; display: flex; align-items: center; padding-right: 1rem; opacity: 0; transform: translateX(-.625rem); transition: all .3s var(--ease-spring); pointer-events: none; }
      
      .volume-slider { 
        -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: linear-gradient(to right, var(--c-white) var(--vol, 0%), color-mix(in oklch, var(--c-black) 65%, transparent) var(--vol, 0%)); border-radius: 2px; outline: none; cursor: pointer; box-shadow: inset 0 1px 2px color-mix(in oklch, var(--c-black) 80%, transparent); 
        &::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--c-white); box-shadow: 0 1px 4px color-mix(in oklch, var(--c-black) 80%, transparent), 0 0 0 1px color-mix(in oklch, var(--c-black) 10%, transparent); transition: transform 0.2s var(--ease-spring); }
        &:active::-webkit-slider-thumb { transform: scale(1.35); }
      }

      .reaction-wrapper { 
        position: relative; display: flex; flex-direction: column; align-items: center; 
        &.is-active {
          & .reaction-options { pointer-events: auto; }
          & .reaction-option-btn { opacity: 1; transform: translateY(0) scale(1); margin-bottom: .5rem; }
          & .fab-inner { background-color: var(--text-main); color: var(--brand-dark); box-shadow: 0 0 24px color-mix(in oklch, var(--c-white) 40%, transparent); }
          & .reaction-option-btn:nth-child(4) { transition-delay: 0s; } 
          & .reaction-option-btn:nth-child(3) { transition-delay: .04s; } 
          & .reaction-option-btn:nth-child(2) { transition-delay: .08s; } 
          & .reaction-option-btn:nth-child(1) { transition-delay: .12s; }
        }
      }

      .reaction-options { position: absolute; bottom: 100%; right: 50%; transform: translateX(50%); display: flex; flex-direction: column; align-items: center; gap: .75rem; pointer-events: none; padding-bottom: 1.25rem; }
      .reaction-option-btn { 
        width: var(--fab-size); height: var(--fab-size); border-radius: 50%; background-color: var(--glass-bg); -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%); border: 1px solid var(--glass-border); font-size: var(--fab-icon-size); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px color-mix(in oklch, var(--c-black) 30%, transparent), var(--glass-highlight); transition: all .3s var(--ease-spring); opacity: 0; transform: translateY(1.5rem) scale(.5); 
        &:active { background-color: color-mix(in oklch, var(--c-gray-700) 60%, transparent); transform: scale(.92); }
        &:nth-child(1) { transition-delay: 0s; } &:nth-child(2) { transition-delay: .04s; } &:nth-child(3) { transition-delay: .08s; } &:nth-child(4) { transition-delay: .12s; }
      }

      .story-excerpt { position: absolute; bottom: max(3.5rem, env(safe-area-inset-bottom)); left: 1.5rem; right: 1.5rem; padding-right: 4.5rem; padding-block: 1.5rem; margin-bottom: -1.5rem; z-index: 50; opacity: 0; pointer-events: none; transform: translateY(1.25rem); transition: opacity .8s var(--ease-out), transform .8s var(--ease-spring); text-align: start; }
      :is(.story-excerpt__badges, .story-view__badges) { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: .75rem; }
      .story-badge-item { background: color-mix(in oklch, var(--c-white) 12%, transparent); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); font-size: .625rem; font-weight: 700; text-transform: uppercase; padding: .375rem .75rem; border-radius: .75rem; box-shadow: 0 4px 12px color-mix(in oklch, var(--c-black) 15%, transparent), inset 0 1px 0 color-mix(in oklch, var(--c-white) 10%, transparent); }
      .story-view__badges .story-badge-item { background: var(--text-main); color: var(--brand-dark); border: none; box-shadow: 0 4px 12px color-mix(in oklch, var(--c-white) 20%, transparent); }
      .story-excerpt__title { display: block; font-size: 1.25rem; font-weight: 700; margin-bottom: .5rem; text-shadow: 0 2px 12px color-mix(in oklch, var(--c-black) 80%, transparent); line-height: 1.25; }

  class EventBus {
    #events = new Map();
    on(event, listener) {
      if (!this.#events.has(event)) this.#events.set(event, new Set());
      this.#events.get(event).add(listener);
    }
    emit(event, data) {
      this.#events.get(event)?.forEach(listener => listener(data));
    }
  }

      this.savedVolume = this.getStoredInteger(APP_CONFIG.STORAGE_KEYS.SAVED_VOLUME, APP_CONFIG.DEFAULT_VOLUME);

    getStoredBoolean(key, defaultValue) { 
      const stored = localStorage.getItem(key); 
      return stored === null ? defaultValue : stored === 'true';

    getStoredInteger(key, defaultValue) { 
      const stored = localStorage.getItem(key);

    getActiveMediaData() {

    saveVolumeState() {

  class MediaUtils {
    static parseYouTubeData(url) {
      if (!url) return { isShort: false, videoId: '' };
      if (url.includes('/shorts/')) return { isShort: true, videoId: url.split('/shorts/')[1].split('?')[0] };
      const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
      return { isShort: false, videoId: (match?.[2].length === 11) ? match[2] : '' };
    }
    
    static slugify = (text) => text.toString().toLowerCase().replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-').replace(/-+/g, '-');
    
    static rampUpVolume(mediaInstance, targetVolume, duration = 300) {
      if (typeof mediaInstance?.setVolume !== 'function') return;
      if (mediaInstance._rampInterval) clearInterval(mediaInstance._rampInterval);
      
      mediaInstance.unMute?.();
      let currentVol = 0; 
      const steps = 10, stepTime = duration / steps, increment = targetVolume / steps;
      
      mediaInstance.setVolume(0);
      mediaInstance._rampInterval = setInterval(() => {
        currentVol += increment;
        if (currentVol >= targetVolume) { 
          mediaInstance.setVolume(targetVolume); 
          clearInterval(mediaInstance._rampInterval); 
        } else {
          mediaInstance.setVolume(currentVol);
        }
      }, stepTime);
    }
    
    static checkNetworkPreload() {
      const conn = navigator.connection;
      return !(conn?.saveData || ['slow-2g', '2g', '3g'].includes(conn?.effectiveType));
    }
  }

    static trigger(pattern) { navigator.vibrate?.(pattern); }
    static light() { this.trigger(10); } 
    static medium() { this.trigger(25); } 
    static heavy() { this.trigger([30, 40, 30]); } 
    static tick() { this.trigger(5); }
  }

  class EventRegistry {
    static #controllers = new Map();
    
    static add(target, type, handler, options = {}, group = 'global') {
      if (!this.#controllers.has(group)) this.#controllers.set(group, new AbortController());
      const opts = typeof options === 'boolean' ? { capture: options } : { ...options };
      opts.signal = this.#controllers.get(group).signal;
      target.addEventListener(type, handler, opts);
    }
    
    static clear(group = 'global') {
      if (this.#controllers.has(group)) { 
        this.#controllers.get(group).abort(); 
        this.#controllers.delete(group); 
      }
    }
  }

  class WakeLockManager {
    static #wakeLock = null;
    static async request() { 
      if ('wakeLock' in navigator && !this.#wakeLock) { 
        try { 
          this.#wakeLock = await navigator.wakeLock.request('screen'); 
          this.#wakeLock.addEventListener('release', () => { this.#wakeLock = null; }); 
        } catch (error) {} 
      } 
    }
    static release() { 
      if (this.#wakeLock) { 
        this.#wakeLock.release().catch(() => {}); 
        this.#wakeLock = null; 
      } 
    }
  }

        battery.addEventListener('chargingchange', () => this.updatePowerState(battery));

      document.documentElement.classList.toggle('is-low-power', battery.level <= 0.20 && !battery.charging);
    }

  const ThumbnailResolver = {
    cache: new Map(), 
    pendingCallbacks: new Map(),
    
    resolve(data, callback) {
      if (!data) return callback(null);
      const cacheKey = data.type === 'youtube' ? MediaUtils.parseYouTubeData(data.url).videoId : data.url;
      
      if (this.cache.has(cacheKey)) { 
        const cachedValue = this.cache.get(cacheKey); 
        return cachedValue === 'loading' ? this.pendingCallbacks.get(cacheKey).push(callback) : callback(cachedValue); 
      }
      
      if (this.cache.size >= APP_CONFIG.THUMBNAIL_MAX_CACHE) { 
        for (const [key, value] of this.cache.entries()) { 
          if (value !== 'loading') { this.cache.delete(key); break; } 
        } 
      }
      
      this.cache.set(cacheKey, 'loading'); 
      this.pendingCallbacks.set(cacheKey, [callback]);
      
      const onResolve = (resultUrl) => {
        this.cache.set(cacheKey, resultUrl);
        this.pendingCallbacks.get(cacheKey)?.forEach(cb => cb(resultUrl)); 
        this.pendingCallbacks.delete(cacheKey);
      };

      if (data.type === 'youtube') {
        const img = new Image(), fallbackUrl = `https://i.ytimg.com/vi/${cacheKey}/hqdefault.jpg`, maxResUrl = `https://i.ytimg.com/vi/${cacheKey}/maxresdefault.jpg`;
        img.onload = () => onResolve(img.naturalWidth > 120 ? maxResUrl : fallbackUrl); 
        img.onerror = () => onResolve(fallbackUrl);
        setTimeout(() => { if (this.cache.get(cacheKey) === 'loading') onResolve(fallbackUrl); }, 5000); 
        img.src = maxResUrl;
      } else if (data.type === 'video') {
        onResolve(data.thumbnail || null);
      } else {
        onResolve(data.thumbnail || data.url || null);
      }
    }
  };

  /** =========================================================================
   * 4. MEDIA HANDLERS
   * ========================================================================= */
  class BaseMediaHandler {
    constructor({ container, data, callbacks = {}, isAmbient = false }) {
      this.container = container; this.data = data; this.callbacks = callbacks; 
      this.isAmbient = isAmbient; this.isDestroyed = false;
    }
    load() {} play() {} pause() {} mute() {} unMute() {}
    seek(offset) { this.seekTo(this.getCurrentTime() + offset); } seekTo(time) {}
    getCurrentTime() { return 0; } getDuration() { return 0; } setPlaybackRate(rate) {}
    isMuted() { return true; } setVolume(level) {} getState() { return MEDIA_STATE.UNSTARTED; }
    destroy() { this.isDestroyed = true; if (this.container) this.container.innerHTML = ''; }
    emitStateChange(state) { this.callbacks.onStateChange?.(state); }
  }

  class YouTubeMediaHandler extends BaseMediaHandler {
    #player = null;
    #autoplayCheckTimer = null;

    load() {
      if (!globalThis.YT?.Player) {
        let retries = 0; 
        const checkInterval = setInterval(() => {
          if (this.isDestroyed) return clearInterval(checkInterval);
          if (globalThis.YT?.Player) { clearInterval(checkInterval); this.load(); }
          if (++retries > 50) { clearInterval(checkInterval); this.callbacks.onError?.(); }
        }, 100); 
        return;
      }
      
      const containerDiv = document.createElement('div'); 
      this.container.appendChild(containerDiv);
      const { videoId, isShort } = MediaUtils.parseYouTubeData(this.data.url);
      
      this.#player = new YT.Player(containerDiv, {
        videoId,
        playerVars: { autoplay: 1, controls: 0, loop: 0, mute: 1, modestbranding: 1, iv_load_policy: 3, rel: 0, playsinline: 1 },
        events: {
          onReady: (event) => {
            if (this.isDestroyed) return;
            const shouldBeMuted = this.isAmbient || GlobalState.isGlobalMuted;
            if (shouldBeMuted) event.target.mute(); 
            else { event.target.unMute(); event.target.setVolume(GlobalState.volume); }
            
            const iframe = event.target.getIframe(); 
            if (iframe) iframe.style.objectFit = (isShort || this.data.isVertical) ? 'cover' : 'contain';
            this.callbacks.onReady?.(event);
          },
          onStateChange: (event) => {
            if (this.isDestroyed) return;
            const stateMapping = { 
              [YT.PlayerState.PLAYING]: MEDIA_STATE.PLAYING, 
              [YT.PlayerState.PAUSED]: MEDIA_STATE.PAUSED, 
              [YT.PlayerState.BUFFERING]: MEDIA_STATE.BUFFERING, 
              [YT.PlayerState.ENDED]: MEDIA_STATE.ENDED 
            };
            this.emitStateChange(stateMapping[event.data] ?? MEDIA_STATE.UNSTARTED);
          },
          onError: (event) => {
            if (this.isDestroyed || !this.callbacks.onError) return;
            const isPlaybackDisabledExternal = event.data === 101 || event.data === 150, isVideoNotFound = event.data === 2;
            let customMessage = null;
            if (isPlaybackDisabledExternal) customMessage = "Pemilik video menonaktifkan pemutaran di situs eksternal.";
            else if (isVideoNotFound) customMessage = "ID Video tidak valid atau telah dihapus.";
            this.callbacks.onError(event, customMessage);
          }
        }
      });
    }
    
    play() {
      const needsToForceMute = !this.isAmbient && !GlobalState.userInteracted && !GlobalState.isGlobalMuted;
      if (needsToForceMute) { this.mute(); GlobalState.isGlobalMuted = true; AppEvents.emit('UI:SYNC_VOLUME'); }
      
      this.#player?.playVideo();
      clearTimeout(this.#autoplayCheckTimer);
      this.#autoplayCheckTimer = setTimeout(() => { 
        if (this.isDestroyed) return; 
        const state = this.#player?.getPlayerState(); 
        if (state === -1 || state === 5) this.emitStateChange(MEDIA_STATE.PAUSED); 
      }, APP_CONFIG.AUTOPLAY_CHECK_MS);
    }
    
    pause() { this.#player?.pauseVideo(); } 
    mute() { this.#player?.mute(); } 
    unMute() { this.#player?.unMute(); }
    seekTo(time) { this.#player?.seekTo(time, true); } 
    getCurrentTime() { return this.#player?.getCurrentTime() || 0; }
    getDuration() { return this.#player?.getDuration() || 0; } 
    setPlaybackRate(rate) { this.#player?.setPlaybackRate(rate); }
    isMuted() { return this.#player?.isMuted(); } 
    setVolume(level) { this.#player?.setVolume(level); }
    
    getState() { 
      const stateMapping = { [YT.PlayerState.PLAYING]: MEDIA_STATE.PLAYING, [YT.PlayerState.PAUSED]: MEDIA_STATE.PAUSED, [YT.PlayerState.BUFFERING]: MEDIA_STATE.BUFFERING, [YT.PlayerState.ENDED]: MEDIA_STATE.ENDED }; 
      return stateMapping[this.#player?.getPlayerState()] ?? MEDIA_STATE.UNSTARTED; 
    }
    
    destroy() { 
      this.isDestroyed = true;
      clearTimeout(this.#autoplayCheckTimer); 
      try { this.#player?.destroy(); } catch (e) {} 
      this.#player = null;
      super.destroy();
    }
  }

  class ImageMediaHandler extends BaseMediaHandler {
    #imageElement = null;
    #duration = 5;
    #currentTime = 0;
    #playbackState = MEDIA_STATE.UNSTARTED;
    #animationFrameTimer = null;
    #lastTickTime = 0;

    constructor(params) { 
      super(params); 
      this.#duration = this.data.duration || 5; 
    }

    load() {
      this.#imageElement = new Image(); 
      this.#imageElement.draggable = false;
      this.#imageElement.decoding = 'async';
      this.#imageElement.style.cssText = `width: 100%; height: 100%; object-fit: ${this.data.isVertical ? 'cover' : 'contain'}; pointer-events: none;`;
      this.#imageElement.src = this.data.url;
      
      if (this.#imageElement.decode) {
        this.#imageElement.decode().then(() => this.#handleSuccess()).catch(() => this.#handleError());
      } else { 
        this.#imageElement.onload = () => this.#handleSuccess(); 
        this.#imageElement.onerror = () => this.#handleError(); 
      }
    }

    #handleSuccess() { 
      if (this.isDestroyed) return; 
      this.container.appendChild(this.#imageElement); 
      this.#playbackState = MEDIA_STATE.PAUSED; 
      this.callbacks.onReady?.({ target: this }); 
    }

    #handleError() { 
      if (this.isDestroyed) return; 
      if (this.data.thumbnail && this.#imageElement.src !== this.data.thumbnail) { 
        this.#imageElement.src = this.data.thumbnail; 
        this.container.appendChild(this.#imageElement); 
      } else { 
        this.#playbackState = MEDIA_STATE.ENDED; 
        this.emitStateChange(this.#playbackState); 
        this.callbacks.onError?.(); 
      } 
    }

    #animationTick() {
      if (this.#playbackState !== MEDIA_STATE.PLAYING || this.isDestroyed) return;
      const now = performance.now(), deltaSeconds = Math.min((now - this.#lastTickTime) / 1000, 0.1);
      this.#currentTime += deltaSeconds; 
      this.#lastTickTime = now;
      
      if (this.#currentTime >= this.#duration) { 
        this.#currentTime = this.#duration; 
        this.#playbackState = MEDIA_STATE.ENDED; 
        this.emitStateChange(this.#playbackState); 
      } else {
        this.#animationFrameTimer = requestAnimationFrame(() => this.#animationTick());
      }
    }

    play() { 
      if (this.#playbackState === MEDIA_STATE.PLAYING) return; 
      if (this.#currentTime >= this.#duration) this.#currentTime = 0; 
      this.#playbackState = MEDIA_STATE.PLAYING; 
      this.#lastTickTime = performance.now(); 
      this.emitStateChange(this.#playbackState); 
      this.#animationTick(); 
    }

    pause() { 
      this.#playbackState = MEDIA_STATE.PAUSED; 
      cancelAnimationFrame(this.#animationFrameTimer); 
      this.emitStateChange(this.#playbackState); 
    }

    seekTo(time) { this.#currentTime = Math.max(0, Math.min(time, this.#duration)); } 
    getCurrentTime() { return this.#currentTime; }
    getDuration() { return this.#duration; } 
    getState() { return this.#playbackState; }
    
    destroy() { 
      cancelAnimationFrame(this.#animationFrameTimer); 
      this.#imageElement?.remove(); 
      this.#imageElement = null; 
      super.destroy(); 
    }
  }

  class HTML5VideoMediaHandler extends BaseMediaHandler {
    #videoElement = null;
    #abortController = null;

    load() {
      this.#videoElement = document.createElement('video'); 
      this.#videoElement.src = this.data.url;
      this.#videoElement.style.cssText = `width: 100%; height: 100%; object-fit: ${this.data.isVertical ? 'cover' : 'contain'};`;
      this.#videoElement.playsInline = true; 
      this.#videoElement.crossOrigin = 'anonymous';
      this.#videoElement.muted = this.isAmbient || GlobalState.isGlobalMuted; 
      this.#videoElement.volume = GlobalState.volume / 100;
      
      this.#abortController = new AbortController(); 
      this.container.appendChild(this.#videoElement); 
      this.#attachEvents();
    }

    #attachEvents() {
      const signal = this.#abortController.signal; 
      let hasFiredPlaying = false;
      const firePlaying = () => { 
        if (!this.isDestroyed && !hasFiredPlaying) { 
          hasFiredPlaying = true; 
          this.emitStateChange(MEDIA_STATE.PLAYING); 
        } 
      };
      
      const bindEvt = (evt, fn) => this.#videoElement.addEventListener(evt, fn, { signal });
      
      bindEvt('loadedmetadata', () => { if (!this.isDestroyed) this.callbacks.onReady?.({ target: this }); });
      bindEvt('playing', () => { if (this.#videoElement.readyState >= 3) firePlaying(); });
      bindEvt('timeupdate', () => { if (!hasFiredPlaying && this.#videoElement.currentTime > 0.05 && this.#videoElement.readyState >= 3) firePlaying(); });
      bindEvt('pause', () => { hasFiredPlaying = false; if (!this.isDestroyed) this.emitStateChange(MEDIA_STATE.PAUSED); });
      bindEvt('waiting', () => { hasFiredPlaying = false; if (!this.isDestroyed) this.emitStateChange(MEDIA_STATE.BUFFERING); });
      bindEvt('seeking', () => { hasFiredPlaying = false; if (!this.isDestroyed) this.emitStateChange(MEDIA_STATE.BUFFERING); });
      bindEvt('seeked', () => { if (!this.isDestroyed && !this.#videoElement.paused && this.#videoElement.readyState >= 3) firePlaying(); });
      bindEvt('ended', () => { hasFiredPlaying = false; if (!this.isDestroyed) this.emitStateChange(MEDIA_STATE.ENDED); });
      bindEvt('error', (e) => { if (!this.isDestroyed) this.callbacks.onError?.(e); });
    }

    play() {
      this.#videoElement?.play()?.then(() => { 
        if (this.isDestroyed) this.#videoElement?.pause(); 
      }).catch(error => {
        if (error.name === 'NotAllowedError' && !this.isAmbient) {
          this.mute(); 
          this.#videoElement?.play().catch(()=>{}); 
          GlobalState.isGlobalMuted = true; 
          AppEvents.emit('UI:SYNC_VOLUME');
          ToastService.show("Browser membisukan audio. Ketuk 🔇 untuk menyalakan suara.");
        } else {
          this.emitStateChange(MEDIA_STATE.PAUSED);
        }
      });
    }

    pause() { this.#videoElement?.pause(); } 
    mute() { if (this.#videoElement) this.#videoElement.muted = true; }
    unMute() { if (this.#videoElement) this.#videoElement.muted = false; } 
    seekTo(time) { if (this.#videoElement) this.#videoElement.currentTime = time; }
    getCurrentTime() { return this.#videoElement?.currentTime || 0; } 
    getDuration() { return this.#videoElement?.duration || 0; }
    setPlaybackRate(rate) { if (this.#videoElement) this.#videoElement.playbackRate = rate; } 
    isMuted() { return this.#videoElement?.muted || false; }
    setVolume(level) { if (this.#videoElement) this.#videoElement.volume = level / 100; }
    
    getState() { 
      if (!this.#videoElement) return MEDIA_STATE.UNSTARTED; 
      if (this.#videoElement.ended) return MEDIA_STATE.ENDED; 
      if (this.#videoElement.paused) return MEDIA_STATE.PAUSED; 
      if (this.#videoElement.readyState < 3) return MEDIA_STATE.BUFFERING; 
      return MEDIA_STATE.PLAYING; 
    }
    
    destroy() { 
      this.#abortController?.abort(); 
      this.#abortController = null; 
      if (this.#videoElement) { 
        this.#videoElement.removeAttribute('src'); 
        this.#videoElement.load(); 
        this.#videoElement.remove(); 
        this.#videoElement = null; 
      } 
      super.destroy(); 
    }
  }

  class MediaFactory {
    static create({ container, data, callbacks, isAmbient = false }) {
      const StrategyMap = { 'youtube': YouTubeMediaHandler, 'image': ImageMediaHandler, 'video': HTML5VideoMediaHandler };
      const HandlerClass = StrategyMap[data.type]; 
      return HandlerClass ? new HandlerClass({ container, data, callbacks, isAmbient }) : null;
    }
  }
